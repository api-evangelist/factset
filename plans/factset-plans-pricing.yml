specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Factset
providerId: factset
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial
  - Financial Data
  - Investment Analytics
  - Market Data
  - Portfolio Analytics
  - Research
description: FactSet sells its data and analytics platform — including the API portfolio (PA Engine, Formula,
  Prices, Estimates, Fundamentals, Real-Time News, ESG, Vermilion, Quant Engine, etc.) — under enterprise
  contracts negotiated through FactSet sales. There is no published list price or self-service tier.
  Most APIs require an existing FactSet workstation/subscription contract; many ship as add-on entitlements
  or are bundled with a Programmatic Environment commitment. The Open FactSet Marketplace exposes partner
  data via the same authenticated channel.
notes: FactSet does not publish list prices for any API. Plans below describe the commercial pattern observed
  on the developer portal (developer.factset.com) — Trial via developer signup, Subscription bundled
  with FactSet workstation seats, Programmatic Environment for high-volume API consumers, and Enterprise
  for negotiated multi-product / multi-region contracts.
sources:
  - https://developer.factset.com/
  - https://www.factset.com/pricing
plans:
  - id: factset-developer-trial
    name: Developer Trial
    type: freemium
    description: Self-service developer signup at developer.factset.com provides interactive API documentation
      and limited test access tied to a developer account; full data access requires an active FactSet
      contract.
    entries:
      - label: Developer access
        description: Read-only documentation; sandbox / interactive API access requires entitlement.
        name: developer_access
        type: quota
        metric: requests
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: developer.factset.com signup
      - name: Interactive API docs
      - name: Limited test endpoints
  - id: factset-subscription
    name: Subscription (per FactSet Workstation)
    type: subscription
    description: API entitlements are typically bundled with FactSet workstation seats and product subscriptions.
      List rate not published; quoted per seat / per product / per data feed.
    entries:
      - label: Workstation seat
        description: Per-user seat fee — covers FactSet platform + selected APIs depending on entitled
          products.
        name: workstation_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: FactSet Workstation
      - name: Bundled API entitlements (Formula, PA, Prices, Estimates, Fundamentals)
      - name: Standard support
  - id: factset-programmatic-environment
    name: Programmatic Environment
    type: enterprise
    description: Add-on commitment for high-volume API consumers — covers the FactSet Programmatic Environment,
      higher request quotas, batch interfaces, and dedicated entitlement.
    entries:
      - label: Programmatic Environment commitment
        description: Annual commitment for elevated API throughput and batch processing.
        name: programmatic_commitment
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: FactSet Programmatic Environment API
      - name: Higher API rate ceilings
      - name: Batch endpoints (Fixed Income Analytics Batcher, Portfolio Reporting Batcher, etc.)
  - id: factset-enterprise
    name: Enterprise (Multi-Product / Multi-Region)
    type: enterprise
    description: Custom-negotiated bundle covering multiple FactSet products (Vermilion, Axioma, Barra,
      Northfield, Tick History, Real-Time, Open FactSet Marketplace partner data, etc.). Includes contractual
      SLA, data residency, dedicated support.
    entries:
      - label: Custom bundle
        description: Negotiated annual contract; price varies by product mix, data redistribution rights,
          and seat count.
        name: enterprise_bundle
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: All FactSet APIs
      - name: Real-Time market data feeds
      - name: Open FactSet Marketplace partner data
      - name: Vermilion regulatory reporting
      - name: Axioma / Barra / Northfield optimizers
      - name: Dedicated technical account manager
      - name: 24/7 support
      - name: Data residency options
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
