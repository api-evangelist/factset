specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Factset
providerId: factset
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial
  - Financial Data
  - Investment Analytics
  - Market Data
  - Portfolio Analytics
  - Research
  - Rate Limiting
description: FactSet does not publish global per-second rate limit numbers in its public developer documentation.
  Each API has product-specific guidance — long-running analytics calls (PA Engine, SPAR, Vault, Axioma,
  Barra, Northfield, Optimization Engine) follow an asynchronous submit-and-poll pattern; batch APIs
  (Fixed Income Analytics Batcher, Portfolio Reporting Batcher, Quant Engine) accept job submissions
  governed by the Programmatic Environment commitment; real-time APIs (Real-Time Quotes, Real-Time News,
  Real-Time Options/Futures) are streaming and limited by the entitled feed bandwidth. Throughput ceilings
  are tied to the customer's contractual entitlement rather than a public tier.
notes: No public per-second numbers. Rate limits are entitlement-bound and negotiated per contract; consult
  the entitlement record in the FactSet developer portal for the deployed environment.
sources:
  - https://developer.factset.com/
responseCodes:
  throttled: 429
  serverError: 500
  serviceUnavailable: 503
  unauthorized: 401
  forbidden: 403
limits:
  - name: Synchronous APIs (Formula, Prices, Fundamentals, Estimates, ESG, etc.)
    scope: contract
    metric: varies
    limit: per-contract entitlement; not publicly published
  - name: Asynchronous engines (PA, SPAR, Vault, Axioma, Barra, Northfield, Optimization)
    scope: contract
    metric: concurrent_jobs
    limit: per-contract entitlement; submit-and-poll pattern with task IDs
  - name: Batch APIs (Fixed Income Analytics Batcher, Portfolio Reporting Batcher, Quant Engine)
    scope: contract
    metric: jobs_per_day
    limit: governed by Programmatic Environment commitment
  - name: Real-time streams (Real-Time Quotes, Real-Time News, Real-Time Options/Futures, Direct Streaming
      of Transaction Messages)
    scope: feed
    metric: messages_per_second
    limit: bounded by entitled feed; streaming connection; no per-call ceiling
  - name: Exchange DataFeed Snapshot
    scope: contract
    metric: snapshots_per_day
    limit: per-entitlement
policies:
  - name: Async submit + poll
    description: Long-running analytics requests return a 202 with a task URL — poll the location header
      for completion; do not retry submit while a task is in progress.
  - name: OAuth 2.0 / Service Accounts
    description: Authenticate via OAuth 2.0 client credentials with FactSet-issued service accounts; rotate
      credentials before expiry.
  - name: Backoff on 429/503
    description: Exponential backoff with jitter on transient errors; honor Retry-After when present.
  - name: Pagination
    description: Use cursor-based pagination on list endpoints; do not parallel-page beyond 4-8 concurrent
      page requests per API.
  - name: Streaming reconnection
    description: Real-time feeds use WebSocket / streaming HTTP; on disconnect, reconnect with exponential
      backoff and resume from last sequence number.
