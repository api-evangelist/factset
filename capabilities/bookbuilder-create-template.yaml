naftiko: 1.0.0-alpha2
info:
  label: Factset BookBuilder — Create Template
  description: 'Factset BookBuilder — Create Template. 1 operations. Lead operation: Factset Kick off request to create template
    with reports of your choice. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Create Template
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: bookbuilder-create-template
    baseUri: https://api.factset.com/book-builder-api
    description: Factset BookBuilder — Create Template business capability. Self-contained, no shared references.
    resources:
    - name: v1-create-template
      path: /v1/create-template/
      operations:
      - name: post
        method: POST
        description: Factset Kick off request to create template with reports of your choice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: bookbuilder-create-template-rest
    port: 8080
    description: REST adapter for Factset BookBuilder — Create Template. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/create-template
      name: v1-create-template
      description: REST surface for v1-create-template.
      operations:
      - method: POST
        name: post
        description: Factset Kick off request to create template with reports of your choice
        call: bookbuilder-create-template.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bookbuilder-create-template-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset BookBuilder — Create Template. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-kick-off-request-create
      description: Factset Kick off request to create template with reports of your choice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookbuilder-create-template.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
