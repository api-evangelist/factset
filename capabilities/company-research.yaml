naftiko: "1.0.0-alpha1"

info:
  label: "FactSet Company Research"
  description: "Unified workflow for company research including entity data, fundamentals, people, concordance, symbology, classifications, ESG, and ownership. Used by research analysts."
  tags:
    - FactSet
    - Company Research
    - Entity Data
    - Fundamentals
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD

capability:
  consumes:
    - import: factset-entity
      location: ./shared/entity.yaml
    - import: factset-fundamentals
      location: ./shared/fundamentals.yaml
    - import: factset-people
      location: ./shared/people.yaml
    - import: factset-concordance
      location: ./shared/concordance.yaml
    - import: factset-symbology
      location: ./shared/symbology.yaml
    - import: factset-classifications
      location: ./shared/classifications.yaml
    - import: factset-rbics
      location: ./shared/rbics.yaml
    - import: factset-esg
      location: ./shared/esg.yaml
    - import: factset-ownership
      location: ./shared/ownership.yaml
    - import: factset-georev
      location: ./shared/georev.yaml
    - import: factset-id-lookup
      location: ./shared/id-lookup.yaml

  exposes:
    - type: rest
      port: 8083
      namespace: company-research-api
      description: "Unified REST API for company research."
      resources:
        - path: /v1/entities
          name: entities
          description: "Entity data."
          operations:
            - method: GET
              name: get-entities
              description: "Get entity data."
              call: "factset-entity.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/fundamentals
          name: fundamentals
          description: "Fundamental data."
          operations:
            - method: GET
              name: get-fundamentals
              description: "Get fundamentals."
              call: "factset-fundamentals.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/people
          name: people
          description: "People data."
          operations:
            - method: GET
              name: get-people
              description: "Get people data."
              call: "factset-people.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/concordance
          name: concordance
          description: "Entity concordance."
          operations:
            - method: GET
              name: concord
              description: "Concordance lookup."
              call: "factset-concordance.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/esg
          name: esg
          description: "ESG data."
          operations:
            - method: GET
              name: get-esg
              description: "Get ESG data."
              call: "factset-esg.list"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9083
      namespace: company-research-mcp
      transport: http
      description: "MCP server for AI-assisted company research."
      tools:
        - name: get-entity
          description: "Get entity reference data."
          hints:
            readOnly: true
          call: "factset-entity.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-fundamentals
          description: "Get fundamental financial data."
          hints:
            readOnly: true
          call: "factset-fundamentals.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-people
          description: "Get people profiles."
          hints:
            readOnly: true
          call: "factset-people.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: concordance-lookup
          description: "Concordance entity lookup."
          hints:
            readOnly: true
          call: "factset-concordance.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: symbology-translate
          description: "Translate between identifier types."
          hints:
            readOnly: true
          call: "factset-symbology.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-classifications
          description: "Get industry classifications."
          hints:
            readOnly: true
          call: "factset-classifications.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-rbics
          description: "Get RBICS classifications."
          hints:
            readOnly: true
          call: "factset-rbics.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-esg
          description: "Get ESG scores."
          hints:
            readOnly: true
          call: "factset-esg.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-ownership
          description: "Get ownership data."
          hints:
            readOnly: true
          call: "factset-ownership.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-georev
          description: "Get geographic revenue."
          hints:
            readOnly: true
          call: "factset-georev.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: id-lookup
          description: "Look up security identifiers."
          hints:
            readOnly: true
          call: "factset-id-lookup.list"
          outputParameters:
            - type: object
              mapping: "$."
