naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Data
  description: 'FactSet Real-Time Quotes API — Data. 1 operations. Lead operation: Factset Interest Rate Details for Selected
    Periods of an Interest-bearing Instrument.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-data
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Data business capability. Self-contained, no shared references.
    resources:
    - name: instrument-coupon-keyData-get
      path: /instrument/coupon/keyData/get
      operations:
      - name: getinstrumentcouponkeydataget
        method: GET
        description: Factset Interest Rate Details for Selected Periods of an Interest-bearing Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-data-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Data. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/instrument/coupon/keydata/get
      name: instrument-coupon-keydata-get
      description: REST surface for instrument-coupon-keyData-get.
      operations:
      - method: GET
        name: getinstrumentcouponkeydataget
        description: Factset Interest Rate Details for Selected Periods of an Interest-bearing Instrument.
        call: real-time-quotes-data.getinstrumentcouponkeydataget
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Data. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-interest-rate-details-selected
      description: Factset Interest Rate Details for Selected Periods of an Interest-bearing Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-data.getinstrumentcouponkeydataget
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
