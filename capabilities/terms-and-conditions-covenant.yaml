naftiko: 1.0.0-alpha2
info:
  label: FactSet Terms and Conditions API — Covenant
  description: 'FactSet Terms and Conditions API — Covenant. 2 operations. Lead operation: Factset Return Covenant Details
    for a Fixed Income Security.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Covenant
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: terms-and-conditions-covenant
    baseUri: https://api.factset.com/content
    description: FactSet Terms and Conditions API — Covenant business capability. Self-contained, no shared references.
    resources:
    - name: factset-terms-and-conditions-v1-covenant-details
      path: /factset-terms-and-conditions/v1/covenant-details
      operations:
      - name: getcovenantdetails
        method: GET
        description: Factset Return Covenant Details for a Fixed Income Security.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getcovenantdetailsforlist
        method: POST
        description: Factset Return Covenant Details for a List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: terms-and-conditions-covenant-rest
    port: 8080
    description: REST adapter for FactSet Terms and Conditions API — Covenant. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/factset-terms-and-conditions/v1/covenant-details
      name: factset-terms-and-conditions-v1-covenant-details
      description: REST surface for factset-terms-and-conditions-v1-covenant-details.
      operations:
      - method: GET
        name: getcovenantdetails
        description: Factset Return Covenant Details for a Fixed Income Security.
        call: terms-and-conditions-covenant.getcovenantdetails
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getcovenantdetailsforlist
        description: Factset Return Covenant Details for a List of Fixed Income Securities.
        call: terms-and-conditions-covenant.getcovenantdetailsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terms-and-conditions-covenant-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Terms and Conditions API — Covenant. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-return-covenant-details-fixed
      description: Factset Return Covenant Details for a Fixed Income Security.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-covenant.getcovenantdetails
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-covenant-details-list
      description: Factset Return Covenant Details for a List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: terms-and-conditions-covenant.getcovenantdetailsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
