naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time News API — Distributor
  description: 'FactSet Real-Time News API — Distributor. 3 operations. Lead operation: Factset Details of a Distributor..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Distributor
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-news-distributor
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time News API — Distributor business capability. Self-contained, no shared references.
    resources:
    - name: news-distributor-get
      path: /news/distributor/get
      operations:
      - name: getnewsdistributorget
        method: GET
        description: Factset Details of a Distributor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: number
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    - name: news-distributor-list
      path: /news/distributor/list
      operations:
      - name: getnewsdistributorlist
        method: GET
        description: Factset List of Distributors.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ids
          in: query
          type: array
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 1 (possibly prefixed
    - name: news-publisher-listByDistributor
      path: /news/publisher/listByDistributor
      operations:
      - name: getnewspublisherlistbydistributor
        method: GET
        description: Factset List of Publishers Provided by the Given Distributor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: number
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 1 (possibly prefixed
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-news-distributor-rest
    port: 8080
    description: REST adapter for FactSet Real-Time News API — Distributor. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/news/distributor/get
      name: news-distributor-get
      description: REST surface for news-distributor-get.
      operations:
      - method: GET
        name: getnewsdistributorget
        description: Factset Details of a Distributor.
        call: real-time-news-distributor.getnewsdistributorget
        with:
          id: rest.id
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/news/distributor/list
      name: news-distributor-list
      description: REST surface for news-distributor-list.
      operations:
      - method: GET
        name: getnewsdistributorlist
        description: Factset List of Distributors.
        call: real-time-news-distributor.getnewsdistributorlist
        with:
          ids: rest.ids
          _attributes: rest._attributes
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/news/publisher/listbydistributor
      name: news-publisher-listbydistributor
      description: REST surface for news-publisher-listByDistributor.
      operations:
      - method: GET
        name: getnewspublisherlistbydistributor
        description: Factset List of Publishers Provided by the Given Distributor.
        call: real-time-news-distributor.getnewspublisherlistbydistributor
        with:
          id: rest.id
          _attributes: rest._attributes
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-news-distributor-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time News API — Distributor. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-details-distributor
      description: Factset Details of a Distributor.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-news-distributor.getnewsdistributorget
      with:
        id: tools.id
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-distributors
      description: Factset List of Distributors.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-news-distributor.getnewsdistributorlist
      with:
        ids: tools.ids
        _attributes: tools._attributes
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-publishers-provided-given
      description: Factset List of Publishers Provided by the Given Distributor.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-news-distributor.getnewspublisherlistbydistributor
      with:
        id: tools.id
        _attributes: tools._attributes
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
