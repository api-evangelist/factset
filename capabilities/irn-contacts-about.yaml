naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Contacts API — About
  description: 'FactSet IRN Contacts API — About. 1 operations. Lead operation: Factset Get the About Field Content for a
    Specific Contact. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - About
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-contacts-about
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Contacts API — About business capability. Self-contained, no shared references.
    resources:
    - name: v1-contacts-contactId-about
      path: /v1/contacts/{contactId}/about
      operations:
      - name: getcontactnotes
        method: GET
        description: Factset Get the About Field Content for a Specific Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: path
          type: string
          description: contactId of associated record
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-contacts-about-rest
    port: 8080
    description: REST adapter for FactSet IRN Contacts API — About. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/contacts/{contactid}/about
      name: v1-contacts-contactid-about
      description: REST surface for v1-contacts-contactId-about.
      operations:
      - method: GET
        name: getcontactnotes
        description: Factset Get the About Field Content for a Specific Contact
        call: irn-contacts-about.getcontactnotes
        with:
          contactId: rest.contactId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-contacts-about-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Contacts API — About. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-about-field-content
      description: Factset Get the About Field Content for a Specific Contact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-contacts-about.getcontactnotes
      with:
        contactId: tools.contactId
      outputParameters:
      - type: object
        mapping: $.
