naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Documents
  description: 'Factset PA Engine API — Documents. 1 operations. Lead operation: Factset Get Pa3 Documents and Sub-directories
    in a Directory. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Documents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-documents
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Documents business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-documents-path
      path: /analytics/engines/pa/v3/documents/{path}
      operations:
      - name: getpa3documents
        method: GET
        description: Factset Get Pa3 Documents and Sub-directories in a Directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: The directory to get the documents and sub-directories in
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-documents-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Documents. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/documents/{path}
      name: analytics-engines-pa-v3-documents-path
      description: REST surface for analytics-engines-pa-v3-documents-path.
      operations:
      - method: GET
        name: getpa3documents
        description: Factset Get Pa3 Documents and Sub-directories in a Directory
        call: pa-engine-documents.getpa3documents
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-documents-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Documents. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-pa3-documents-and
      description: Factset Get Pa3 Documents and Sub-directories in a Directory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-documents.getpa3documents
      with:
        path: tools.path
      outputParameters:
      - type: object
        mapping: $.
