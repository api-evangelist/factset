naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Columns
  description: 'Factset PA Engine API — Columns. 2 operations. Lead operation: Factset Get Pa Columns. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Columns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-columns
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Columns business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-columns
      path: /analytics/engines/pa/v3/columns
      operations:
      - name: getpacolumns
        method: GET
        description: Factset Get Pa Columns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Column name
        - name: category
          in: query
          type: string
          description: Column category
        - name: directory
          in: query
          type: string
          description: The directory to get the columns in
    - name: analytics-engines-pa-v3-columns-id
      path: /analytics/engines/pa/v3/columns/{id}
      operations:
      - name: getpacolumnbyid
        method: GET
        description: Factset Get Pa Column Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for a column
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-columns-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Columns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/columns
      name: analytics-engines-pa-v3-columns
      description: REST surface for analytics-engines-pa-v3-columns.
      operations:
      - method: GET
        name: getpacolumns
        description: Factset Get Pa Columns
        call: pa-engine-columns.getpacolumns
        with:
          name: rest.name
          category: rest.category
          directory: rest.directory
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/engines/pa/v3/columns/{id}
      name: analytics-engines-pa-v3-columns-id
      description: REST surface for analytics-engines-pa-v3-columns-id.
      operations:
      - method: GET
        name: getpacolumnbyid
        description: Factset Get Pa Column Settings
        call: pa-engine-columns.getpacolumnbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-columns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Columns. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-pa-columns
      description: Factset Get Pa Columns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-columns.getpacolumns
      with:
        name: tools.name
        category: tools.category
        directory: tools.directory
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-pa-column-settings
      description: Factset Get Pa Column Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-columns.getpacolumnbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
