naftiko: 1.0.0-alpha2
info:
  label: FactSet Northfield Portfolio Optimizer — Currencies
  description: 'FactSet Northfield Portfolio Optimizer — Currencies. 1 operations. Lead operation: Factset Get Currencies.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Currencies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: northfield-portfolio-optimizer-currencies
    baseUri: https://api.factset.com
    description: FactSet Northfield Portfolio Optimizer — Currencies business capability. Self-contained, no shared references.
    resources:
    - name: analytics-lookups-v3-currencies
      path: /analytics/lookups/v3/currencies
      operations:
      - name: getcurrencies
        method: GET
        description: Factset Get Currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: northfield-portfolio-optimizer-currencies-rest
    port: 8080
    description: REST adapter for FactSet Northfield Portfolio Optimizer — Currencies. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/lookups/v3/currencies
      name: analytics-lookups-v3-currencies
      description: REST surface for analytics-lookups-v3-currencies.
      operations:
      - method: GET
        name: getcurrencies
        description: Factset Get Currencies
        call: northfield-portfolio-optimizer-currencies.getcurrencies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: northfield-portfolio-optimizer-currencies-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Northfield Portfolio Optimizer — Currencies. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-get-currencies
      description: Factset Get Currencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: northfield-portfolio-optimizer-currencies.getcurrencies
      outputParameters:
      - type: object
        mapping: $.
