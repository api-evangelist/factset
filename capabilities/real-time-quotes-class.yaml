naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Class
  description: 'FactSet Real-Time Quotes API — Class. 1 operations. Lead operation: Factset List of Asset Classes.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Class
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-class
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Class business capability. Self-contained, no shared references.
    resources:
    - name: basic-assetClass-list
      path: /basic/assetClass/list
      operations:
      - name: getbasicassetclasslist
        method: GET
        description: Factset List of Asset Classes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-class-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Class. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basic/assetclass/list
      name: basic-assetclass-list
      description: REST surface for basic-assetClass-list.
      operations:
      - method: GET
        name: getbasicassetclasslist
        description: Factset List of Asset Classes.
        call: real-time-quotes-class.getbasicassetclasslist
        with:
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-class-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Class. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-list-asset-classes
      description: Factset List of Asset Classes.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-class.getbasicassetclasslist
      with:
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
