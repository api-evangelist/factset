naftiko: 1.0.0-alpha2
info:
  label: Factset Portfolio Metadata — User Defined Field
  description: 'Factset Portfolio Metadata — User Defined Field. 2 operations. Lead operation: User Defined Field. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - User Defined Field
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-user-defined-field
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: Factset Portfolio Metadata — User Defined Field business capability. Self-contained, no shared references.
    resources:
    - name: user-defined-field
      path: /user-defined-field
      operations:
      - name: listuserdefinedfields
        method: GET
        description: List user defined fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database
          in: query
          type: string
          description: Database where the fields are defined.
        - name: name
          in: query
          type: string
          description: Return only fields whose name includes this query
        - name: group
          in: query
          type: string
          description: Return only fields whose group includes this query
        - name: _paginationLimit
          in: query
          type: number
          description: Number of fields to return
        - name: _paginationCursor
          in: query
          type: string
          description: Cursor used for paging.  Fetch items after the specified cursor
    - name: user-defined-field-id
      path: /user-defined-field/{id}
      operations:
      - name: readuserdefinedfield
        method: GET
        description: Read a user defined field
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the user defined field to be read
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-user-defined-field-rest
    port: 8080
    description: REST adapter for Factset Portfolio Metadata — User Defined Field. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/user-defined-field
      name: user-defined-field
      description: REST surface for user-defined-field.
      operations:
      - method: GET
        name: listuserdefinedfields
        description: List user defined fields
        call: portfolio-metadata-user-defined-field.listuserdefinedfields
        with:
          database: rest.database
          name: rest.name
          group: rest.group
          _paginationLimit: rest._paginationLimit
          _paginationCursor: rest._paginationCursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user-defined-field/{id}
      name: user-defined-field-id
      description: REST surface for user-defined-field-id.
      operations:
      - method: GET
        name: readuserdefinedfield
        description: Read a user defined field
        call: portfolio-metadata-user-defined-field.readuserdefinedfield
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-user-defined-field-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Portfolio Metadata — User Defined Field. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-user-defined-fields
      description: List user defined fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-user-defined-field.listuserdefinedfields
      with:
        database: tools.database
        name: tools.name
        group: tools.group
        _paginationLimit: tools._paginationLimit
        _paginationCursor: tools._paginationCursor
      outputParameters:
      - type: object
        mapping: $.
    - name: read-user-defined-field
      description: Read a user defined field
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-user-defined-field.readuserdefinedfield
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
