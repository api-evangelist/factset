naftiko: 1.0.0-alpha2
info:
  label: FactSet Content Feeds Data Dictionary — Products
  description: 'FactSet Content Feeds Data Dictionary — Products. 1 operations. Lead operation: Factset Get the List of Products
    for Navigator.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-feeds-data-dictionary-products
    baseUri: https://api.factset.com/data-dictionary
    description: FactSet Content Feeds Data Dictionary — Products business capability. Self-contained, no shared references.
    resources:
    - name: navigator-products
      path: /navigator/products
      operations:
      - name: get
        method: GET
        description: Factset Get the List of Products for Navigator.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: content-feeds-data-dictionary-products-rest
    port: 8080
    description: REST adapter for FactSet Content Feeds Data Dictionary — Products. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/navigator/products
      name: navigator-products
      description: REST surface for navigator-products.
      operations:
      - method: GET
        name: get
        description: Factset Get the List of Products for Navigator.
        call: content-feeds-data-dictionary-products.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-feeds-data-dictionary-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Content Feeds Data Dictionary — Products. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-get-list-products-navigator
      description: Factset Get the List of Products for Navigator.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-feeds-data-dictionary-products.get
      outputParameters:
      - type: object
        mapping: $.
