naftiko: 1.0.0-alpha2
info:
  label: FactSet Securitized Derivatives API for Digital Portals — Underlying
  description: 'FactSet Securitized Derivatives API for Digital Portals — Underlying. 1 operations. Lead operation: Factset
    List of Underlyings With Barrier and Cash Flow Information.. Self-contained Naftiko capability covering one Factset business
    surface.'
  tags:
  - Factset
  - Underlying
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: securitized-derivatives-api-for-digital-portals-underlying
    baseUri: https://api.factset.com/wealth/v1
    description: FactSet Securitized Derivatives API for Digital Portals — Underlying business capability. Self-contained,
      no shared references.
    resources:
    - name: securitizedDerivative-underlying-list
      path: /securitizedDerivative/underlying/list
      operations:
      - name: getsecuritizedderivativeunderlyinglist
        method: GET
        description: Factset List of Underlyings With Barrier and Cash Flow Information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: securitized-derivatives-api-for-digital-portals-underlying-rest
    port: 8080
    description: REST adapter for FactSet Securitized Derivatives API for Digital Portals — Underlying. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/securitizedderivative/underlying/list
      name: securitizedderivative-underlying-list
      description: REST surface for securitizedDerivative-underlying-list.
      operations:
      - method: GET
        name: getsecuritizedderivativeunderlyinglist
        description: Factset List of Underlyings With Barrier and Cash Flow Information.
        call: securitized-derivatives-api-for-digital-portals-underlying.getsecuritizedderivativeunderlyinglist
        with:
          id: rest.id
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: securitized-derivatives-api-for-digital-portals-underlying-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Securitized Derivatives API for Digital Portals — Underlying. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: factset-list-underlyings-barrier-and
      description: Factset List of Underlyings With Barrier and Cash Flow Information.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: securitized-derivatives-api-for-digital-portals-underlying.getsecuritizedderivativeunderlyinglist
      with:
        id: tools.id
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
