naftiko: 1.0.0-alpha2
info:
  label: FactSet Trading and Operations
  description: Unified workflow for trading and operations including order management, private markets, event calendars, security
    modeling, and user provisioning. Used by operations teams.
  tags:
  - FactSet
  - Trading
  - Operations
  - Administration
  created: '2026-04-18'
  modified: '2026-05-06'
