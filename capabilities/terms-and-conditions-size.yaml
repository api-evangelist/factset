naftiko: 1.0.0-alpha2
info:
  label: FactSet Terms and Conditions API — Size
  description: 'FactSet Terms and Conditions API — Size. 2 operations. Lead operation: Factset Return Issue Size Data for
    a List of Fixed Income Securities.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Size
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: terms-and-conditions-size
    baseUri: https://api.factset.com/content
    description: FactSet Terms and Conditions API — Size business capability. Self-contained, no shared references.
    resources:
    - name: factset-terms-and-conditions-v1-issue-size
      path: /factset-terms-and-conditions/v1/issue-size
      operations:
      - name: getissuesize
        method: GET
        description: Factset Return Issue Size Data for a List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getissuesizeforlist
        method: POST
        description: Factset Return Issue Size Data for a Large List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: terms-and-conditions-size-rest
    port: 8080
    description: REST adapter for FactSet Terms and Conditions API — Size. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-terms-and-conditions/v1/issue-size
      name: factset-terms-and-conditions-v1-issue-size
      description: REST surface for factset-terms-and-conditions-v1-issue-size.
      operations:
      - method: GET
        name: getissuesize
        description: Factset Return Issue Size Data for a List of Fixed Income Securities.
        call: terms-and-conditions-size.getissuesize
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getissuesizeforlist
        description: Factset Return Issue Size Data for a Large List of Fixed Income Securities.
        call: terms-and-conditions-size.getissuesizeforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terms-and-conditions-size-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Terms and Conditions API — Size. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-return-issue-size-data
      description: Factset Return Issue Size Data for a List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-size.getissuesize
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-issue-size-data-2
      description: Factset Return Issue Size Data for a Large List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: terms-and-conditions-size.getissuesizeforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
