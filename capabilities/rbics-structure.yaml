naftiko: 1.0.0-alpha2
info:
  label: FactSet RBICS API — Structure
  description: 'FactSet RBICS API — Structure. 2 operations. Lead operation: Factset Get the Full Rbics Taxonomy Structure
    Ids, Names, and Effective Periods.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Structure
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: rbics-structure
    baseUri: https://api.factset.com/content
    description: FactSet RBICS API — Structure business capability. Self-contained, no shared references.
    resources:
    - name: factset-rbics-v1-structure
      path: /factset-rbics/v1/structure
      operations:
      - name: getrbicsstructure
        method: GET
        description: Factset Get the Full Rbics Taxonomy Structure Ids, Names, and Effective Periods.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getrbicsstructureforlist
        method: POST
        description: Factset Get the Full Rbics Taxonomy Structure Ids, Names, and Effective Periods.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: rbics-structure-rest
    port: 8080
    description: REST adapter for FactSet RBICS API — Structure. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-rbics/v1/structure
      name: factset-rbics-v1-structure
      description: REST surface for factset-rbics-v1-structure.
      operations:
      - method: GET
        name: getrbicsstructure
        description: Factset Get the Full Rbics Taxonomy Structure Ids, Names, and Effective Periods.
        call: rbics-structure.getrbicsstructure
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getrbicsstructureforlist
        description: Factset Get the Full Rbics Taxonomy Structure Ids, Names, and Effective Periods.
        call: rbics-structure.getrbicsstructureforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rbics-structure-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet RBICS API — Structure. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-full-rbics-taxonomy
      description: Factset Get the Full Rbics Taxonomy Structure Ids, Names, and Effective Periods.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rbics-structure.getrbicsstructure
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-full-rbics-taxonomy-2
      description: Factset Get the Full Rbics Taxonomy Structure Ids, Names, and Effective Periods.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: rbics-structure.getrbicsstructureforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
