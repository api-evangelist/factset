naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Notes API — Record
  description: 'FactSet IRN Notes API — Record. 1 operations. Lead operation: Factset Get Details of a Record Event of a Note.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Record
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-notes-record
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Notes API — Record business capability. Self-contained, no shared references.
    resources:
    - name: v1-notes-noteId-events-recordEventId
      path: /v1/notes/{noteId}/events/{recordEventId}
      operations:
      - name: getrecordevent
        method: GET
        description: Factset Get Details of a Record Event of a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          description: Note Id
          required: true
        - name: recordEventId
          in: path
          type: string
          description: Record Event Id
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: irn-notes-record-rest
    port: 8080
    description: REST adapter for FactSet IRN Notes API — Record. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/notes/{noteid}/events/{recordeventid}
      name: v1-notes-noteid-events-recordeventid
      description: REST surface for v1-notes-noteId-events-recordEventId.
      operations:
      - method: GET
        name: getrecordevent
        description: Factset Get Details of a Record Event of a Note
        call: irn-notes-record.getrecordevent
        with:
          noteId: rest.noteId
          recordEventId: rest.recordEventId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-notes-record-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Notes API — Record. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-details-record-event
      description: Factset Get Details of a Record Event of a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-record.getrecordevent
      with:
        noteId: tools.noteId
        recordEventId: tools.recordEventId
      outputParameters:
      - type: object
        mapping: $.
