naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Metadata API — Trade
  description: 'FactSet Portfolio Metadata API — Trade. 1 operations. Lead operation: Trade. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Trade
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-trade
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: FactSet Portfolio Metadata API — Trade business capability. Self-contained, no shared references.
    resources:
    - name: trade-data-id
      path: /trade-data/{id}
      operations:
      - name: readtradedata
        method: GET
        description: Read a trade data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the trade data to be read
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-trade-rest
    port: 8080
    description: REST adapter for FactSet Portfolio Metadata API — Trade. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/trade-data/{id}
      name: trade-data-id
      description: REST surface for trade-data-id.
      operations:
      - method: GET
        name: readtradedata
        description: Read a trade data
        call: portfolio-metadata-trade.readtradedata
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-trade-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Portfolio Metadata API — Trade. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: read-trade-data
      description: Read a trade data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-trade.readtradedata
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
