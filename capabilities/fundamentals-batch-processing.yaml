    resources:
    - name: batch-result
      path: /batch-result
      operations:
      - name: getbatchresult
        method: GET
        description: Factset Returns the Response for a Batch Request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
