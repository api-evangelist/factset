naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Ask
  description: 'FactSet Real-Time Quotes API — Ask. 2 operations. Lead operation: Factset Most Recent Bid and Ask Prices (best
    Bid / Offer) for a Notation.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Ask
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-ask
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Ask business capability. Self-contained, no shared references.
    resources:
    - name: prices-bidAsk-get
      path: /prices/bidAsk/get
      operations:
      - name: getpricesbidaskget
        method: GET
        description: Factset Most Recent Bid and Ask Prices (best Bid / Offer) for a Notation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: quality
          in: query
          type: string
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _subscriptionMinimumInterval
          in: query
          type: number
          description: Minimum number of milliseconds at which updates are send.
    - name: prices-bidAsk-list
      path: /prices/bidAsk/list
      operations:
      - name: getpricesbidasklist
        method: GET
        description: Factset Most Recent Bid and Ask Prices (best Bid / Offer) for a List of Notations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifiers
          in: query
          type: array
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: quality
          in: query
          type: string
        - name: sameQuality
          in: query
          type: boolean
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-ask-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Ask. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/prices/bidask/get
      name: prices-bidask-get
      description: REST surface for prices-bidAsk-get.
      operations:
      - method: GET
        name: getpricesbidaskget
        description: Factset Most Recent Bid and Ask Prices (best Bid / Offer) for a Notation.
        call: real-time-quotes-ask.getpricesbidaskget
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          quality: rest.quality
          _attributes: rest._attributes
          _subscriptionMinimumInterval: rest._subscriptionMinimumInterval
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/prices/bidask/list
      name: prices-bidask-list
      description: REST surface for prices-bidAsk-list.
      operations:
      - method: GET
        name: getpricesbidasklist
        description: Factset Most Recent Bid and Ask Prices (best Bid / Offer) for a List of Notations.
        call: real-time-quotes-ask.getpricesbidasklist
        with:
          identifiers: rest.identifiers
          identifierType: rest.identifierType
          quality: rest.quality
          sameQuality: rest.sameQuality
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-ask-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Ask. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-most-recent-bid-and
      description: Factset Most Recent Bid and Ask Prices (best Bid / Offer) for a Notation.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-ask.getpricesbidaskget
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        quality: tools.quality
        _attributes: tools._attributes
        _subscriptionMinimumInterval: tools._subscriptionMinimumInterval
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-most-recent-bid-and-2
      description: Factset Most Recent Bid and Ask Prices (best Bid / Offer) for a List of Notations.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-ask.getpricesbidasklist
      with:
        identifiers: tools.identifiers
        identifierType: tools.identifierType
        quality: tools.quality
        sameQuality: tools.sameQuality
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
