naftiko: 1.0.0-alpha2
info:
  label: FactSet SCIM API — Group
  description: 'FactSet SCIM API — Group. 3 operations. Lead operation: Factset Get a group.. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Group
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: procure-to-pay-api-scim-group
    baseUri: https://api.factset.com/scim/v2
    description: FactSet SCIM API — Group business capability. Self-contained, no shared references.
    resources:
    - name: Group-id
      path: /Group/{id}
      operations:
      - name: get
        method: GET
        description: Factset Get a group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put
        method: PUT
        description: Factset Replace a group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: patch
        method: PATCH
        description: Factset Patch a group (add, replace, or remove attributes of a group.)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: procure-to-pay-api-scim-group-rest
    port: 8080
    description: REST adapter for FactSet SCIM API — Group. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/group/{id}
      name: group-id
      description: REST surface for Group-id.
      operations:
      - method: GET
        name: get
        description: Factset Get a group.
        call: procure-to-pay-api-scim-group.get
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Factset Replace a group.
        call: procure-to-pay-api-scim-group.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Factset Patch a group (add, replace, or remove attributes of a group.)
        call: procure-to-pay-api-scim-group.patch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: procure-to-pay-api-scim-group-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet SCIM API — Group. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: factset-get-group
      description: Factset Get a group.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procure-to-pay-api-scim-group.get
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-replace-group
      description: Factset Replace a group.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: procure-to-pay-api-scim-group.put
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-patch-group-add-replace
      description: Factset Patch a group (add, replace, or remove attributes of a group.)
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: procure-to-pay-api-scim-group.patch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
