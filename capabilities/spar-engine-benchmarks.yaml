naftiko: 1.0.0-alpha2
info:
  label: FactSet SPAR Engine API — Benchmarks
  description: 'FactSet SPAR Engine API — Benchmarks. 1 operations. Lead operation: Factset Get Spar Benchmark Details. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Benchmarks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: spar-engine-benchmarks
    baseUri: https://api.factset.com
    description: FactSet SPAR Engine API — Benchmarks business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-spar-v3-benchmarks
      path: /analytics/engines/spar/v3/benchmarks
      operations:
      - name: getsparbenchmarkbyid
        method: GET
        description: Factset Get Spar Benchmark Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: Benchmark Identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: spar-engine-benchmarks-rest
    port: 8080
    description: REST adapter for FactSet SPAR Engine API — Benchmarks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/spar/v3/benchmarks
      name: analytics-engines-spar-v3-benchmarks
      description: REST surface for analytics-engines-spar-v3-benchmarks.
      operations:
      - method: GET
        name: getsparbenchmarkbyid
        description: Factset Get Spar Benchmark Details
        call: spar-engine-benchmarks.getsparbenchmarkbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spar-engine-benchmarks-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet SPAR Engine API — Benchmarks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-spar-benchmark-details
      description: Factset Get Spar Benchmark Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spar-engine-benchmarks.getsparbenchmarkbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
