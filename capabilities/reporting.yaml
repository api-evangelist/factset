naftiko: 1.0.0-alpha2
info:
  label: FactSet Reporting
  description: Unified workflow for generating reports including entity, fundamentals, estimates, capital structure, overview,
    ownership reports, charts, and digital cards. Used by report builders.
  tags:
  - FactSet
  - Reporting
  - Report Builder
  - Visualization
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
