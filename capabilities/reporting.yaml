  exposes:
  - type: rest
    port: 8089
    namespace: reporting-api
    description: Unified REST API for reporting.
    resources:
    - path: /v1/reports
      name: reports
      description: Report generation.
      operations:
      - method: GET
        name: list-reports
        description: List available reports.
        call: factset-fund-rb.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/charts
      name: charts
      description: Chart generation.
      operations:
      - method: GET
        name: generate-chart
        description: Generate a chart.
        call: factset-charts.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9089
    namespace: reporting-mcp
    transport: http
    description: MCP server for AI-assisted reporting.
    tools:
    - name: entity-report
      description: Generate entity report.
      hints:
        readOnly: true
      call: factset-ent-rb.list
      outputParameters:
      - type: object
        mapping: $.
    - name: fundamentals-report
      description: Generate fundamentals report.
      hints:
        readOnly: true
      call: factset-fund-rb.list
      outputParameters:
      - type: object
        mapping: $.
    - name: estimates-report
      description: Generate estimates report.
      hints:
        readOnly: true
      call: factset-est-rb.list
      outputParameters:
      - type: object
        mapping: $.
    - name: capital-structure-report
      description: Generate capital structure report.
      hints:
        readOnly: true
      call: factset-cap-rb.list
      outputParameters:
      - type: object
        mapping: $.
    - name: overview-report
      description: Generate overview report.
      hints:
        readOnly: true
      call: factset-ovw-rb.list
      outputParameters:
      - type: object
        mapping: $.
    - name: ownership-report
      description: Generate ownership report.
      hints:
        readOnly: true
      call: factset-own-rb.list
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-chart
      description: Generate a chart.
      hints:
        readOnly: true
      call: factset-charts.list
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-digital-card
      description: Generate a digital card.
      hints:
        readOnly: true
      call: factset-cards.list
      outputParameters:
      - type: object
        mapping: $.
    - name: build-book
      description: Build a custom report book.
      hints:
        readOnly: true
      call: factset-bookbuilder.list
      outputParameters:
      - type: object
        mapping: $.
    - name: vermilion-report
      description: Generate Vermilion report.
      hints:
        readOnly: true
      call: factset-vermilion.list
      outputParameters:
      - type: object
        mapping: $.
