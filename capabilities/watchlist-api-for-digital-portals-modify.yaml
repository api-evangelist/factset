    namespace: watchlist-api-for-digital-portals-modify
    baseUri: https://api.factset.com/wealth/v1
    description: FactSet Watchlist API for Digital Portals — Modify business capability. Self-contained, no shared references.
    resources:
    - name: watchlist-modify
      path: /watchlist/modify
      operations:
      - name: postwatchlistmodify
        method: POST
        description: Factset Modify a Watchlist.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: watchlist-position-modify
      path: /watchlist/position/modify
      operations:
      - name: postwatchlistpositionmodify
        method: POST
        description: Factset Modify a Position in a Watchlist.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
