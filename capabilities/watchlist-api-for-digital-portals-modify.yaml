      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: watchlist-api-for-digital-portals-modify-rest
    port: 8080
    description: REST adapter for FactSet Watchlist API for Digital Portals — Modify. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/watchlist/modify
      name: watchlist-modify
      description: REST surface for watchlist-modify.
      operations:
      - method: POST
        name: postwatchlistmodify
        description: Factset Modify a Watchlist.
        call: watchlist-api-for-digital-portals-modify.postwatchlistmodify
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/watchlist/position/modify
      name: watchlist-position-modify
      description: REST surface for watchlist-position-modify.
      operations:
      - method: POST
        name: postwatchlistpositionmodify
        description: Factset Modify a Position in a Watchlist.
        call: watchlist-api-for-digital-portals-modify.postwatchlistpositionmodify
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: watchlist-api-for-digital-portals-modify-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Watchlist API for Digital Portals — Modify. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-modify-watchlist
      description: Factset Modify a Watchlist.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: watchlist-api-for-digital-portals-modify.postwatchlistmodify
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-modify-position-watchlist
      description: Factset Modify a Position in a Watchlist.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: watchlist-api-for-digital-portals-modify.postwatchlistpositionmodify
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
