  description: 'FactSet Watchlist API for Digital Portals — Modify. 2 operations. Lead operation: Factset Modify a Watchlist..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Modify
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
