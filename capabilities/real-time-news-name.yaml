naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time News API — Name
  description: 'FactSet Real-Time News API — Name. 1 operations. Lead operation: Factset Search for Publishers.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Name
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-news-name
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time News API — Name business capability. Self-contained, no shared references.
    resources:
    - name: news-publisher-searchByName
      path: /news/publisher/searchByName
      operations:
      - name: postnewspublishersearchbyname
        method: POST
        description: Factset Search for Publishers.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-news-name-rest
    port: 8080
    description: REST adapter for FactSet Real-Time News API — Name. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/news/publisher/searchbyname
      name: news-publisher-searchbyname
      description: REST surface for news-publisher-searchByName.
      operations:
      - method: POST
        name: postnewspublishersearchbyname
        description: Factset Search for Publishers.
        call: real-time-news-name.postnewspublishersearchbyname
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-news-name-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time News API — Name. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-search-publishers
      description: Factset Search for Publishers.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-news-name.postnewspublishersearchbyname
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
