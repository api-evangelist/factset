naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Fractional
  description: 'FactSet Real-Time Quotes API — Fractional. 2 operations. Lead operation: Factset Details of a Fractional Currency..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Fractional
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-fractional
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Fractional business capability. Self-contained, no shared references.
    resources:
    - name: basic-valueUnit-currency-fractional-get
      path: /basic/valueUnit/currency/fractional/get
      operations:
      - name: getbasicvalueunitcurrencyfractionalget
        method: GET
        description: Factset Details of a Fractional Currency.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: number
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: basic-valueUnit-currency-fractional-list
      path: /basic/valueUnit/currency/fractional/list
      operations:
      - name: getbasicvalueunitcurrencyfractionallist
        method: GET
        description: Factset List of Fractional Currencies.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 1 (possibly prefixed
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-fractional-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Fractional. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/basic/valueunit/currency/fractional/get
      name: basic-valueunit-currency-fractional-get
      description: REST surface for basic-valueUnit-currency-fractional-get.
      operations:
      - method: GET
        name: getbasicvalueunitcurrencyfractionalget
        description: Factset Details of a Fractional Currency.
        call: real-time-quotes-fractional.getbasicvalueunitcurrencyfractionalget
        with:
          id: rest.id
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/valueunit/currency/fractional/list
      name: basic-valueunit-currency-fractional-list
      description: REST surface for basic-valueUnit-currency-fractional-list.
      operations:
      - method: GET
        name: getbasicvalueunitcurrencyfractionallist
        description: Factset List of Fractional Currencies.
        call: real-time-quotes-fractional.getbasicvalueunitcurrencyfractionallist
        with:
          _attributes: rest._attributes
          _language: rest._language
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-fractional-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Fractional. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-details-fractional-currency
      description: Factset Details of a Fractional Currency.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-fractional.getbasicvalueunitcurrencyfractionalget
      with:
        id: tools.id
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-fractional-currencies
      description: Factset List of Fractional Currencies.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-fractional.getbasicvalueunitcurrencyfractionallist
      with:
        _attributes: tools._attributes
        _language: tools._language
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
