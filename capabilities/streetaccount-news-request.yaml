naftiko: 1.0.0-alpha2
info:
  label: FactSet StreetAccount News API — Request
  description: 'FactSet StreetAccount News API — Request. 1 operations. Lead operation: Factset Returns the Jobid. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Request
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: streetaccount-news-request
    baseUri: https://api.factset.com/research/news/v0
    description: FactSet StreetAccount News API — Request business capability. Self-contained, no shared references.
    resources:
    - name: streetaccount-historical-request-files
      path: /streetaccount/historical/request-files
      operations:
      - name: get
        method: GET
        description: Factset Returns the Jobid
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Date from which data is required. Should be YYYY-MM-DDTHH:MM:SSZ format
          required: true
        - name: endDate
          in: query
          type: string
          description: The date until which the data is to be fetched. Should be YYYY-MM-DDTHH:MM:SSZ format
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: streetaccount-news-request-rest
    port: 8080
    description: REST adapter for FactSet StreetAccount News API — Request. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/streetaccount/historical/request-files
      name: streetaccount-historical-request-files
      description: REST surface for streetaccount-historical-request-files.
      operations:
      - method: GET
        name: get
        description: Factset Returns the Jobid
        call: streetaccount-news-request.get
        with:
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streetaccount-news-request-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet StreetAccount News API — Request. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-returns-jobid
      description: Factset Returns the Jobid
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streetaccount-news-request.get
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
