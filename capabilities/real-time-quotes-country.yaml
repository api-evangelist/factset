naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Country
  description: 'FactSet Real-Time Quotes API — Country. 3 operations. Lead operation: Factset Details for a Country.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Country
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-country
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Country business capability. Self-contained, no shared references.
    resources:
    - name: basic-region-country-get
      path: /basic/region/country/get
      operations:
      - name: getbasicregioncountryget
        method: GET
        description: Factset Details for a Country.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: number
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: basic-region-country-getByCode
      path: /basic/region/country/getByCode
      operations:
      - name: getbasicregioncountrygetbycode
        method: GET
        description: Factset Details for a Country Identified by Code.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: code
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: basic-region-country-list
      path: /basic/region/country/list
      operations:
      - name: getbasicregioncountrylist
        method: GET
        description: Factset List of Countries.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 2 (possibly prefixed
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-country-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Country. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basic/region/country/get
      name: basic-region-country-get
      description: REST surface for basic-region-country-get.
      operations:
      - method: GET
        name: getbasicregioncountryget
        description: Factset Details for a Country.
        call: real-time-quotes-country.getbasicregioncountryget
        with:
          id: rest.id
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/region/country/getbycode
      name: basic-region-country-getbycode
      description: REST surface for basic-region-country-getByCode.
      operations:
      - method: GET
        name: getbasicregioncountrygetbycode
        description: Factset Details for a Country Identified by Code.
        call: real-time-quotes-country.getbasicregioncountrygetbycode
        with:
          code: rest.code
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/region/country/list
      name: basic-region-country-list
      description: REST surface for basic-region-country-list.
      operations:
      - method: GET
        name: getbasicregioncountrylist
        description: Factset List of Countries.
        call: real-time-quotes-country.getbasicregioncountrylist
        with:
          _attributes: rest._attributes
          _language: rest._language
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-country-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Country. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-details-country
      description: Factset Details for a Country.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-country.getbasicregioncountryget
      with:
        id: tools.id
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-details-country-identified-code
      description: Factset Details for a Country Identified by Code.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-country.getbasicregioncountrygetbycode
      with:
        code: tools.code
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-countries
      description: Factset List of Countries.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-country.getbasicregioncountrylist
      with:
        _attributes: tools._attributes
        _language: tools._language
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
