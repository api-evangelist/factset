naftiko: 1.0.0-alpha2
info:
  label: Factset IRN API v1 — Users
  description: 'Factset IRN API v1 — Users. 1 operations. Lead operation: Get all assigned FactSet users. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-users-2
    baseUri: https://api.factset.com/research/irn
    description: Factset IRN API v1 — Users business capability. Self-contained, no shared references.
    resources:
    - name: v1-users
      path: /v1/users
      operations:
      - name: getassignedfactsetusers
        method: GET
        description: Get all assigned FactSet users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-users-2-rest
    port: 8080
    description: REST adapter for Factset IRN API v1 — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/users
      name: v1-users
      description: REST surface for v1-users.
      operations:
      - method: GET
        name: getassignedfactsetusers
        description: Get all assigned FactSet users
        call: irn-configuration-users-2.getassignedfactsetusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-users-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset IRN API v1 — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-assigned-factset-users
      description: Get all assigned FactSet users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-users-2.getassignedfactsetusers
      outputParameters:
      - type: object
        mapping: $.
