    namespace: esg-scores
    baseUri: https://api.factset.com/content
    description: FactSet ESG API — Scores business capability. Self-contained, no shared references.
    resources:
    - name: factset-esg-v1-sasb-scores
      path: /factset-esg/v1/sasb-scores
      operations:
      - name: getsasbscores
        method: GET
        description: Factset Gets Short-term, Long-term, and Momentum Scores Based on the 26 Esg Categories Defined by the
          Sustainability Accounting Standards Board (sasb).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsasbscorespost
        method: POST
        description: Factset for a Large List of Ids, Gets Short-term, Long-term, and Momentum Scores Based on the 26 Esg
          Categories Defined by the Sustainability Accounting Standards Board (sasb).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: factset-esg-v1-sasb-scores-all
      path: /factset-esg/v1/sasb-scores-all
      operations:
      - name: getsasbscoresall
        method: GET
        description: Factset Gets a Flat Key Value Array of Scores for Named Categories of the Input Scoretype(s).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsasbscoresallpost
        method: POST
        description: Factset Gets a Flat Key Value Array of Scores for Named Categories of the Input Score Type(s).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: factset-esg-v1-sdg-scores
      path: /factset-esg/v1/sdg-scores
      operations:
      - name: getsdgscores
        method: GET
        description: Factset Gets Short-term, Long-term, and Momentum Scores Based on the 16 Sustainable Development Goals
          Categories Defined by the United Nations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsdgscorespost
        method: POST
        description: Factset Gets Short-term, Long-term, and Momentum Scores Based on the 16 Sustainable Development Goals
          Categories Defined by United Nations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
