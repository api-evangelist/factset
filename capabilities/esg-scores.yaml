naftiko: 1.0.0-alpha2
info:
  label: FactSet ESG API — Scores
  description: 'FactSet ESG API — Scores. 6 operations. Lead operation: Factset Gets Short-term, Long-term, and Momentum Scores
    Based on the 26 Esg Categories Defined by the Sustainability Accounting Standards Board (sasb).. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Scores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
