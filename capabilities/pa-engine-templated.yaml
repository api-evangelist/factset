        method: PUT
        description: Factset Update Templated Pa Component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for a templated PA component
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: gettemplatedpacomponentbyid
        method: GET
        description: Factset Get Templated Pa Component by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for a templated PA component
          required: true
      - name: deletetemplatedpacomponents
        method: DELETE
        description: Factset Delete Templated Pa Component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for a templated PA component
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
