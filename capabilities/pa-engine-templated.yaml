        directory: tools.directory
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-update-templated-pa-component
      description: Factset Update Templated Pa Component
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pa-engine-templated.updatetemplatedpacomponents
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
