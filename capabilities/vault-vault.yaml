  - type: mcp
    namespace: vault-vault-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Vault API — Vault. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: factset-create-and-run-vault
      description: Factset Create and Run Vault Calculation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vault-vault.postandcalculate
