naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Optimizer API — Strategies
  description: 'FactSet Portfolio Optimizer API — Strategies. 1 operations. Lead operation: Get Factset Portfolio Optimizer
    Strategy Documents and Sub-directories in a Directory. Self-contained Naftiko capability covering one Factset business
    surface.'
  tags:
  - Factset
  - Strategies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-optimizer-strategies
    baseUri: https://api.factset.com
    description: FactSet Portfolio Optimizer API — Strategies business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-fpo-v3-strategies-path
      path: /analytics/engines/fpo/v3/strategies/{path}
      operations:
      - name: getfpostrategydocuments
        method: GET
        description: Get Factset Portfolio Optimizer Strategy Documents and Sub-directories in a Directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: The directory to get the strategy documents and sub-directories in
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: portfolio-optimizer-strategies-rest
    port: 8080
    description: REST adapter for FactSet Portfolio Optimizer API — Strategies. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/fpo/v3/strategies/{path}
      name: analytics-engines-fpo-v3-strategies-path
      description: REST surface for analytics-engines-fpo-v3-strategies-path.
      operations:
      - method: GET
        name: getfpostrategydocuments
        description: Get Factset Portfolio Optimizer Strategy Documents and Sub-directories in a Directory
        call: portfolio-optimizer-strategies.getfpostrategydocuments
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-optimizer-strategies-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Portfolio Optimizer API — Strategies. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-factset-portfolio-optimizer-strategy
      description: Get Factset Portfolio Optimizer Strategy Documents and Sub-directories in a Directory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-optimizer-strategies.getfpostrategydocuments
      with:
        path: tools.path
      outputParameters:
      - type: object
        mapping: $.
