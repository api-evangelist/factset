naftiko: 1.0.0-alpha2
info:
  label: FactSet Recommendation List API for Digital Portals — Recommendation List
  description: 'FactSet Recommendation List API for Digital Portals — Recommendation List. 2 operations. Lead operation: Factset
    Attributes of a Single Revision.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Recommendation List
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: recommendation-list-api-for-digital-portals-recommendation-list
    baseUri: https://api.factset.com/wealth/v1
    description: FactSet Recommendation List API for Digital Portals — Recommendation List business capability. Self-contained,
      no shared references.
    resources:
    - name: recommendationList-revision-get
      path: /recommendationList/revision/get
      operations:
      - name: getrecommendationlistrevisionget
        method: GET
        description: Factset Attributes of a Single Revision.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: number
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: recommendationList-revision-list
      path: /recommendationList/revision/list
      operations:
      - name: postrecommendationlistrevisionlist
        method: POST
        description: Factset List of Revisions of a Recommendation List.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: recommendation-list-api-for-digital-portals-recommendation-list-rest
    port: 8080
    description: REST adapter for FactSet Recommendation List API for Digital Portals — Recommendation List. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/recommendationlist/revision/get
      name: recommendationlist-revision-get
      description: REST surface for recommendationList-revision-get.
      operations:
      - method: GET
        name: getrecommendationlistrevisionget
        description: Factset Attributes of a Single Revision.
        call: recommendation-list-api-for-digital-portals-recommendation-list.getrecommendationlistrevisionget
        with:
          id: rest.id
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recommendationlist/revision/list
      name: recommendationlist-revision-list
      description: REST surface for recommendationList-revision-list.
      operations:
      - method: POST
        name: postrecommendationlistrevisionlist
        description: Factset List of Revisions of a Recommendation List.
        call: recommendation-list-api-for-digital-portals-recommendation-list.postrecommendationlistrevisionlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: recommendation-list-api-for-digital-portals-recommendation-list-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Recommendation List API for Digital Portals — Recommendation List. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: factset-attributes-single-revision
      description: Factset Attributes of a Single Revision.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: recommendation-list-api-for-digital-portals-recommendation-list.getrecommendationlistrevisionget
      with:
        id: tools.id
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-revisions-recommendation-list
      description: Factset List of Revisions of a Recommendation List.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: recommendation-list-api-for-digital-portals-recommendation-list.postrecommendationlistrevisionlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
