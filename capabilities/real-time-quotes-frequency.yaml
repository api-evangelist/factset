naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Frequency
  description: 'FactSet Real-Time Quotes API — Frequency. 1 operations. Lead operation: Factset List of Frequency Types..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Frequency
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-frequency
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Frequency business capability. Self-contained, no shared references.
    resources:
    - name: basic-frequency-type-list
      path: /basic/frequency/type/list
      operations:
      - name: getbasicfrequencytypelist
        method: GET
        description: Factset List of Frequency Types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-frequency-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Frequency. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basic/frequency/type/list
      name: basic-frequency-type-list
      description: REST surface for basic-frequency-type-list.
      operations:
      - method: GET
        name: getbasicfrequencytypelist
        description: Factset List of Frequency Types.
        call: real-time-quotes-frequency.getbasicfrequencytypelist
        with:
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-frequency-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Frequency. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-list-frequency-types
      description: Factset List of Frequency Types.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-frequency.getbasicfrequencytypelist
      with:
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
