naftiko: 1.0.0-alpha2
info:
  label: FactSet Terms and Conditions API — Schedules
  description: 'FactSet Terms and Conditions API — Schedules. 2 operations. Lead operation: Factset Return Coupon Sechedules
    for a Fixed Income Security.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Schedules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: terms-and-conditions-schedules
    baseUri: https://api.factset.com/content
    description: FactSet Terms and Conditions API — Schedules business capability. Self-contained, no shared references.
    resources:
    - name: factset-terms-and-conditions-v1-coupon-schedules
      path: /factset-terms-and-conditions/v1/coupon-schedules
      operations:
      - name: getcouponschedules
        method: GET
        description: Factset Return Coupon Sechedules for a Fixed Income Security.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getcouponschedulesforlist
        method: POST
        description: Factset Return Coupon Schedules Information for a List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: terms-and-conditions-schedules-rest
    port: 8080
    description: REST adapter for FactSet Terms and Conditions API — Schedules. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/factset-terms-and-conditions/v1/coupon-schedules
      name: factset-terms-and-conditions-v1-coupon-schedules
      description: REST surface for factset-terms-and-conditions-v1-coupon-schedules.
      operations:
      - method: GET
        name: getcouponschedules
        description: Factset Return Coupon Sechedules for a Fixed Income Security.
        call: terms-and-conditions-schedules.getcouponschedules
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getcouponschedulesforlist
        description: Factset Return Coupon Schedules Information for a List of Fixed Income Securities.
        call: terms-and-conditions-schedules.getcouponschedulesforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terms-and-conditions-schedules-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Terms and Conditions API — Schedules. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-return-coupon-sechedules-fixed
      description: Factset Return Coupon Sechedules for a Fixed Income Security.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-schedules.getcouponschedules
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-coupon-schedules-information
      description: Factset Return Coupon Schedules Information for a List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: terms-and-conditions-schedules.getcouponschedulesforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
