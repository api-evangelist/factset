naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Configuration API — Users
  description: 'FactSet IRN Configuration API — Users. 1 operations. Lead operation: Get All Assigned Factset Users. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-users
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Configuration API — Users business capability. Self-contained, no shared references.
    resources:
    - name: v1-users
      path: /v1/users
      operations:
      - name: getassignedfactsetusers
        method: GET
        description: Get All Assigned Factset Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-users-rest
    port: 8080
    description: REST adapter for FactSet IRN Configuration API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/users
      name: v1-users
      description: REST surface for v1-users.
      operations:
      - method: GET
        name: getassignedfactsetusers
        description: Get All Assigned Factset Users
        call: irn-configuration-users.getassignedfactsetusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Configuration API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-all-assigned-factset-users
      description: Get All Assigned Factset Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-users.getassignedfactsetusers
      outputParameters:
      - type: object
        mapping: $.
