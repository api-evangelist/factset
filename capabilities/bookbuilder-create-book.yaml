naftiko: 1.0.0-alpha2
info:
  label: Factset BookBuilder — Create Book
  description: 'Factset BookBuilder — Create Book. 1 operations. Lead operation: Factset Kicks off request to create a book
    with reports of your choice. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Create Book
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: bookbuilder-create-book
    baseUri: https://api.factset.com/book-builder-api
    description: Factset BookBuilder — Create Book business capability. Self-contained, no shared references.
    resources:
    - name: v1-create-book
      path: /v1/create-book
      operations:
      - name: post
        method: POST
        description: Factset Kicks off request to create a book with reports of your choice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: bookbuilder-create-book-rest
    port: 8080
    description: REST adapter for Factset BookBuilder — Create Book. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/create-book
      name: v1-create-book
      description: REST surface for v1-create-book.
      operations:
      - method: POST
        name: post
        description: Factset Kicks off request to create a book with reports of your choice
        call: bookbuilder-create-book.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bookbuilder-create-book-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset BookBuilder — Create Book. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-kicks-off-request-create
      description: Factset Kicks off request to create a book with reports of your choice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookbuilder-create-book.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
