naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Custom Symbols API — Custom
  description: 'FactSet IRN Custom Symbols API — Custom. 10 operations. Lead operation: Factset Get List of All Custom Symbols
    in Your Group Along With Some of Their Standard Field and Custom Fields Data. Self-contained Naftiko capability covering
    one Factset business surface.'
  tags:
  - Factset
  - Custom
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
