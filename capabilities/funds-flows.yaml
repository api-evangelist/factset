naftiko: 1.0.0-alpha2
info:
  label: FactSet Funds API — Flows
  description: 'FactSet Funds API — Flows. 2 operations. Lead operation: Factset Get Fund Flows for a Requested Date Range
    and List of Ids. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Flows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: funds-flows
    baseUri: https://api.factset.com/content
    description: FactSet Funds API — Flows business capability. Self-contained, no shared references.
    resources:
    - name: factset-funds-v1-flows
      path: /factset-funds/v1/flows
      operations:
      - name: getfundsflows
        method: GET
        description: Factset Get Fund Flows for a Requested Date Range and List of Ids
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfundsflowsforlist
        method: POST
        description: Factset Get Fund Flows for a Requested Date Range and Large List of Ids
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: funds-flows-rest
    port: 8080
    description: REST adapter for FactSet Funds API — Flows. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-funds/v1/flows
      name: factset-funds-v1-flows
      description: REST surface for factset-funds-v1-flows.
      operations:
      - method: GET
        name: getfundsflows
        description: Factset Get Fund Flows for a Requested Date Range and List of Ids
        call: funds-flows.getfundsflows
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfundsflowsforlist
        description: Factset Get Fund Flows for a Requested Date Range and Large List of Ids
        call: funds-flows.getfundsflowsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: funds-flows-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Funds API — Flows. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: factset-get-fund-flows-requested
      description: Factset Get Fund Flows for a Requested Date Range and List of Ids
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: funds-flows.getfundsflows
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-fund-flows-requested-2
      description: Factset Get Fund Flows for a Requested Date Range and Large List of Ids
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: funds-flows.getfundsflowsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
