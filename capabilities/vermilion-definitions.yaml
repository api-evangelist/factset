naftiko: 1.0.0-alpha2
info:
  label: FactSet Vermilion API — Definitions
  description: 'FactSet Vermilion API — Definitions. 1 operations. Lead operation: Factset Gets a Report Definition. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Definitions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: vermilion-definitions
    baseUri: ''
    description: FactSet Vermilion API — Definitions business capability. Self-contained, no shared references.
    resources:
    - name: v1-tenant-reports-reportDefinitionCode
      path: /v1/{tenant}/reports/{reportDefinitionCode}
      operations:
      - name: getreportdefinitionbycode
        method: GET
        description: Factset Gets a Report Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant
          in: path
          type: string
          description: The code of the tenancy
          required: true
        - name: reportDefinitionCode
          in: path
          type: string
          description: The code of the report definition
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: vermilion-definitions-rest
    port: 8080
    description: REST adapter for FactSet Vermilion API — Definitions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/{tenant}/reports/{reportdefinitioncode}
      name: v1-tenant-reports-reportdefinitioncode
      description: REST surface for v1-tenant-reports-reportDefinitionCode.
      operations:
      - method: GET
        name: getreportdefinitionbycode
        description: Factset Gets a Report Definition
        call: vermilion-definitions.getreportdefinitionbycode
        with:
          tenant: rest.tenant
          reportDefinitionCode: rest.reportDefinitionCode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vermilion-definitions-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Vermilion API — Definitions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-gets-report-definition
      description: Factset Gets a Report Definition
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vermilion-definitions.getreportdefinitionbycode
      with:
        tenant: tools.tenant
        reportDefinitionCode: tools.reportDefinitionCode
      outputParameters:
      - type: object
        mapping: $.
