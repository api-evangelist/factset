naftiko: 1.0.0-alpha2
info:
  label: FactSet SPAR Engine API — Analytics
  description: 'FactSet SPAR Engine API — Analytics. 15 operations. Lead operation: Factset Get Spar Account Returns Type
    Details. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: spar-engine-analytics
    baseUri: https://api.factset.com
    description: FactSet SPAR Engine API — Analytics business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-spar-v3-accounts-accountPath-returns-type
      path: /analytics/engines/spar/v3/accounts/{accountPath}/returns-type
      operations:
      - name: getsparreturnstype
        method: GET
        description: Factset Get Spar Account Returns Type Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountPath
          in: path
          type: string
          description: URL encoded account path
          required: true
    - name: analytics-engines-spar-v3-benchmarks
      path: /analytics/engines/spar/v3/benchmarks
      operations:
      - name: getsparbenchmarkbyid
        method: GET
        description: Factset Get Spar Benchmark Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: Benchmark Identifier
          required: true
    - name: analytics-engines-spar-v3-calculations
      path: /analytics/engines/spar/v3/calculations
      operations:
      - name: postandcalculate
        method: POST
        description: Factset Create and Run Spar Calculation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-FactSet-Api-Long-Running-Deadline
          in: header
          type: integer
          description: Long running deadline in seconds when only one unit is passed in the POST body.
        - name: Cache-Control
          in: header
          type: string
          description: Standard HTTP header.  Accepts max-stale.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getallcalculations
        method: GET
        description: Factset Get All Calculations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pageNumber
          in: query
          type: integer
    - name: analytics-engines-spar-v3-calculations-id
      path: /analytics/engines/spar/v3/calculations/{id}
      operations:
      - name: putandcalculate
        method: PUT
        description: Factset Create or Update Spar Calculation and Run It.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run SPAR calculation endpoint
          required: true
        - name: X-FactSet-Api-Long-Running-Deadline
          in: header
          type: integer
          description: Long running deadline in seconds when only one unit is passed in the PUT body.
        - name: Cache-Control
          in: header
          type: string
          description: Standard HTTP header.  Accepts max-stale.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getcalculationparameters
        method: GET
        description: Factset Get Spar Calculation Parameters by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run SPAR calculation endpoint
          required: true
      - name: cancelcalculationbyid
        method: DELETE
        description: Factset Cancel Spar Calculation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run SPAR calculation endpoint
          required: true
    - name: analytics-engines-spar-v3-calculations-id-status
      path: /analytics/engines/spar/v3/calculations/{id}/status
      operations:
      - name: getcalculationstatusbyid
        method: GET
        description: Factset Get Spar Calculation Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run SPAR calculation endpoint
          required: true
    - name: analytics-engines-spar-v3-calculations-id-units-unitId-result
      path: /analytics/engines/spar/v3/calculations/{id}/units/{unitId}/result
      operations:
      - name: getcalculationunitresultbyid
        method: GET
        description: Factset Get Spar Calculation Result by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Get SPAR calculation status by id endpoint
          required: true
        - name: unitId
          in: path
          type: string
          description: from url, provided from the location header in the Get SPAR calculation status by id endpoint
          required: true
    - name: analytics-engines-spar-v3-components
      path: /analytics/engines/spar/v3/components
      operations:
      - name: getsparcomponents
        method: GET
        description: Factset Get Spar Components
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: document
          in: query
          type: string
          description: Document Name
          required: true
    - name: analytics-engines-spar-v3-components-id
      path: /analytics/engines/spar/v3/components/{id}
      operations:
      - name: getsparcomponentbyid
        method: GET
        description: Factset Get Spar Component by Id
        outputRawFormat: json
        outputParameters:
