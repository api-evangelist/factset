        name: getcomment
        description: Factset Get Details of a Comment Belonging to a Note
        call: irn-notes-comments.getcomment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchcomment
        description: Factset Edit a Comment for a Note
        call: irn-notes-comments.patchcomment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecomment
        description: Factset Delete a Comment From a Note
        call: irn-notes-comments.deletecomment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/comments/{commentid}/attachments
      name: v1-notes-noteid-comments-commentid-attachments
      description: REST surface for v1-notes-noteId-comments-commentId-attachments.
      operations:
      - method: GET
        name: getcommentattachments
        description: Factset Get Attachments Summary of a Comment Belonging to a Note
        call: irn-notes-comments.getcommentattachments
        with:
          noteId: rest.noteId
          commentId: rest.commentId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcommentattachment
        description: Factset Create a Comment Attachment to a Note
        call: irn-notes-comments.createcommentattachment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/comments/{commentid}/attachments/{attachmentid}/download
      name: v1-notes-noteid-comments-commentid-attachments-attachmentid-download
      description: REST surface for v1-notes-noteId-comments-commentId-attachments-attachmentId-download.
      operations:
      - method: GET
        name: downloadcommentattachmentforcomment
        description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
        call: irn-notes-comments.downloadcommentattachmentforcomment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
          attachmentId: rest.attachmentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-notes-comments-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Notes API — Comments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-all-comments-note
      description: Factset Get All Comments for a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-comments.getcomments
      with:
        noteId: tools.noteId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-create-comment-note
      description: Factset Create a Comment to a Note
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: irn-notes-comments.createcomment
      with:
        noteId: tools.noteId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-details-comment-belonging
      description: Factset Get Details of a Comment Belonging to a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-comments.getcomment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-edit-comment-note
      description: Factset Edit a Comment for a Note
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: irn-notes-comments.patchcomment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-delete-comment-note
      description: Factset Delete a Comment From a Note
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: irn-notes-comments.deletecomment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-attachments-summary-comment
      description: Factset Get Attachments Summary of a Comment Belonging to a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-comments.getcommentattachments
      with:
        noteId: tools.noteId
        commentId: tools.commentId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-create-comment-attachment-note
      description: Factset Create a Comment Attachment to a Note
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: irn-notes-comments.createcommentattachment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-download-single-attachment-detail
      description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-comments.downloadcommentattachmentforcomment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
        attachmentId: tools.attachmentId
      outputParameters:
      - type: object
        mapping: $.
