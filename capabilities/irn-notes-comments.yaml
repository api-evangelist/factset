naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Notes API — Comments
  description: 'FactSet IRN Notes API — Comments. 8 operations. Lead operation: Factset Get All Comments for a Note. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Comments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-notes-comments
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Notes API — Comments business capability. Self-contained, no shared references.
    resources:
    - name: v1-notes-noteId-comments
      path: /v1/notes/{noteId}/comments
      operations:
      - name: getcomments
        method: GET
        description: Factset Get All Comments for a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
      - name: createcomment
        method: POST
        description: Factset Create a Comment to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-notes-noteId-comments-commentId
      path: /v1/notes/{noteId}/comments/{commentId}
      operations:
      - name: getcomment
        method: GET
        description: Factset Get Details of a Comment Belonging to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
      - name: patchcomment
        method: PATCH
        description: Factset Edit a Comment for a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletecomment
        method: DELETE
        description: Factset Delete a Comment From a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
    - name: v1-notes-noteId-comments-commentId-attachments
      path: /v1/notes/{noteId}/comments/{commentId}/attachments
      operations:
      - name: getcommentattachments
        method: GET
        description: Factset Get Attachments Summary of a Comment Belonging to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
      - name: createcommentattachment
        method: POST
        description: Factset Create a Comment Attachment to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-notes-noteId-comments-commentId-attachments-attachmentId-download
      path: /v1/notes/{noteId}/comments/{commentId}/attachments/{attachmentId}/download
      operations:
      - name: downloadcommentattachmentforcomment
        method: GET
        description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: attachmentId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: irn-notes-comments-rest
    port: 8080
    description: REST adapter for FactSet IRN Notes API — Comments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/notes/{noteid}/comments
      name: v1-notes-noteid-comments
      description: REST surface for v1-notes-noteId-comments.
      operations:
      - method: GET
        name: getcomments
        description: Factset Get All Comments for a Note
        call: irn-notes-comments.getcomments
        with:
          noteId: rest.noteId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcomment
        description: Factset Create a Comment to a Note
        call: irn-notes-comments.createcomment
        with:
          noteId: rest.noteId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/comments/{commentid}
      name: v1-notes-noteid-comments-commentid
      description: REST surface for v1-notes-noteId-comments-commentId.
      operations:
