naftiko: 1.0.0-alpha2
info:
  label: FactSet Terms and Conditions API — Fields
  description: 'FactSet Terms and Conditions API — Fields. 1 operations. Lead operation: Factset Available Fields for /terms-and-conditions
    Endpoint. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Fields
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: terms-and-conditions-fields
    baseUri: https://api.factset.com/content
    description: FactSet Terms and Conditions API — Fields business capability. Self-contained, no shared references.
    resources:
    - name: factset-terms-and-conditions-v1-fields
      path: /factset-terms-and-conditions/v1/fields
      operations:
      - name: gettermsandconditionsfields
        method: GET
        description: Factset Available Fields for /terms-and-conditions Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: terms-and-conditions-fields-rest
    port: 8080
    description: REST adapter for FactSet Terms and Conditions API — Fields. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/factset-terms-and-conditions/v1/fields
      name: factset-terms-and-conditions-v1-fields
      description: REST surface for factset-terms-and-conditions-v1-fields.
      operations:
      - method: GET
        name: gettermsandconditionsfields
        description: Factset Available Fields for /terms-and-conditions Endpoint
        call: terms-and-conditions-fields.gettermsandconditionsfields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terms-and-conditions-fields-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Terms and Conditions API — Fields. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-available-fields-terms-and
      description: Factset Available Fields for /terms-and-conditions Endpoint
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-fields.gettermsandconditionsfields
      outputParameters:
      - type: object
        mapping: $.
