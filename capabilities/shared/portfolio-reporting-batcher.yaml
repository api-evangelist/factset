naftiko: "1.0.0-alpha1"
info:
  label: "FactSet Signals"
  description: "Material event signals derived from FactSet core data."
  tags: [FactSet, Financial Data]
  created: "2026-04-18"
  modified: "2026-04-18"
binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD
capability:
  consumes:
    - type: http
      namespace: factset-signals
      baseUri: https://api.factset.com
      description: "Material event signals."
      authentication:
        type: basic
        username: "{{FACTSET_USERNAME}}"
        password: "{{FACTSET_PASSWORD}}"
      resources:
        - name: signals
          path: /
          description: "Signals API resources."
          operations:
            - name: list-signals
              method: GET
              description: "List Signals resources."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
  exposes:
    - type: rest
      port: 8104
      namespace: factset-signals-api
      resources:
        - path: /v1/signals
          name: signals
          description: "Signals resources."
          operations:
            - method: GET
              name: list-signals
              description: "List Signals resources."
              call: "factset-signals.list-signals"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9104
      namespace: factset-signals-mcp
      transport: http
      tools:
        - name: list-signals
          description: "List Signals resources."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-signals.list-signals"
          outputParameters:
            - type: object
              mapping: "$."
