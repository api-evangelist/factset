naftiko: "1.0.0-alpha1"

info:
  label: "FactSet PA Engine"
  description: "Portfolio analytics engine for multi-asset class performance, attribution, and risk."
  tags:
    - FactSet
    - Financial Data
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD

capability:
  consumes:
    - type: http
      namespace: factset-pa-engine
      baseUri: https://api.factset.com
      description: "Portfolio analytics engine for multi-asset class performance, attribution, and risk."
      authentication:
        type: basic
        username: "{{FACTSET_USERNAME}}"
        password: "{{FACTSET_PASSWORD}}"
      resources:
        - name: pa_engine
          path: /
          description: "PA Engine API resources."
          operations:
            - name: list-pa-engine
              method: GET
              description: "List PA Engine resources."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: factset-pa-engine-api
      resources:
        - path: /v1/pa-engine
          name: pa-engine
          description: "PA Engine resources."
          operations:
            - method: GET
              name: list-pa-engine
              description: "List PA Engine resources."
              call: "factset-pa-engine.list-pa-engine"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: factset-pa-engine-mcp
      transport: http
      tools:
        - name: list-pa-engine
          description: "List PA Engine resources."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-pa-engine.list-pa-engine"
          outputParameters:
            - type: object
              mapping: "$."
