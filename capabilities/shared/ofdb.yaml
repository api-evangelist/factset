naftiko: "1.0.0-alpha1"

info:
  label: "FactSet OFDB"
  description: "Open FactSet Database for creating and managing non-portfolio databases."
  tags:
    - FactSet
    - Financial Data
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD

capability:
  consumes:
    - type: http
      namespace: factset-ofdb
      baseUri: https://api.factset.com
      description: "Open FactSet Database for creating and managing non-portfolio databases."
      authentication:
        type: basic
        username: "{{FACTSET_USERNAME}}"
        password: "{{FACTSET_PASSWORD}}"
      resources:
        - name: ofdb
          path: /
          description: "OFDB API resources."
          operations:
            - name: list-ofdb
              method: GET
              description: "List OFDB resources."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: factset-ofdb-api
      resources:
        - path: /v1/ofdb
          name: ofdb
          description: "OFDB resources."
          operations:
            - method: GET
              name: list-ofdb
              description: "List OFDB resources."
              call: "factset-ofdb.list-ofdb"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: factset-ofdb-mcp
      transport: http
      tools:
        - name: list-ofdb
          description: "List OFDB resources."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-ofdb.list-ofdb"
          outputParameters:
            - type: object
              mapping: "$."
