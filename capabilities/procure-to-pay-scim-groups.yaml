        name: get
        description: Factset Get a Group.
        call: procure-to-pay-scim-groups.get
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Factset Replace a Group.
        call: procure-to-pay-scim-groups.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
