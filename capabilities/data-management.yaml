naftiko: 1.0.0-alpha2
info:
  label: FactSet Data Management
  description: Unified workflow for data management including custom databases, standard datafeeds, exchange datafeeds, content
    feeds, and programmatic environments. Used by data engineers.
  tags:
  - FactSet
  - Data Management
  - Datafeed
  - ETL
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACTSET_USERNAME: FACTSET_USERNAME
    FACTSET_PASSWORD: FACTSET_PASSWORD
capability:
  consumes:
  - type: http
    namespace: factset-ofdb
    baseUri: https://api.factset.com
    description: Open FactSet Database for creating and managing non-portfolio databases.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: ofdb
      path: /
      description: OFDB API resources.
      operations:
      - name: list-ofdb
        method: GET
        description: List OFDB resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: factset-signals
    baseUri: https://api.factset.com
    description: Material event signals.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: signals
      path: /
      description: Signals API resources.
