  exposes:
  - type: rest
    port: 8090
    namespace: data-management-api
    description: Unified REST API for data management.
    resources:
    - path: /v1/databases
      name: databases
      description: OFDB database management.
      operations:
      - method: GET
        name: list-databases
        description: List databases.
        call: factset-ofdb.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datafeeds
      name: datafeeds
      description: Standard datafeed.
      operations:
      - method: GET
        name: list-datafeeds
        description: List datafeeds.
        call: factset-sdf.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: data-management-mcp
    transport: http
    description: MCP server for AI-assisted data management.
    tools:
    - name: list-ofdb
      description: List OFDB databases.
      hints:
        readOnly: true
      call: factset-ofdb.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-standard-datafeed
      description: Get standard datafeed.
      hints:
        readOnly: true
      call: factset-sdf.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-content-feeds
      description: Get content feeds dictionary.
      hints:
        readOnly: true
      call: factset-cfd.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-xdf-model
      description: Get exchange datafeed model.
      hints:
        readOnly: true
      call: factset-xdf-model.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-xdf-snapshot
      description: Get exchange datafeed snapshot.
      hints:
        readOnly: true
      call: factset-xdf-entire.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-streaming
      description: Get direct streaming data.
      hints:
        readOnly: true
      call: factset-dst.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-prog-env
      description: Get programmatic environment.
      hints:
        readOnly: true
      call: factset-prog.list
      outputParameters:
      - type: object
        mapping: $.
