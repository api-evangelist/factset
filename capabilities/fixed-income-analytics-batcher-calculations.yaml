naftiko: 1.0.0-alpha2
info:
  label: FactSet Fixed Income Analytics Batcher API — Calculations
  description: 'FactSet Fixed Income Analytics Batcher API — Calculations. 3 operations. Lead operation: Factset Run Fiab
    Calculation. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Calculations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fixed-income-analytics-batcher-calculations
    baseUri: https://api-sandbox.factset.com
    description: FactSet Fixed Income Analytics Batcher API — Calculations business capability. Self-contained, no shared
      references.
    resources:
    - name: analytics-engines-fiab-v1-calculations
      path: /analytics/engines/fiab/v1/calculations
      operations:
      - name: runfiabcalculation
        method: POST
        description: Factset Run Fiab Calculation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getfiabcalculationstatussummaries
        method: GET
        description: Factset Get All Fiab Calculation Summaries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics-engines-fiab-v1-calculations-id
      path: /analytics/engines/fiab/v1/calculations/{id}
      operations:
      - name: getfiabcalculationbyid
        method: GET
        description: Factset Get Fiab Calculation by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Run FIAB Calculation endpoint
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: fixed-income-analytics-batcher-calculations-rest
    port: 8080
    description: REST adapter for FactSet Fixed Income Analytics Batcher API — Calculations. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/fiab/v1/calculations
      name: analytics-engines-fiab-v1-calculations
      description: REST surface for analytics-engines-fiab-v1-calculations.
      operations:
      - method: POST
        name: runfiabcalculation
        description: Factset Run Fiab Calculation
        call: fixed-income-analytics-batcher-calculations.runfiabcalculation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getfiabcalculationstatussummaries
        description: Factset Get All Fiab Calculation Summaries
        call: fixed-income-analytics-batcher-calculations.getfiabcalculationstatussummaries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/engines/fiab/v1/calculations/{id}
      name: analytics-engines-fiab-v1-calculations-id
      description: REST surface for analytics-engines-fiab-v1-calculations-id.
      operations:
      - method: GET
        name: getfiabcalculationbyid
        description: Factset Get Fiab Calculation by Id
        call: fixed-income-analytics-batcher-calculations.getfiabcalculationbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fixed-income-analytics-batcher-calculations-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Fixed Income Analytics Batcher API — Calculations. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: factset-run-fiab-calculation
      description: Factset Run Fiab Calculation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fixed-income-analytics-batcher-calculations.runfiabcalculation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-all-fiab-calculation
      description: Factset Get All Fiab Calculation Summaries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fixed-income-analytics-batcher-calculations.getfiabcalculationstatussummaries
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-fiab-calculation-id
      description: Factset Get Fiab Calculation by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fixed-income-analytics-batcher-calculations.getfiabcalculationbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
