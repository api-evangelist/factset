naftiko: 1.0.0-alpha2
info:
  label: FactSet ETF and Fund Analysis
  description: Unified workflow for ETF and mutual fund analysis including profiles, pricing, allocations, performance, and
    benchmarks. Used by fund analysts.
  tags:
  - FactSet
  - ETF
  - Funds
  - Benchmarks
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACTSET_USERNAME: FACTSET_USERNAME
    FACTSET_PASSWORD: FACTSET_PASSWORD
capability:
  consumes:
  - type: http
    namespace: factset-signals
    baseUri: https://api.factset.com
    description: Material event signals.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: signals
      path: /
      description: Signals API resources.
      operations:
      - name: list-signals
        method: GET
        description: List Signals resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: factset-signals
    baseUri: https://api.factset.com
    description: Material event signals.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: signals
      path: /
      description: Signals API resources.
      operations:
      - name: list-signals
        method: GET
        description: List Signals resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: factset-signals
    baseUri: https://api.factset.com
    description: Material event signals.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: signals
      path: /
      description: Signals API resources.
      operations:
      - name: list-signals
        method: GET
        description: List Signals resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: factset-signals
    baseUri: https://api.factset.com
    description: Material event signals.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: signals
      path: /
      description: Signals API resources.
      operations:
      - name: list-signals
        method: GET
        description: List Signals resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: factset-signals
    baseUri: https://api.factset.com
    description: Material event signals.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: signals
      path: /
      description: Signals API resources.
      operations:
      - name: list-signals
        method: GET
        description: List Signals resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8088
    namespace: etf-fund-api
    description: Unified REST API for ETF and fund analysis.
    resources:
    - path: /v1/etfs
      name: etfs
      description: ETF data.
      operations:
      - method: GET
        name: get-etfs
        description: Get ETF data.
        call: factset-etf.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/funds
      name: funds
      description: Fund data.
      operations:
      - method: GET
        name: get-funds
        description: Get fund data.
        call: factset-funds.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/benchmarks
      name: benchmarks
      description: Benchmark data.
      operations:
      - method: GET
        name: get-benchmarks
        description: Get benchmark data.
        call: factset-benchmarks.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9088
    namespace: etf-fund-mcp
    transport: http
    description: MCP server for AI-assisted ETF and fund analysis.
    tools:
    - name: get-etf-data
      description: Get ETF reference data.
      hints:
        readOnly: true
      call: factset-etf.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-etf-profiles
      description: Get ETF profiles and prices.
      hints:
        readOnly: true
      call: factset-etf-profile.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-fund-data
      description: Get mutual fund data.
      hints:
        readOnly: true
      call: factset-funds.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-benchmarks
      description: Get benchmark data.
      hints:
        readOnly: true
      call: factset-benchmarks.list
      outputParameters:
      - type: object
        mapping: $.
    - name: get-estimates
      description: Get consensus estimates.
      hints:
        readOnly: true
      call: factset-estimates.list
      outputParameters:
      - type: object
        mapping: $.
