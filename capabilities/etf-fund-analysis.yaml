naftiko: "1.0.0-alpha1"

info:
  label: "FactSet ETF and Fund Analysis"
  description: "Unified workflow for ETF and mutual fund analysis including profiles, pricing, allocations, performance, and benchmarks. Used by fund analysts."
  tags:
    - FactSet
    - ETF
    - Funds
    - Benchmarks
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD

capability:
  consumes:
    - import: factset-etf
      location: ./shared/etf.yaml
    - import: factset-etf-profile
      location: ./shared/etf-profile-and-prices.yaml
    - import: factset-funds
      location: ./shared/funds.yaml
    - import: factset-benchmarks
      location: ./shared/benchmarks.yaml
    - import: factset-estimates
      location: ./shared/estimates.yaml

  exposes:
    - type: rest
      port: 8088
      namespace: etf-fund-api
      description: "Unified REST API for ETF and fund analysis."
      resources:
        - path: /v1/etfs
          name: etfs
          description: "ETF data."
          operations:
            - method: GET
              name: get-etfs
              description: "Get ETF data."
              call: "factset-etf.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/funds
          name: funds
          description: "Fund data."
          operations:
            - method: GET
              name: get-funds
              description: "Get fund data."
              call: "factset-funds.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/benchmarks
          name: benchmarks
          description: "Benchmark data."
          operations:
            - method: GET
              name: get-benchmarks
              description: "Get benchmark data."
              call: "factset-benchmarks.list"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9088
      namespace: etf-fund-mcp
      transport: http
      description: "MCP server for AI-assisted ETF and fund analysis."
      tools:
        - name: get-etf-data
          description: "Get ETF reference data."
          hints:
            readOnly: true
          call: "factset-etf.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-etf-profiles
          description: "Get ETF profiles and prices."
          hints:
            readOnly: true
          call: "factset-etf-profile.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-fund-data
          description: "Get mutual fund data."
          hints:
            readOnly: true
          call: "factset-funds.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-benchmarks
          description: "Get benchmark data."
          hints:
            readOnly: true
          call: "factset-benchmarks.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-estimates
          description: "Get consensus estimates."
          hints:
            readOnly: true
          call: "factset-estimates.list"
          outputParameters:
            - type: object
              mapping: "$."
