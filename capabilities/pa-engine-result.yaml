naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Result
  description: 'Factset PA Engine API — Result. 1 operations. Lead operation: Factset Get Pa Calculation Result by Id. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Result
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-result
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Result business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-calculations-id-units-unitId-result
      path: /analytics/engines/pa/v3/calculations/{id}/units/{unitId}/result
      operations:
      - name: getcalculationunitresultbyid
        method: GET
        description: Factset Get Pa Calculation Result by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Get PA calculation status by id endpoint
          required: true
        - name: unitId
          in: path
          type: string
          description: from url, provided from the location header in the Get PA calculation status by id endpoint
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-result-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Result. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/calculations/{id}/units/{unitid}/result
      name: analytics-engines-pa-v3-calculations-id-units-unitid-result
      description: REST surface for analytics-engines-pa-v3-calculations-id-units-unitId-result.
      operations:
      - method: GET
        name: getcalculationunitresultbyid
        description: Factset Get Pa Calculation Result by Id
        call: pa-engine-result.getcalculationunitresultbyid
        with:
          id: rest.id
          unitId: rest.unitId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-result-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Result. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-pa-calculation-result
      description: Factset Get Pa Calculation Result by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-result.getcalculationunitresultbyid
      with:
        id: tools.id
        unitId: tools.unitId
      outputParameters:
      - type: object
        mapping: $.
