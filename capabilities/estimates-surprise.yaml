naftiko: 1.0.0-alpha2
info:
  label: FactSet Estimates API — Surprise
  description: 'FactSet Estimates API — Surprise. 2 operations. Lead operation: Factset Surprise Estimates for Rolling Fiscal
    Periods. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Surprise
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: estimates-surprise
    baseUri: https://api.factset.com/content
    description: FactSet Estimates API — Surprise business capability. Self-contained, no shared references.
    resources:
    - name: factset-estimates-v2-surprise
      path: /factset-estimates/v2/surprise
      operations:
      - name: getsurprise
        method: GET
        description: Factset Surprise Estimates for Rolling Fiscal Periods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsurpriseforlist
        method: POST
        description: Factset Surprise Estimates for Rolling Fiscal Periods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: estimates-surprise-rest
    port: 8080
    description: REST adapter for FactSet Estimates API — Surprise. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-estimates/v2/surprise
      name: factset-estimates-v2-surprise
      description: REST surface for factset-estimates-v2-surprise.
      operations:
      - method: GET
        name: getsurprise
        description: Factset Surprise Estimates for Rolling Fiscal Periods
        call: estimates-surprise.getsurprise
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getsurpriseforlist
        description: Factset Surprise Estimates for Rolling Fiscal Periods
        call: estimates-surprise.getsurpriseforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: estimates-surprise-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Estimates API — Surprise. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-surprise-estimates-rolling-fiscal
      description: Factset Surprise Estimates for Rolling Fiscal Periods
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: estimates-surprise.getsurprise
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-surprise-estimates-rolling-fiscal-2
      description: Factset Surprise Estimates for Rolling Fiscal Periods
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: estimates-surprise.getsurpriseforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
