naftiko: "1.0.0-alpha1"

info:
  label: "FactSet Quantitative Research"
  description: "Unified workflow for quantitative research including formula-based data retrieval, screening, factor analysis, and quant engine computations. Used by quantitative analysts."
  tags:
    - FactSet
    - Quantitative Research
    - Factor Analysis
    - Screening
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD

capability:
  consumes:
    - import: factset-formula
      location: ./shared/formula.yaml
    - import: factset-quant
      location: ./shared/quant-engine.yaml
    - import: factset-qfl
      location: ./shared/quant-factor-library.yaml
    - import: factset-screening
      location: ./shared/universal-screening.yaml

  exposes:
    - type: rest
      port: 8081
      namespace: quant-research-api
      description: "Unified REST API for quantitative research."
      resources:
        - path: /v1/formulas
          name: formulas
          description: "Formula-based data retrieval."
          operations:
            - method: GET
              name: list-formulas
              description: "Execute formula queries."
              call: "factset-formula.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/quant-engine
          name: quant-engine
          description: "Quant engine computations."
          operations:
            - method: GET
              name: list-quant
              description: "List quant engine resources."
              call: "factset-quant.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/factors
          name: factors
          description: "Factor library data."
          operations:
            - method: GET
              name: list-factors
              description: "List factor library resources."
              call: "factset-qfl.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/screens
          name: screens
          description: "Universal screening."
          operations:
            - method: GET
              name: list-screens
              description: "List screening resources."
              call: "factset-screening.list"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9081
      namespace: quant-research-mcp
      transport: http
      description: "MCP server for AI-assisted quantitative research."
      tools:
        - name: run-formula
          description: "Execute formula queries."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-formula.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: run-quant-engine
          description: "Run quant engine computations."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-quant.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-factors
          description: "Get factor library data."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-qfl.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: run-screen
          description: "Run universal screening."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-screening.list"
          outputParameters:
            - type: object
              mapping: "$."
