naftiko: 1.0.0-alpha2
info:
  label: FactSet Publisher API — Status
  description: 'FactSet Publisher API — Status. 1 operations. Lead operation: Factset Get Pub Calculation Status by Id. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: publisher-status
    baseUri: https://api.factset.com
    description: FactSet Publisher API — Status business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pub-v3-calculations-id-status
      path: /analytics/engines/pub/v3/calculations/{id}/status
      operations:
      - name: getcalculationstatusbyid
        method: GET
        description: Factset Get Pub Calculation Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run Pub calculation endpoint
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: publisher-status-rest
    port: 8080
    description: REST adapter for FactSet Publisher API — Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pub/v3/calculations/{id}/status
      name: analytics-engines-pub-v3-calculations-id-status
      description: REST surface for analytics-engines-pub-v3-calculations-id-status.
      operations:
      - method: GET
        name: getcalculationstatusbyid
        description: Factset Get Pub Calculation Status by Id
        call: publisher-status.getcalculationstatusbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: publisher-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Publisher API — Status. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-pub-calculation-status
      description: Factset Get Pub Calculation Status by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: publisher-status.getcalculationstatusbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
