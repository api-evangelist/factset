naftiko: 1.0.0-alpha2
info:
  label: Factset VRS API documentation — Report Instances
  description: 'Factset VRS API documentation — Report Instances. 6 operations. Lead operation: Factset Generates a report.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Report Instances
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
