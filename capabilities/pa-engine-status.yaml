naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Status
  description: 'Factset PA Engine API — Status. 1 operations. Lead operation: Factset Get Pa Calculation Status by Id. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-status
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Status business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-calculations-id-status
      path: /analytics/engines/pa/v3/calculations/{id}/status
      operations:
      - name: getcalculationstatusbyid
        method: GET
        description: Factset Get Pa Calculation Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run PA calculation endpoint
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-status-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/calculations/{id}/status
      name: analytics-engines-pa-v3-calculations-id-status
      description: REST surface for analytics-engines-pa-v3-calculations-id-status.
      operations:
      - method: GET
        name: getcalculationstatusbyid
        description: Factset Get Pa Calculation Status by Id
        call: pa-engine-status.getcalculationstatusbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Status. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-pa-calculation-status
      description: Factset Get Pa Calculation Status by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-status.getcalculationstatusbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
