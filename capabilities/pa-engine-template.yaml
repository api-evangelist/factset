naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Template
  description: 'Factset PA Engine API — Template. 2 operations. Lead operation: Factset Get Default Unlinked Pa Template Types..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Template
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-template
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Template business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-unlinked-templates-template-types
      path: /analytics/engines/pa/v3/unlinked-templates/template-types
      operations:
      - name: getdefaultunlinkedpatemplatetypes
        method: GET
        description: Factset Get Default Unlinked Pa Template Types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics-engines-pa-v3-unlinked-templates-template-types-id
      path: /analytics/engines/pa/v3/unlinked-templates/template-types/{id}
      operations:
      - name: getdetailstype
        method: GET
        description: Factset Get Unlinked Pa Template Type Details by Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for an unlinked PA template type
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-template-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Template. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/unlinked-templates/template-types
      name: analytics-engines-pa-v3-unlinked-templates-template-types
      description: REST surface for analytics-engines-pa-v3-unlinked-templates-template-types.
      operations:
      - method: GET
        name: getdefaultunlinkedpatemplatetypes
        description: Factset Get Default Unlinked Pa Template Types.
        call: pa-engine-template.getdefaultunlinkedpatemplatetypes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/engines/pa/v3/unlinked-templates/template-types/{id}
      name: analytics-engines-pa-v3-unlinked-templates-template-types-id
      description: REST surface for analytics-engines-pa-v3-unlinked-templates-template-types-id.
      operations:
      - method: GET
        name: getdetailstype
        description: Factset Get Unlinked Pa Template Type Details by Id.
        call: pa-engine-template.getdetailstype
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-template-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Template. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-default-unlinked-pa
      description: Factset Get Default Unlinked Pa Template Types.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-template.getdefaultunlinkedpatemplatetypes
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-unlinked-pa-template
      description: Factset Get Unlinked Pa Template Type Details by Id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-template.getdetailstype
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
