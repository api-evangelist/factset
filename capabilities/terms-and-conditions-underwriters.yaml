naftiko: 1.0.0-alpha2
info:
  label: FactSet Terms and Conditions API — Underwriters
  description: 'FactSet Terms and Conditions API — Underwriters. 2 operations. Lead operation: Factset Return Lead Underwriters
    for a Fixed Income Security.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Underwriters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: terms-and-conditions-underwriters
    baseUri: https://api.factset.com/content
    description: FactSet Terms and Conditions API — Underwriters business capability. Self-contained, no shared references.
    resources:
    - name: factset-terms-and-conditions-v1-lead-underwriters
      path: /factset-terms-and-conditions/v1/lead-underwriters
      operations:
      - name: getleadunderwriters
        method: GET
        description: Factset Return Lead Underwriters for a Fixed Income Security.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getleadunderwritersforlist
        method: POST
        description: Factset Return Lead Underwriters for a List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: terms-and-conditions-underwriters-rest
    port: 8080
    description: REST adapter for FactSet Terms and Conditions API — Underwriters. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/factset-terms-and-conditions/v1/lead-underwriters
      name: factset-terms-and-conditions-v1-lead-underwriters
      description: REST surface for factset-terms-and-conditions-v1-lead-underwriters.
      operations:
      - method: GET
        name: getleadunderwriters
        description: Factset Return Lead Underwriters for a Fixed Income Security.
        call: terms-and-conditions-underwriters.getleadunderwriters
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getleadunderwritersforlist
        description: Factset Return Lead Underwriters for a List of Fixed Income Securities.
        call: terms-and-conditions-underwriters.getleadunderwritersforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terms-and-conditions-underwriters-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Terms and Conditions API — Underwriters. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-return-lead-underwriters-fixed
      description: Factset Return Lead Underwriters for a Fixed Income Security.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-underwriters.getleadunderwriters
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-lead-underwriters-list
      description: Factset Return Lead Underwriters for a List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: terms-and-conditions-underwriters.getleadunderwritersforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
