naftiko: 1.0.0-alpha2
info:
  label: Factset Portfolio Metadata — Returns Composite
  description: 'Factset Portfolio Metadata — Returns Composite. 1 operations. Lead operation: Returns Composite. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Returns Composite
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-returns-composite
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: Factset Portfolio Metadata — Returns Composite business capability. Self-contained, no shared references.
    resources:
    - name: returns-composite-id
      path: /returns-composite/{id}
      operations:
      - name: readreturnscomposite
        method: GET
        description: Read a returns composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the returns composite to be read
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-returns-composite-rest
    port: 8080
    description: REST adapter for Factset Portfolio Metadata — Returns Composite. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/returns-composite/{id}
      name: returns-composite-id
      description: REST surface for returns-composite-id.
      operations:
      - method: GET
        name: readreturnscomposite
        description: Read a returns composite
        call: portfolio-metadata-returns-composite.readreturnscomposite
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-returns-composite-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Portfolio Metadata — Returns Composite. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: read-returns-composite
      description: Read a returns composite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-returns-composite.readreturnscomposite
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
