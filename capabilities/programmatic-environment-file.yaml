naftiko: 1.0.0-alpha2
info:
  label: FactSet Programmatic Environment API — File
  description: 'FactSet Programmatic Environment API — File. 1 operations. Lead operation: Factset Starts a File Upload. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - File
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: programmatic-environment-file
    baseUri: https://api.factset.com
    description: FactSet Programmatic Environment API — File business capability. Self-contained, no shared references.
    resources:
    - name: analytics-quant-fpe-v1-files-server-file
      path: /analytics/quant/fpe/v1/files/{server}/{file}
      operations:
      - name: post
        method: POST
        description: Factset Starts a File Upload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: server
          in: path
          type: string
          description: The server to upload the file to. Either `interactive` or `batch`.
          required: true
        - name: file
          in: path
          type: string
          description: The file name to upload the file to. Existing directory can be specified.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: programmatic-environment-file-rest
    port: 8080
    description: REST adapter for FactSet Programmatic Environment API — File. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/quant/fpe/v1/files/{server}/{file}
      name: analytics-quant-fpe-v1-files-server-file
      description: REST surface for analytics-quant-fpe-v1-files-server-file.
      operations:
      - method: POST
        name: post
        description: Factset Starts a File Upload
        call: programmatic-environment-file.post
        with:
          server: rest.server
          file: rest.file
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: programmatic-environment-file-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Programmatic Environment API — File. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-starts-file-upload
      description: Factset Starts a File Upload
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: programmatic-environment-file.post
      with:
        server: tools.server
        file: tools.file
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
