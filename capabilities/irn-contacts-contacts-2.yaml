        idempotent: true
      call: irn-contacts-contacts-2.patchcontact
      with:
        contactId: tools.contactId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-delete-contact
      description: Factset Delete a contact
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: irn-contacts-contacts-2.deletecontact
      with:
        contactId: tools.contactId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-about-field-content
      description: Factset Get the About field content for a specific contact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-contacts-contacts-2.getcontactnotes
      with:
        contactId: tools.contactId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-contact-s-audit-history
      description: Factset Get a contact’s audit history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-contacts-contacts-2.getcontactevents
      with:
        contactId: tools.contactId
