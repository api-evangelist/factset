naftiko: 1.0.0-alpha2
info:
  label: FactSet Fundamentals API — Fundamentals
  description: 'FactSet Fundamentals API — Fundamentals. 2 operations. Lead operation: Factset Returns Company Fundamental
    Data.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Fundamentals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fundamentals-fundamentals
    baseUri: https://api.factset.com/content/factset-fundamentals/v2
    description: FactSet Fundamentals API — Fundamentals business capability. Self-contained, no shared references.
    resources:
    - name: fundamentals
      path: /fundamentals
      operations:
      - name: getfdsfundamentals
        method: GET
        description: Factset Returns Company Fundamental Data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfdsfundamentalsforlist
        method: POST
        description: Factset Returns Company Fundamental Data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: fundamentals-fundamentals-rest
    port: 8080
    description: REST adapter for FactSet Fundamentals API — Fundamentals. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fundamentals
      name: fundamentals
      description: REST surface for fundamentals.
      operations:
      - method: GET
        name: getfdsfundamentals
        description: Factset Returns Company Fundamental Data.
        call: fundamentals-fundamentals.getfdsfundamentals
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfdsfundamentalsforlist
        description: Factset Returns Company Fundamental Data.
        call: fundamentals-fundamentals.getfdsfundamentalsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fundamentals-fundamentals-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Fundamentals API — Fundamentals. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-returns-company-fundamental-data
      description: Factset Returns Company Fundamental Data.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fundamentals-fundamentals.getfdsfundamentals
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-company-fundamental-data-2
      description: Factset Returns Company Fundamental Data.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fundamentals-fundamentals.getfdsfundamentalsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
