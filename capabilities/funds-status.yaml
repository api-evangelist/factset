naftiko: 1.0.0-alpha2
info:
  label: FactSet Funds API — Status
  description: 'FactSet Funds API — Status. 2 operations. Lead operation: Factset Get Fund''s Current Status and Database
    Availability. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: funds-status
    baseUri: https://api.factset.com/content
    description: FactSet Funds API — Status business capability. Self-contained, no shared references.
    resources:
    - name: factset-funds-v1-status
      path: /factset-funds/v1/status
      operations:
      - name: getstatuses
        method: GET
        description: Factset Get Fund's Current Status and Database Availability
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getstatusesforlist
        method: POST
        description: Factset Get Fund's Current Status and Database Availability for Large List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: funds-status-rest
    port: 8080
    description: REST adapter for FactSet Funds API — Status. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-funds/v1/status
      name: factset-funds-v1-status
      description: REST surface for factset-funds-v1-status.
      operations:
      - method: GET
        name: getstatuses
        description: Factset Get Fund's Current Status and Database Availability
        call: funds-status.getstatuses
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getstatusesforlist
        description: Factset Get Fund's Current Status and Database Availability for Large List of Ids.
        call: funds-status.getstatusesforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: funds-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Funds API — Status. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: factset-get-fund-s-current-status
      description: Factset Get Fund's Current Status and Database Availability
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: funds-status.getstatuses
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-fund-s-current-status-2
      description: Factset Get Fund's Current Status and Database Availability for Large List of Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: funds-status.getstatusesforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
