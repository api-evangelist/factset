naftiko: 1.0.0-alpha2
info:
  label: FactSet Vermilion API — Generate
  description: 'FactSet Vermilion API — Generate. 1 operations. Lead operation: Factset Generates a Report. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Generate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: vermilion-generate
    baseUri: ''
    description: FactSet Vermilion API — Generate business capability. Self-contained, no shared references.
    resources:
    - name: v1-report-instances-generate
      path: /v1/report-instances/generate
      operations:
      - name: generatereport
        method: POST
        description: Factset Generates a Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: vermilion-generate-rest
    port: 8080
    description: REST adapter for FactSet Vermilion API — Generate. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/report-instances/generate
      name: v1-report-instances-generate
      description: REST surface for v1-report-instances-generate.
      operations:
      - method: POST
        name: generatereport
        description: Factset Generates a Report
        call: vermilion-generate.generatereport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vermilion-generate-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Vermilion API — Generate. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-generates-report
      description: Factset Generates a Report
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vermilion-generate.generatereport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
