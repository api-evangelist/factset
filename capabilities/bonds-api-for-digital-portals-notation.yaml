naftiko: 1.0.0-alpha2
info:
  label: FactSet Bonds API for Digital Portals — Notation
  description: 'FactSet Bonds API for Digital Portals — Notation. 3 operations. Lead operation: Factset Key Figures of a Debt
    Instrument.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Notation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: bonds-api-for-digital-portals-notation
    baseUri: https://api.factset.com/wealth/v1
    description: FactSet Bonds API for Digital Portals — Notation business capability. Self-contained, no shared references.
    resources:
    - name: debtInstrument-keyFigures-notation-get
      path: /debtInstrument/keyFigures/notation/get
      operations:
      - name: getdebtinstrumentkeyfiguresnotationget
        method: GET
        description: Factset Key Figures of a Debt Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    - name: debtInstrument-notation-screener-search
      path: /debtInstrument/notation/screener/search
      operations:
      - name: postdebtinstrumentnotationscreenersearch
        method: POST
        description: Factset Screener for Debt Instruments' Notations Based on Debt Instrument-specific Parameters.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: debtInstrument-notation-screener-valueRanges-get
      path: /debtInstrument/notation/screener/valueRanges/get
      operations:
      - name: postdebtinstrumentnotationscreenervaluerangesget
        method: POST
        description: Factset Possible Values and Value Ranges for the Parameters Used in the Endpoint `/debtinstrument/notation/screener/search.`
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: bonds-api-for-digital-portals-notation-rest
    port: 8080
    description: REST adapter for FactSet Bonds API for Digital Portals — Notation. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/debtinstrument/keyfigures/notation/get
      name: debtinstrument-keyfigures-notation-get
      description: REST surface for debtInstrument-keyFigures-notation-get.
      operations:
      - method: GET
        name: getdebtinstrumentkeyfiguresnotationget
        description: Factset Key Figures of a Debt Instrument.
        call: bonds-api-for-digital-portals-notation.getdebtinstrumentkeyfiguresnotationget
        with:
          id: rest.id
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/debtinstrument/notation/screener/search
      name: debtinstrument-notation-screener-search
      description: REST surface for debtInstrument-notation-screener-search.
      operations:
      - method: POST
        name: postdebtinstrumentnotationscreenersearch
        description: Factset Screener for Debt Instruments' Notations Based on Debt Instrument-specific Parameters.
        call: bonds-api-for-digital-portals-notation.postdebtinstrumentnotationscreenersearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/debtinstrument/notation/screener/valueranges/get
      name: debtinstrument-notation-screener-valueranges-get
      description: REST surface for debtInstrument-notation-screener-valueRanges-get.
      operations:
      - method: POST
        name: postdebtinstrumentnotationscreenervaluerangesget
        description: Factset Possible Values and Value Ranges for the Parameters Used in the Endpoint `/debtinstrument/notation/screener/search.`
        call: bonds-api-for-digital-portals-notation.postdebtinstrumentnotationscreenervaluerangesget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bonds-api-for-digital-portals-notation-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Bonds API for Digital Portals — Notation. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-key-figures-debt-instrument
      description: Factset Key Figures of a Debt Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bonds-api-for-digital-portals-notation.getdebtinstrumentkeyfiguresnotationget
      with:
        id: tools.id
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-screener-debt-instruments-notations
      description: Factset Screener for Debt Instruments' Notations Based on Debt Instrument-specific Parameters.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bonds-api-for-digital-portals-notation.postdebtinstrumentnotationscreenersearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-possible-values-and-value
      description: Factset Possible Values and Value Ranges for the Parameters Used in the Endpoint `/debtinstrument/notation/screener/search.`
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: bonds-api-for-digital-portals-notation.postdebtinstrumentnotationscreenervaluerangesget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
