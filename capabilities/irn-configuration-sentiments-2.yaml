naftiko: 1.0.0-alpha2
info:
  label: Factset IRN API v1 — Sentiments
  description: 'Factset IRN API v1 — Sentiments. 1 operations. Lead operation: Factset Get all Sentiments. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Sentiments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-sentiments-2
    baseUri: https://api.factset.com/research/irn
    description: Factset IRN API v1 — Sentiments business capability. Self-contained, no shared references.
    resources:
    - name: v1-sentiments
      path: /v1/sentiments
      operations:
      - name: getsentiments
        method: GET
        description: Factset Get all Sentiments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-sentiments-2-rest
    port: 8080
    description: REST adapter for Factset IRN API v1 — Sentiments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/sentiments
      name: v1-sentiments
      description: REST surface for v1-sentiments.
      operations:
      - method: GET
        name: getsentiments
        description: Factset Get all Sentiments
        call: irn-configuration-sentiments-2.getsentiments
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-sentiments-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset IRN API v1 — Sentiments. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-all-sentiments
      description: Factset Get all Sentiments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-sentiments-2.getsentiments
      outputParameters:
      - type: object
        mapping: $.
