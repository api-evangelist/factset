naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Status
  description: 'FactSet Real-Time Quotes API — Status. 1 operations. Lead operation: Factset Intraday Trading Status of a
    Notation.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-status
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Status business capability. Self-contained, no shared references.
    resources:
    - name: notation-status-get
      path: /notation/status/get
      operations:
      - name: getnotationstatusget
        method: GET
        description: Factset Intraday Trading Status of a Notation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: quality
          in: query
          type: string
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _subscriptionMinimumInterval
          in: query
          type: number
          description: Minimum number of milliseconds at which updates are sent.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-status-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/notation/status/get
      name: notation-status-get
      description: REST surface for notation-status-get.
      operations:
      - method: GET
        name: getnotationstatusget
        description: Factset Intraday Trading Status of a Notation.
        call: real-time-quotes-status.getnotationstatusget
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          quality: rest.quality
          _attributes: rest._attributes
          _subscriptionMinimumInterval: rest._subscriptionMinimumInterval
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Status. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-intraday-trading-status-notation
      description: Factset Intraday Trading Status of a Notation.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-status.getnotationstatusget
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        quality: tools.quality
        _attributes: tools._attributes
        _subscriptionMinimumInterval: tools._subscriptionMinimumInterval
      outputParameters:
      - type: object
        mapping: $.
