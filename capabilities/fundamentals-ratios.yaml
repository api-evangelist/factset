naftiko: 1.0.0-alpha2
info:
  label: FactSet Fundamentals API — Ratios
  description: 'FactSet Fundamentals API — Ratios. 2 operations. Lead operation: Factset Returns Pre-calculated Financial
    Ratios.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Ratios
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fundamentals-ratios
    baseUri: https://api.factset.com/content/factset-fundamentals/v2
    description: FactSet Fundamentals API — Ratios business capability. Self-contained, no shared references.
    resources:
    - name: ratios
      path: /ratios
      operations:
      - name: getratios
        method: GET
        description: Factset Returns Pre-calculated Financial Ratios.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postratios
        method: POST
        description: Factset Returns Pre-calculated Financial Ratios for a List of Identifiers.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: fundamentals-ratios-rest
    port: 8080
    description: REST adapter for FactSet Fundamentals API — Ratios. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/ratios
      name: ratios
      description: REST surface for ratios.
      operations:
      - method: GET
        name: getratios
        description: Factset Returns Pre-calculated Financial Ratios.
        call: fundamentals-ratios.getratios
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postratios
        description: Factset Returns Pre-calculated Financial Ratios for a List of Identifiers.
        call: fundamentals-ratios.postratios
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fundamentals-ratios-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Fundamentals API — Ratios. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-returns-pre-calculated-financial
      description: Factset Returns Pre-calculated Financial Ratios.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fundamentals-ratios.getratios
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-pre-calculated-financial-2
      description: Factset Returns Pre-calculated Financial Ratios for a List of Identifiers.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: fundamentals-ratios.postratios
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
