naftiko: 1.0.0-alpha2
info:
  label: FactSet Universal Screening API — Status
  description: 'FactSet Universal Screening API — Status. 1 operations. Lead operation: Status. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: universal-screening-status
    baseUri: https://api.factset.com/universal-screening
    description: FactSet Universal Screening API — Status business capability. Self-contained, no shared references.
    resources:
    - name: v2-job-id-status
      path: /v2/job/{id}/status
      operations:
      - name: pollcalculate
        method: GET
        description: Polls the job with a given screen ID and returns job status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: universal-screening-status-rest
    port: 8080
    description: REST adapter for FactSet Universal Screening API — Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/job/{id}/status
      name: v2-job-id-status
      description: REST surface for v2-job-id-status.
      operations:
      - method: GET
        name: pollcalculate
        description: Polls the job with a given screen ID and returns job status
        call: universal-screening-status.pollcalculate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: universal-screening-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Universal Screening API — Status. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: polls-job-given-screen-id
      description: Polls the job with a given screen ID and returns job status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: universal-screening-status.pollcalculate
      outputParameters:
      - type: object
        mapping: $.
