naftiko: 1.0.0-alpha2
info:
  label: FactSet Tick History API — Bars
  description: 'FactSet Tick History API — Bars. 3 operations. Lead operation: Factset Requests the Creation of Minute Bars
    File. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Bars
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: tick-history-bars
    baseUri: https://api.factset.com/tick-history/v2
    description: FactSet Tick History API — Bars business capability. Self-contained, no shared references.
    resources:
    - name: level1-files-minute-bars-create
      path: /level1/files/minute-bars/create
      operations:
      - name: requestminutebarsfiles
        method: POST
        description: Factset Requests the Creation of Minute Bars File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: level1-files-minute-bars-get
      path: /level1/files/minute-bars/get
      operations:
      - name: getminutebarsfiles
        method: GET
        description: Factset Returns the Minute Bars Data in Files Requested in the /create Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: level1-files-minute-bars-status
      path: /level1/files/minute-bars/status
      operations:
      - name: getminutebarsfilestatus
        method: GET
        description: Factset Returns the Status of the Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: tick-history-bars-rest
    port: 8080
    description: REST adapter for FactSet Tick History API — Bars. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/level1/files/minute-bars/create
      name: level1-files-minute-bars-create
      description: REST surface for level1-files-minute-bars-create.
      operations:
      - method: POST
        name: requestminutebarsfiles
        description: Factset Requests the Creation of Minute Bars File
        call: tick-history-bars.requestminutebarsfiles
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/level1/files/minute-bars/get
      name: level1-files-minute-bars-get
      description: REST surface for level1-files-minute-bars-get.
      operations:
      - method: GET
        name: getminutebarsfiles
        description: Factset Returns the Minute Bars Data in Files Requested in the /create Endpoint
        call: tick-history-bars.getminutebarsfiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/level1/files/minute-bars/status
      name: level1-files-minute-bars-status
      description: REST surface for level1-files-minute-bars-status.
      operations:
      - method: GET
        name: getminutebarsfilestatus
        description: Factset Returns the Status of the Id
        call: tick-history-bars.getminutebarsfilestatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tick-history-bars-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Tick History API — Bars. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-requests-creation-minute-bars
      description: Factset Requests the Creation of Minute Bars File
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tick-history-bars.requestminutebarsfiles
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-minute-bars-data
      description: Factset Returns the Minute Bars Data in Files Requested in the /create Endpoint
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tick-history-bars.getminutebarsfiles
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-status-id
      description: Factset Returns the Status of the Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tick-history-bars.getminutebarsfilestatus
      outputParameters:
      - type: object
        mapping: $.
