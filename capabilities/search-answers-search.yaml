naftiko: 1.0.0-alpha2
info:
  label: FactSet Search Answers — Search
  description: 'FactSet Search Answers — Search. 2 operations. Lead operation: Fetch Factset Answer in Adaptive Card Format.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-answers-search
    baseUri: https://api.factset.com
    description: FactSet Search Answers — Search business capability. Self-contained, no shared references.
    resources:
    - name: search-answers-v1-adaptive-card
      path: /search/answers/v1/adaptive-card
      operations:
      - name: searchforadaptivecardanswer
        method: GET
        description: Fetch Factset Answer in Adaptive Card Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-answers-v1-data
      path: /search/answers/v1/data
      operations:
      - name: searchfordataanswer
        method: GET
        description: Fetch Factset Answer in Data Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: search-answers-search-rest
    port: 8080
    description: REST adapter for FactSet Search Answers — Search. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/search/answers/v1/adaptive-card
      name: search-answers-v1-adaptive-card
      description: REST surface for search-answers-v1-adaptive-card.
      operations:
      - method: GET
        name: searchforadaptivecardanswer
        description: Fetch Factset Answer in Adaptive Card Format
        call: search-answers-search.searchforadaptivecardanswer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/answers/v1/data
      name: search-answers-v1-data
      description: REST surface for search-answers-v1-data.
      operations:
      - method: GET
        name: searchfordataanswer
        description: Fetch Factset Answer in Data Format
        call: search-answers-search.searchfordataanswer
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-answers-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Search Answers — Search. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: fetch-factset-answer-adaptive-card
      description: Fetch Factset Answer in Adaptive Card Format
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-answers-search.searchforadaptivecardanswer
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-factset-answer-data-format
      description: Fetch Factset Answer in Data Format
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-answers-search.searchfordataanswer
      outputParameters:
      - type: object
        mapping: $.
