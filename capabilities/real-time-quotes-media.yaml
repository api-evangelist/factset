naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Media
  description: 'FactSet Real-Time Quotes API — Media. 2 operations. Lead operation: Factset List of Media Kinds.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Media
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-media
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Media business capability. Self-contained, no shared references.
    resources:
    - name: basic-media-kind-list
      path: /basic/media/kind/list
      operations:
      - name: getbasicmediakindlist
        method: GET
        description: Factset List of Media Kinds.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    - name: basic-media-type-list
      path: /basic/media/type/list
      operations:
      - name: postbasicmediatypelist
        method: POST
        description: Factset List of Internet Media Types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-media-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Media. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basic/media/kind/list
      name: basic-media-kind-list
      description: REST surface for basic-media-kind-list.
      operations:
      - method: GET
        name: getbasicmediakindlist
        description: Factset List of Media Kinds.
        call: real-time-quotes-media.getbasicmediakindlist
        with:
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/media/type/list
      name: basic-media-type-list
      description: REST surface for basic-media-type-list.
      operations:
      - method: POST
        name: postbasicmediatypelist
        description: Factset List of Internet Media Types.
        call: real-time-quotes-media.postbasicmediatypelist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-media-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Media. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-list-media-kinds
      description: Factset List of Media Kinds.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-media.getbasicmediakindlist
      with:
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-internet-media-types
      description: Factset List of Internet Media Types.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-quotes-media.postbasicmediatypelist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
