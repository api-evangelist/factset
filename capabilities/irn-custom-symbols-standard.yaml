naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Custom Symbols API — Standard
  description: 'FactSet IRN Custom Symbols API — Standard. 4 operations. Lead operation: Factset Create Standard Symbol Metadata.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Standard
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-custom-symbols-standard
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Custom Symbols API — Standard business capability. Self-contained, no shared references.
    resources:
    - name: v1-custom-symbols-standard-symbol-metadata
      path: /v1/custom-symbols/standard-symbol-metadata
      operations:
      - name: createstandardsymbolmetadata
        method: POST
        description: Factset Create Standard Symbol Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-custom-symbols-standard-symbol-metadata-standardSymbolId
      path: /v1/custom-symbols/standard-symbol-metadata/{standardSymbolId}
      operations:
      - name: patchstandardsymbol
        method: PATCH
        description: Factset Edit a Standard Symbols Standard Field and Custom Field Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: standardSymbolId
          in: path
          type: string
          description: standardSymbolId to update associated standard symbol
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-custom-symbols-standard-symbol-metadata-standardSymbol
      path: /v1/custom-symbols/standard-symbol-metadata/{standardSymbol}
      operations:
      - name: getstandardsymbolmetadataguid
        method: GET
        description: Factset Get All Custom Field and Standard Field Details on a Specific Standard Symbol
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: standardSymbol
          in: path
          type: string
          description: Standard symbol to get associated customSymbolId
          required: true
    - name: v1-custom-symbols-customSymbolId-link-standard-symbol
      path: /v1/custom-symbols/{customSymbolId}/link-standard-symbol
      operations:
      - name: linkcustomsymboltostandardsymbol
        method: POST
        description: Factset Link Custom Symbol to Standard Symbol
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customSymbolId
          in: path
          type: string
          description: customSymbolId associated with custom symbol
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-custom-symbols-standard-rest
    port: 8080
    description: REST adapter for FactSet IRN Custom Symbols API — Standard. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/custom-symbols/standard-symbol-metadata
      name: v1-custom-symbols-standard-symbol-metadata
      description: REST surface for v1-custom-symbols-standard-symbol-metadata.
      operations:
      - method: POST
        name: createstandardsymbolmetadata
        description: Factset Create Standard Symbol Metadata
        call: irn-custom-symbols-standard.createstandardsymbolmetadata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/custom-symbols/standard-symbol-metadata/{standardsymbolid}
      name: v1-custom-symbols-standard-symbol-metadata-standardsymbolid
      description: REST surface for v1-custom-symbols-standard-symbol-metadata-standardSymbolId.
      operations:
      - method: PATCH
        name: patchstandardsymbol
        description: Factset Edit a Standard Symbols Standard Field and Custom Field Data
        call: irn-custom-symbols-standard.patchstandardsymbol
        with:
          standardSymbolId: rest.standardSymbolId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/custom-symbols/standard-symbol-metadata/{standardsymbol}
      name: v1-custom-symbols-standard-symbol-metadata-standardsymbol
      description: REST surface for v1-custom-symbols-standard-symbol-metadata-standardSymbol.
      operations:
      - method: GET
        name: getstandardsymbolmetadataguid
        description: Factset Get All Custom Field and Standard Field Details on a Specific Standard Symbol
        call: irn-custom-symbols-standard.getstandardsymbolmetadataguid
        with:
          standardSymbol: rest.standardSymbol
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/custom-symbols/{customsymbolid}/link-standard-symbol
      name: v1-custom-symbols-customsymbolid-link-standard-symbol
      description: REST surface for v1-custom-symbols-customSymbolId-link-standard-symbol.
      operations:
      - method: POST
        name: linkcustomsymboltostandardsymbol
        description: Factset Link Custom Symbol to Standard Symbol
        call: irn-custom-symbols-standard.linkcustomsymboltostandardsymbol
        with:
          customSymbolId: rest.customSymbolId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-custom-symbols-standard-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Custom Symbols API — Standard. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-create-standard-symbol-metadata
      description: Factset Create Standard Symbol Metadata
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: irn-custom-symbols-standard.createstandardsymbolmetadata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-edit-standard-symbols-standard
      description: Factset Edit a Standard Symbols Standard Field and Custom Field Data
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: irn-custom-symbols-standard.patchstandardsymbol
      with:
        standardSymbolId: tools.standardSymbolId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-all-custom-field
      description: Factset Get All Custom Field and Standard Field Details on a Specific Standard Symbol
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-custom-symbols-standard.getstandardsymbolmetadataguid
      with:
        standardSymbol: tools.standardSymbol
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-link-custom-symbol-standard
      description: Factset Link Custom Symbol to Standard Symbol
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: irn-custom-symbols-standard.linkcustomsymboltostandardsymbol
      with:
        customSymbolId: tools.customSymbolId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
