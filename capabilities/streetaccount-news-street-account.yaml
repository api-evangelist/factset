        call: streetaccount-news-street-account.createstreetaccountview
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: editstreetaccountview
        description: Factset Edits and Saves an Existing Streetaccount View
        call: streetaccount-news-street-account.editstreetaccountview
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletestreetaccountview
        description: Factset Deletes an Existing Streetaccount View
        call: streetaccount-news-street-account.deletestreetaccountview
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/streetaccount/views/{id}/headlines
      name: streetaccount-views-id-headlines
      description: REST surface for streetaccount-views-id-headlines.
      operations:
      - method: POST
        name: getstreetaccountheadlinesbyview
        description: Factset Retrieve Streetaccount Headlines for Given View
        call: streetaccount-news-street-account.getstreetaccountheadlinesbyview
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streetaccount-news-street-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet StreetAccount News API — Street Account. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-retrieve-all-streetaccount-filters
      description: Factset Retrieve All Streetaccount Filters
