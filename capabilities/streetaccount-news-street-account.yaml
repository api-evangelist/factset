naftiko: 1.0.0-alpha2
info:
  label: FactSet StreetAccount News API — Street Account
  description: 'FactSet StreetAccount News API — Street Account. 10 operations. Lead operation: Factset Retrieve All Streetaccount
    Filters. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Street Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: streetaccount-news-street-account
    baseUri: https://api.factset.com/research/news/v0
    description: FactSet StreetAccount News API — Street Account business capability. Self-contained, no shared references.
    resources:
    - name: streetaccount-filters
      path: /streetaccount/filters
      operations:
      - name: getstreetaccountfilters
        method: GET
        description: Factset Retrieve All Streetaccount Filters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: structured
          in: query
          type: boolean
          description: Pass structured to generate a structured view of the available filters.
        - name: flattened
          in: query
          type: boolean
          description: Pass flattened to generate a structured view of the available filters.
    - name: streetaccount-headlines
      path: /streetaccount/headlines
      operations:
      - name: getstreetaccountheadlines
        method: POST
        description: Factset Retrieve Streetaccount Headlines for Given Filters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: streetaccount-historical-check-status
      path: /streetaccount/historical/check-status
      operations:
      - name: get
        method: GET
        description: Factset Returns the Status and Percentage of Completion for the Requested Jobid
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobID
          in: query
          type: string
          description: jobID returned by the request-files endpoint to know the status and percentDone
          required: true
        - name: _paginationLimit
          in: query
          type: integer
          description: Specifies the maximum number of results to return per result
        - name: _paginationOffset
          in: query
          type: integer
          description: Specifies the starting point for pagination. This parameter is used to identify the   beginning of
            next set of results
    - name: streetaccount-historical-get-files
      path: /streetaccount/historical/get-files
      operations:
      - name: get
        method: GET
        description: Factset Returns the Streetaccount Xml Files for the Specified Date Range
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobID
          in: query
          type: string
          description: jobID returned by the request-files endpoint to collect the results of the query
          required: true
        - name: _paginationLimit
          in: query
          type: integer
          description: Specifies the maximum number of results to return per result
        - name: _paginationOffset
          in: query
          type: integer
          description: Specifies the starting point for pagination. This parameter is used to identify the   beginning of
            next set of results
    - name: streetaccount-historical-request-files
      path: /streetaccount/historical/request-files
      operations:
      - name: get
        method: GET
        description: Factset Returns the Jobid
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Date from which data is required. Should be YYYY-MM-DDTHH:MM:SSZ format
          required: true
        - name: endDate
          in: query
          type: string
          description: The date until which the data is to be fetched. Should be YYYY-MM-DDTHH:MM:SSZ format
          required: true
    - name: streetaccount-views
      path: /streetaccount/views
      operations:
      - name: getstreetaccountviews
        method: GET
        description: Factset Retrieves Streetaccount Search Views
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: streetaccount-views-id
      path: /streetaccount/views/{id}
      operations:
      - name: createstreetaccountview
        method: POST
        description: Factset Creates and Saves a Streetaccount View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: view id of the view which is the be created
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: editstreetaccountview
        method: PUT
        description: Factset Edits and Saves an Existing Streetaccount View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: view id of the view to be edited
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletestreetaccountview
        method: DELETE
        description: Factset Deletes an Existing Streetaccount View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: view id of the view to be deleted
          required: true
    - name: streetaccount-views-id-headlines
      path: /streetaccount/views/{id}/headlines
      operations:
      - name: getstreetaccountheadlinesbyview
        method: POST
        description: Factset Retrieve Streetaccount Headlines for Given View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: view id of the view to return headlines for
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: streetaccount-news-street-account-rest
    port: 8080
    description: REST adapter for FactSet StreetAccount News API — Street Account. One Spectral-compliant resource per consumed
