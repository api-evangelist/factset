      - method: GET
        name: getstreetaccountviews
        description: Factset Retrieves Streetaccount Search Views
        call: streetaccount-news-street-account.getstreetaccountviews
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/streetaccount/views/{id}
