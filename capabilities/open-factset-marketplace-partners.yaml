naftiko: 1.0.0-alpha2
info:
  label: FactSet Open FactSet Marketplace API — Partners
  description: 'FactSet Open FactSet Marketplace API — Partners. 3 operations. Lead operation: Factset Retrieve a Collection
    of Partner Records.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Partners
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-factset-marketplace-partners
    baseUri: https://api-sandbox.factset.com
    description: FactSet Open FactSet Marketplace API — Partners business capability. Self-contained, no shared references.
    resources:
    - name: ofs-v2-partners
      path: /ofs/v2/partners
      operations:
      - name: get
        method: GET
        description: Factset Retrieve a Collection of Partner Records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Limit the amount of records per page
        - name: page
          in: query
          type: integer
          description: Select which page to show
    - name: ofs-v2-partners-search
      path: /ofs/v2/partners/search
      operations:
      - name: post
        method: POST
        description: Factset Retrieve a Collection of Partner Records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: json
    - name: ofs-v2-partners-id
      path: /ofs/v2/partners/{id}
      operations:
      - name: get
        method: GET
        description: Factset Retrieve a Specific Partner Record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Globally unique identifier (GUID) of a partner record
          required: true
  exposes:
  - type: rest
    namespace: open-factset-marketplace-partners-rest
    port: 8080
    description: REST adapter for FactSet Open FactSet Marketplace API — Partners. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ofs/v2/partners
      name: ofs-v2-partners
      description: REST surface for ofs-v2-partners.
      operations:
      - method: GET
        name: get
        description: Factset Retrieve a Collection of Partner Records.
        call: open-factset-marketplace-partners.get
        with:
          limit: rest.limit
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ofs/v2/partners/search
      name: ofs-v2-partners-search
      description: REST surface for ofs-v2-partners-search.
      operations:
      - method: POST
        name: post
        description: Factset Retrieve a Collection of Partner Records.
        call: open-factset-marketplace-partners.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ofs/v2/partners/{id}
      name: ofs-v2-partners-id
      description: REST surface for ofs-v2-partners-id.
      operations:
      - method: GET
        name: get
        description: Factset Retrieve a Specific Partner Record.
        call: open-factset-marketplace-partners.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-factset-marketplace-partners-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Open FactSet Marketplace API — Partners. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-retrieve-collection-partner-records
      description: Factset Retrieve a Collection of Partner Records.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-factset-marketplace-partners.get
      with:
        limit: tools.limit
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-retrieve-collection-partner-records-2
      description: Factset Retrieve a Collection of Partner Records.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: open-factset-marketplace-partners.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-retrieve-specific-partner-record
      description: Factset Retrieve a Specific Partner Record.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-factset-marketplace-partners.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
