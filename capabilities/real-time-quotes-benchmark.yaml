naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Benchmark
  description: 'FactSet Real-Time Quotes API — Benchmark. 2 operations. Lead operation: Factset List of Benchmark Types..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Benchmark
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-benchmark
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Benchmark business capability. Self-contained, no shared references.
    resources:
    - name: basic-benchmark-type-list
      path: /basic/benchmark/type/list
      operations:
      - name: getbasicbenchmarktypelist
        method: GET
        description: Factset List of Benchmark Types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: instrument-benchmark-list
      path: /instrument/benchmark/list
      operations:
      - name: postinstrumentbenchmarklist
        method: POST
        description: Factset List of Benchmarks of a Financial Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-benchmark-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Benchmark. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basic/benchmark/type/list
      name: basic-benchmark-type-list
      description: REST surface for basic-benchmark-type-list.
      operations:
      - method: GET
        name: getbasicbenchmarktypelist
        description: Factset List of Benchmark Types.
        call: real-time-quotes-benchmark.getbasicbenchmarktypelist
        with:
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/instrument/benchmark/list
      name: instrument-benchmark-list
      description: REST surface for instrument-benchmark-list.
      operations:
      - method: POST
        name: postinstrumentbenchmarklist
        description: Factset List of Benchmarks of a Financial Instrument.
        call: real-time-quotes-benchmark.postinstrumentbenchmarklist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-benchmark-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Benchmark. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-list-benchmark-types
      description: Factset List of Benchmark Types.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-benchmark.getbasicbenchmarktypelist
      with:
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-benchmarks-financial-instrument
      description: Factset List of Benchmarks of a Financial Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-quotes-benchmark.postinstrumentbenchmarklist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
