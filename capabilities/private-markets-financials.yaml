naftiko: 1.0.0-alpha2
info:
  label: FactSet Private Markets API — Financials
  description: 'FactSet Private Markets API — Financials. 2 operations. Lead operation: Factset Returns Private Company Financials
    for a List of Ids.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Financials
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: private-markets-financials
    baseUri: https://api.factset.com/content
    description: FactSet Private Markets API — Financials business capability. Self-contained, no shared references.
    resources:
    - name: factset-private-markets-v1-financials
      path: /factset-private-markets/v1/financials
      operations:
      - name: getfinancials
        method: GET
        description: Factset Returns Private Company Financials for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfinancialsforlist
        method: POST
        description: Factset Returns Private Company Financials for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: private-markets-financials-rest
    port: 8080
    description: REST adapter for FactSet Private Markets API — Financials. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-private-markets/v1/financials
      name: factset-private-markets-v1-financials
      description: REST surface for factset-private-markets-v1-financials.
      operations:
      - method: GET
        name: getfinancials
        description: Factset Returns Private Company Financials for a List of Ids.
        call: private-markets-financials.getfinancials
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfinancialsforlist
        description: Factset Returns Private Company Financials for a List of Ids.
        call: private-markets-financials.getfinancialsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: private-markets-financials-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Private Markets API — Financials. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-returns-private-company-financials
      description: Factset Returns Private Company Financials for a List of Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: private-markets-financials.getfinancials
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-private-company-financials-2
      description: Factset Returns Private Company Financials for a List of Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: private-markets-financials.getfinancialsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
