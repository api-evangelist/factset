naftiko: 1.0.0-alpha2
info:
  label: FactSet Fundamentals API — Segments
  description: 'FactSet Fundamentals API — Segments. 2 operations. Lead operation: Factset Returns Company Segments data..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Segments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fundamentals-segments-2
    baseUri: https://api.factset.com/content/factset-fundamentals/v2
    description: FactSet Fundamentals API — Segments business capability. Self-contained, no shared references.
    resources:
    - name: segments
      path: /segments
      operations:
      - name: getfdssegments
        method: GET
        description: Factset Returns Company Segments data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfdssegmentsforlist
        method: POST
        description: Factset Returns Company Segment Data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: fundamentals-segments-2-rest
    port: 8080
    description: REST adapter for FactSet Fundamentals API — Segments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/segments
      name: segments
      description: REST surface for segments.
      operations:
      - method: GET
        name: getfdssegments
        description: Factset Returns Company Segments data.
        call: fundamentals-segments-2.getfdssegments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfdssegmentsforlist
        description: Factset Returns Company Segment Data.
        call: fundamentals-segments-2.getfdssegmentsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fundamentals-segments-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Fundamentals API — Segments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-returns-company-segments-data
      description: Factset Returns Company Segments data.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fundamentals-segments-2.getfdssegments
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-company-segment-data
      description: Factset Returns Company Segment Data.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fundamentals-segments-2.getfdssegmentsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
