naftiko: 1.0.0-alpha2
info:
  label: FactSet Vault API — Status
  description: 'FactSet Vault API — Status. 1 operations. Lead operation: Factset Get Vault Calculation Status by Id. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: vault-status
    baseUri: https://api.factset.com
    description: FactSet Vault API — Status business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-vault-v3-calculations-id-status
      path: /analytics/engines/vault/v3/calculations/{id}/status
      operations:
      - name: getcalculationstatusbyid
        method: GET
        description: Factset Get Vault Calculation Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run Vault calculation endpoint
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: vault-status-rest
    port: 8080
    description: REST adapter for FactSet Vault API — Status. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/analytics/engines/vault/v3/calculations/{id}/status
      name: analytics-engines-vault-v3-calculations-id-status
      description: REST surface for analytics-engines-vault-v3-calculations-id-status.
      operations:
      - method: GET
        name: getcalculationstatusbyid
        description: Factset Get Vault Calculation Status by Id
        call: vault-status.getcalculationstatusbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vault-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Vault API — Status. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: factset-get-vault-calculation-status
      description: Factset Get Vault Calculation Status by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vault-status.getcalculationstatusbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
