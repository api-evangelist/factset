naftiko: 1.0.0-alpha2
info:
  label: FactSet Axioma Fixed Income Optimizer — Status
  description: 'FactSet Axioma Fixed Income Optimizer — Status. 1 operations. Lead operation: Factset Get Afi Optimization
    Status by Id. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: axioma-fixed-income-optimizer-status
    baseUri: https://api.factset.com
    description: FactSet Axioma Fixed Income Optimizer — Status business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-afi-v3-optimizations-id-status
      path: /analytics/engines/afi/v3/optimizations/{id}/status
      operations:
      - name: getoptimizationstatusbyid
        method: GET
        description: Factset Get Afi Optimization Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run AFI optimization endpoint
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: axioma-fixed-income-optimizer-status-rest
    port: 8080
    description: REST adapter for FactSet Axioma Fixed Income Optimizer — Status. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/afi/v3/optimizations/{id}/status
      name: analytics-engines-afi-v3-optimizations-id-status
      description: REST surface for analytics-engines-afi-v3-optimizations-id-status.
      operations:
      - method: GET
        name: getoptimizationstatusbyid
        description: Factset Get Afi Optimization Status by Id
        call: axioma-fixed-income-optimizer-status.getoptimizationstatusbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: axioma-fixed-income-optimizer-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Axioma Fixed Income Optimizer — Status. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-get-afi-optimization-status
      description: Factset Get Afi Optimization Status by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: axioma-fixed-income-optimizer-status.getoptimizationstatusbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
