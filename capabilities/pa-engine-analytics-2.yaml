          in: query
          type: string
          description: Document Name
          required: true
    - name: analytics-engines-pa-v3-components-id
      path: /analytics/engines/pa/v3/components/{id}
      operations:
      - name: getpacomponentbyid
        method: GET
        description: Factset Get PA component by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
