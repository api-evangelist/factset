naftiko: 1.0.0-alpha2
info:
  label: FactSet Estimates Report Builder — Industry Metrics
  description: 'FactSet Estimates Report Builder — Industry Metrics. 1 operations. Lead operation: Factset Industry Metrics.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Industry Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: estimates-report-builder-industry-metrics
    baseUri: https://api.factset.com/report/estimates/v1
    description: FactSet Estimates Report Builder — Industry Metrics business capability. Self-contained, no shared references.
    resources:
    - name: industry-metrics
      path: /industry-metrics
      operations:
      - name: getestimatesindustrymetrics
        method: GET
        description: Factset Industry Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: estimates-report-builder-industry-metrics-rest
    port: 8080
    description: REST adapter for FactSet Estimates Report Builder — Industry Metrics. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/industry-metrics
      name: industry-metrics
      description: REST surface for industry-metrics.
      operations:
      - method: GET
        name: getestimatesindustrymetrics
        description: Factset Industry Metrics
        call: estimates-report-builder-industry-metrics.getestimatesindustrymetrics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: estimates-report-builder-industry-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Estimates Report Builder — Industry Metrics. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-industry-metrics
      description: Factset Industry Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: estimates-report-builder-industry-metrics.getestimatesindustrymetrics
      outputParameters:
      - type: object
        mapping: $.
