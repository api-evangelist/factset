naftiko: 1.0.0-alpha2
info:
  label: FactSet Global Prices API — Annualized
  description: 'FactSet Global Prices API — Annualized. 2 operations. Lead operation: Factset Gets Indicated Annualized Dividend
    Information.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Annualized
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: global-prices-annualized
    baseUri: https://api.factset.com/content
    description: FactSet Global Prices API — Annualized business capability. Self-contained, no shared references.
    resources:
    - name: factset-global-prices-v1-annualized-dividends
      path: /factset-global-prices/v1/annualized-dividends
      operations:
      - name: getannualizeddividends
        method: GET
        description: Factset Gets Indicated Annualized Dividend Information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getannualizeddividendsforlist
        method: POST
        description: Factset Gets Indicated Annualized Dividend Information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: global-prices-annualized-rest
    port: 8080
    description: REST adapter for FactSet Global Prices API — Annualized. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-global-prices/v1/annualized-dividends
      name: factset-global-prices-v1-annualized-dividends
      description: REST surface for factset-global-prices-v1-annualized-dividends.
      operations:
      - method: GET
        name: getannualizeddividends
        description: Factset Gets Indicated Annualized Dividend Information.
        call: global-prices-annualized.getannualizeddividends
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getannualizeddividendsforlist
        description: Factset Gets Indicated Annualized Dividend Information.
        call: global-prices-annualized.getannualizeddividendsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: global-prices-annualized-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Global Prices API — Annualized. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-gets-indicated-annualized-dividend
      description: Factset Gets Indicated Annualized Dividend Information.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: global-prices-annualized.getannualizeddividends
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-gets-indicated-annualized-dividend-2
      description: Factset Gets Indicated Annualized Dividend Information.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: global-prices-annualized.getannualizeddividendsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
