naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Notes API — Notes
  description: 'FactSet IRN Notes API — Notes. 19 operations. Lead operation: Factset Get All the Notes in the Specified Date
    Range Filtered on the Given Identifiers. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Notes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-notes-notes
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Notes API — Notes business capability. Self-contained, no shared references.
    resources:
    - name: v1-notes
      path: /v1/notes
      operations:
      - name: getnotes
        method: GET
        description: Factset Get All the Notes in the Specified Date Range Filtered on the Given Identifiers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start
          in: query
          type: string
          description: StartDate
        - name: end
          in: query
          type: string
          description: EndDate
        - name: identifiers
          in: query
          type: array
          description: Set of identifiers to filter on
        - name: authors
          in: query
          type: array
          description: Set of authors to filter on
        - name: subjects
          in: query
          type: array
          description: Set of subjects to filter on
        - name: recommendations
          in: query
          type: array
          description: Set of recommendations to filter on
        - name: sentiments
          in: query
          type: array
          description: Set of sentiments to filter on
        - name: limit
          in: query
          type: integer
          description: Limit on the number of notes retrieved
        - name: offset
          in: query
          type: integer
          description: Fetch notes after the offset
        - name: modifiedSince
          in: query
          type: string
          description: Only return notes which have been modified or created since a particular time
        - name: states
          in: query
          type: array
          description: Set of states to filter on
        - name: filterOnRelatedSymbols
          in: query
          type: boolean
          description: Include notes whose related symbols match the identifier filter
        - name: includeRelatedEntities
          in: query
          type: boolean
          description: When set to true fetches notes tagged with all the entities related to identifiers param
        - name: X-IRN-Include-Deleted
          in: header
          type: boolean
      - name: createnote
        method: POST
        description: Factset Create a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-IRN-Contributor-Username
          in: header
          type: string
        - name: X-IRN-Contributor-Serial
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-notes-noteId
      path: /v1/notes/{noteId}
      operations:
      - name: getnote
        method: GET
        description: Factset Get Details of a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          description: Note Id
          required: true
      - name: updatenote
