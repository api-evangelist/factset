naftiko: 1.0.0-alpha2
info:
  label: Factset Portfolio Metadata — Holdings Composite
  description: 'Factset Portfolio Metadata — Holdings Composite. 1 operations. Lead operation: Holdings Composite. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Holdings Composite
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-holdings-composite
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: Factset Portfolio Metadata — Holdings Composite business capability. Self-contained, no shared references.
    resources:
    - name: holdings-composite-id
      path: /holdings-composite/{id}
      operations:
      - name: readholdingscomposite
        method: GET
        description: Read a holdings composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the holdings composite to be read
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-holdings-composite-rest
    port: 8080
    description: REST adapter for Factset Portfolio Metadata — Holdings Composite. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/holdings-composite/{id}
      name: holdings-composite-id
      description: REST surface for holdings-composite-id.
      operations:
      - method: GET
        name: readholdingscomposite
        description: Read a holdings composite
        call: portfolio-metadata-holdings-composite.readholdingscomposite
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-holdings-composite-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Portfolio Metadata — Holdings Composite. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: read-holdings-composite
      description: Read a holdings composite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-holdings-composite.readholdingscomposite
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
