naftiko: 1.0.0-alpha2
info:
  label: FactSet Global Prices API — Prices
  description: 'FactSet Global Prices API — Prices. 2 operations. Lead operation: Factset Gets End-of-day Open, High, Low,
    Close for a List of Securities.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Prices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: global-prices-prices
    baseUri: https://api.factset.com/content
    description: FactSet Global Prices API — Prices business capability. Self-contained, no shared references.
    resources:
    - name: factset-global-prices-v1-prices
      path: /factset-global-prices/v1/prices
      operations:
      - name: getgpdprices
        method: GET
        description: Factset Gets End-of-day Open, High, Low, Close for a List of Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsecuritypricesforlist
        method: POST
        description: Factset Requests End-of-day Open, High, Low, Close for a Large List of Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: global-prices-prices-rest
    port: 8080
    description: REST adapter for FactSet Global Prices API — Prices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-global-prices/v1/prices
      name: factset-global-prices-v1-prices
      description: REST surface for factset-global-prices-v1-prices.
      operations:
      - method: GET
        name: getgpdprices
        description: Factset Gets End-of-day Open, High, Low, Close for a List of Securities.
        call: global-prices-prices.getgpdprices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getsecuritypricesforlist
        description: Factset Requests End-of-day Open, High, Low, Close for a Large List of Securities.
        call: global-prices-prices.getsecuritypricesforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: global-prices-prices-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Global Prices API — Prices. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-gets-end-day-open
      description: Factset Gets End-of-day Open, High, Low, Close for a List of Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: global-prices-prices.getgpdprices
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-requests-end-day-open
      description: Factset Requests End-of-day Open, High, Low, Close for a Large List of Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: global-prices-prices.getsecuritypricesforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
