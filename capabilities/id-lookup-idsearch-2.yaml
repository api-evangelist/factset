naftiko: 1.0.0-alpha2
info:
  label: Factset ID Lookup API — Idsearch
  description: 'Factset ID Lookup API — Idsearch. 1 operations. Lead operation: Search funtionality to return tickers, company
    names and unique identifiers for FactSet data. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Idsearch
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: id-lookup-idsearch-2
    baseUri: https://api.factset.com/idsearch
    description: Factset ID Lookup API — Idsearch business capability. Self-contained, no shared references.
    resources:
    - name: v1-idsearch
      path: /v1/idsearch
      operations:
      - name: searchcompanyname
        method: POST
        description: Search funtionality to return tickers, company names and unique identifiers for FactSet data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: id-lookup-idsearch-2-rest
    port: 8080
    description: REST adapter for Factset ID Lookup API — Idsearch. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/idsearch
      name: v1-idsearch
      description: REST surface for v1-idsearch.
      operations:
      - method: POST
        name: searchcompanyname
        description: Search funtionality to return tickers, company names and unique identifiers for FactSet data
        call: id-lookup-idsearch-2.searchcompanyname
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: id-lookup-idsearch-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset ID Lookup API — Idsearch. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-funtionality-return-tickers-company
      description: Search funtionality to return tickers, company names and unique identifiers for FactSet data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: id-lookup-idsearch-2.searchcompanyname
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
