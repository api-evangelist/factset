naftiko: 1.0.0-alpha2
info:
  label: Factset Formula API — Series
  description: 'Factset Formula API — Series. 2 operations. Lead operation: Factset Retrieve Data Items (fql Formulas) for
    a List of Identifiers or Defined Universe.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Series
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: formula-series
    baseUri: https://api.factset.com/formula-api
    description: Factset Formula API — Series business capability. Self-contained, no shared references.
    resources:
    - name: v1-time-series
      path: /v1/time-series
      operations:
      - name: gettimeseriesdata
        method: GET
        description: Factset Retrieve Data Items (fql Formulas) for a List of Identifiers or Defined Universe.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: gettimeseriesdataforlist
        method: POST
        description: Factset Retrieve Data Items (fql Formulas) for a List of Identifiers or Defined Universe.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: formula-series-rest
    port: 8080
    description: REST adapter for Factset Formula API — Series. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/time-series
      name: v1-time-series
      description: REST surface for v1-time-series.
      operations:
      - method: GET
        name: gettimeseriesdata
        description: Factset Retrieve Data Items (fql Formulas) for a List of Identifiers or Defined Universe.
        call: formula-series.gettimeseriesdata
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: gettimeseriesdataforlist
        description: Factset Retrieve Data Items (fql Formulas) for a List of Identifiers or Defined Universe.
        call: formula-series.gettimeseriesdataforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: formula-series-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Formula API — Series. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-retrieve-data-items-fql
      description: Factset Retrieve Data Items (fql Formulas) for a List of Identifiers or Defined Universe.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: formula-series.gettimeseriesdata
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-retrieve-data-items-fql-2
      description: Factset Retrieve Data Items (fql Formulas) for a List of Identifiers or Defined Universe.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: formula-series.gettimeseriesdataforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
