naftiko: "1.0.0-alpha1"

info:
  label: "FactSet Portfolio Analytics"
  description: "Unified workflow for portfolio analytics including performance attribution, risk analysis, and benchmarking. Used by portfolio managers and performance analysts."
  tags:
    - FactSet
    - Portfolio Analytics
    - Performance Attribution
    - Risk Analysis
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD

capability:
  consumes:
    - import: factset-pa-engine
      location: ./shared/pa-engine.yaml
    - import: factset-spar
      location: ./shared/spar-engine.yaml
    - import: factset-vault
      location: ./shared/vault.yaml
    - import: factset-publisher
      location: ./shared/publisher.yaml
    - import: factset-portfolio
      location: ./shared/portfolio.yaml
    - import: factset-portfolio-meta
      location: ./shared/portfolio-metadata.yaml
    - import: factset-datastore
      location: ./shared/analytics-datastore.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: portfolio-analytics-api
      description: "Unified REST API for FactSet portfolio analytics."
      resources:
        - path: /v1/pa-engine
          name: pa-engine
          description: "PA Engine resources."
          operations:
            - method: GET
              name: list-pa
              description: "List PA Engine resources."
              call: "factset-pa-engine.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/spar-engine
          name: spar-engine
          description: "SPAR Engine resources."
          operations:
            - method: GET
              name: list-spar
              description: "List SPAR Engine resources."
              call: "factset-spar.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/vault
          name: vault
          description: "Vault resources."
          operations:
            - method: GET
              name: list-vault
              description: "List Vault resources."
              call: "factset-vault.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/portfolios
          name: portfolios
          description: "Portfolio resources."
          operations:
            - method: GET
              name: list-portfolios
              description: "List portfolios."
              call: "factset-portfolio.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/portfolio-metadata
          name: portfolio-metadata
          description: "Portfolio metadata."
          operations:
            - method: GET
              name: list-metadata
              description: "List portfolio metadata."
              call: "factset-portfolio-meta.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/analytics-datastore
          name: analytics-datastore
          description: "Analytics datastore."
          operations:
            - method: GET
              name: list-datastore
              description: "List analytics datastore."
              call: "factset-datastore.list"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9080
      namespace: portfolio-analytics-mcp
      transport: http
      description: "MCP server for AI-assisted portfolio analytics."
      tools:
        - name: list-pa-engine
          description: "List PA Engine resources."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-pa-engine.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-spar-engine
          description: "List SPAR Engine resources."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-spar.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-vault
          description: "List Vault resources."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-vault.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-publisher
          description: "List Publisher resources."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-publisher.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-portfolios
          description: "List portfolios."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-portfolio.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-portfolio-metadata
          description: "List portfolio metadata."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-portfolio-meta.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-analytics-datastore
          description: "List analytics datastore."
          hints:
            readOnly: true
            openWorld: true
          call: "factset-datastore.list"
          outputParameters:
            - type: object
              mapping: "$."
