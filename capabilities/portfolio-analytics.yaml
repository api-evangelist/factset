naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Analytics
  description: Unified workflow for portfolio analytics including performance attribution, risk analysis, and benchmarking.
    Used by portfolio managers and performance analysts.
  tags:
  - FactSet
  - Portfolio Analytics
  - Performance Attribution
  - Risk Analysis
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACTSET_USERNAME: FACTSET_USERNAME
    FACTSET_PASSWORD: FACTSET_PASSWORD
capability:
  consumes:
  - type: http
    namespace: factset-pa-engine
    baseUri: https://api.factset.com
    description: Portfolio analytics engine for multi-asset class performance, attribution, and risk.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: pa_engine
      path: /
      description: PA Engine API resources.
      operations:
      - name: list-pa-engine
        method: GET
        description: List PA Engine resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
