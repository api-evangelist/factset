naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Deliveries
  description: 'FactSet Real-Time Quotes API — Deliveries. 1 operations. Lead operation: Factset List of Deliveries.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Deliveries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-deliveries
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Deliveries business capability. Self-contained, no shared references.
    resources:
    - name: basic-delivery-list
      path: /basic/delivery/list
      operations:
      - name: postbasicdeliverylist
        method: POST
        description: Factset List of Deliveries.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-deliveries-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Deliveries. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/basic/delivery/list
      name: basic-delivery-list
      description: REST surface for basic-delivery-list.
      operations:
      - method: POST
        name: postbasicdeliverylist
        description: Factset List of Deliveries.
        call: real-time-quotes-deliveries.postbasicdeliverylist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-deliveries-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Deliveries. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-list-deliveries
      description: Factset List of Deliveries.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-quotes-deliveries.postbasicdeliverylist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
