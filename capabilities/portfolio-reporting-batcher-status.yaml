naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Reporting Batcher API — Status
  description: 'FactSet Portfolio Reporting Batcher API — Status. 1 operations. Lead operation: Factset Check the Status for
    a Particular Run Id. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-reporting-batcher-status
    baseUri: https://api.factset.com/analytics/prb/v0
    description: FactSet Portfolio Reporting Batcher API — Status business capability. Self-contained, no shared references.
    resources:
    - name: runs-id-status
      path: /runs/{id}/status
      operations:
      - name: checkrunstatus
        method: GET
        description: Factset Check the Status for a Particular Run Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-reporting-batcher-status-rest
    port: 8080
    description: REST adapter for FactSet Portfolio Reporting Batcher API — Status. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/runs/{id}/status
      name: runs-id-status
      description: REST surface for runs-id-status.
      operations:
      - method: GET
        name: checkrunstatus
        description: Factset Check the Status for a Particular Run Id
        call: portfolio-reporting-batcher-status.checkrunstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-reporting-batcher-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Portfolio Reporting Batcher API — Status. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-check-status-particular-run
      description: Factset Check the Status for a Particular Run Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-reporting-batcher-status.checkrunstatus
      outputParameters:
      - type: object
        mapping: $.
