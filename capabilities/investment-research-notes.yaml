naftiko: 1.0.0-alpha2
info:
  label: FactSet Investment Research Notes
  description: Unified workflow for managing internal research notes including configuration, contacts, custom symbols, meetings,
    and notes. Used by research analysts and relationship managers.
  tags:
  - FactSet
  - IRN
  - Research Notes
  - CRM
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACTSET_USERNAME: FACTSET_USERNAME
    FACTSET_PASSWORD: FACTSET_PASSWORD
capability:
  consumes:
  - type: http
    namespace: factset-signals
    baseUri: https://api.factset.com
    description: Material event signals.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: signals
      path: /
      description: Signals API resources.
      operations:
      - name: list-signals
        method: GET
        description: List Signals resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
