          type: object
          value: $.
  exposes:
  - type: rest
    port: 8086
    namespace: irn-api
    description: Unified REST API for investment research notes.
    resources:
    - path: /v1/irn-contacts
      name: irn-contacts
      description: IRN contact management.
      operations:
      - method: GET
        name: list-contacts
        description: List IRN contacts.
        call: factset-irn-contacts.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/irn-meetings
      name: irn-meetings
      description: IRN meeting management.
      operations:
      - method: GET
        name: list-meetings
        description: List IRN meetings.
        call: factset-irn-meetings.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/irn-notes
      name: irn-notes
      description: IRN note management.
      operations:
      - method: GET
        name: list-notes
        description: List IRN notes.
        call: factset-irn-notes.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9086
    namespace: irn-mcp
    transport: http
    description: MCP server for AI-assisted investment research notes.
    tools:
    - name: get-irn-config
      description: Get IRN configuration.
      hints:
        readOnly: true
      call: factset-irn-config.list
      outputParameters:
      - type: object
        mapping: $.
    - name: list-irn-contacts
      description: List IRN contacts.
      hints:
        readOnly: true
      call: factset-irn-contacts.list
      outputParameters:
      - type: object
        mapping: $.
    - name: list-irn-symbols
      description: List IRN custom symbols.
      hints:
        readOnly: true
      call: factset-irn-symbols.list
      outputParameters:
      - type: object
        mapping: $.
    - name: list-irn-meetings
      description: List IRN meetings.
      hints:
        readOnly: true
      call: factset-irn-meetings.list
      outputParameters:
      - type: object
        mapping: $.
    - name: list-irn-notes
      description: List IRN notes.
      hints:
        readOnly: true
      call: factset-irn-notes.list
      outputParameters:
      - type: object
        mapping: $.
