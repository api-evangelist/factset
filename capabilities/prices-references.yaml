naftiko: 1.0.0-alpha2
info:
  label: FactSet Prices API — References
  description: 'FactSet Prices API — References. 2 operations. Lead operation: Factset Gets Security Reference Details for
    a List of Securities. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - References
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: prices-references
    baseUri: https://api.factset.com/content
    description: FactSet Prices API — References business capability. Self-contained, no shared references.
    resources:
    - name: factset-prices-v1-references
      path: /factset-prices/v1/references
      operations:
      - name: getsecurityreferences
        method: GET
        description: Factset Gets Security Reference Details for a List of Securities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsecurityreferenceforlist
        method: POST
        description: Factset Requests Security Reference Details a List of Securities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: prices-references-rest
    port: 8080
    description: REST adapter for FactSet Prices API — References. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-prices/v1/references
      name: factset-prices-v1-references
      description: REST surface for factset-prices-v1-references.
      operations:
      - method: GET
        name: getsecurityreferences
        description: Factset Gets Security Reference Details for a List of Securities
        call: prices-references.getsecurityreferences
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getsecurityreferenceforlist
        description: Factset Requests Security Reference Details a List of Securities
        call: prices-references.getsecurityreferenceforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prices-references-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Prices API — References. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-gets-security-reference-details
      description: Factset Gets Security Reference Details for a List of Securities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prices-references.getsecurityreferences
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-requests-security-reference-details
      description: Factset Requests Security Reference Details a List of Securities
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: prices-references.getsecurityreferenceforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
