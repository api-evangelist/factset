naftiko: 1.0.0-alpha2
info:
  label: FactSet Securitized Derivatives API for Digital Portals — Issuer
  description: 'FactSet Securitized Derivatives API for Digital Portals — Issuer. 1 operations. Lead operation: Factset Search
    for Issuers of Securitized Derivatives.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Issuer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: securitized-derivatives-api-for-digital-portals-issuer
    baseUri: https://api.factset.com/wealth/v1
    description: FactSet Securitized Derivatives API for Digital Portals — Issuer business capability. Self-contained, no
      shared references.
    resources:
    - name: securitizedDerivative-issuer-search
      path: /securitizedDerivative/issuer/search
      operations:
      - name: postsecuritizedderivativeissuersearch
        method: POST
        description: Factset Search for Issuers of Securitized Derivatives.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: securitized-derivatives-api-for-digital-portals-issuer-rest
    port: 8080
    description: REST adapter for FactSet Securitized Derivatives API for Digital Portals — Issuer. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/securitizedderivative/issuer/search
      name: securitizedderivative-issuer-search
      description: REST surface for securitizedDerivative-issuer-search.
      operations:
      - method: POST
        name: postsecuritizedderivativeissuersearch
        description: Factset Search for Issuers of Securitized Derivatives.
        call: securitized-derivatives-api-for-digital-portals-issuer.postsecuritizedderivativeissuersearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: securitized-derivatives-api-for-digital-portals-issuer-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Securitized Derivatives API for Digital Portals — Issuer. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: factset-search-issuers-securitized-derivatives
      description: Factset Search for Issuers of Securitized Derivatives.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: securitized-derivatives-api-for-digital-portals-issuer.postsecuritizedderivativeissuersearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
