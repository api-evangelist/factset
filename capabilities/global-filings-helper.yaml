naftiko: 1.0.0-alpha2
info:
  label: FactSet Global Filings API — Helper
  description: 'FactSet Global Filings API — Helper. 1 operations. Lead operation: Factset Returns the Static Values for Various
    Parameters. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Helper
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: global-filings-helper
    baseUri: https://api.factset.com/global-filings/v0
    description: FactSet Global Filings API — Helper business capability. Self-contained, no shared references.
    resources:
    - name: helper
      path: /helper
      operations:
      - name: gethelper
        method: GET
        description: Factset Returns the Static Values for Various Parameters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: global-filings-helper-rest
    port: 8080
    description: REST adapter for FactSet Global Filings API — Helper. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/helper
      name: helper
      description: REST surface for helper.
      operations:
      - method: GET
        name: gethelper
        description: Factset Returns the Static Values for Various Parameters
        call: global-filings-helper.gethelper
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: global-filings-helper-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Global Filings API — Helper. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-returns-static-values-various
      description: Factset Returns the Static Values for Various Parameters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: global-filings-helper.gethelper
      outputParameters:
      - type: object
        mapping: $.
