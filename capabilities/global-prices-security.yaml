naftiko: 1.0.0-alpha2
info:
  label: FactSet Global Prices API — Security
  description: 'FactSet Global Prices API — Security. 2 operations. Lead operation: Factset Gets Shares Outstanding Information
    for Securities.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Security
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: global-prices-security
    baseUri: https://api.factset.com/content
    description: FactSet Global Prices API — Security business capability. Self-contained, no shared references.
    resources:
    - name: factset-global-prices-v1-security-shares
      path: /factset-global-prices/v1/security-shares
      operations:
      - name: getsharesoutstanding
        method: GET
        description: Factset Gets Shares Outstanding Information for Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postsharesoutstanding
        method: POST
        description: Factset Gets Shares Outstanding Information for Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: global-prices-security-rest
    port: 8080
    description: REST adapter for FactSet Global Prices API — Security. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-global-prices/v1/security-shares
      name: factset-global-prices-v1-security-shares
      description: REST surface for factset-global-prices-v1-security-shares.
      operations:
      - method: GET
        name: getsharesoutstanding
        description: Factset Gets Shares Outstanding Information for Securities.
        call: global-prices-security.getsharesoutstanding
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postsharesoutstanding
        description: Factset Gets Shares Outstanding Information for Securities.
        call: global-prices-security.postsharesoutstanding
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: global-prices-security-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Global Prices API — Security. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-gets-shares-outstanding-information
      description: Factset Gets Shares Outstanding Information for Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: global-prices-security.getsharesoutstanding
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-gets-shares-outstanding-information-2
      description: Factset Gets Shares Outstanding Information for Securities.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: global-prices-security.postsharesoutstanding
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
