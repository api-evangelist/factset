    description: FactSet Axioma Fixed Income Optimizer — Engines business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-afi-v3-optimizations
      path: /analytics/engines/afi/v3/optimizations
      operations:
      - name: postandoptimize
        method: POST
        description: Factset Create and Run Afi Optimization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-FactSet-Api-Long-Running-Deadline
          in: header
          type: integer
          description: Long running deadline in seconds.
        - name: Cache-Control
          in: header
          type: string
          description: Standard HTTP header.  Accepts max-stale.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: analytics-engines-afi-v3-optimizations-id
      path: /analytics/engines/afi/v3/optimizations/{id}
      operations:
      - name: putandoptimize
        method: PUT
        description: Factset Create or Update Afi Optimization and Run It.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run AFI optimization endpoint
          required: true
        - name: X-FactSet-Api-Long-Running-Deadline
          in: header
          type: integer
          description: Long running deadline in seconds.
        - name: Cache-Control
          in: header
          type: string
          description: Standard HTTP header.  Accepts max-stale.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getoptimizationparameters
        method: GET
        description: Factset Get Afi Optimization Parameters by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run AFI optimization endpoint
          required: true
      - name: canceloptimizationbyid
        method: DELETE
        description: Factset Cancel Afi Optimization by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
