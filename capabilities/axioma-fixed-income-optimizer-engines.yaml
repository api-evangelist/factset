      operations:
      - name: getoptimizationresult
        method: GET
        description: Factset Get Afi Optimization Result by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Get AFI optimization status by id endpoint
          required: true
    - name: analytics-engines-afi-v3-optimizations-id-status
      path: /analytics/engines/afi/v3/optimizations/{id}/status
      operations:
      - name: getoptimizationstatusbyid
        method: GET
        description: Factset Get Afi Optimization Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run AFI optimization endpoint
          required: true
