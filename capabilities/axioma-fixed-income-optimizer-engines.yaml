naftiko: 1.0.0-alpha2
info:
  label: FactSet Axioma Fixed Income Optimizer — Engines
  description: 'FactSet Axioma Fixed Income Optimizer — Engines. 7 operations. Lead operation: Factset Create and Run Afi
    Optimization. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
