naftiko: 1.0.0-alpha2
info:
  label: Factset IRN API v1 — Subjects
  description: 'Factset IRN API v1 — Subjects. 2 operations. Lead operation: Factset Get all Subjects. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Subjects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-subjects-2
    baseUri: https://api.factset.com/research/irn
    description: Factset IRN API v1 — Subjects business capability. Self-contained, no shared references.
    resources:
    - name: v1-subjects
      path: /v1/subjects
      operations:
      - name: getsubjects
        method: GET
        description: Factset Get all Subjects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-IRN-Ignore-Permissions
          in: header
          type: boolean
    - name: v1-subjects-subjectId
      path: /v1/subjects/{subjectId}
      operations:
      - name: getsubject
        method: GET
        description: Factset Get Subject details for the given Id provided
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subjectId
          in: path
          type: string
          description: Id
          required: true
        - name: X-IRN-Ignore-Permissions
          in: header
          type: boolean
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-subjects-2-rest
    port: 8080
    description: REST adapter for Factset IRN API v1 — Subjects. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/subjects
      name: v1-subjects
      description: REST surface for v1-subjects.
      operations:
      - method: GET
        name: getsubjects
        description: Factset Get all Subjects
        call: irn-configuration-subjects-2.getsubjects
        with:
          X-IRN-Ignore-Permissions: rest.X-IRN-Ignore-Permissions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/subjects/{subjectid}
      name: v1-subjects-subjectid
      description: REST surface for v1-subjects-subjectId.
      operations:
      - method: GET
        name: getsubject
        description: Factset Get Subject details for the given Id provided
        call: irn-configuration-subjects-2.getsubject
        with:
          subjectId: rest.subjectId
          X-IRN-Ignore-Permissions: rest.X-IRN-Ignore-Permissions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-subjects-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset IRN API v1 — Subjects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-all-subjects
      description: Factset Get all Subjects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-subjects-2.getsubjects
      with:
        X-IRN-Ignore-Permissions: tools.X-IRN-Ignore-Permissions
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-subject-details-given
      description: Factset Get Subject details for the given Id provided
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-subjects-2.getsubject
      with:
        subjectId: tools.subjectId
        X-IRN-Ignore-Permissions: tools.X-IRN-Ignore-Permissions
      outputParameters:
      - type: object
        mapping: $.
