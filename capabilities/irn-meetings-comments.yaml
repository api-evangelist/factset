naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Meetings API — Comments
  description: 'FactSet IRN Meetings API — Comments. 8 operations. Lead operation: Factset Get All Comments for a Meeting.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Comments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-meetings-comments
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Meetings API — Comments business capability. Self-contained, no shared references.
    resources:
    - name: v1-meetings-meetingId-comments
      path: /v1/meetings/{meetingId}/comments
      operations:
      - name: getcomments
        method: GET
        description: Factset Get All Comments for a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
      - name: createcomment
        method: POST
        description: Factset Create a Comment to a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-meetings-meetingId-comments-commentId
      path: /v1/meetings/{meetingId}/comments/{commentId}
      operations:
      - name: getcomment
        method: GET
        description: Factset Get Details of a Comment Belonging to a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
      - name: patchcomment
        method: PATCH
        description: Factset Edit a Comment for a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletecomment
        method: DELETE
        description: Factset Delete a Comment From a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
    - name: v1-meetings-meetingId-comments-commentId-attachments
      path: /v1/meetings/{meetingId}/comments/{commentId}/attachments
      operations:
      - name: getcommentattachments
        method: GET
        description: Factset Get Attachments Summary of a Comment Belonging to a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
      - name: createcommentattachment
        method: POST
        description: Factset Create a Comment Attachment to a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-meetings-meetingId-comments-commentId-attachments-attachmentId-download
      path: /v1/meetings/{meetingId}/comments/{commentId}/attachments/{attachmentId}/download
      operations:
      - name: downloadcommentattachmentforcomment
        method: GET
        description: Factset Download Single Attachment Detail of a Comment Belonging to a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: attachmentId
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-meetings-comments-rest
    port: 8080
    description: REST adapter for FactSet IRN Meetings API — Comments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/meetings/{meetingid}/comments
      name: v1-meetings-meetingid-comments
      description: REST surface for v1-meetings-meetingId-comments.
      operations:
      - method: GET
        name: getcomments
        description: Factset Get All Comments for a Meeting
        call: irn-meetings-comments.getcomments
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcomment
        description: Factset Create a Comment to a Meeting
        call: irn-meetings-comments.createcomment
        with:
          meetingId: rest.meetingId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
