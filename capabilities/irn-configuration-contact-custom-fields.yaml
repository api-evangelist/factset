          contactCustomFieldId: rest.contactCustomFieldId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecontactcustomfield
        description: Factset Delete a contact custom field
        call: irn-configuration-contact-custom-fields.deletecontactcustomfield
        with:
          contactCustomFieldId: rest.contactCustomFieldId
        outputParameters:
        - type: object
          mapping: $.
