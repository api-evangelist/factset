naftiko: 1.0.0-alpha2
info:
  label: Factset Formula API — Results
  description: 'Factset Formula API — Results. 2 operations. Lead operation: Factset Returns the Response for a Batch Request.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Results
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: formula-results
    baseUri: https://api.factset.com/formula-api
    description: Factset Formula API — Results business capability. Self-contained, no shared references.
    resources:
    - name: v1-batch-result
      path: /v1/batch-result
      operations:
      - name: getbatchdata
        method: GET
        description: Factset Returns the Response for a Batch Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getbatchdatawithpost
        method: POST
        description: Factset Returns the Status for a Batch Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: formula-results-rest
    port: 8080
    description: REST adapter for Factset Formula API — Results. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/batch-result
      name: v1-batch-result
      description: REST surface for v1-batch-result.
      operations:
      - method: GET
        name: getbatchdata
        description: Factset Returns the Response for a Batch Request
        call: formula-results.getbatchdata
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getbatchdatawithpost
        description: Factset Returns the Status for a Batch Request
        call: formula-results.getbatchdatawithpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: formula-results-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Formula API — Results. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-returns-response-batch-request
      description: Factset Returns the Response for a Batch Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: formula-results.getbatchdata
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-status-batch-request
      description: Factset Returns the Status for a Batch Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: formula-results.getbatchdatawithpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
