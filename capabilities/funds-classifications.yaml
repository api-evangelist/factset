naftiko: 1.0.0-alpha2
info:
  label: FactSet Funds API — Classifications
  description: 'FactSet Funds API — Classifications. 2 operations. Lead operation: Factset Get Basic Fund Classifications.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Classifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: funds-classifications
    baseUri: https://api.factset.com/content
    description: FactSet Funds API — Classifications business capability. Self-contained, no shared references.
    resources:
    - name: factset-funds-v1-classifications
      path: /factset-funds/v1/classifications
      operations:
      - name: getfundsclassifications
        method: GET
        description: Factset Get Basic Fund Classifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfundsclassificationsforlist
        method: POST
        description: Factset Get Basic Fund Classifications for a Large List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: funds-classifications-rest
    port: 8080
    description: REST adapter for FactSet Funds API — Classifications. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-funds/v1/classifications
      name: factset-funds-v1-classifications
      description: REST surface for factset-funds-v1-classifications.
      operations:
      - method: GET
        name: getfundsclassifications
        description: Factset Get Basic Fund Classifications
        call: funds-classifications.getfundsclassifications
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfundsclassificationsforlist
        description: Factset Get Basic Fund Classifications for a Large List of Ids.
        call: funds-classifications.getfundsclassificationsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: funds-classifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Funds API — Classifications. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-basic-fund-classifications
      description: Factset Get Basic Fund Classifications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: funds-classifications.getfundsclassifications
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-basic-fund-classifications-2
      description: Factset Get Basic Fund Classifications for a Large List of Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: funds-classifications.getfundsclassificationsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
