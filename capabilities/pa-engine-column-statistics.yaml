naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Column Statistics
  description: 'Factset PA Engine API — Column Statistics. 1 operations. Lead operation: Factset Get Pa Column Statistics.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Column Statistics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-column-statistics
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Column Statistics business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-columnstatistics
      path: /analytics/engines/pa/v3/columnstatistics
      operations:
      - name: getpacolumnstatistics
        method: GET
        description: Factset Get Pa Column Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-column-statistics-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Column Statistics. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/columnstatistics
      name: analytics-engines-pa-v3-columnstatistics
      description: REST surface for analytics-engines-pa-v3-columnstatistics.
      operations:
      - method: GET
        name: getpacolumnstatistics
        description: Factset Get Pa Column Statistics
        call: pa-engine-column-statistics.getpacolumnstatistics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-column-statistics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Column Statistics. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-get-pa-column-statistics
      description: Factset Get Pa Column Statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-column-statistics.getpacolumnstatistics
      outputParameters:
      - type: object
        mapping: $.
