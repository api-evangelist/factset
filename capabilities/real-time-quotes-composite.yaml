naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Composite
  description: 'FactSet Real-Time Quotes API — Composite. 1 operations. Lead operation: Factset Composite Instrument and Its
    Components.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Composite
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-composite
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Composite business capability. Self-contained, no shared references.
    resources:
    - name: instrument-composite-get
      path: /instrument/composite/get
      operations:
      - name: getinstrumentcompositeget
        method: GET
        description: Factset Composite Instrument and Its Components.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-composite-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Composite. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/instrument/composite/get
      name: instrument-composite-get
      description: REST surface for instrument-composite-get.
      operations:
      - method: GET
        name: getinstrumentcompositeget
        description: Factset Composite Instrument and Its Components.
        call: real-time-quotes-composite.getinstrumentcompositeget
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-composite-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Composite. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-composite-instrument-and-its
      description: Factset Composite Instrument and Its Components.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-composite.getinstrumentcompositeget
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
