naftiko: 1.0.0-alpha2
info:
  label: FactSet Global Prices API — Corporate
  description: 'FactSet Global Prices API — Corporate. 2 operations. Lead operation: Factset Gets Corporate Actions Information..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Corporate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: global-prices-corporate
    baseUri: https://api.factset.com/content
    description: FactSet Global Prices API — Corporate business capability. Self-contained, no shared references.
    resources:
    - name: factset-global-prices-v1-corporate-actions
      path: /factset-global-prices/v1/corporate-actions
      operations:
      - name: getgpdcorporateactions
        method: GET
        description: Factset Gets Corporate Actions Information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postcorporateactions
        method: POST
        description: Factset Requests Corporate Actions Information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: global-prices-corporate-rest
    port: 8080
    description: REST adapter for FactSet Global Prices API — Corporate. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-global-prices/v1/corporate-actions
      name: factset-global-prices-v1-corporate-actions
      description: REST surface for factset-global-prices-v1-corporate-actions.
      operations:
      - method: GET
        name: getgpdcorporateactions
        description: Factset Gets Corporate Actions Information.
        call: global-prices-corporate.getgpdcorporateactions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postcorporateactions
        description: Factset Requests Corporate Actions Information.
        call: global-prices-corporate.postcorporateactions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: global-prices-corporate-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Global Prices API — Corporate. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-gets-corporate-actions-information
      description: Factset Gets Corporate Actions Information.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: global-prices-corporate.getgpdcorporateactions
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-requests-corporate-actions-information
      description: Factset Requests Corporate Actions Information.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: global-prices-corporate.postcorporateactions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
