          in: path
          type: string
          description: The Publisher or Analytics Datafeed document containing the report
          required: true
        - name: assetName
          in: path
          type: string
          description: The PA/SPAR asset name and extension
          required: true
        - name: reportId
          in: path
          type: string
          description: The PA/SPAR report ID
          required: true
        - name: tileId
          in: path
          type: string
          description: The PA/SPAR tile ID
          required: true
