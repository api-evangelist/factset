naftiko: 1.0.0-alpha2
info:
  label: Factset Portfolio Metadata — Holdings
  description: 'Factset Portfolio Metadata — Holdings. 1 operations. Lead operation: Holdings. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Holdings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-holdings-2
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: Factset Portfolio Metadata — Holdings business capability. Self-contained, no shared references.
    resources:
    - name: holdings-id
      path: /holdings/{id}
      operations:
      - name: readholdings
        method: GET
        description: Read a holdings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the holdings to be read
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-holdings-2-rest
    port: 8080
    description: REST adapter for Factset Portfolio Metadata — Holdings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/holdings/{id}
      name: holdings-id
      description: REST surface for holdings-id.
      operations:
      - method: GET
        name: readholdings
        description: Read a holdings
        call: portfolio-metadata-holdings-2.readholdings
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-holdings-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Portfolio Metadata — Holdings. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: read-holdings
      description: Read a holdings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-holdings-2.readholdings
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
