naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time News API — Chain
  description: 'FactSet Real-Time News API — Chain. 1 operations. Lead operation: Factset List News Articles of an Article
    Chain.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Chain
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-news-chain
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time News API — Chain business capability. Self-contained, no shared references.
    resources:
    - name: news-article-listByChain
      path: /news/article/listByChain
      operations:
      - name: postnewsarticlelistbychain
        method: POST
        description: Factset List News Articles of an Article Chain.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-news-chain-rest
    port: 8080
    description: REST adapter for FactSet Real-Time News API — Chain. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/news/article/listbychain
      name: news-article-listbychain
      description: REST surface for news-article-listByChain.
      operations:
      - method: POST
        name: postnewsarticlelistbychain
        description: Factset List News Articles of an Article Chain.
        call: real-time-news-chain.postnewsarticlelistbychain
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-news-chain-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time News API — Chain. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-list-news-articles-article
      description: Factset List News Articles of an Article Chain.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-news-chain.postnewsarticlelistbychain
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
