naftiko: 1.0.0-alpha2
info:
  label: FactSet People API — Profiles
  description: 'FactSet People API — Profiles. 2 operations. Lead operation: Factset Return Information About the Person With
    the Specified Entity Id.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Profiles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: people-profiles
    baseUri: https://api.factset.com/content
    description: FactSet People API — Profiles business capability. Self-contained, no shared references.
    resources:
    - name: factset-people-v1-profiles
      path: /factset-people/v1/profiles
      operations:
      - name: getpeopleprofiles
        method: GET
        description: Factset Return Information About the Person With the Specified Entity Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getpeopleprofilesforlist
        method: POST
        description: Factset Returns Profile Information for a Large List of People.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: people-profiles-rest
    port: 8080
    description: REST adapter for FactSet People API — Profiles. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-people/v1/profiles
      name: factset-people-v1-profiles
      description: REST surface for factset-people-v1-profiles.
      operations:
      - method: GET
        name: getpeopleprofiles
        description: Factset Return Information About the Person With the Specified Entity Id.
        call: people-profiles.getpeopleprofiles
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getpeopleprofilesforlist
        description: Factset Returns Profile Information for a Large List of People.
        call: people-profiles.getpeopleprofilesforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: people-profiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet People API — Profiles. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-return-information-about-person
      description: Factset Return Information About the Person With the Specified Entity Id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: people-profiles.getpeopleprofiles
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-profile-information-large
      description: Factset Returns Profile Information for a Large List of People.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: people-profiles.getpeopleprofilesforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
