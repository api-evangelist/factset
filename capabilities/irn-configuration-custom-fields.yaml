naftiko: 1.0.0-alpha2
info:
  label: Factset IRN API v1 — Custom Fields
  description: 'Factset IRN API v1 — Custom Fields. 1 operations. Lead operation: Factset Get all Custom Fields. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Custom Fields
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-custom-fields
    baseUri: https://api.factset.com/research/irn
    description: Factset IRN API v1 — Custom Fields business capability. Self-contained, no shared references.
    resources:
    - name: v1-custom-fields
      path: /v1/custom-fields
      operations:
      - name: getcustomfields
        method: GET
        description: Factset Get all Custom Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-IRN-Ignore-Permissions
          in: header
          type: boolean
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-custom-fields-rest
    port: 8080
    description: REST adapter for Factset IRN API v1 — Custom Fields. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/custom-fields
      name: v1-custom-fields
      description: REST surface for v1-custom-fields.
      operations:
      - method: GET
        name: getcustomfields
        description: Factset Get all Custom Fields
        call: irn-configuration-custom-fields.getcustomfields
        with:
          X-IRN-Ignore-Permissions: rest.X-IRN-Ignore-Permissions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-custom-fields-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset IRN API v1 — Custom Fields. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-all-custom-fields
      description: Factset Get all Custom Fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-custom-fields.getcustomfields
      with:
        X-IRN-Ignore-Permissions: tools.X-IRN-Ignore-Permissions
      outputParameters:
      - type: object
        mapping: $.
