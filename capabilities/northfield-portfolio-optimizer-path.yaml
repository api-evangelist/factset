naftiko: 1.0.0-alpha2
info:
  label: FactSet Northfield Portfolio Optimizer — Path
  description: 'FactSet Northfield Portfolio Optimizer — Path. 2 operations. Lead operation: Factset Get Northfield Strategy
    Documents and Sub-directories in a Directory. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Path
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: northfield-portfolio-optimizer-path
    baseUri: https://api.factset.com
    description: FactSet Northfield Portfolio Optimizer — Path business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-npo-v3-strategies-path
      path: /analytics/engines/npo/v3/strategies/{path}
      operations:
      - name: getnorthfieldstrategydocuments
        method: GET
        description: Factset Get Northfield Strategy Documents and Sub-directories in a Directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: The directory to get the strategy documents and sub-directories in
          required: true
    - name: analytics-lookups-v3-accounts-path
      path: /analytics/lookups/v3/accounts/{path}
      operations:
      - name: getaccounts
        method: GET
        description: Factset Get Accounts and Sub-directories in a Directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: The directory to get the accounts and sub-directories in
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: northfield-portfolio-optimizer-path-rest
    port: 8080
    description: REST adapter for FactSet Northfield Portfolio Optimizer — Path. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/npo/v3/strategies/{path}
      name: analytics-engines-npo-v3-strategies-path
      description: REST surface for analytics-engines-npo-v3-strategies-path.
      operations:
      - method: GET
        name: getnorthfieldstrategydocuments
        description: Factset Get Northfield Strategy Documents and Sub-directories in a Directory
        call: northfield-portfolio-optimizer-path.getnorthfieldstrategydocuments
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/lookups/v3/accounts/{path}
      name: analytics-lookups-v3-accounts-path
      description: REST surface for analytics-lookups-v3-accounts-path.
      operations:
      - method: GET
        name: getaccounts
        description: Factset Get Accounts and Sub-directories in a Directory
        call: northfield-portfolio-optimizer-path.getaccounts
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: northfield-portfolio-optimizer-path-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Northfield Portfolio Optimizer — Path. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-get-northfield-strategy-documents
      description: Factset Get Northfield Strategy Documents and Sub-directories in a Directory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: northfield-portfolio-optimizer-path.getnorthfieldstrategydocuments
      with:
        path: tools.path
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-accounts-and-sub
      description: Factset Get Accounts and Sub-directories in a Directory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: northfield-portfolio-optimizer-path.getaccounts
      with:
        path: tools.path
      outputParameters:
      - type: object
        mapping: $.
