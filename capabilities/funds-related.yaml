naftiko: 1.0.0-alpha2
info:
  label: FactSet Funds API — Related
  description: 'FactSet Funds API — Related. 2 operations. Lead operation: Factset Get a List of Related Funds for a List
    of Fund Ids.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Related
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: funds-related
    baseUri: https://api.factset.com/content
    description: FactSet Funds API — Related business capability. Self-contained, no shared references.
    resources:
    - name: factset-funds-v1-related-funds
      path: /factset-funds/v1/related-funds
      operations:
      - name: getrelatedfunds
        method: GET
        description: Factset Get a List of Related Funds for a List of Fund Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getrelatedfundsforlist
        method: POST
        description: Factset Get a List of Related Funds for a Large List of Fund Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: funds-related-rest
    port: 8080
    description: REST adapter for FactSet Funds API — Related. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-funds/v1/related-funds
      name: factset-funds-v1-related-funds
      description: REST surface for factset-funds-v1-related-funds.
      operations:
      - method: GET
        name: getrelatedfunds
        description: Factset Get a List of Related Funds for a List of Fund Ids.
        call: funds-related.getrelatedfunds
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getrelatedfundsforlist
        description: Factset Get a List of Related Funds for a Large List of Fund Ids.
        call: funds-related.getrelatedfundsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: funds-related-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Funds API — Related. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-list-related-funds
      description: Factset Get a List of Related Funds for a List of Fund Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: funds-related.getrelatedfunds
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-list-related-funds-2
      description: Factset Get a List of Related Funds for a Large List of Fund Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: funds-related.getrelatedfundsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
