naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Price Alerting API — Trigger
  description: 'FactSet Real-Time Price Alerting API — Trigger. 2 operations. Lead operation: Factset Details of a Trigger..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Trigger
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-price-alerting-trigger
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Price Alerting API — Trigger business capability. Self-contained, no shared references.
    resources:
    - name: alerting-prices-basic-trigger-get
      path: /alerting/prices/basic/trigger/get
      operations:
      - name: getalertingpricesbasictriggerget
        method: GET
        description: Factset Details of a Trigger.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    - name: alerting-prices-basic-trigger-list
      path: /alerting/prices/basic/trigger/list
      operations:
      - name: postalertingpricesbasictriggerlist
        method: POST
        description: Factset List of Triggers.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-price-alerting-trigger-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Price Alerting API — Trigger. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/alerting/prices/basic/trigger/get
      name: alerting-prices-basic-trigger-get
      description: REST surface for alerting-prices-basic-trigger-get.
      operations:
      - method: GET
        name: getalertingpricesbasictriggerget
        description: Factset Details of a Trigger.
        call: real-time-price-alerting-trigger.getalertingpricesbasictriggerget
        with:
          id: rest.id
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerting/prices/basic/trigger/list
      name: alerting-prices-basic-trigger-list
      description: REST surface for alerting-prices-basic-trigger-list.
      operations:
      - method: POST
        name: postalertingpricesbasictriggerlist
        description: Factset List of Triggers.
        call: real-time-price-alerting-trigger.postalertingpricesbasictriggerlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-price-alerting-trigger-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Price Alerting API — Trigger. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-details-trigger
      description: Factset Details of a Trigger.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-price-alerting-trigger.getalertingpricesbasictriggerget
      with:
        id: tools.id
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-triggers
      description: Factset List of Triggers.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-price-alerting-trigger.postalertingpricesbasictriggerlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
