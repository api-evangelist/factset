      path: /scim/v2/Groups
      operations:
      - name: getallroles
        method: GET
        description: Factset Retrieves a List of Vrs Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: count
          in: query
          type: integer
          description: Non-negative maximum number of entries to return
        - name: startIndex
          in: query
          type: integer
          description: The 1-based index of the first query result
      - name: createrole
        method: POST
        description: Factset Creates a Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: scim-v2-Groups-groupId
      path: /scim/v2/Groups/{groupId}
      operations:
      - name: getrolebyid
        method: GET
        description: Factset Retrieves a Vrs Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupId
          in: path
          type: string
          description: The ID of the role
          required: true
      - name: deleterolebyid
        method: DELETE
        description: Factset Deletes a Vrs Role
        outputRawFormat: json
