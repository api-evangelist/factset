    resources:
    - path: /v1/scim/v2/groups
      name: scim-v2-groups
      description: REST surface for scim-v2-Groups.
      operations:
      - method: GET
        name: getallroles
        description: Factset Retrieves a List of Vrs Role
        call: vermilion-groups.getallroles
        with:
          count: rest.count
          startIndex: rest.startIndex
        outputParameters:
        - type: object
          mapping: $.
