          in: path
          type: string
          description: The ID of the group
          required: true
      - name: patchrolebyid
        method: PATCH
        description: Factset Add or Remove a User To/from a Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupId
          in: path
          type: string
          description: The ID of the role
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updaterolebyid
        method: PUT
        description: Factset Updates a Vrs Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupId
          in: path
          type: string
          description: The ID of the group
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
