          mapping: $.
      - method: PATCH
        name: patchrolebyid
        description: Factset Add or Remove a User To/from a Group
        call: vermilion-groups.patchrolebyid
        with:
          groupId: rest.groupId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
