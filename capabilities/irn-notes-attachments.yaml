naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Notes API — Attachments
  description: 'FactSet IRN Notes API — Attachments. 7 operations. Lead operation: Factset Get All the Attachments Belonging
    to a Note. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Attachments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-notes-attachments
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Notes API — Attachments business capability. Self-contained, no shared references.
    resources:
    - name: v1-notes-noteId-attachments
      path: /v1/notes/{noteId}/attachments
      operations:
      - name: getattachments
        method: GET
        description: Factset Get All the Attachments Belonging to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          description: Note Id
          required: true
      - name: createattachment
        method: POST
        description: Factset Create an Attachment for an Existing Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-notes-noteId-attachments-attachmentId
      path: /v1/notes/{noteId}/attachments/{attachmentId}
      operations:
      - name: softdeletenoteattachment
        method: DELETE
        description: Factset Delete Attachment From Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          description: Note Id
          required: true
        - name: attachmentId
          in: path
          type: string
          description: Attachment Id
          required: true
    - name: v1-notes-noteId-attachments-attachmentId-download
      path: /v1/notes/{noteId}/attachments/{attachmentId}/download
      operations:
      - name: downloadattachment
        method: GET
        description: Factset Download an Attachment From a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: attachmentId
          in: path
          type: string
          required: true
    - name: v1-notes-noteId-comments-commentId-attachments
      path: /v1/notes/{noteId}/comments/{commentId}/attachments
      operations:
      - name: getcommentattachments
        method: GET
        description: Factset Get Attachments Summary of a Comment Belonging to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
      - name: createcommentattachment
        method: POST
        description: Factset Create a Comment Attachment to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-notes-noteId-comments-commentId-attachments-attachmentId-download
      path: /v1/notes/{noteId}/comments/{commentId}/attachments/{attachmentId}/download
      operations:
      - name: downloadcommentattachmentforcomment
        method: GET
        description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: attachmentId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: irn-notes-attachments-rest
    port: 8080
    description: REST adapter for FactSet IRN Notes API — Attachments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/notes/{noteid}/attachments
      name: v1-notes-noteid-attachments
      description: REST surface for v1-notes-noteId-attachments.
      operations:
      - method: GET
        name: getattachments
        description: Factset Get All the Attachments Belonging to a Note
        call: irn-notes-attachments.getattachments
        with:
          noteId: rest.noteId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createattachment
        description: Factset Create an Attachment for an Existing Note
        call: irn-notes-attachments.createattachment
        with:
          noteId: rest.noteId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/attachments/{attachmentid}
      name: v1-notes-noteid-attachments-attachmentid
      description: REST surface for v1-notes-noteId-attachments-attachmentId.
      operations:
      - method: DELETE
        name: softdeletenoteattachment
        description: Factset Delete Attachment From Note
        call: irn-notes-attachments.softdeletenoteattachment
        with:
          noteId: rest.noteId
          attachmentId: rest.attachmentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/attachments/{attachmentid}/download
      name: v1-notes-noteid-attachments-attachmentid-download
      description: REST surface for v1-notes-noteId-attachments-attachmentId-download.
      operations:
      - method: GET
        name: downloadattachment
        description: Factset Download an Attachment From a Note
        call: irn-notes-attachments.downloadattachment
        with:
          noteId: rest.noteId
          attachmentId: rest.attachmentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/comments/{commentid}/attachments
      name: v1-notes-noteid-comments-commentid-attachments
      description: REST surface for v1-notes-noteId-comments-commentId-attachments.
      operations:
      - method: GET
        name: getcommentattachments
        description: Factset Get Attachments Summary of a Comment Belonging to a Note
        call: irn-notes-attachments.getcommentattachments
        with:
          noteId: rest.noteId
          commentId: rest.commentId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcommentattachment
        description: Factset Create a Comment Attachment to a Note
        call: irn-notes-attachments.createcommentattachment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/comments/{commentid}/attachments/{attachmentid}/download
      name: v1-notes-noteid-comments-commentid-attachments-attachmentid-download
      description: REST surface for v1-notes-noteId-comments-commentId-attachments-attachmentId-download.
      operations:
      - method: GET
        name: downloadcommentattachmentforcomment
        description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
        call: irn-notes-attachments.downloadcommentattachmentforcomment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
          attachmentId: rest.attachmentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-notes-attachments-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Notes API — Attachments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-all-attachments-belonging
      description: Factset Get All the Attachments Belonging to a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-attachments.getattachments
      with:
        noteId: tools.noteId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-create-attachment-existing-note
      description: Factset Create an Attachment for an Existing Note
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: irn-notes-attachments.createattachment
      with:
        noteId: tools.noteId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-delete-attachment-note
      description: Factset Delete Attachment From Note
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: irn-notes-attachments.softdeletenoteattachment
      with:
        noteId: tools.noteId
        attachmentId: tools.attachmentId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-download-attachment-note
      description: Factset Download an Attachment From a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-attachments.downloadattachment
      with:
        noteId: tools.noteId
        attachmentId: tools.attachmentId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-attachments-summary-comment
      description: Factset Get Attachments Summary of a Comment Belonging to a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-attachments.getcommentattachments
      with:
        noteId: tools.noteId
        commentId: tools.commentId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-create-comment-attachment-note
      description: Factset Create a Comment Attachment to a Note
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: irn-notes-attachments.createcommentattachment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-download-single-attachment-detail
      description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-attachments.downloadcommentattachmentforcomment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
        attachmentId: tools.attachmentId
      outputParameters:
      - type: object
        mapping: $.
