naftiko: 1.0.0-alpha2
info:
  label: FactSet Procure to Pay SCIM — Products
  description: 'FactSet Procure to Pay SCIM — Products. 2 operations. Lead operation: Factset Get a List of Products.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: procure-to-pay-scim-products
    baseUri: https://api.factset.com/scim/v2
    description: FactSet Procure to Pay SCIM — Products business capability. Self-contained, no shared references.
    resources:
    - name: Products
      path: /Products
      operations:
      - name: get
        method: GET
        description: Factset Get a List of Products.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: Products-id
      path: /Products/{id}
      operations:
      - name: get
        method: GET
        description: Factset Get a Product.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: procure-to-pay-scim-products-rest
    port: 8080
    description: REST adapter for FactSet Procure to Pay SCIM — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for Products.
      operations:
      - method: GET
        name: get
        description: Factset Get a List of Products.
        call: procure-to-pay-scim-products.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{id}
      name: products-id
      description: REST surface for Products-id.
      operations:
      - method: GET
        name: get
        description: Factset Get a Product.
        call: procure-to-pay-scim-products.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: procure-to-pay-scim-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Procure to Pay SCIM — Products. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-list-products
      description: Factset Get a List of Products.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procure-to-pay-scim-products.get
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-product
      description: Factset Get a Product.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procure-to-pay-scim-products.get
      outputParameters:
      - type: object
        mapping: $.
