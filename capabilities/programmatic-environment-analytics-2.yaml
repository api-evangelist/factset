      name: analytics-quant-fpe-v1-files-server-file
      description: REST surface for analytics-quant-fpe-v1-files-server-file.
      operations:
      - method: POST
        name: post
        description: Factset Starts a file upload
        call: programmatic-environment-analytics-2.post
        with:
          server: rest.server
          file: rest.file
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: programmatic-environment-analytics-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset FPE API — Analytics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
