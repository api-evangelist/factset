        name: getinstrumentcrossreferencegetbyisin
        description: Factset Translate Isin to Instrument.
        call: real-time-quotes-i.getinstrumentcrossreferencegetbyisin
        with:
          isin: rest.isin
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
