naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Compliance
  description: 'FactSet Real-Time Quotes API — Compliance. 3 operations. Lead operation: Factset List of Compliance Properties
    for Instruments.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Compliance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-compliance
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Compliance business capability. Self-contained, no shared references.
    resources:
    - name: instrument-complianceProperty-list
      path: /instrument/complianceProperty/list
      operations:
      - name: postinstrumentcompliancepropertylist
        method: POST
        description: Factset List of Compliance Properties for Instruments.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: instrument-complianceProperty-listByInstrument
      path: /instrument/complianceProperty/listByInstrument
      operations:
      - name: getinstrumentcompliancepropertylistbyinstrument
        method: GET
        description: Factset Compliance Properties of an Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: instrument-legalEntity-complianceProperty-list
      path: /instrument/legalEntity/complianceProperty/list
      operations:
      - name: getinstrumentlegalentitycompliancepropertylist
        method: GET
        description: Factset Role-specific Compliance Properties of Legal Entities Related to an Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-compliance-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Compliance. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/instrument/complianceproperty/list
      name: instrument-complianceproperty-list
      description: REST surface for instrument-complianceProperty-list.
      operations:
      - method: POST
        name: postinstrumentcompliancepropertylist
        description: Factset List of Compliance Properties for Instruments.
        call: real-time-quotes-compliance.postinstrumentcompliancepropertylist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/instrument/complianceproperty/listbyinstrument
      name: instrument-complianceproperty-listbyinstrument
      description: REST surface for instrument-complianceProperty-listByInstrument.
      operations:
      - method: GET
        name: getinstrumentcompliancepropertylistbyinstrument
        description: Factset Compliance Properties of an Instrument.
        call: real-time-quotes-compliance.getinstrumentcompliancepropertylistbyinstrument
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/instrument/legalentity/complianceproperty/list
      name: instrument-legalentity-complianceproperty-list
      description: REST surface for instrument-legalEntity-complianceProperty-list.
      operations:
      - method: GET
        name: getinstrumentlegalentitycompliancepropertylist
        description: Factset Role-specific Compliance Properties of Legal Entities Related to an Instrument.
        call: real-time-quotes-compliance.getinstrumentlegalentitycompliancepropertylist
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-compliance-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Compliance. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-list-compliance-properties-instruments
      description: Factset List of Compliance Properties for Instruments.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-quotes-compliance.postinstrumentcompliancepropertylist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-compliance-properties-instrument
      description: Factset Compliance Properties of an Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-compliance.getinstrumentcompliancepropertylistbyinstrument
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-role-specific-compliance-properties
      description: Factset Role-specific Compliance Properties of Legal Entities Related to an Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-compliance.getinstrumentlegalentitycompliancepropertylist
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
