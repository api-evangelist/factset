        outputParameters:
        - name: result
          type: object
          value: $.
      - name: posteventdetails
        method: POST
        description: 'Fetch Signals event headlines plus all additional event details for up to 1000 identifiers and at least
          one of the following filtering parameters: `ids`, `portfolios`'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
