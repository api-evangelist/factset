naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Dates
  description: 'Factset PA Engine API — Dates. 1 operations. Lead operation: Factset Convert Pa Dates to Absolute Format.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Dates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-dates
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Dates business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-dates
      path: /analytics/engines/pa/v3/dates
      operations:
      - name: convertpadatestoabsoluteformat
        method: GET
        description: Factset Convert Pa Dates to Absolute Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startdate
          in: query
          type: string
          description: Start Date
        - name: enddate
          in: query
          type: string
          description: End Date
          required: true
        - name: componentid
          in: query
          type: string
          description: Component Id
          required: true
        - name: account
          in: query
          type: string
          description: Account ( Account Name ending with .ACCT or .ACTM )
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-dates-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Dates. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/dates
      name: analytics-engines-pa-v3-dates
      description: REST surface for analytics-engines-pa-v3-dates.
      operations:
      - method: GET
        name: convertpadatestoabsoluteformat
        description: Factset Convert Pa Dates to Absolute Format
        call: pa-engine-dates.convertpadatestoabsoluteformat
        with:
          startdate: rest.startdate
          enddate: rest.enddate
          componentid: rest.componentid
          account: rest.account
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-dates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Dates. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-convert-pa-dates-absolute
      description: Factset Convert Pa Dates to Absolute Format
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-dates.convertpadatestoabsoluteformat
      with:
        startdate: tools.startdate
        enddate: tools.enddate
        componentid: tools.componentid
        account: tools.account
      outputParameters:
      - type: object
        mapping: $.
