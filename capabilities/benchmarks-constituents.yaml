naftiko: 1.0.0-alpha2
info:
  label: FactSet Benchmarks API — Constituents
  description: 'FactSet Benchmarks API — Constituents. 4 operations. Lead operation: Factset Returns the Requested Benchmark
    Constituents and Respective Weights, Price and Market Value.. Self-contained Naftiko capability covering one Factset business
    surface.'
  tags:
  - Factset
  - Constituents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: benchmarks-constituents
    baseUri: https://api.factset.com/content
    description: FactSet Benchmarks API — Constituents business capability. Self-contained, no shared references.
    resources:
    - name: factset-benchmarks-v1-constituents
      path: /factset-benchmarks/v1/constituents
      operations:
      - name: getbenchmarkconstituents
        method: GET
        description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getbenchmarkconstituentsforlist
        method: POST
        description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: factset-benchmarks-v1-fixed-income-constituents
      path: /factset-benchmarks/v1/fixed-income-constituents
      operations:
      - name: getfibenchmarkconstituents
        method: GET
        description: Factset Returns the Requested Fixed Income Benchmark Constituents and Respective Weights, Price and Market
          Value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfibenchmarkconstituentsforlist
        method: POST
        description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: benchmarks-constituents-rest
    port: 8080
    description: REST adapter for FactSet Benchmarks API — Constituents. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-benchmarks/v1/constituents
      name: factset-benchmarks-v1-constituents
      description: REST surface for factset-benchmarks-v1-constituents.
      operations:
      - method: GET
        name: getbenchmarkconstituents
        description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
        call: benchmarks-constituents.getbenchmarkconstituents
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getbenchmarkconstituentsforlist
        description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
        call: benchmarks-constituents.getbenchmarkconstituentsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/factset-benchmarks/v1/fixed-income-constituents
      name: factset-benchmarks-v1-fixed-income-constituents
      description: REST surface for factset-benchmarks-v1-fixed-income-constituents.
      operations:
      - method: GET
        name: getfibenchmarkconstituents
        description: Factset Returns the Requested Fixed Income Benchmark Constituents and Respective Weights, Price and Market
          Value.
        call: benchmarks-constituents.getfibenchmarkconstituents
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfibenchmarkconstituentsforlist
        description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
        call: benchmarks-constituents.getfibenchmarkconstituentsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: benchmarks-constituents-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Benchmarks API — Constituents. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-returns-requested-benchmark-constituents
      description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: benchmarks-constituents.getbenchmarkconstituents
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-requested-benchmark-constituents-2
      description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: benchmarks-constituents.getbenchmarkconstituentsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-requested-fixed-income
      description: Factset Returns the Requested Fixed Income Benchmark Constituents and Respective Weights, Price and Market
        Value.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: benchmarks-constituents.getfibenchmarkconstituents
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-requested-benchmark-constituents-3
      description: Factset Returns the Requested Benchmark Constituents and Respective Weights, Price and Market Value.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: benchmarks-constituents.getfibenchmarkconstituentsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
