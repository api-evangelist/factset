naftiko: 1.0.0-alpha2
info:
  label: FactSet Publisher API — Units
  description: 'FactSet Publisher API — Units. 1 operations. Lead operation: Factset Get Pub Calculation Result by Id. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Units
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: publisher-units
    baseUri: https://api.factset.com
    description: FactSet Publisher API — Units business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pub-v3-calculations-id-units-unitId-result
      path: /analytics/engines/pub/v3/calculations/{id}/units/{unitId}/result
      operations:
      - name: getcalculationunitresultbyid
        method: GET
        description: Factset Get Pub Calculation Result by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Get Pub calculation status by id endpoint
          required: true
        - name: unitId
          in: path
          type: string
          description: from url, provided from the location header in the Get Pub calculation status by id endpoint
          required: true
        - name: Accept
          in: header
          type: string
          description: Standard HTTP header. Value can be gzip, compress, deflate, br, identity and/or *
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: publisher-units-rest
    port: 8080
    description: REST adapter for FactSet Publisher API — Units. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/analytics/engines/pub/v3/calculations/{id}/units/{unitid}/result
      name: analytics-engines-pub-v3-calculations-id-units-unitid-result
      description: REST surface for analytics-engines-pub-v3-calculations-id-units-unitId-result.
      operations:
      - method: GET
        name: getcalculationunitresultbyid
        description: Factset Get Pub Calculation Result by Id
        call: publisher-units.getcalculationunitresultbyid
        with:
          id: rest.id
          unitId: rest.unitId
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: publisher-units-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Publisher API — Units. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-pub-calculation-result
      description: Factset Get Pub Calculation Result by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: publisher-units.getcalculationunitresultbyid
      with:
        id: tools.id
        unitId: tools.unitId
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
