    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Count. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-list-day-count-convention
      description: Factset List of Day Count Convention Types.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-count.getinstrumentcoupondaycountconventiontypelist
      with:
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
