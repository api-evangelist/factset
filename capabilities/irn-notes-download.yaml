naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Notes API — Download
  description: 'FactSet IRN Notes API — Download. 2 operations. Lead operation: Factset Download an Attachment From a Note.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Download
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-notes-download
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Notes API — Download business capability. Self-contained, no shared references.
    resources:
    - name: v1-notes-noteId-attachments-attachmentId-download
      path: /v1/notes/{noteId}/attachments/{attachmentId}/download
      operations:
      - name: downloadattachment
        method: GET
        description: Factset Download an Attachment From a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: attachmentId
          in: path
          type: string
          required: true
    - name: v1-notes-noteId-comments-commentId-attachments-attachmentId-download
      path: /v1/notes/{noteId}/comments/{commentId}/attachments/{attachmentId}/download
      operations:
      - name: downloadcommentattachmentforcomment
        method: GET
        description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
        - name: commentId
          in: path
          type: string
          required: true
        - name: attachmentId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: irn-notes-download-rest
    port: 8080
    description: REST adapter for FactSet IRN Notes API — Download. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/notes/{noteid}/attachments/{attachmentid}/download
      name: v1-notes-noteid-attachments-attachmentid-download
      description: REST surface for v1-notes-noteId-attachments-attachmentId-download.
      operations:
      - method: GET
        name: downloadattachment
        description: Factset Download an Attachment From a Note
        call: irn-notes-download.downloadattachment
        with:
          noteId: rest.noteId
          attachmentId: rest.attachmentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notes/{noteid}/comments/{commentid}/attachments/{attachmentid}/download
      name: v1-notes-noteid-comments-commentid-attachments-attachmentid-download
      description: REST surface for v1-notes-noteId-comments-commentId-attachments-attachmentId-download.
      operations:
      - method: GET
        name: downloadcommentattachmentforcomment
        description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
        call: irn-notes-download.downloadcommentattachmentforcomment
        with:
          noteId: rest.noteId
          commentId: rest.commentId
          attachmentId: rest.attachmentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-notes-download-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Notes API — Download. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-download-attachment-note
      description: Factset Download an Attachment From a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-download.downloadattachment
      with:
        noteId: tools.noteId
        attachmentId: tools.attachmentId
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-download-single-attachment-detail
      description: Factset Download Single Attachment Detail of a Comment Belonging to a Note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-download.downloadcommentattachmentforcomment
      with:
        noteId: tools.noteId
        commentId: tools.commentId
        attachmentId: tools.attachmentId
      outputParameters:
      - type: object
        mapping: $.
