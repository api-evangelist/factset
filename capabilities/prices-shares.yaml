naftiko: 1.0.0-alpha2
info:
  label: FactSet Prices API — Shares
  description: 'FactSet Prices API — Shares. 2 operations. Lead operation: Factset Gets Shares for a List of `ids` as of Given
    Date Range.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Shares
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: prices-shares
    baseUri: https://api.factset.com/content
    description: FactSet Prices API — Shares business capability. Self-contained, no shared references.
    resources:
    - name: factset-prices-v1-shares
      path: /factset-prices/v1/shares
      operations:
      - name: getsecurityshares
        method: GET
        description: Factset Gets Shares for a List of `ids` as of Given Date Range.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsecuritysharesforlist
        method: POST
        description: Factset Requests Shares for a List of `ids` as of Given Date Range.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: prices-shares-rest
    port: 8080
    description: REST adapter for FactSet Prices API — Shares. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-prices/v1/shares
      name: factset-prices-v1-shares
      description: REST surface for factset-prices-v1-shares.
      operations:
      - method: GET
        name: getsecurityshares
        description: Factset Gets Shares for a List of `ids` as of Given Date Range.
        call: prices-shares.getsecurityshares
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getsecuritysharesforlist
        description: Factset Requests Shares for a List of `ids` as of Given Date Range.
        call: prices-shares.getsecuritysharesforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prices-shares-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Prices API — Shares. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-gets-shares-list-ids
      description: Factset Gets Shares for a List of `ids` as of Given Date Range.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prices-shares.getsecurityshares
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-requests-shares-list-ids
      description: Factset Requests Shares for a List of `ids` as of Given Date Range.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: prices-shares.getsecuritysharesforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
