naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Configuration API — Recommendations
  description: 'FactSet IRN Configuration API — Recommendations. 1 operations. Lead operation: Factset Get All Recommendations.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Recommendations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-recommendations
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Configuration API — Recommendations business capability. Self-contained, no shared references.
    resources:
    - name: v1-recommendations
      path: /v1/recommendations
      operations:
      - name: getrecommendations
        method: GET
        description: Factset Get All Recommendations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-recommendations-rest
    port: 8080
    description: REST adapter for FactSet IRN Configuration API — Recommendations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/recommendations
      name: v1-recommendations
      description: REST surface for v1-recommendations.
      operations:
      - method: GET
        name: getrecommendations
        description: Factset Get All Recommendations
        call: irn-configuration-recommendations.getrecommendations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-recommendations-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Configuration API — Recommendations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-get-all-recommendations
      description: Factset Get All Recommendations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-recommendations.getrecommendations
      outputParameters:
      - type: object
        mapping: $.
