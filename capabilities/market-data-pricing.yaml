naftiko: 1.0.0-alpha2
info:
  label: FactSet Market Data and Pricing
  description: Unified workflow for accessing real-time and historical market data including prices, quotes, news, tick history,
    options, and FX rates. Used by traders and market data analysts.
  tags:
  - FactSet
  - Market Data
  - Real-Time Data
  - Pricing
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACTSET_USERNAME: FACTSET_USERNAME
    FACTSET_PASSWORD: FACTSET_PASSWORD
