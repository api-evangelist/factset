    namespace: factset-global-prices
    baseUri: https://api.factset.com/content
    description: Global equity prices, volume, turnover, and VWAP data.
    authentication:
      type: basic
      username: '{{FACTSET_USERNAME}}'
      password: '{{FACTSET_PASSWORD}}'
    resources:
    - name: global_prices
      path: /
      description: Global Prices API resources.
      operations:
      - name: list-global-prices
        method: GET
        description: List Global Prices resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
