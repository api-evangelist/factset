naftiko: 1.0.0-alpha2
info:
  label: Factset IRN API v1 — Authors
  description: 'Factset IRN API v1 — Authors. 1 operations. Lead operation: Factset Get all Authors. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Authors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-authors-2
    baseUri: https://api.factset.com/research/irn
    description: Factset IRN API v1 — Authors business capability. Self-contained, no shared references.
    resources:
    - name: v1-authors
      path: /v1/authors
      operations:
      - name: getauthors
        method: GET
        description: Factset Get all Authors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-IRN-Ignore-Permissions
          in: header
          type: boolean
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-authors-2-rest
    port: 8080
    description: REST adapter for Factset IRN API v1 — Authors. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/authors
      name: v1-authors
      description: REST surface for v1-authors.
      operations:
      - method: GET
        name: getauthors
        description: Factset Get all Authors
        call: irn-configuration-authors-2.getauthors
        with:
          X-IRN-Ignore-Permissions: rest.X-IRN-Ignore-Permissions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-authors-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset IRN API v1 — Authors. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-all-authors
      description: Factset Get all Authors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-authors-2.getauthors
      with:
        X-IRN-Ignore-Permissions: tools.X-IRN-Ignore-Permissions
      outputParameters:
      - type: object
        mapping: $.
