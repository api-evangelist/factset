naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Legal
  description: 'FactSet Real-Time Quotes API — Legal. 2 operations. Lead operation: Factset Role-specific Background Texts
    of Legal Entities Related to an Instrument.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Legal
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-legal
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Legal business capability. Self-contained, no shared references.
    resources:
    - name: instrument-legalEntity-backgroundText-list
      path: /instrument/legalEntity/backgroundText/list
      operations:
      - name: getinstrumentlegalentitybackgroundtextlist
        method: GET
        description: Factset Role-specific Background Texts of Legal Entities Related to an Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: instrument-legalEntity-complianceProperty-list
      path: /instrument/legalEntity/complianceProperty/list
      operations:
      - name: getinstrumentlegalentitycompliancepropertylist
        method: GET
        description: Factset Role-specific Compliance Properties of Legal Entities Related to an Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-legal-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Legal. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/instrument/legalentity/backgroundtext/list
      name: instrument-legalentity-backgroundtext-list
      description: REST surface for instrument-legalEntity-backgroundText-list.
      operations:
      - method: GET
        name: getinstrumentlegalentitybackgroundtextlist
        description: Factset Role-specific Background Texts of Legal Entities Related to an Instrument.
        call: real-time-quotes-legal.getinstrumentlegalentitybackgroundtextlist
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/instrument/legalentity/complianceproperty/list
      name: instrument-legalentity-complianceproperty-list
      description: REST surface for instrument-legalEntity-complianceProperty-list.
      operations:
      - method: GET
        name: getinstrumentlegalentitycompliancepropertylist
        description: Factset Role-specific Compliance Properties of Legal Entities Related to an Instrument.
        call: real-time-quotes-legal.getinstrumentlegalentitycompliancepropertylist
        with:
          identifier: rest.identifier
          identifierType: rest.identifierType
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-legal-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Legal. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-role-specific-background-texts
      description: Factset Role-specific Background Texts of Legal Entities Related to an Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-legal.getinstrumentlegalentitybackgroundtextlist
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-role-specific-compliance-properties
      description: Factset Role-specific Compliance Properties of Legal Entities Related to an Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-legal.getinstrumentlegalentitycompliancepropertylist
      with:
        identifier: tools.identifier
        identifierType: tools.identifierType
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
