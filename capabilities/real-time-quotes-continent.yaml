naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Continent
  description: 'FactSet Real-Time Quotes API — Continent. 2 operations. Lead operation: Factset Details for a Continent..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Continent
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-continent
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Continent business capability. Self-contained, no shared references.
    resources:
    - name: basic-region-continent-get
      path: /basic/region/continent/get
      operations:
      - name: getbasicregioncontinentget
        method: GET
        description: Factset Details for a Continent.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: number
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: basic-region-continent-list
      path: /basic/region/continent/list
      operations:
      - name: getbasicregioncontinentlist
        method: GET
        description: Factset List of Continents.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 1 (possibly prefixed
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-continent-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Continent. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basic/region/continent/get
      name: basic-region-continent-get
      description: REST surface for basic-region-continent-get.
      operations:
      - method: GET
        name: getbasicregioncontinentget
        description: Factset Details for a Continent.
        call: real-time-quotes-continent.getbasicregioncontinentget
        with:
          id: rest.id
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/region/continent/list
      name: basic-region-continent-list
      description: REST surface for basic-region-continent-list.
      operations:
      - method: GET
        name: getbasicregioncontinentlist
        description: Factset List of Continents.
        call: real-time-quotes-continent.getbasicregioncontinentlist
        with:
          _attributes: rest._attributes
          _language: rest._language
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-continent-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Continent. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-details-continent
      description: Factset Details for a Continent.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-continent.getbasicregioncontinentget
      with:
        id: tools.id
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-continents
      description: Factset List of Continents.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-continent.getbasicregioncontinentlist
      with:
        _attributes: tools._attributes
        _language: tools._language
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
