naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Metadata API — Composite
  description: 'FactSet Portfolio Metadata API — Composite. 7 operations. Lead operation: Composite. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Composite
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-composite
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: FactSet Portfolio Metadata API — Composite business capability. Self-contained, no shared references.
    resources:
    - name: account-composite
      path: /account-composite
      operations:
      - name: createaccountcomposite
        method: POST
        description: Create a new account composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listaccountcomposite
        method: GET
        description: List account composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: query
          type: string
          description: Directory to list
        - name: name
          in: query
          type: string
          description: Return only files whose name includes this query
        - name: description
          in: query
          type: string
          description: Return only files whose name includes this query
        - name: _paginationLimit
          in: query
          type: number
          description: Number of directory items to return
        - name: _paginationCursor
          in: query
          type: string
          description: Cursor used for paging.  Fetch items after the specified cursor
    - name: account-composite-id
      path: /account-composite/{id}
      operations:
      - name: deleteaccountcomposite
        method: DELETE
        description: Remove a account composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for the account composite to be deleted
          required: true
        - name: reason
          in: query
          type: string
          description: User auditable reason that the account composite is being removed
      - name: readaccountcomposite
        method: GET
        description: Read a account composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the account composite to be read
          required: true
      - name: updateaccountcomposite
        method: PUT
        description: Modify a account composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for the account composite to be updated
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: holdings-composite-id
      path: /holdings-composite/{id}
      operations:
      - name: readholdingscomposite
        method: GET
        description: Read a holdings composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the holdings composite to be read
          required: true
    - name: returns-composite-id
      path: /returns-composite/{id}
      operations:
      - name: readreturnscomposite
        method: GET
        description: Read a returns composite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the returns composite to be read
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-composite-rest
    port: 8080
    description: REST adapter for FactSet Portfolio Metadata API — Composite. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/account-composite
      name: account-composite
      description: REST surface for account-composite.
      operations:
      - method: POST
        name: createaccountcomposite
        description: Create a new account composite
        call: portfolio-metadata-composite.createaccountcomposite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listaccountcomposite
        description: List account composite
        call: portfolio-metadata-composite.listaccountcomposite
        with:
          path: rest.path
          name: rest.name
          description: rest.description
          _paginationLimit: rest._paginationLimit
          _paginationCursor: rest._paginationCursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account-composite/{id}
      name: account-composite-id
      description: REST surface for account-composite-id.
      operations:
      - method: DELETE
        name: deleteaccountcomposite
        description: Remove a account composite
        call: portfolio-metadata-composite.deleteaccountcomposite
        with:
          id: rest.id
          reason: rest.reason
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: readaccountcomposite
        description: Read a account composite
        call: portfolio-metadata-composite.readaccountcomposite
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateaccountcomposite
        description: Modify a account composite
        call: portfolio-metadata-composite.updateaccountcomposite
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/holdings-composite/{id}
      name: holdings-composite-id
      description: REST surface for holdings-composite-id.
      operations:
      - method: GET
        name: readholdingscomposite
        description: Read a holdings composite
        call: portfolio-metadata-composite.readholdingscomposite
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/returns-composite/{id}
      name: returns-composite-id
      description: REST surface for returns-composite-id.
      operations:
      - method: GET
        name: readreturnscomposite
        description: Read a returns composite
        call: portfolio-metadata-composite.readreturnscomposite
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-composite-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Portfolio Metadata API — Composite. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-new-account-composite
      description: Create a new account composite
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portfolio-metadata-composite.createaccountcomposite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-account-composite
      description: List account composite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-composite.listaccountcomposite
      with:
        path: tools.path
        name: tools.name
        description: tools.description
        _paginationLimit: tools._paginationLimit
        _paginationCursor: tools._paginationCursor
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-account-composite
      description: Remove a account composite
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: portfolio-metadata-composite.deleteaccountcomposite
      with:
        id: tools.id
        reason: tools.reason
      outputParameters:
      - type: object
        mapping: $.
    - name: read-account-composite
      description: Read a account composite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-composite.readaccountcomposite
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: modify-account-composite
      description: Modify a account composite
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portfolio-metadata-composite.updateaccountcomposite
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-holdings-composite
      description: Read a holdings composite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-composite.readholdingscomposite
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: read-returns-composite
      description: Read a returns composite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-composite.readreturnscomposite
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
