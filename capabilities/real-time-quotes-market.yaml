naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Market
  description: 'FactSet Real-Time Quotes API — Market. 6 operations. Lead operation: Factset Details of a Market.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Market
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-market
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Market business capability. Self-contained, no shared references.
    resources:
    - name: basic-market-get
      path: /basic/market/get
      operations:
      - name: getbasicmarketget
        method: GET
        description: Factset Details of a Market.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: number
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: basic-market-group-list
      path: /basic/market/group/list
      operations:
      - name: getbasicmarketgrouplist
        method: GET
        description: Factset List of Market Groups.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 2 (possibly prefixed
    - name: basic-market-list
      path: /basic/market/list
      operations:
      - name: postbasicmarketlist
        method: POST
        description: Factset List of Markets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: basic-market-type-list
      path: /basic/market/type/list
      operations:
      - name: getbasicmarkettypelist
        method: GET
        description: Factset List of Market Types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 1 (possibly prefixed
    - name: notation-crossReference-getByFactSetMarketSymbol
      path: /notation/crossReference/getByFactSetMarketSymbol
      operations:
      - name: getnotationcrossreferencegetbyfactsetmarketsymbol
        method: GET
        description: Translate a Factset Market Symbol to a Notation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: factSetMarketSymbol
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
    - name: notation-market-list
      path: /notation/market/list
      operations:
      - name: postnotationmarketlist
        method: POST
        description: Factset List of Markets With Entitled Notations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-market-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Market. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basic/market/get
      name: basic-market-get
      description: REST surface for basic-market-get.
      operations:
      - method: GET
        name: getbasicmarketget
        description: Factset Details of a Market.
        call: real-time-quotes-market.getbasicmarketget
        with:
          id: rest.id
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/market/group/list
      name: basic-market-group-list
      description: REST surface for basic-market-group-list.
      operations:
      - method: GET
        name: getbasicmarketgrouplist
        description: Factset List of Market Groups.
        call: real-time-quotes-market.getbasicmarketgrouplist
        with:
          _attributes: rest._attributes
          _language: rest._language
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/market/list
      name: basic-market-list
      description: REST surface for basic-market-list.
      operations:
      - method: POST
        name: postbasicmarketlist
        description: Factset List of Markets.
        call: real-time-quotes-market.postbasicmarketlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic/market/type/list
      name: basic-market-type-list
      description: REST surface for basic-market-type-list.
      operations:
      - method: GET
        name: getbasicmarkettypelist
        description: Factset List of Market Types.
        call: real-time-quotes-market.getbasicmarkettypelist
        with:
          _attributes: rest._attributes
          _language: rest._language
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/notation/crossreference/getbyfactsetmarketsymbol
      name: notation-crossreference-getbyfactsetmarketsymbol
      description: REST surface for notation-crossReference-getByFactSetMarketSymbol.
      operations:
      - method: GET
        name: getnotationcrossreferencegetbyfactsetmarketsymbol
        description: Translate a Factset Market Symbol to a Notation.
        call: real-time-quotes-market.getnotationcrossreferencegetbyfactsetmarketsymbol
        with:
          factSetMarketSymbol: rest.factSetMarketSymbol
          _attributes: rest._attributes
          _language: rest._language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/notation/market/list
      name: notation-market-list
      description: REST surface for notation-market-list.
      operations:
      - method: POST
        name: postnotationmarketlist
        description: Factset List of Markets With Entitled Notations.
        call: real-time-quotes-market.postnotationmarketlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-market-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Market. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-details-market
      description: Factset Details of a Market.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-market.getbasicmarketget
      with:
        id: tools.id
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-market-groups
      description: Factset List of Market Groups.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-market.getbasicmarketgrouplist
      with:
        _attributes: tools._attributes
        _language: tools._language
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-markets
      description: Factset List of Markets.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-quotes-market.postbasicmarketlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-market-types
      description: Factset List of Market Types.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-market.getbasicmarkettypelist
      with:
        _attributes: tools._attributes
        _language: tools._language
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
    - name: translate-factset-market-symbol-notation
      description: Translate a Factset Market Symbol to a Notation.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-market.getnotationcrossreferencegetbyfactsetmarketsymbol
      with:
        factSetMarketSymbol: tools.factSetMarketSymbol
        _attributes: tools._attributes
        _language: tools._language
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-list-markets-entitled-notations
      description: Factset List of Markets With Entitled Notations.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-quotes-market.postnotationmarketlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
