naftiko: 1.0.0-alpha2
info:
  label: FactSet Estimates Report Builder — Cash Flow
  description: 'FactSet Estimates Report Builder — Cash Flow. 1 operations. Lead operation: Factset Cash Flow. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Cash Flow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: estimates-report-builder-cash-flow
    baseUri: https://api.factset.com/report/estimates/v1
    description: FactSet Estimates Report Builder — Cash Flow business capability. Self-contained, no shared references.
    resources:
    - name: cash-flow
      path: /cash-flow
      operations:
      - name: getestimatescashflow
        method: GET
        description: Factset Cash Flow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: estimates-report-builder-cash-flow-rest
    port: 8080
    description: REST adapter for FactSet Estimates Report Builder — Cash Flow. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/cash-flow
      name: cash-flow
      description: REST surface for cash-flow.
      operations:
      - method: GET
        name: getestimatescashflow
        description: Factset Cash Flow
        call: estimates-report-builder-cash-flow.getestimatescashflow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: estimates-report-builder-cash-flow-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Estimates Report Builder — Cash Flow. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-cash-flow
      description: Factset Cash Flow
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: estimates-report-builder-cash-flow.getestimatescashflow
      outputParameters:
      - type: object
        mapping: $.
