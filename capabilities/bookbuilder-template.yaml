naftiko: 1.0.0-alpha2
info:
  label: FactSet BookBuilder API — Template
  description: 'FactSet BookBuilder API — Template. 3 operations. Lead operation: Factset Kicks Off Request to Create a Book
    With Template. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Template
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: bookbuilder-template
    baseUri: https://api.factset.com/book-builder-api
    description: FactSet BookBuilder API — Template business capability. Self-contained, no shared references.
    resources:
    - name: v1-create-book-from-template
      path: /v1/create-book-from-template
      operations:
      - name: post
        method: POST
        description: Factset Kicks Off Request to Create a Book With Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-create-template
      path: /v1/create-template/
      operations:
      - name: post
        method: POST
        description: Factset Kick Off Request to Create Template With Reports of Your Choice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-template-list
      path: /v1/template-list
      operations:
      - name: get
        method: GET
        description: Factset Retrieves the List of Templates That Are Available
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: bookbuilder-template-rest
    port: 8080
    description: REST adapter for FactSet BookBuilder API — Template. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/create-book-from-template
      name: v1-create-book-from-template
      description: REST surface for v1-create-book-from-template.
      operations:
      - method: POST
        name: post
        description: Factset Kicks Off Request to Create a Book With Template
        call: bookbuilder-template.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/create-template
      name: v1-create-template
      description: REST surface for v1-create-template.
      operations:
      - method: POST
        name: post
        description: Factset Kick Off Request to Create Template With Reports of Your Choice
        call: bookbuilder-template.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/template-list
      name: v1-template-list
      description: REST surface for v1-template-list.
      operations:
      - method: GET
        name: get
        description: Factset Retrieves the List of Templates That Are Available
        call: bookbuilder-template.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bookbuilder-template-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet BookBuilder API — Template. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-kicks-off-request-create
      description: Factset Kicks Off Request to Create a Book With Template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookbuilder-template.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-kick-off-request-create
      description: Factset Kick Off Request to Create Template With Reports of Your Choice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookbuilder-template.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-retrieves-list-templates-that
      description: Factset Retrieves the List of Templates That Are Available
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bookbuilder-template.get
      outputParameters:
      - type: object
        mapping: $.
