naftiko: 1.0.0-alpha2
info:
  label: Factset Open:FactSet - Partners — Luxembourg
  description: 'Factset Open:FactSet - Partners — Luxembourg. 1 operations. Lead operation: Returns daily files from Open:FactSet
    Partner - Luxembourg. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Luxembourg
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-partners-documents-luxembourg
    baseUri: https://api.factset.com/bulk-documents/ofm/v2
    description: Factset Open:FactSet - Partners — Luxembourg business capability. Self-contained, no shared references.
    resources:
    - name: luxembourg-green-bonds-daily
      path: /luxembourg/green-bonds/daily
      operations:
      - name: getluxembourggreenbondsdaily
        method: GET
        description: Returns daily files from Open:FactSet Partner - Luxembourg
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: open-partners-documents-luxembourg-rest
    port: 8080
    description: REST adapter for Factset Open:FactSet - Partners — Luxembourg. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/luxembourg/green-bonds/daily
      name: luxembourg-green-bonds-daily
      description: REST surface for luxembourg-green-bonds-daily.
      operations:
      - method: GET
        name: getluxembourggreenbondsdaily
        description: Returns daily files from Open:FactSet Partner - Luxembourg
        call: open-partners-documents-luxembourg.getluxembourggreenbondsdaily
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-partners-documents-luxembourg-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Open:FactSet - Partners — Luxembourg. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: returns-daily-files-open-factset-partner
      description: Returns daily files from Open:FactSet Partner - Luxembourg
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-partners-documents-luxembourg.getluxembourggreenbondsdaily
      outputParameters:
      - type: object
        mapping: $.
