          type: string
          description: The code of the tenancy
          required: true
        - name: reportDefinitionCode
          in: path
          type: string
          description: The code of the report definition
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
