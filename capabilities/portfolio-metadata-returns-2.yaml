naftiko: 1.0.0-alpha2
info:
  label: Factset Portfolio Metadata — Returns
  description: 'Factset Portfolio Metadata — Returns. 1 operations. Lead operation: Returns. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Returns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-returns-2
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: Factset Portfolio Metadata — Returns business capability. Self-contained, no shared references.
    resources:
    - name: returns-id
      path: /returns/{id}
      operations:
      - name: readreturns
        method: GET
        description: Read a returns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the returns to be read
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-returns-2-rest
    port: 8080
    description: REST adapter for Factset Portfolio Metadata — Returns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/returns/{id}
      name: returns-id
      description: REST surface for returns-id.
      operations:
      - method: GET
        name: readreturns
        description: Read a returns
        call: portfolio-metadata-returns-2.readreturns
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-returns-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Portfolio Metadata — Returns. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: read-returns
      description: Read a returns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-returns-2.readreturns
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
