naftiko: 1.0.0-alpha2
info:
  label: Factset IRN API v1 — Teams
  description: 'Factset IRN API v1 — Teams. 2 operations. Lead operation: Factset Get all Teams. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-configuration-teams-2
    baseUri: https://api.factset.com/research/irn
    description: Factset IRN API v1 — Teams business capability. Self-contained, no shared references.
    resources:
    - name: v1-teams
      path: /v1/teams
      operations:
      - name: getteams
        method: GET
        description: Factset Get all Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-IRN-Ignore-Permissions
          in: header
          type: boolean
    - name: v1-teams-teamId
      path: /v1/teams/{teamId}
      operations:
      - name: getteam
        method: GET
        description: Factset Get Team details for the given Id provided
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: string
          description: Id
          required: true
        - name: X-IRN-Ignore-Permissions
          in: header
          type: boolean
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-configuration-teams-2-rest
    port: 8080
    description: REST adapter for Factset IRN API v1 — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/teams
      name: v1-teams
      description: REST surface for v1-teams.
      operations:
      - method: GET
        name: getteams
        description: Factset Get all Teams
        call: irn-configuration-teams-2.getteams
        with:
          X-IRN-Ignore-Permissions: rest.X-IRN-Ignore-Permissions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/teams/{teamid}
      name: v1-teams-teamid
      description: REST surface for v1-teams-teamId.
      operations:
      - method: GET
        name: getteam
        description: Factset Get Team details for the given Id provided
        call: irn-configuration-teams-2.getteam
        with:
          teamId: rest.teamId
          X-IRN-Ignore-Permissions: rest.X-IRN-Ignore-Permissions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-configuration-teams-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset IRN API v1 — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: factset-get-all-teams
      description: Factset Get all Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-teams-2.getteams
      with:
        X-IRN-Ignore-Permissions: tools.X-IRN-Ignore-Permissions
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-team-details-given
      description: Factset Get Team details for the given Id provided
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-configuration-teams-2.getteam
      with:
        teamId: tools.teamId
        X-IRN-Ignore-Permissions: tools.X-IRN-Ignore-Permissions
      outputParameters:
      - type: object
        mapping: $.
