naftiko: 1.0.0-alpha2
info:
  label: Factset Portfolio Metadata — Account
  description: 'Factset Portfolio Metadata — Account. 5 operations. Lead operation: Account. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-account-2
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: Factset Portfolio Metadata — Account business capability. Self-contained, no shared references.
    resources:
    - name: account
      path: /account
      operations:
      - name: createaccount
        method: POST
        description: Create a new account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listaccount
        method: GET
        description: List account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: query
          type: string
          description: Directory to list
        - name: name
          in: query
          type: string
          description: Return only files whose name includes this query
        - name: description
          in: query
          type: string
          description: Return only files whose name includes this query
        - name: _paginationLimit
          in: query
          type: number
          description: Number of directory items to return
        - name: _paginationCursor
          in: query
          type: string
          description: Cursor used for paging.  Fetch items after the specified cursor
    - name: account-id
      path: /account/{id}
      operations:
      - name: deleteaccount
        method: DELETE
        description: Remove a account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for the account to be deleted
          required: true
        - name: reason
          in: query
          type: string
          description: User auditable reason that the account is being removed
      - name: readaccount
        method: GET
        description: Read a account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the account to be read
          required: true
      - name: updateaccount
        method: PUT
        description: Modify a account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for the account to be updated
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-account-2-rest
    port: 8080
    description: REST adapter for Factset Portfolio Metadata — Account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/account
      name: account
      description: REST surface for account.
      operations:
      - method: POST
        name: createaccount
        description: Create a new account
        call: portfolio-metadata-account-2.createaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listaccount
        description: List account
        call: portfolio-metadata-account-2.listaccount
        with:
          path: rest.path
          name: rest.name
          description: rest.description
          _paginationLimit: rest._paginationLimit
          _paginationCursor: rest._paginationCursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account/{id}
      name: account-id
      description: REST surface for account-id.
      operations:
      - method: DELETE
        name: deleteaccount
        description: Remove a account
        call: portfolio-metadata-account-2.deleteaccount
        with:
          id: rest.id
          reason: rest.reason
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: readaccount
        description: Read a account
        call: portfolio-metadata-account-2.readaccount
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateaccount
        description: Modify a account
        call: portfolio-metadata-account-2.updateaccount
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-account-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Portfolio Metadata — Account. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-new-account
      description: Create a new account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portfolio-metadata-account-2.createaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-account
      description: List account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-account-2.listaccount
      with:
        path: tools.path
        name: tools.name
        description: tools.description
        _paginationLimit: tools._paginationLimit
        _paginationCursor: tools._paginationCursor
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-account
      description: Remove a account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: portfolio-metadata-account-2.deleteaccount
      with:
        id: tools.id
        reason: tools.reason
      outputParameters:
      - type: object
        mapping: $.
    - name: read-account
      description: Read a account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-account-2.readaccount
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: modify-account
      description: Modify a account
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portfolio-metadata-account-2.updateaccount
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
