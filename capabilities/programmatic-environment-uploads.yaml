naftiko: 1.0.0-alpha2
info:
  label: FactSet Programmatic Environment API — Uploads
  description: 'FactSet Programmatic Environment API — Uploads. 1 operations. Lead operation: Factset Get Upload Status by
    Id. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Uploads
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: programmatic-environment-uploads
    baseUri: https://api.factset.com
    description: FactSet Programmatic Environment API — Uploads business capability. Self-contained, no shared references.
    resources:
    - name: analytics-quant-fpe-v1-files-uploads-id
      path: /analytics/quant/fpe/v1/files/uploads/{id}
      operations:
      - name: get
        method: GET
        description: Factset Get Upload Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: From url, provided by location header or response body in the upload start endpoint
          required: true
  exposes:
  - type: rest
    namespace: programmatic-environment-uploads-rest
    port: 8080
    description: REST adapter for FactSet Programmatic Environment API — Uploads. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/quant/fpe/v1/files/uploads/{id}
      name: analytics-quant-fpe-v1-files-uploads-id
      description: REST surface for analytics-quant-fpe-v1-files-uploads-id.
      operations:
      - method: GET
        name: get
        description: Factset Get Upload Status by Id
        call: programmatic-environment-uploads.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: programmatic-environment-uploads-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Programmatic Environment API — Uploads. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-get-upload-status-id
      description: Factset Get Upload Status by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: programmatic-environment-uploads.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
