naftiko: 1.0.0-alpha2
info:
  label: FactSet Overview Report Builder API — Peer List
  description: 'FactSet Overview Report Builder API — Peer List. 1 operations. Lead operation: Factset Peer List. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Peer List
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: overview-report-builder-peer-list
    baseUri: https://api.factset.com/report/overview/v1
    description: FactSet Overview Report Builder API — Peer List business capability. Self-contained, no shared references.
    resources:
    - name: peer-list
      path: /peer-list
      operations:
      - name: get
        method: GET
        description: Factset Peer List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: Company ticker
          required: true
        - name: topn
          in: query
          type: number
          description: Limits the number of peers returned.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: overview-report-builder-peer-list-rest
    port: 8080
    description: REST adapter for FactSet Overview Report Builder API — Peer List. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/peer-list
      name: peer-list
      description: REST surface for peer-list.
      operations:
      - method: GET
        name: get
        description: Factset Peer List
        call: overview-report-builder-peer-list.get
        with:
          id: rest.id
          topn: rest.topn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: overview-report-builder-peer-list-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Overview Report Builder API — Peer List. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-peer-list
      description: Factset Peer List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: overview-report-builder-peer-list.get
      with:
        id: tools.id
        topn: tools.topn
      outputParameters:
      - type: object
        mapping: $.
