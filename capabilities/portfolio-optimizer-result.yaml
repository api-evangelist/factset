naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Optimizer API — Result
  description: 'FactSet Portfolio Optimizer API — Result. 1 operations. Lead operation: Factset Get Fpo Optimization Result
    by Id. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Result
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-optimizer-result
    baseUri: https://api.factset.com
    description: FactSet Portfolio Optimizer API — Result business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-fpo-v3-optimizations-id-result
      path: /analytics/engines/fpo/v3/optimizations/{id}/result
      operations:
      - name: getoptimizationresult
        method: GET
        description: Factset Get Fpo Optimization Result by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Get FPO optimization status by id endpoint
          required: true
        - name: Accept
          in: header
          type: string
          description: Standard HTTP header. Value can be gzip, compress, deflate, br, identity and/or *
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: portfolio-optimizer-result-rest
    port: 8080
    description: REST adapter for FactSet Portfolio Optimizer API — Result. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/fpo/v3/optimizations/{id}/result
      name: analytics-engines-fpo-v3-optimizations-id-result
      description: REST surface for analytics-engines-fpo-v3-optimizations-id-result.
      operations:
      - method: GET
        name: getoptimizationresult
        description: Factset Get Fpo Optimization Result by Id
        call: portfolio-optimizer-result.getoptimizationresult
        with:
          id: rest.id
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-optimizer-result-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Portfolio Optimizer API — Result. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-get-fpo-optimization-result
      description: Factset Get Fpo Optimization Result by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-optimizer-result.getoptimizationresult
      with:
        id: tools.id
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
