      - method: GET
        name: getfinancials
        description: Factset Returns Private Company Financials for a List of Ids.
        call: private-markets-private.getfinancials
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfinancialsforlist
        description: Factset Returns Private Company Financials for a List of Ids.
        call: private-markets-private.getfinancialsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
