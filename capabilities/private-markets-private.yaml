naftiko: 1.0.0-alpha2
info:
  label: FactSet Private Markets API — Private
  description: 'FactSet Private Markets API — Private. 7 operations. Lead operation: Factset Available Private Company Fields,
    Metrics, and Ratios.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Private
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: private-markets-private
    baseUri: https://api.factset.com/content
    description: FactSet Private Markets API — Private business capability. Self-contained, no shared references.
    resources:
    - name: factset-private-markets-v1-fields
      path: /factset-private-markets/v1/fields
      operations:
      - name: getfields
        method: GET
        description: Factset Available Private Company Fields, Metrics, and Ratios.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: factset-private-markets-v1-financials
      path: /factset-private-markets/v1/financials
      operations:
      - name: getfinancials
        method: GET
        description: Factset Returns Private Company Financials for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfinancialsforlist
        method: POST
        description: Factset Returns Private Company Financials for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: factset-private-markets-v1-non-periodic
      path: /factset-private-markets/v1/non-periodic
      operations:
      - name: getnonperiodic
        method: GET
        description: Factset Returns Private Company Reference Data for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getnonperiodicforlist
        method: POST
        description: Factset Returns Private Company Reference Data for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: factset-private-markets-v1-universe
      path: /factset-private-markets/v1/universe
      operations:
      - name: getuniverse
        method: GET
        description: Factset Get Entity Candidates and Matches for a Single Name and Attributes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getuniverseforlist
        method: POST
        description: Factset Get a List of Entity Candidates and Matches for a Requested List of up to 25 Names and Attributes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: private-markets-private-rest
    port: 8080
    description: REST adapter for FactSet Private Markets API — Private. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-private-markets/v1/fields
      name: factset-private-markets-v1-fields
      description: REST surface for factset-private-markets-v1-fields.
      operations:
      - method: GET
        name: getfields
        description: Factset Available Private Company Fields, Metrics, and Ratios.
        call: private-markets-private.getfields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/factset-private-markets/v1/financials
