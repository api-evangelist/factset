      operations:
      - method: GET
        name: getnonperiodic
        description: Factset Returns Private Company Reference Data for a List of Ids.
        call: private-markets-private.getnonperiodic
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getnonperiodicforlist
        description: Factset Returns Private Company Reference Data for a List of Ids.
        call: private-markets-private.getnonperiodicforlist
        with:
          body: rest.body
