naftiko: 1.0.0-alpha2
info:
  label: FactSet Overview Report Builder API — Profile
  description: 'FactSet Overview Report Builder API — Profile. 1 operations. Lead operation: Factset Overview Profile. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Profile
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: overview-report-builder-profile
    baseUri: https://api.factset.com/report/overview/v1
    description: FactSet Overview Report Builder API — Profile business capability. Self-contained, no shared references.
    resources:
    - name: profile
      path: /profile
      operations:
      - name: getprofileprofile
        method: GET
        description: Factset Overview Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: Company ticker
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: overview-report-builder-profile-rest
    port: 8080
    description: REST adapter for FactSet Overview Report Builder API — Profile. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/profile
      name: profile
      description: REST surface for profile.
      operations:
      - method: GET
        name: getprofileprofile
        description: Factset Overview Profile
        call: overview-report-builder-profile.getprofileprofile
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: overview-report-builder-profile-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Overview Report Builder API — Profile. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-overview-profile
      description: Factset Overview Profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: overview-report-builder-profile.getprofileprofile
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
