naftiko: 1.0.0-alpha2
info:
  label: FactSet Prices API — Market
  description: 'FactSet Prices API — Market. 2 operations. Lead operation: Factset Gets the Security Level and Company Level
    Market Values for a List of `ids` as of Given Date Range and Frequency.. Self-contained Naftiko capability covering one
    Factset business surface.'
  tags:
  - Factset
  - Market
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: prices-market
    baseUri: https://api.factset.com/content
    description: FactSet Prices API — Market business capability. Self-contained, no shared references.
    resources:
    - name: factset-prices-v1-market-value
      path: /factset-prices/v1/market-value
      operations:
      - name: getmarketvalue
        method: GET
        description: Factset Gets the Security Level and Company Level Market Values for a List of `ids` as of Given Date
          Range and Frequency.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getmarketvalueforlist
        method: POST
        description: Factset Requests the Market Value for a List of `ids` as of Given Date Range.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: prices-market-rest
    port: 8080
    description: REST adapter for FactSet Prices API — Market. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-prices/v1/market-value
      name: factset-prices-v1-market-value
      description: REST surface for factset-prices-v1-market-value.
      operations:
      - method: GET
        name: getmarketvalue
        description: Factset Gets the Security Level and Company Level Market Values for a List of `ids` as of Given Date
          Range and Frequency.
        call: prices-market.getmarketvalue
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getmarketvalueforlist
        description: Factset Requests the Market Value for a List of `ids` as of Given Date Range.
        call: prices-market.getmarketvalueforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prices-market-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Prices API — Market. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-gets-security-level-and
      description: Factset Gets the Security Level and Company Level Market Values for a List of `ids` as of Given Date Range
        and Frequency.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prices-market.getmarketvalue
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-requests-market-value-list
      description: Factset Requests the Market Value for a List of `ids` as of Given Date Range.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: prices-market.getmarketvalueforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
