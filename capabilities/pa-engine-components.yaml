naftiko: 1.0.0-alpha2
info:
  label: Factset PA Engine API — Components
  description: 'Factset PA Engine API — Components. 2 operations. Lead operation: Factset Get Pa Components. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Components
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: pa-engine-components
    baseUri: https://api.factset.com
    description: Factset PA Engine API — Components business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pa-v3-components
      path: /analytics/engines/pa/v3/components
      operations:
      - name: getpacomponents
        method: GET
        description: Factset Get Pa Components
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: document
          in: query
          type: string
          description: Document Name
          required: true
    - name: analytics-engines-pa-v3-components-id
      path: /analytics/engines/pa/v3/components/{id}
      operations:
      - name: getpacomponentbyid
        method: GET
        description: Factset Get Pa Component by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier for a PA component
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: pa-engine-components-rest
    port: 8080
    description: REST adapter for Factset PA Engine API — Components. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pa/v3/components
      name: analytics-engines-pa-v3-components
      description: REST surface for analytics-engines-pa-v3-components.
      operations:
      - method: GET
        name: getpacomponents
        description: Factset Get Pa Components
        call: pa-engine-components.getpacomponents
        with:
          document: rest.document
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/engines/pa/v3/components/{id}
      name: analytics-engines-pa-v3-components-id
      description: REST surface for analytics-engines-pa-v3-components-id.
      operations:
      - method: GET
        name: getpacomponentbyid
        description: Factset Get Pa Component by Id
        call: pa-engine-components.getpacomponentbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pa-engine-components-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset PA Engine API — Components. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-pa-components
      description: Factset Get Pa Components
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-components.getpacomponents
      with:
        document: tools.document
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-pa-component-id
      description: Factset Get Pa Component by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pa-engine-components.getpacomponentbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
