naftiko: 1.0.0-alpha2
info:
  label: FactSet Benchmarks API — Snapshots
  description: 'FactSet Benchmarks API — Snapshots. 2 operations. Lead operation: Factset Index Level Prices, Returns, and
    Related Information as of a Single Date.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Snapshots
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: benchmarks-snapshots
    baseUri: https://api.factset.com/content
    description: FactSet Benchmarks API — Snapshots business capability. Self-contained, no shared references.
    resources:
    - name: factset-benchmarks-v1-index-snapshot
      path: /factset-benchmarks/v1/index-snapshot
      operations:
      - name: getindexsnapshot
        method: GET
        description: Factset Index Level Prices, Returns, and Related Information as of a Single Date.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getindexsnapshotforlist
        method: POST
        description: Factset Retrieves the Index Level Snapshot of Prices and Returns Information for a Given Identifier and
          Single Date.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: benchmarks-snapshots-rest
    port: 8080
    description: REST adapter for FactSet Benchmarks API — Snapshots. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-benchmarks/v1/index-snapshot
      name: factset-benchmarks-v1-index-snapshot
      description: REST surface for factset-benchmarks-v1-index-snapshot.
      operations:
      - method: GET
        name: getindexsnapshot
        description: Factset Index Level Prices, Returns, and Related Information as of a Single Date.
        call: benchmarks-snapshots.getindexsnapshot
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getindexsnapshotforlist
        description: Factset Retrieves the Index Level Snapshot of Prices and Returns Information for a Given Identifier and
          Single Date.
        call: benchmarks-snapshots.getindexsnapshotforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: benchmarks-snapshots-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Benchmarks API — Snapshots. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-index-level-prices-returns
      description: Factset Index Level Prices, Returns, and Related Information as of a Single Date.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: benchmarks-snapshots.getindexsnapshot
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-retrieves-index-level-snapshot
      description: Factset Retrieves the Index Level Snapshot of Prices and Returns Information for a Given Identifier and
        Single Date.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: benchmarks-snapshots.getindexsnapshotforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
