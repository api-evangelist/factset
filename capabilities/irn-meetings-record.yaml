naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Meetings API — Record
  description: 'FactSet IRN Meetings API — Record. 1 operations. Lead operation: Factset Get Details of a Record Event of
    a Meeting. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Record
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-meetings-record
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Meetings API — Record business capability. Self-contained, no shared references.
    resources:
    - name: v1-meetings-meetingId-events-recordEventId
      path: /v1/meetings/{meetingId}/events/{recordEventId}
      operations:
      - name: getrecordevent
        method: GET
        description: Factset Get Details of a Record Event of a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          description: Meeting Id
          required: true
        - name: recordEventId
          in: path
          type: string
          description: Record Event Id
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: irn-meetings-record-rest
    port: 8080
    description: REST adapter for FactSet IRN Meetings API — Record. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/meetings/{meetingid}/events/{recordeventid}
      name: v1-meetings-meetingid-events-recordeventid
      description: REST surface for v1-meetings-meetingId-events-recordEventId.
      operations:
      - method: GET
        name: getrecordevent
        description: Factset Get Details of a Record Event of a Meeting
        call: irn-meetings-record.getrecordevent
        with:
          meetingId: rest.meetingId
          recordEventId: rest.recordEventId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-meetings-record-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Meetings API — Record. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-details-record-event
      description: Factset Get Details of a Record Event of a Meeting
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-meetings-record.getrecordevent
      with:
        meetingId: tools.meetingId
        recordEventId: tools.recordEventId
      outputParameters:
      - type: object
        mapping: $.
