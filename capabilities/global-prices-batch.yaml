naftiko: 1.0.0-alpha2
info:
  label: FactSet Global Prices API — Batch
  description: 'FactSet Global Prices API — Batch. 2 operations. Lead operation: Factset Returns the Response for a Batch
    Request. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Batch
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: global-prices-batch
    baseUri: https://api.factset.com/content
    description: FactSet Global Prices API — Batch business capability. Self-contained, no shared references.
    resources:
    - name: factset-global-prices-v1-batch-result
      path: /factset-global-prices/v1/batch-result
      operations:
      - name: getbatchdata
        method: GET
        description: Factset Returns the Response for a Batch Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: factset-global-prices-v1-batch-status
      path: /factset-global-prices/v1/batch-status
      operations:
      - name: getbatchstatus
        method: GET
        description: Factset Returns the Status for a Batch Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: global-prices-batch-rest
    port: 8080
    description: REST adapter for FactSet Global Prices API — Batch. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-global-prices/v1/batch-result
      name: factset-global-prices-v1-batch-result
      description: REST surface for factset-global-prices-v1-batch-result.
      operations:
      - method: GET
        name: getbatchdata
        description: Factset Returns the Response for a Batch Request
        call: global-prices-batch.getbatchdata
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/factset-global-prices/v1/batch-status
      name: factset-global-prices-v1-batch-status
      description: REST surface for factset-global-prices-v1-batch-status.
      operations:
      - method: GET
        name: getbatchstatus
        description: Factset Returns the Status for a Batch Request
        call: global-prices-batch.getbatchstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: global-prices-batch-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Global Prices API — Batch. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-returns-response-batch-request
      description: Factset Returns the Response for a Batch Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: global-prices-batch.getbatchdata
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-status-batch-request
      description: Factset Returns the Status for a Batch Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: global-prices-batch.getbatchstatus
      outputParameters:
      - type: object
        mapping: $.
