naftiko: 1.0.0-alpha2
info:
  label: FactSet Quant Engine API — Status
  description: 'FactSet Quant Engine API — Status. 1 operations. Lead operation: Factset Get Quant Engine Calculation Status
    by Id. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: quant-engine-status
    baseUri: https://api.factset.com/analytics/engines/quant/v3
    description: FactSet Quant Engine API — Status business capability. Self-contained, no shared references.
    resources:
    - name: calculations-id-status
      path: /calculations/{id}/status
      operations:
      - name: getcalculationstatusbyid
        method: GET
        description: Factset Get Quant Engine Calculation Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run Quant Engine calculation endpoint
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: quant-engine-status-rest
    port: 8080
    description: REST adapter for FactSet Quant Engine API — Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/calculations/{id}/status
      name: calculations-id-status
      description: REST surface for calculations-id-status.
      operations:
      - method: GET
        name: getcalculationstatusbyid
        description: Factset Get Quant Engine Calculation Status by Id
        call: quant-engine-status.getcalculationstatusbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quant-engine-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Quant Engine API — Status. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-quant-engine-calculation
      description: Factset Get Quant Engine Calculation Status by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quant-engine-status.getcalculationstatusbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
