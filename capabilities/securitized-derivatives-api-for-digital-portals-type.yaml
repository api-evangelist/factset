naftiko: 1.0.0-alpha2
info:
  label: FactSet Securitized Derivatives API for Digital Portals — Type
  description: 'FactSet Securitized Derivatives API for Digital Portals — Type. 1 operations. Lead operation: Factset List
    of Barrier Types.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Type
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: securitized-derivatives-api-for-digital-portals-type
    baseUri: https://api.factset.com/wealth/v1
    description: FactSet Securitized Derivatives API for Digital Portals — Type business capability. Self-contained, no shared
      references.
    resources:
    - name: securitizedDerivative-barrier-type-list
      path: /securitizedDerivative/barrier/type/list
      operations:
      - name: getsecuritizedderivativebarriertypelist
        method: GET
        description: Factset List of Barrier Types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: securitized-derivatives-api-for-digital-portals-type-rest
    port: 8080
    description: REST adapter for FactSet Securitized Derivatives API for Digital Portals — Type. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/securitizedderivative/barrier/type/list
      name: securitizedderivative-barrier-type-list
      description: REST surface for securitizedDerivative-barrier-type-list.
      operations:
      - method: GET
        name: getsecuritizedderivativebarriertypelist
        description: Factset List of Barrier Types.
        call: securitized-derivatives-api-for-digital-portals-type.getsecuritizedderivativebarriertypelist
        with:
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: securitized-derivatives-api-for-digital-portals-type-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Securitized Derivatives API for Digital Portals — Type. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: factset-list-barrier-types
      description: Factset List of Barrier Types.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: securitized-derivatives-api-for-digital-portals-type.getsecuritizedderivativebarriertypelist
      with:
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
