naftiko: 1.0.0-alpha2
info:
  label: FactSet Prices API — Splits
  description: 'FactSet Prices API — Splits. 2 operations. Lead operation: Factset Gets Full History of Security Splits for
    a List of `ids`. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Splits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: prices-splits
    baseUri: https://api.factset.com/content
    description: FactSet Prices API — Splits business capability. Self-contained, no shared references.
    resources:
    - name: factset-prices-v1-splits
      path: /factset-prices/v1/splits
      operations:
      - name: getsecuritysplits
        method: GET
        description: Factset Gets Full History of Security Splits for a List of `ids`
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsecuritysplitsforlist
        method: POST
        description: Factset Requests Splits for a List of `ids`
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: prices-splits-rest
    port: 8080
    description: REST adapter for FactSet Prices API — Splits. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-prices/v1/splits
      name: factset-prices-v1-splits
      description: REST surface for factset-prices-v1-splits.
      operations:
      - method: GET
        name: getsecuritysplits
        description: Factset Gets Full History of Security Splits for a List of `ids`
        call: prices-splits.getsecuritysplits
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getsecuritysplitsforlist
        description: Factset Requests Splits for a List of `ids`
        call: prices-splits.getsecuritysplitsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prices-splits-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Prices API — Splits. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-gets-full-history-security
      description: Factset Gets Full History of Security Splits for a List of `ids`
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prices-splits.getsecuritysplits
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-requests-splits-list-ids
      description: Factset Requests Splits for a List of `ids`
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: prices-splits.getsecuritysplitsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
