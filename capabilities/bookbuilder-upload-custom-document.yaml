naftiko: 1.0.0-alpha2
info:
  label: Factset BookBuilder — Upload Custom Document
  description: 'Factset BookBuilder — Upload Custom Document. 1 operations. Lead operation: Factset Upload a custom document.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Upload Custom Document
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: bookbuilder-upload-custom-document
    baseUri: https://api.factset.com/book-builder-api
    description: Factset BookBuilder — Upload Custom Document business capability. Self-contained, no shared references.
    resources:
    - name: v1-upload-custom-document
      path: /v1/upload-custom-document
      operations:
      - name: post
        method: POST
        description: Factset Upload a custom document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: bookbuilder-upload-custom-document-rest
    port: 8080
    description: REST adapter for Factset BookBuilder — Upload Custom Document. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/upload-custom-document
      name: v1-upload-custom-document
      description: REST surface for v1-upload-custom-document.
      operations:
      - method: POST
        name: post
        description: Factset Upload a custom document
        call: bookbuilder-upload-custom-document.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bookbuilder-upload-custom-document-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset BookBuilder — Upload Custom Document. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-upload-custom-document
      description: Factset Upload a custom document
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookbuilder-upload-custom-document.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
