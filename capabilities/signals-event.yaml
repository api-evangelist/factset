naftiko: 1.0.0-alpha2
info:
  label: FactSet Signals API — Event
  description: 'FactSet Signals API — Event. 1 operations. Lead operation: Event. Self-contained Naftiko capability covering
    one Factset business surface.'
  tags:
  - Factset
  - Event
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: signals-event
    baseUri: https://api.factset.com/signals/v2
    description: FactSet Signals API — Event business capability. Self-contained, no shared references.
    resources:
    - name: events-details-eventId
      path: /events/details/{eventId}
      operations:
      - name: geteventdetailbyid
        method: GET
        description: Fetch Signals event headlines plus all additional event details for a single requested Signal event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: signals-event-rest
    port: 8080
    description: REST adapter for FactSet Signals API — Event. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/events/details/{eventid}
      name: events-details-eventid
      description: REST surface for events-details-eventId.
      operations:
      - method: GET
        name: geteventdetailbyid
        description: Fetch Signals event headlines plus all additional event details for a single requested Signal event
        call: signals-event.geteventdetailbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signals-event-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Signals API — Event. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: fetch-signals-event-headlines-plus
      description: Fetch Signals event headlines plus all additional event details for a single requested Signal event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signals-event.geteventdetailbyid
      outputParameters:
      - type: object
        mapping: $.
