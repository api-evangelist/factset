          in: query
          type: array
          required: true
        - name: identifierType
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
