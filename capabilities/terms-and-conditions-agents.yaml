naftiko: 1.0.0-alpha2
info:
  label: FactSet Terms and Conditions API — Agents
  description: 'FactSet Terms and Conditions API — Agents. 2 operations. Lead operation: Factset Return Agents Items for a
    Fixed Income Security.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Agents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: terms-and-conditions-agents
    baseUri: https://api.factset.com/content
    description: FactSet Terms and Conditions API — Agents business capability. Self-contained, no shared references.
    resources:
    - name: factset-terms-and-conditions-v1-agents
      path: /factset-terms-and-conditions/v1/agents
      operations:
      - name: getagents
        method: GET
        description: Factset Return Agents Items for a Fixed Income Security.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getagentsforlist
        method: POST
        description: Factset Return Agents Items for a List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: terms-and-conditions-agents-rest
    port: 8080
    description: REST adapter for FactSet Terms and Conditions API — Agents. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/factset-terms-and-conditions/v1/agents
      name: factset-terms-and-conditions-v1-agents
      description: REST surface for factset-terms-and-conditions-v1-agents.
      operations:
      - method: GET
        name: getagents
        description: Factset Return Agents Items for a Fixed Income Security.
        call: terms-and-conditions-agents.getagents
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getagentsforlist
        description: Factset Return Agents Items for a List of Fixed Income Securities.
        call: terms-and-conditions-agents.getagentsforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terms-and-conditions-agents-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Terms and Conditions API — Agents. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-return-agents-items-fixed
      description: Factset Return Agents Items for a Fixed Income Security.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-agents.getagents
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-agents-items-list
      description: Factset Return Agents Items for a List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: terms-and-conditions-agents.getagentsforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
