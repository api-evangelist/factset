naftiko: "1.0.0-alpha1"

info:
  label: "FactSet Portfolio Optimization"
  description: "Unified workflow for portfolio optimization using multiple optimization engines including FactSet, Axioma, Barra, Northfield, and open risk models. Used by portfolio optimizers."
  tags:
    - FactSet
    - Portfolio Optimization
    - Risk Models
    - Asset Allocation
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      FACTSET_USERNAME: FACTSET_USERNAME
      FACTSET_PASSWORD: FACTSET_PASSWORD

capability:
  consumes:
    - import: factset-optimizer
      location: ./shared/portfolio-optimizer.yaml
    - import: factset-axioma-eq
      location: ./shared/axioma-equity-optimizer.yaml
    - import: factset-barra
      location: ./shared/barra-portfolio-optimizer.yaml
    - import: factset-northfield
      location: ./shared/northfield-portfolio-optimizer.yaml
    - import: factset-open-risk
      location: ./shared/open-risk.yaml

  exposes:
    - type: rest
      port: 8085
      namespace: portfolio-optimization-api
      description: "Unified REST API for portfolio optimization."
      resources:
        - path: /v1/optimize
          name: optimize
          description: "Portfolio optimization."
          operations:
            - method: GET
              name: list-optimizations
              description: "List optimizations."
              call: "factset-optimizer.list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/risk-models
          name: risk-models
          description: "Open risk models."
          operations:
            - method: GET
              name: list-risk-models
              description: "List risk models."
              call: "factset-open-risk.list"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9085
      namespace: portfolio-optimization-mcp
      transport: http
      description: "MCP server for AI-assisted portfolio optimization."
      tools:
        - name: factset-optimize
          description: "Run FactSet portfolio optimization."
          hints:
            readOnly: true
          call: "factset-optimizer.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: axioma-equity-optimize
          description: "Run Axioma equity optimization."
          hints:
            readOnly: true
          call: "factset-axioma-eq.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: barra-optimize
          description: "Run Barra optimization."
          hints:
            readOnly: true
          call: "factset-barra.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: northfield-optimize
          description: "Run Northfield optimization."
          hints:
            readOnly: true
          call: "factset-northfield.list"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-risk-models
          description: "Get open risk models."
          hints:
            readOnly: true
          call: "factset-open-risk.list"
          outputParameters:
            - type: object
              mapping: "$."
