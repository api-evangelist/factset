naftiko: 1.0.0-alpha2
info:
  label: Factset EMS API — Orders
  description: 'Factset EMS API — Orders. 3 operations. Lead operation: Factset Cancel the orders on EMS system.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: trading-orders
    baseUri: https://api.factset.com/trading/ems/v0
    description: Factset EMS API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders-cancel
      path: /orders/cancel
      operations:
      - name: cancel
        method: POST
        description: Factset Cancel the orders on EMS system.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: orders-create
      path: /orders/create
      operations:
      - name: create
        method: POST
        description: Factset Send orders to EMS for execution.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: orders-replace
      path: /orders/replace
      operations:
      - name: replace
        method: POST
        description: Factset Replace the orders on EMS system.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: trading-orders-rest
    port: 8080
    description: REST adapter for Factset EMS API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orders/cancel
      name: orders-cancel
      description: REST surface for orders-cancel.
      operations:
      - method: POST
        name: cancel
        description: Factset Cancel the orders on EMS system.
        call: trading-orders.cancel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/create
      name: orders-create
      description: REST surface for orders-create.
      operations:
      - method: POST
        name: create
        description: Factset Send orders to EMS for execution.
        call: trading-orders.create
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/replace
      name: orders-replace
      description: REST surface for orders-replace.
      operations:
      - method: POST
        name: replace
        description: Factset Replace the orders on EMS system.
        call: trading-orders.replace
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: trading-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset EMS API — Orders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: factset-cancel-orders-ems-system
      description: Factset Cancel the orders on EMS system.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trading-orders.cancel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-send-orders-ems-execution
      description: Factset Send orders to EMS for execution.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trading-orders.create
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-replace-orders-ems-system
      description: Factset Replace the orders on EMS system.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trading-orders.replace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
