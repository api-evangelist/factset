naftiko: 1.0.0-alpha2
info:
  label: FactSet IRN Notes API — Identifiers
  description: 'FactSet IRN Notes API — Identifiers. 1 operations. Lead operation: Factset Get All the Identifier Details
    for Given Identifiers. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Identifiers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: irn-notes-identifiers
    baseUri: https://api.factset.com/research/irn
    description: FactSet IRN Notes API — Identifiers business capability. Self-contained, no shared references.
    resources:
    - name: v1-identifiers
      path: /v1/identifiers
      operations:
      - name: getidentifiers
        method: GET
        description: Factset Get All the Identifier Details for Given Identifiers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifiers
          in: query
          type: string
          description: Identifiers
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: irn-notes-identifiers-rest
    port: 8080
    description: REST adapter for FactSet IRN Notes API — Identifiers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/identifiers
      name: v1-identifiers
      description: REST surface for v1-identifiers.
      operations:
      - method: GET
        name: getidentifiers
        description: Factset Get All the Identifier Details for Given Identifiers
        call: irn-notes-identifiers.getidentifiers
        with:
          identifiers: rest.identifiers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: irn-notes-identifiers-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet IRN Notes API — Identifiers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-get-all-identifier-details
      description: Factset Get All the Identifier Details for Given Identifiers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: irn-notes-identifiers.getidentifiers
      with:
        identifiers: tools.identifiers
      outputParameters:
      - type: object
        mapping: $.
