naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time News API — Media
  description: 'FactSet Real-Time News API — Media. 1 operations. Lead operation: Factset List News Articles Which Contain
    Media of Specific Media Kinds.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Media
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-news-media
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time News API — Media business capability. Self-contained, no shared references.
    resources:
    - name: news-article-listByMediaKind
      path: /news/article/listByMediaKind
      operations:
      - name: postnewsarticlelistbymediakind
        method: POST
        description: Factset List News Articles Which Contain Media of Specific Media Kinds.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-news-media-rest
    port: 8080
    description: REST adapter for FactSet Real-Time News API — Media. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/news/article/listbymediakind
      name: news-article-listbymediakind
      description: REST surface for news-article-listByMediaKind.
      operations:
      - method: POST
        name: postnewsarticlelistbymediakind
        description: Factset List News Articles Which Contain Media of Specific Media Kinds.
        call: real-time-news-media.postnewsarticlelistbymediakind
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-news-media-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time News API — Media. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-list-news-articles-which
      description: Factset List News Articles Which Contain Media of Specific Media Kinds.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: real-time-news-media.postnewsarticlelistbymediakind
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
