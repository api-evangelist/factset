naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Metadata API — Groups
  description: 'FactSet Portfolio Metadata API — Groups. 2 operations. Lead operation: Groups. Self-contained Naftiko capability
    covering one Factset business surface.'
  tags:
  - Factset
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-metadata-groups
    baseUri: https://api.factset.com/analytics/portfolio-metadata/v1
    description: FactSet Portfolio Metadata API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: user-defined-field-group
      path: /user-defined-field-group
      operations:
      - name: listuserdefinedfieldgroups
        method: GET
        description: List user defined groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Return only files whose name includes this query
        - name: _paginationLimit
          in: query
          type: number
          description: Number of groups to return
        - name: _paginationCursor
          in: query
          type: string
          description: Cursor used for paging.  Fetch items after the specified cursor
    - name: user-defined-field-group-id
      path: /user-defined-field-group/{id}
      operations:
      - name: readuserdefinedgroup
        method: GET
        description: Read a specific user defined field group and list its fields.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifer for the group to be read.
          required: true
        - name: _paginationLimit
          in: query
          type: number
          description: Number of fields to list from this group
        - name: _paginationCursor
          in: query
          type: string
          description: Cursor used for paging.  Fetch fields after the specified cursor
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: portfolio-metadata-groups-rest
    port: 8080
    description: REST adapter for FactSet Portfolio Metadata API — Groups. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/user-defined-field-group
      name: user-defined-field-group
      description: REST surface for user-defined-field-group.
      operations:
      - method: GET
        name: listuserdefinedfieldgroups
        description: List user defined groups
        call: portfolio-metadata-groups.listuserdefinedfieldgroups
        with:
          name: rest.name
          _paginationLimit: rest._paginationLimit
          _paginationCursor: rest._paginationCursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user-defined-field-group/{id}
      name: user-defined-field-group-id
      description: REST surface for user-defined-field-group-id.
      operations:
      - method: GET
        name: readuserdefinedgroup
        description: Read a specific user defined field group and list its fields.
        call: portfolio-metadata-groups.readuserdefinedgroup
        with:
          id: rest.id
          _paginationLimit: rest._paginationLimit
          _paginationCursor: rest._paginationCursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-metadata-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Portfolio Metadata API — Groups. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-user-defined-groups
      description: List user defined groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-groups.listuserdefinedfieldgroups
      with:
        name: tools.name
        _paginationLimit: tools._paginationLimit
        _paginationCursor: tools._paginationCursor
      outputParameters:
      - type: object
        mapping: $.
    - name: read-specific-user-defined-field
      description: Read a specific user defined field group and list its fields.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portfolio-metadata-groups.readuserdefinedgroup
      with:
        id: tools.id
        _paginationLimit: tools._paginationLimit
        _paginationCursor: tools._paginationCursor
      outputParameters:
      - type: object
        mapping: $.
