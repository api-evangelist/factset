naftiko: 1.0.0-alpha2
info:
  label: FactSet Private Markets API — Non
  description: 'FactSet Private Markets API — Non. 2 operations. Lead operation: Factset Returns Private Company Reference
    Data for a List of Ids.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Non
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: private-markets-non
    baseUri: https://api.factset.com/content
    description: FactSet Private Markets API — Non business capability. Self-contained, no shared references.
    resources:
    - name: factset-private-markets-v1-non-periodic
      path: /factset-private-markets/v1/non-periodic
      operations:
      - name: getnonperiodic
        method: GET
        description: Factset Returns Private Company Reference Data for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getnonperiodicforlist
        method: POST
        description: Factset Returns Private Company Reference Data for a List of Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: private-markets-non-rest
    port: 8080
    description: REST adapter for FactSet Private Markets API — Non. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/factset-private-markets/v1/non-periodic
      name: factset-private-markets-v1-non-periodic
      description: REST surface for factset-private-markets-v1-non-periodic.
      operations:
      - method: GET
        name: getnonperiodic
        description: Factset Returns Private Company Reference Data for a List of Ids.
        call: private-markets-non.getnonperiodic
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getnonperiodicforlist
        description: Factset Returns Private Company Reference Data for a List of Ids.
        call: private-markets-non.getnonperiodicforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: private-markets-non-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Private Markets API — Non. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-returns-private-company-reference
      description: Factset Returns Private Company Reference Data for a List of Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: private-markets-non.getnonperiodic
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-returns-private-company-reference-2
      description: Factset Returns Private Company Reference Data for a List of Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: private-markets-non.getnonperiodicforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
