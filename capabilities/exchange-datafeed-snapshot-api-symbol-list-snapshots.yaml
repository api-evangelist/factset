naftiko: 1.0.0-alpha2
info:
  label: FactSet Exchange DataFeed Snapshot API - Symbol List — Snapshots
  description: 'FactSet Exchange DataFeed Snapshot API - Symbol List — Snapshots. 2 operations. Lead operation: Factset Request
    a Snapshot of Exchange Data for a List of Symbols.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Snapshots
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: exchange-datafeed-snapshot-api-symbol-list-snapshots
    baseUri: https://api-sandbox.factset.com
    description: FactSet Exchange DataFeed Snapshot API - Symbol List — Snapshots business capability. Self-contained, no
      shared references.
    resources:
    - name: DFSnapshot
      path: /DFSnapshot
      operations:
      - name: getdfsnapshot
        method: GET
        description: Factset Request a Snapshot of Exchange Data for a List of Symbols.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postdfsnapshot
        method: POST
        description: Factset Snap Exchange Data. Use if Url Lengh of 2,048 Is Exceeded.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: exchange-datafeed-snapshot-api-symbol-list-snapshots-rest
    port: 8080
    description: REST adapter for FactSet Exchange DataFeed Snapshot API - Symbol List — Snapshots. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/dfsnapshot
      name: dfsnapshot
      description: REST surface for DFSnapshot.
      operations:
      - method: GET
        name: getdfsnapshot
        description: Factset Request a Snapshot of Exchange Data for a List of Symbols.
        call: exchange-datafeed-snapshot-api-symbol-list-snapshots.getdfsnapshot
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postdfsnapshot
        description: Factset Snap Exchange Data. Use if Url Lengh of 2,048 Is Exceeded.
        call: exchange-datafeed-snapshot-api-symbol-list-snapshots.postdfsnapshot
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: exchange-datafeed-snapshot-api-symbol-list-snapshots-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Exchange DataFeed Snapshot API - Symbol List — Snapshots. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: factset-request-snapshot-exchange-data
      description: Factset Request a Snapshot of Exchange Data for a List of Symbols.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exchange-datafeed-snapshot-api-symbol-list-snapshots.getdfsnapshot
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-snap-exchange-data-use
      description: Factset Snap Exchange Data. Use if Url Lengh of 2,048 Is Exceeded.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: exchange-datafeed-snapshot-api-symbol-list-snapshots.postdfsnapshot
      outputParameters:
      - type: object
        mapping: $.
