      operations:
      - name: getpacolumns
        method: GET
        description: Factset Get Pa Columns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Column name
        - name: category
          in: query
          type: string
          description: Column category
        - name: directory
          in: query
