naftiko: 1.0.0-alpha2
info:
  label: FactSet Bonds API for Digital Portals — Figures
  description: 'FactSet Bonds API for Digital Portals — Figures. 1 operations. Lead operation: Factset Key Figures of a Debt
    Instrument.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Figures
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: bonds-api-for-digital-portals-figures
    baseUri: https://api.factset.com/wealth/v1
    description: FactSet Bonds API for Digital Portals — Figures business capability. Self-contained, no shared references.
    resources:
    - name: debtInstrument-keyFigures-notation-get
      path: /debtInstrument/keyFigures/notation/get
      operations:
      - name: getdebtinstrumentkeyfiguresnotationget
        method: GET
        description: Factset Key Figures of a Debt Instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: bonds-api-for-digital-portals-figures-rest
    port: 8080
    description: REST adapter for FactSet Bonds API for Digital Portals — Figures. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/debtinstrument/keyfigures/notation/get
      name: debtinstrument-keyfigures-notation-get
      description: REST surface for debtInstrument-keyFigures-notation-get.
      operations:
      - method: GET
        name: getdebtinstrumentkeyfiguresnotationget
        description: Factset Key Figures of a Debt Instrument.
        call: bonds-api-for-digital-portals-figures.getdebtinstrumentkeyfiguresnotationget
        with:
          id: rest.id
          _attributes: rest._attributes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bonds-api-for-digital-portals-figures-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Bonds API for Digital Portals — Figures. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-key-figures-debt-instrument
      description: Factset Key Figures of a Debt Instrument.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bonds-api-for-digital-portals-figures.getdebtinstrumentkeyfiguresnotationget
      with:
        id: tools.id
        _attributes: tools._attributes
      outputParameters:
      - type: object
        mapping: $.
