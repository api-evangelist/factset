naftiko: 1.0.0-alpha2
info:
  label: FactSet Funds API — Summary
  description: 'FactSet Funds API — Summary. 2 operations. Lead operation: Factset Get Basic Reference Summary Data for a
    Fund.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Summary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: funds-summary
    baseUri: https://api.factset.com/content
    description: FactSet Funds API — Summary business capability. Self-contained, no shared references.
    resources:
    - name: factset-funds-v1-summary
      path: /factset-funds/v1/summary
      operations:
      - name: getfundssummary
        method: GET
        description: Factset Get Basic Reference Summary Data for a Fund.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getfundssummaryforlist
        method: POST
        description: Factset Get Basic Reference Data for a Large List of Fund Ids.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: funds-summary-rest
    port: 8080
    description: REST adapter for FactSet Funds API — Summary. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/factset-funds/v1/summary
      name: factset-funds-v1-summary
      description: REST surface for factset-funds-v1-summary.
      operations:
      - method: GET
        name: getfundssummary
        description: Factset Get Basic Reference Summary Data for a Fund.
        call: funds-summary.getfundssummary
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getfundssummaryforlist
        description: Factset Get Basic Reference Data for a Large List of Fund Ids.
        call: funds-summary.getfundssummaryforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: funds-summary-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Funds API — Summary. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-basic-reference-summary
      description: Factset Get Basic Reference Summary Data for a Fund.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: funds-summary.getfundssummary
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-basic-reference-data
      description: Factset Get Basic Reference Data for a Large List of Fund Ids.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: funds-summary.getfundssummaryforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
