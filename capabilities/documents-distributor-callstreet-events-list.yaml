naftiko: 1.0.0-alpha2
info:
  label: FactSet Documents Distributor - CallStreet Events — List
  description: 'FactSet Documents Distributor - CallStreet Events — List. 2 operations. Lead operation: Factset Returns the
    Latest Transcript Snippets From an Active Call.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - List
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: documents-distributor-callstreet-events-list
    baseUri: https://api.factset.com
    description: FactSet Documents Distributor - CallStreet Events — List business capability. Self-contained, no shared references.
    resources:
    - name: bulk-documents-nrt-v1-list-snippets
      path: /bulk-documents/nrt/v1/list-snippets
      operations:
      - name: getbulkdocumentsnrtv1listsnippets
        method: GET
        description: Factset Returns the Latest Transcript Snippets From an Active Call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: docs-distributor-audio-v1-list-files
      path: /docs-distributor/audio/v1/list-files
      operations:
      - name: getdocsdistributoraudiov1listfiles
        method: GET
        description: Retrieve Latest Audio Recordings and Related Metadata Within Factset Coverage.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _sort
          in: query
          type: string
          description: Sorts results in chronological order, reverse chronological order and by uploadTime(latest uploaded
            first). Results are in reverse chronological order by defaul
        - name: _paginationLimit
          in: query
          type: integer
          description: Specifies the number of results to return per page. [ Min=0 ; Max=500 ]
        - name: startDate
          in: query
          type: string
          description: 'Used in conjuction with endDate. The earliest date of the audio file the API should fetch for (can
            be in absolute: **YYYY-MM-DD** or relative date: **-1** for y'
        - name: _paginationOffset
          in: query
          type: integer
          description: Specifies the starting point for pagination. This parameter is used to identify the beginning of next
            set of results.
        - name: endDate
          in: query
          type: string
          description: 'Used in conjuction with startDate. The latest date of the audio file the API should fetch for (can
            be in absolute: **YYYY-MM-DD** or relative date: **0** for to'
        - name: reportId
          in: query
          type: integer
          description: Unique identifier for fetching the audio file for an event. The same ID is used for the transcript
            of the same event.
        - name: audioSourceId
          in: query
          type: integer
          description: Unique ID for an Internal recording specific to reportID. For example, ReportID X would have multiple
            recordings from different source (phone or webcast or vend
        - name: ids
          in: query
          type: array
          description: This parameter filters the results based on ticker-region or Entity ID or the combination of both.
            A comma is used to separate each identifier.
        - name: sourceCode
          in: query
          type: string
          description: This parameter filters the results based on Source of the Audio file. Below are the descriptions for
            each Source Code -
        - name: fileName
          in: query
          type: string
          description: This parameter is used to filter the data on based on the file name.
        - name: trimmed
          in: query
          type: boolean
          description: This parameters helps to search trimmed audio files.
        - name: uploadTime
          in: query
          type: integer
          description: This parameter filters data based on uploadTime relative to the current time, in hours. For example:-
            uploadTime = -15 (fetches audio files between 15 hours ago
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: documents-distributor-callstreet-events-list-rest
    port: 8080
    description: REST adapter for FactSet Documents Distributor - CallStreet Events — List. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/bulk-documents/nrt/v1/list-snippets
      name: bulk-documents-nrt-v1-list-snippets
      description: REST surface for bulk-documents-nrt-v1-list-snippets.
      operations:
      - method: GET
        name: getbulkdocumentsnrtv1listsnippets
        description: Factset Returns the Latest Transcript Snippets From an Active Call.
        call: documents-distributor-callstreet-events-list.getbulkdocumentsnrtv1listsnippets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/docs-distributor/audio/v1/list-files
      name: docs-distributor-audio-v1-list-files
      description: REST surface for docs-distributor-audio-v1-list-files.
      operations:
      - method: GET
        name: getdocsdistributoraudiov1listfiles
        description: Retrieve Latest Audio Recordings and Related Metadata Within Factset Coverage.
        call: documents-distributor-callstreet-events-list.getdocsdistributoraudiov1listfiles
        with:
          _sort: rest._sort
          _paginationLimit: rest._paginationLimit
          startDate: rest.startDate
          _paginationOffset: rest._paginationOffset
          endDate: rest.endDate
          reportId: rest.reportId
          audioSourceId: rest.audioSourceId
          ids: rest.ids
          sourceCode: rest.sourceCode
          fileName: rest.fileName
          trimmed: rest.trimmed
          uploadTime: rest.uploadTime
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: documents-distributor-callstreet-events-list-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Documents Distributor - CallStreet Events — List. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: factset-returns-latest-transcript-snippets
      description: Factset Returns the Latest Transcript Snippets From an Active Call.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: documents-distributor-callstreet-events-list.getbulkdocumentsnrtv1listsnippets
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-latest-audio-recordings-and
      description: Retrieve Latest Audio Recordings and Related Metadata Within Factset Coverage.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: documents-distributor-callstreet-events-list.getdocsdistributoraudiov1listfiles
      with:
        _sort: tools._sort
        _paginationLimit: tools._paginationLimit
        startDate: tools.startDate
        _paginationOffset: tools._paginationOffset
        endDate: tools.endDate
        reportId: tools.reportId
        audioSourceId: tools.audioSourceId
        ids: tools.ids
        sourceCode: tools.sourceCode
        fileName: tools.fileName
        trimmed: tools.trimmed
        uploadTime: tools.uploadTime
      outputParameters:
      - type: object
        mapping: $.
