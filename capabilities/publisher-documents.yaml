naftiko: 1.0.0-alpha2
info:
  label: FactSet Publisher API — Documents
  description: 'FactSet Publisher API — Documents. 1 operations. Lead operation: Factset Gets Publisher Documents and Sub-directories
    in a Directory. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Documents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: publisher-documents
    baseUri: https://api.factset.com
    description: FactSet Publisher API — Documents business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-pub-v3-documents-path
      path: /analytics/engines/pub/v3/documents/{path}
      operations:
      - name: getpubdocuments
        method: GET
        description: Factset Gets Publisher Documents and Sub-directories in a Directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: The directory to get the documents in
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: publisher-documents-rest
    port: 8080
    description: REST adapter for FactSet Publisher API — Documents. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/engines/pub/v3/documents/{path}
      name: analytics-engines-pub-v3-documents-path
      description: REST surface for analytics-engines-pub-v3-documents-path.
      operations:
      - method: GET
        name: getpubdocuments
        description: Factset Gets Publisher Documents and Sub-directories in a Directory
        call: publisher-documents.getpubdocuments
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: publisher-documents-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Publisher API — Documents. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-gets-publisher-documents-and
      description: Factset Gets Publisher Documents and Sub-directories in a Directory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: publisher-documents.getpubdocuments
      with:
        path: tools.path
      outputParameters:
      - type: object
        mapping: $.
