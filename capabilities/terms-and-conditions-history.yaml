naftiko: 1.0.0-alpha2
info:
  label: FactSet Terms and Conditions API — History
  description: 'FactSet Terms and Conditions API — History. 4 operations. Lead operation: Factset Return Convertible History
    Data for a List of Fixed Income Securities.. Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - History
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: terms-and-conditions-history
    baseUri: https://api.factset.com/content
    description: FactSet Terms and Conditions API — History business capability. Self-contained, no shared references.
    resources:
    - name: factset-terms-and-conditions-v1-convertible-history
      path: /factset-terms-and-conditions/v1/convertible-history
      operations:
      - name: getconvertiblehistory
        method: GET
        description: Factset Return Convertible History Data for a List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getconvertiblehistoryforlist
        method: POST
        description: Factset Return Convertible History Data for a Large List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: factset-terms-and-conditions-v1-coupon-history
      path: /factset-terms-and-conditions/v1/coupon-history
      operations:
      - name: getcouponhistory
        method: GET
        description: Factset Return Historical Coupon Information for a Fixed Income Security.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getcouponhistoryforlist
        method: POST
        description: Factset Return Historical Coupon Information for a List of Fixed Income Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: terms-and-conditions-history-rest
    port: 8080
    description: REST adapter for FactSet Terms and Conditions API — History. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/factset-terms-and-conditions/v1/convertible-history
      name: factset-terms-and-conditions-v1-convertible-history
      description: REST surface for factset-terms-and-conditions-v1-convertible-history.
      operations:
      - method: GET
        name: getconvertiblehistory
        description: Factset Return Convertible History Data for a List of Fixed Income Securities.
        call: terms-and-conditions-history.getconvertiblehistory
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getconvertiblehistoryforlist
        description: Factset Return Convertible History Data for a Large List of Fixed Income Securities.
        call: terms-and-conditions-history.getconvertiblehistoryforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/factset-terms-and-conditions/v1/coupon-history
      name: factset-terms-and-conditions-v1-coupon-history
      description: REST surface for factset-terms-and-conditions-v1-coupon-history.
      operations:
      - method: GET
        name: getcouponhistory
        description: Factset Return Historical Coupon Information for a Fixed Income Security.
        call: terms-and-conditions-history.getcouponhistory
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: getcouponhistoryforlist
        description: Factset Return Historical Coupon Information for a List of Fixed Income Securities.
        call: terms-and-conditions-history.getcouponhistoryforlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terms-and-conditions-history-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Terms and Conditions API — History. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-return-convertible-history-data
      description: Factset Return Convertible History Data for a List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-history.getconvertiblehistory
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-convertible-history-data-2
      description: Factset Return Convertible History Data for a Large List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: terms-and-conditions-history.getconvertiblehistoryforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-historical-coupon-information
      description: Factset Return Historical Coupon Information for a Fixed Income Security.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: terms-and-conditions-history.getcouponhistory
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-return-historical-coupon-information-2
      description: Factset Return Historical Coupon Information for a List of Fixed Income Securities.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: terms-and-conditions-history.getcouponhistoryforlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
