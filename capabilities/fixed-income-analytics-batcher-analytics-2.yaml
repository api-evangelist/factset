naftiko: 1.0.0-alpha2
info:
  label: Factset FIAB API — Analytics
  description: 'Factset FIAB API — Analytics. 3 operations. Lead operation: Factset Run FIAB calculation. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fixed-income-analytics-batcher-analytics-2
    baseUri: https://api-sandbox.factset.com
    description: Factset FIAB API — Analytics business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-fiab-v1-calculations
      path: /analytics/engines/fiab/v1/calculations
      operations:
      - name: runfiabcalculation
        method: POST
        description: Factset Run FIAB calculation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getfiabcalculationstatussummaries
        method: GET
        description: Factset Get all FIAB calculation summaries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics-engines-fiab-v1-calculations-id
      path: /analytics/engines/fiab/v1/calculations/{id}
      operations:
      - name: getfiabcalculationbyid
        method: GET
        description: Factset Get FIAB calculation by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Run FIAB Calculation endpoint
          required: true
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: fixed-income-analytics-batcher-analytics-2-rest
    port: 8080
    description: REST adapter for Factset FIAB API — Analytics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/analytics/engines/fiab/v1/calculations
      name: analytics-engines-fiab-v1-calculations
      description: REST surface for analytics-engines-fiab-v1-calculations.
      operations:
      - method: POST
        name: runfiabcalculation
        description: Factset Run FIAB calculation
        call: fixed-income-analytics-batcher-analytics-2.runfiabcalculation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getfiabcalculationstatussummaries
        description: Factset Get all FIAB calculation summaries
        call: fixed-income-analytics-batcher-analytics-2.getfiabcalculationstatussummaries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/engines/fiab/v1/calculations/{id}
      name: analytics-engines-fiab-v1-calculations-id
      description: REST surface for analytics-engines-fiab-v1-calculations-id.
      operations:
      - method: GET
        name: getfiabcalculationbyid
        description: Factset Get FIAB calculation by id
        call: fixed-income-analytics-batcher-analytics-2.getfiabcalculationbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fixed-income-analytics-batcher-analytics-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset FIAB API — Analytics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-run-fiab-calculation
      description: Factset Run FIAB calculation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fixed-income-analytics-batcher-analytics-2.runfiabcalculation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-all-fiab-calculation
      description: Factset Get all FIAB calculation summaries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fixed-income-analytics-batcher-analytics-2.getfiabcalculationstatussummaries
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-fiab-calculation-id
      description: Factset Get FIAB calculation by id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fixed-income-analytics-batcher-analytics-2.getfiabcalculationbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
