naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio Optimizer API — Analytics
  description: 'FactSet Portfolio Optimizer API — Analytics. 9 operations. Lead operation: Factset Create and Run Fpo Optimization.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-optimizer-analytics
    baseUri: https://api.factset.com
    description: FactSet Portfolio Optimizer API — Analytics business capability. Self-contained, no shared references.
    resources:
    - name: analytics-engines-fpo-v3-optimizations
      path: /analytics/engines/fpo/v3/optimizations
      operations:
      - name: postandoptimize
        method: POST
        description: Factset Create and Run Fpo Optimization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-FactSet-Api-Long-Running-Deadline
          in: header
          type: integer
          description: Long running deadline in seconds.
        - name: Cache-Control
          in: header
          type: string
          description: Standard HTTP header.  Accepts no-cache, no-store, max-age, max-stale.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: analytics-engines-fpo-v3-optimizations-id
      path: /analytics/engines/fpo/v3/optimizations/{id}
      operations:
      - name: putandoptimize
        method: PUT
        description: Factset Create or Update Fpo Optimization and Run It.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run FPO optimization endpoint
          required: true
        - name: X-FactSet-Api-Long-Running-Deadline
          in: header
          type: integer
          description: Long running deadline in seconds.
        - name: Cache-Control
          in: header
          type: string
          description: Standard HTTP header.  Accepts no-cache, no-store, max-age, max-stale.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getoptimizationparameters
        method: GET
        description: Factset Get Fpo Optimization Parameters by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run FPO optimization endpoint
          required: true
      - name: canceloptimizationbyid
        method: DELETE
        description: Factset Cancel Fpo Optimization by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run FPO optimization endpoint
          required: true
    - name: analytics-engines-fpo-v3-optimizations-id-result
      path: /analytics/engines/fpo/v3/optimizations/{id}/result
      operations:
      - name: getoptimizationresult
        method: GET
        description: Factset Get Fpo Optimization Result by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Get FPO optimization status by id endpoint
          required: true
        - name: Accept
          in: header
          type: string
          description: Standard HTTP header. Value can be gzip, compress, deflate, br, identity and/or *
    - name: analytics-engines-fpo-v3-optimizations-id-status
      path: /analytics/engines/fpo/v3/optimizations/{id}/status
      operations:
      - name: getoptimizationstatusbyid
        method: GET
        description: Factset Get Fpo Optimization Status by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: from url, provided from the location header in the Create and Run FPO optimization endpoint
          required: true
    - name: analytics-engines-fpo-v3-strategies-path
      path: /analytics/engines/fpo/v3/strategies/{path}
      operations:
      - name: getfpostrategydocuments
        method: GET
        description: Get Factset Portfolio Optimizer Strategy Documents and Sub-directories in a Directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: The directory to get the strategy documents and sub-directories in
          required: true
    - name: analytics-lookups-v3-accounts-path
      path: /analytics/lookups/v3/accounts/{path}
      operations:
      - name: getaccounts
        method: GET
        description: Factset Get Accounts and Sub-directories in a Directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: path
          type: string
          description: The directory to get the accounts and sub-directories in
          required: true
    - name: analytics-lookups-v3-currencies
      path: /analytics/lookups/v3/currencies
      operations:
      - name: getcurrencies
        method: GET
        description: Factset Get Currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
