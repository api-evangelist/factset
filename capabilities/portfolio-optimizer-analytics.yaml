        call: portfolio-optimizer-analytics.getoptimizationresult
        with:
          id: rest.id
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/engines/fpo/v3/optimizations/{id}/status
      name: analytics-engines-fpo-v3-optimizations-id-status
      description: REST surface for analytics-engines-fpo-v3-optimizations-id-status.
      operations:
      - method: GET
        name: getoptimizationstatusbyid
        description: Factset Get Fpo Optimization Status by Id
        call: portfolio-optimizer-analytics.getoptimizationstatusbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/engines/fpo/v3/strategies/{path}
      name: analytics-engines-fpo-v3-strategies-path
      description: REST surface for analytics-engines-fpo-v3-strategies-path.
      operations:
      - method: GET
        name: getfpostrategydocuments
        description: Get Factset Portfolio Optimizer Strategy Documents and Sub-directories in a Directory
        call: portfolio-optimizer-analytics.getfpostrategydocuments
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/lookups/v3/accounts/{path}
      name: analytics-lookups-v3-accounts-path
      description: REST surface for analytics-lookups-v3-accounts-path.
      operations:
      - method: GET
        name: getaccounts
        description: Factset Get Accounts and Sub-directories in a Directory
        call: portfolio-optimizer-analytics.getaccounts
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/lookups/v3/currencies
      name: analytics-lookups-v3-currencies
      description: REST surface for analytics-lookups-v3-currencies.
      operations:
      - method: GET
        name: getcurrencies
        description: Factset Get Currencies
        call: portfolio-optimizer-analytics.getcurrencies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portfolio-optimizer-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Portfolio Optimizer API — Analytics. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
