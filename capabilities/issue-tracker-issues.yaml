naftiko: 1.0.0-alpha2
info:
  label: Factset Issue Tracker API — Issues
  description: 'Factset Issue Tracker API — Issues. 3 operations. Lead operation: Factset Creates a Issue Tracker issue. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Issues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: issue-tracker-issues
    baseUri: https://api.factset.com/issue-tracker/v1
    description: Factset Issue Tracker API — Issues business capability. Self-contained, no shared references.
    resources:
    - name: issues
      path: /issues
      operations:
      - name: postissue
        method: POST
        description: Factset Creates a Issue Tracker issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: issues-id
      path: /issues/{id}
      operations:
      - name: getissue
        method: GET
        description: Factset Get the matched issue details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of Issue Tracker issue
          required: true
    - name: issues-id-comments
      path: /issues/{id}/comments
      operations:
      - name: postreply
        method: POST
        description: Factset post comment to Issue Tracker issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of Issue Tracker issue
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: issue-tracker-issues-rest
    port: 8080
    description: REST adapter for Factset Issue Tracker API — Issues. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/issues
      name: issues
      description: REST surface for issues.
      operations:
      - method: POST
        name: postissue
        description: Factset Creates a Issue Tracker issue
        call: issue-tracker-issues.postissue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issues/{id}
      name: issues-id
      description: REST surface for issues-id.
      operations:
      - method: GET
        name: getissue
        description: Factset Get the matched issue details
        call: issue-tracker-issues.getissue
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issues/{id}/comments
      name: issues-id-comments
      description: REST surface for issues-id-comments.
      operations:
      - method: POST
        name: postreply
        description: Factset post comment to Issue Tracker issue
        call: issue-tracker-issues.postreply
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issue-tracker-issues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Issue Tracker API — Issues. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: factset-creates-issue-tracker-issue
      description: Factset Creates a Issue Tracker issue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issue-tracker-issues.postissue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-matched-issue-details
      description: Factset Get the matched issue details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issue-tracker-issues.getissue
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-post-comment-issue-tracker
      description: Factset post comment to Issue Tracker issue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issue-tracker-issues.postreply
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
