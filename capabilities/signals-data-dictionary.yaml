naftiko: 1.0.0-alpha2
info:
  label: Factset Signals API — Data Dictionary
  description: 'Factset Signals API — Data Dictionary. 2 operations. Lead operation: Data Dictionary. Self-contained Naftiko
    capability covering one Factset business surface.'
  tags:
  - Factset
  - Data Dictionary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: signals-data-dictionary
    baseUri: https://api.factset.com/signals/v2
    description: Factset Signals API — Data Dictionary business capability. Self-contained, no shared references.
    resources:
    - name: data-dictionary
      path: /data-dictionary
      operations:
      - name: getdatadictionary
        method: GET
        description: Fetch a list of all active signals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: data-dictionary-signalId
      path: /data-dictionary/{signalId}
      operations:
      - name: getdatadictionarybyid
        method: GET
        description: Fetch the metadata and contract for the requested signal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: signals-data-dictionary-rest
    port: 8080
    description: REST adapter for Factset Signals API — Data Dictionary. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/data-dictionary
      name: data-dictionary
      description: REST surface for data-dictionary.
      operations:
      - method: GET
        name: getdatadictionary
        description: Fetch a list of all active signals
        call: signals-data-dictionary.getdatadictionary
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data-dictionary/{signalid}
      name: data-dictionary-signalid
      description: REST surface for data-dictionary-signalId.
      operations:
      - method: GET
        name: getdatadictionarybyid
        description: Fetch the metadata and contract for the requested signal
        call: signals-data-dictionary.getdatadictionarybyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signals-data-dictionary-mcp
    port: 9090
    transport: http
    description: MCP adapter for Factset Signals API — Data Dictionary. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: fetch-list-all-active-signals
      description: Fetch a list of all active signals
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signals-data-dictionary.getdatadictionary
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-metadata-and-contract-requested
      description: Fetch the metadata and contract for the requested signal
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signals-data-dictionary.getdatadictionarybyid
      outputParameters:
      - type: object
        mapping: $.
