naftiko: 1.0.0-alpha2
info:
  label: FactSet Portfolio — Models
  description: 'FactSet Portfolio — Models. 9 operations. Lead operation: Factset Create or Update an Existing Model Account.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: portfolio-models
    baseUri: https://api.factset.com
    description: FactSet Portfolio — Models business capability. Self-contained, no shared references.
    resources:
    - name: analytics-accounts-v3-models-name
      path: /analytics/accounts/v3/models/{name}
      operations:
      - name: createorupdatemodelaccount
        method: PUT
        description: Factset Create or Update an Existing Model Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The path and filename of the model account to create or update
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteamodelaccount
        method: DELETE
        description: Factset Delete Model Account, Takes an Account Path and Name and Deletes It.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The path and filename of model account to delete
          required: true
      - name: getaccount
        method: GET
        description: Factset Get Account Endpoint, Takes an Account Name and Returns Underlying Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The path and filename of the account to get
          required: true
        - name: format
          in: query
          type: string
          description: Optional format for the response, supported formats are JsonStach and AccountModel
    - name: analytics-accounts-v3-models-name-dates-date
      path: /analytics/accounts/v3/models/{name}/dates/{date}
      operations:
      - name: deletemodelaccountbydate
        method: DELETE
        description: Factset Delete All Entries for a Date or Specific Symbol Entries for a Date From a Previously Created
          Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The filename of model account to delete
          required: true
        - name: date
          in: path
          type: string
          description: The date from the given file name to delete
          required: true
        - name: symbols
          in: query
          type: array
          description: The symbols from the given file name and date to delete (Maximum 10 symbols are allowed)
      - name: getaccountfordate
        method: GET
        description: Factset Get Account Endpoint, Takes an Account Name, Date and Returns Underlying Data for That Date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The path and filename of the account to get
          required: true
        - name: date
          in: path
          type: string
          description: The date for which data needs to be updated
          required: true
        - name: format
          in: query
          type: string
          description: Optional format for the response, supported formats are JsonStach and AccountModel
    - name: analytics-accounts-v3-models-name-dates-date-symbols-symbol
      path: /analytics/accounts/v3/models/{name}/dates/{date}/symbols/{symbol}
      operations:
      - name: getaccountfordateandsymbol
        method: GET
        description: Factset Get Account Endpoint, Takes an Account Name and Returns Underlying Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The path and filename of the account to get
          required: true
        - name: symbol
          in: path
          type: string
          description: The symbol for which data needs to be updated
          required: true
        - name: date
          in: path
          type: string
          description: The date for which data needs to be updated
          required: true
        - name: format
          in: query
          type: string
          description: Optional format for the response, supported formats are JsonStach and AccountModel
    - name: analytics-accounts-v3-models-name-schema
      path: /analytics/accounts/v3/models/{name}/schema
      operations:
      - name: getaccountschema
        method: GET
        description: Factset Get Account Schema Endpoint, Takes an Account Name and Returns Its Schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The path and filename of the account to get its schema
          required: true
    - name: analytics-accounts-v3-models-name-symbols-symbol
      path: /analytics/accounts/v3/models/{name}/symbols/{symbol}
      operations:
      - name: deletemodelaccountbysymbol
        method: DELETE
        description: Factset Delete All Entries for a Symbol or Specific Date Entries for a Symbol From a Previously Created
          Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The filename of model account to delete
          required: true
        - name: symbol
          in: path
          type: string
          description: The symbol from the given file name to delete
          required: true
        - name: dates
          in: query
          type: array
          description: The dates from the given file name and symbol to delete (Maximum 10 dates are allowed)
      - name: getaccountforsymbol
        method: GET
        description: Factset Get Account Endpoint, Takes an Account Name, Symbol and Returns Underlying Data for That Symbol
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The path and filename of the account to get
          required: true
        - name: symbol
          in: path
          type: string
          description: The symbol for which data needs to be updated
          required: true
        - name: format
          in: query
          type: string
          description: Optional format for the response, supported formats are JsonStach and AccountModel
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
