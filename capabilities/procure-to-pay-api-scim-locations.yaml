naftiko: 1.0.0-alpha2
info:
  label: FactSet SCIM API — Locations
  description: 'FactSet SCIM API — Locations. 4 operations. Lead operation: Factset Get a list of locations.. Self-contained
    Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Locations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: procure-to-pay-api-scim-locations
    baseUri: https://api.factset.com/scim/v2
    description: FactSet SCIM API — Locations business capability. Self-contained, no shared references.
    resources:
    - name: Locations
      path: /Locations
      operations:
      - name: get
        method: GET
        description: Factset Get a list of locations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: Locations-id
      path: /Locations/{id}
      operations:
      - name: get
        method: GET
        description: Factset Get a location.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put
        method: PUT
        description: Factset Replace a location.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: patch
        method: PATCH
        description: Factset Patch a location (add, replace, or remove attributes of a location.)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: procure-to-pay-api-scim-locations-rest
    port: 8080
    description: REST adapter for FactSet SCIM API — Locations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/locations
      name: locations
      description: REST surface for Locations.
      operations:
      - method: GET
        name: get
        description: Factset Get a list of locations.
        call: procure-to-pay-api-scim-locations.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/locations/{id}
      name: locations-id
      description: REST surface for Locations-id.
      operations:
      - method: GET
        name: get
        description: Factset Get a location.
        call: procure-to-pay-api-scim-locations.get
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Factset Replace a location.
        call: procure-to-pay-api-scim-locations.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Factset Patch a location (add, replace, or remove attributes of a location.)
        call: procure-to-pay-api-scim-locations.patch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: procure-to-pay-api-scim-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet SCIM API — Locations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: factset-get-list-locations
      description: Factset Get a list of locations.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procure-to-pay-api-scim-locations.get
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-get-location
      description: Factset Get a location.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procure-to-pay-api-scim-locations.get
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-replace-location
      description: Factset Replace a location.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: procure-to-pay-api-scim-locations.put
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: factset-patch-location-add-replace
      description: Factset Patch a location (add, replace, or remove attributes of a location.)
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: procure-to-pay-api-scim-locations.patch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
