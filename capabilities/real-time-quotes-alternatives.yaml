naftiko: 1.0.0-alpha2
info:
  label: FactSet Real-Time Quotes API — Alternatives
  description: 'FactSet Real-Time Quotes API — Alternatives. 1 operations. Lead operation: Factset List of Alternative Units..
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Alternatives
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: real-time-quotes-alternatives
    baseUri: https://api.factset.com/wealth/v3
    description: FactSet Real-Time Quotes API — Alternatives business capability. Self-contained, no shared references.
    resources:
    - name: basic-valueUnit-alternative-list
      path: /basic/valueUnit/alternative/list
      operations:
      - name: getbasicvalueunitalternativelist
        method: GET
        description: Factset List of Alternative Units.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _attributes
          in: query
          type: array
          description: Limit the attributes returned in the response to the specified set.
        - name: _language
          in: query
          type: string
        - name: _sort
          in: query
          type: array
          description: Sortable attributes. The sort order is ascending unless it is prefixed with a minus sign, in which
            case it is descending. A list of at most 1 (possibly prefixed
    authentication:
      type: bearer
      token: '{{env.FACTSET_API_KEY}}'
  exposes:
  - type: rest
    namespace: real-time-quotes-alternatives-rest
    port: 8080
    description: REST adapter for FactSet Real-Time Quotes API — Alternatives. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/basic/valueunit/alternative/list
      name: basic-valueunit-alternative-list
      description: REST surface for basic-valueUnit-alternative-list.
      operations:
      - method: GET
        name: getbasicvalueunitalternativelist
        description: Factset List of Alternative Units.
        call: real-time-quotes-alternatives.getbasicvalueunitalternativelist
        with:
          _attributes: rest._attributes
          _language: rest._language
          _sort: rest._sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: real-time-quotes-alternatives-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Real-Time Quotes API — Alternatives. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: factset-list-alternative-units
      description: Factset List of Alternative Units.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: real-time-quotes-alternatives.getbasicvalueunitalternativelist
      with:
        _attributes: tools._attributes
        _language: tools._language
        _sort: tools._sort
      outputParameters:
      - type: object
        mapping: $.
