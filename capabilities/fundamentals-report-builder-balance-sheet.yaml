naftiko: 1.0.0-alpha2
info:
  label: FactSet Fundamentals Report Builder — Balance Sheet
  description: 'FactSet Fundamentals Report Builder — Balance Sheet. 1 operations. Lead operation: Factset Balance Sheet.
    Self-contained Naftiko capability covering one Factset business surface.'
  tags:
  - Factset
  - Balance Sheet
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACTSET_API_KEY: FACTSET_API_KEY
capability:
  consumes:
  - type: http
    namespace: fundamentals-report-builder-balance-sheet
    baseUri: https://api.factset.com/report/financials/v1
    description: FactSet Fundamentals Report Builder — Balance Sheet business capability. Self-contained, no shared references.
    resources:
    - name: balance-sheet
      path: /balance-sheet
      operations:
      - name: getfinancialsbalancesheet
        method: GET
        description: Factset Balance Sheet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FACTSET_USER}}'
      password: '{{env.FACTSET_PASS}}'
  exposes:
  - type: rest
    namespace: fundamentals-report-builder-balance-sheet-rest
    port: 8080
    description: REST adapter for FactSet Fundamentals Report Builder — Balance Sheet. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/balance-sheet
      name: balance-sheet
      description: REST surface for balance-sheet.
      operations:
      - method: GET
        name: getfinancialsbalancesheet
        description: Factset Balance Sheet
        call: fundamentals-report-builder-balance-sheet.getfinancialsbalancesheet
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fundamentals-report-builder-balance-sheet-mcp
    port: 9090
    transport: http
    description: MCP adapter for FactSet Fundamentals Report Builder — Balance Sheet. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: factset-balance-sheet
      description: Factset Balance Sheet
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fundamentals-report-builder-balance-sheet.getfinancialsbalancesheet
      outputParameters:
      - type: object
        mapping: $.
