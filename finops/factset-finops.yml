specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Factset
providerId: factset
publisherName: FactSet Research Systems Inc.
serviceCategory: Financial Data / Investment Analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial
  - Financial Data
  - Investment Analytics
  - Market Data
  - Portfolio Analytics
  - Research
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for FactSet: cost is dominated by negotiated annual contracts covering
  workstation seats, API entitlements, the Programmatic Environment add-on, real-time data feeds, and
  Open FactSet Marketplace partner data. There is no per-API-call list price; consumption is observed
  via the FactSet entitlement record, usage reports, and Programmatic Environment activity exports.'
notes: FactSet does not publish list prices. Reconcile FinOps values from the active FactSet contract
  and Programmatic Environment usage reports.
sources:
  - https://developer.factset.com/
  - https://www.factset.com/pricing
principles:
  - name: Visibility
    description: Pull Programmatic Environment usage reports and entitlement records from the FactSet
      developer portal; track per-API call counts, per-batch job counts, and real-time stream uptime
      per service account.
  - name: Allocation
    description: Allocate by service account / OAuth client (one per consuming team or product); allocate
      workstation seats to named users; allocate batch / Programmatic Environment usage by submitted
      job tags.
  - name: Optimization
    description: Cache reference data (Symbology, Classifications, Concordance, Entity API) aggressively
      since they change slowly; batch analytics via the Batcher APIs and Quant Engine instead of running
      one-off PA jobs; consolidate real-time feeds (one entitled stream consumed by multiple internal
      apps); avoid duplicate ESG/Estimates pulls across teams.
  - name: Accountability
    description: FactSet entitlement owner (typically Investment Operations / Data Strategy) owns contract
      cost; per-team owners own service account usage; Quarterly Business Reviews with FactSet to true
      up to actual usage and adjust seat counts.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Subscription + Programmatic Environment Commitment + Add-on Data Feeds
  billingFrequency: Annual (with optional quarterly true-up)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Tax
  chargeFrequency: Recurring
focusColumns:
  ServiceName: FactSet
  ServiceCategory: Financial Data / Investment Analytics
  ProviderName: FactSet
  PublisherName: FactSet Research Systems Inc.
  InvoiceIssuerName: FactSet Research Systems Inc.
  PricingCategory: Subscription + Add-on
  PricingUnit: seat | API call | streaming feed
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: workstation_seats
    description: Active FactSet workstation seats.
    unit: seat
    aggregation: max
    dimensions:
      - business_unit
      - product
  - name: api_calls
    description: Synchronous API requests to FactSet APIs (Formula, Prices, Fundamentals, Estimates, ESG,
      etc.).
    unit: call
    aggregation: sum
    dimensions:
      - service_account
      - api
      - endpoint
  - name: batch_jobs
    description: Batch / Quant Engine / Optimization Engine / Batcher API job submissions.
    unit: job
    aggregation: sum
    dimensions:
      - service_account
      - api
      - job_size
  - name: real_time_streams
    description: Real-time feed connections (Real-Time Quotes, News, Options/Futures, Direct Streaming).
    unit: stream
    aggregation: max
    dimensions:
      - feed
      - exchange
  - name: programmatic_commitment
    description: Programmatic Environment annual commitment $.
    unit: USD
    aggregation: sum
    dimensions:
      - year
apis:
  - name: FactSet Developer Portal APIs
    baseURL: https://api.factset.com
    tags:
      - Analytics
      - Estimates
      - Fundamentals
      - Market Data
      - News
      - Portfolio
      - Real-Time
    serviceName: FactSet Developer Portal APIs
    serviceCategory: API
unitEconomics:
  - name: Cost per Workstation Seat / year
    metric: total_subscription_cost / workstation_seats
    target: contract-dependent
  - name: Cost per 1M API calls
    metric: programmatic_environment_cost / (api_calls / 1000000)
    target: contract-dependent
  - name: Programmatic Environment true-up variance
    metric: (actual_calls - committed) / committed
    target: minimize positive variance
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
