overlay: 1.0.0
info:
  title: API Evangelist enhancements for FactSet Concordance API
  version: 1.0.0
extends: openapi/factset-factset-concordance-api-openapi.yml
actions:
- target: $.info
  update:
    x-apievangelist:
      provider: factset
      repo: https://github.com/api-evangelist/factset
      conventions: conventions/factset-conventions.yml
      errors: errors/factset-problem-types.yml
      authentication: authentication/factset-authentication.yml
      rate-limits: rate-limits/factset-rate-limits.yml
      skills: skills/_index.yml
      mcp: mcp/factset-mcp.yml
- target: $
  update:
    x-agentic-access-profile: agentic-access/factset-agentic-access.yml
