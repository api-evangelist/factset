- type: Features
  data:
  - name: Multi-asset class analytics covering equities, fixed income, derivatives, and alternatives
  - name: Real-time and delayed market data from global exchanges
  - name: Portfolio analytics with performance attribution, risk, and optimization
  - name: Entity concordance and symbology mapping across identifier systems
  - name: ESG scoring and sustainability data with SASB and SFDR compliance
  - name: Natural language processing for financial text analysis
  - name: Quantitative factor library and screening tools
  - name: Investment research notes and meeting management (IRN)
  - name: Report builder APIs for presentation-ready financial data
  - name: Exchange datafeed and tick history for market microstructure analysis
- type: UseCases
  data:
  - name: Portfolio managers analyzing multi-asset class performance and risk attribution
  - name: Quantitative analysts building and backtesting factor-based investment strategies
  - name: Research analysts concording entity identifiers and enriching company data
  - name: Compliance teams monitoring ESG scores and regulatory reporting requirements
  - name: Trading desks accessing real-time prices and executing orders programmatically
  - name: Data engineers building automated financial data pipelines and reports
  - name: Wealth managers generating client-facing portfolio reports and analytics
- type: Integrations
  data:
  - name: Excel and Office add-ins for direct data access in spreadsheets
  - name: Python SDK for programmatic data retrieval and analysis
  - name: R SDK for statistical computing and quantitative research
  - name: Java SDK for enterprise application integration
  - name: MCP (Model Context Protocol) for AI assistant integration
  - name: Snowflake connector for cloud data warehouse analytics
  - name: Open FactSet Marketplace for third-party content and applications
