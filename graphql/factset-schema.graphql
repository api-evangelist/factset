  returnOnAssets: Float
  returnOnCapital: Float
  grossMargin: Float
  operatingMargin: Float
  netMargin: Float
  revenueGrowth: Float
  epsGrowth: Float
  dividendYield: Float
  payoutRatio: Float
  bookValuePerShare: Float
  earningsPerShare: Float
  freeCashFlowPerShare: Float
