# ─────────────────────────────────────────────
# Economic / Macro Types
# ─────────────────────────────────────────────

"""A macroeconomic indicator time series"""
type EconomicIndicator {
  id: ID!
  name: String!
  description: String
  country: String!
  frequency: Frequency!
  unit: String
  source: String
  series(startDate: Date, endDate: Date): [EconomicDataPoint!]
}

"""A single data point in an economic indicator series"""
type EconomicDataPoint {
  indicatorId: ID!
  date: Date!
  value: Float!
  revisedValue: Float
  isRevised: Boolean!
}

# ─────────────────────────────────────────────
# Search & Reference Types
# ─────────────────────────────────────────────

"""Search result for a security lookup"""
type SecuritySearchResult {
  securityId: ID!
  ticker: String!
  name: String!
  exchange: String
  currency: CurrencyCode!
  type: SecurityType!
  country: String
  score: Float
}

"""Pagination metadata"""
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int
}

"""Paginated list of securities"""
type SecurityConnection {
  edges: [SecurityEdge!]!
  pageInfo: PageInfo!
}

"""Edge in a security connection"""
type SecurityEdge {
  cursor: String!
  node: Security!
}

# ─────────────────────────────────────────────
# PA Engine / Calculation Types
# ─────────────────────────────────────────────

"""A portfolio analytics calculation job"""
type Calculation {
  id: ID!
  status: CalculationStatus!
  createdAt: DateTime!
  completedAt: DateTime
  parameters: JSON
  results: CalculationResult
}

"""Result of a portfolio analytics calculation"""
type CalculationResult {
  calculationId: ID!
  columns: [String!]!
  rows: [[JSON]]
  metadata: JSON
}

# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────

"""Input for searching securities"""
input SecuritySearchInput {
  query: String
  type: SecurityType
  exchange: ExchangeType
  country: String
  sector: String
  currency: CurrencyCode
  limit: Int
  offset: Int
  sortBy: String
  sortOrder: SortOrder
}

"""Input for price history requests"""
input PriceHistoryInput {
  securityIds: [ID!]!
  startDate: Date!
  endDate: Date!
  frequency: Frequency
  priceType: PriceType
  currency: CurrencyCode
}

"""Input for portfolio creation"""
input CreatePortfolioInput {
  name: String!
  description: String
  currency: CurrencyCode!
  benchmarkId: String
  holdings: [PortfolioHoldingInput!]!
}

"""Input for a single portfolio holding"""
input PortfolioHoldingInput {
  securityId: ID!
  weight: Float!
  marketValue: Float
}

# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type Query {
  """Retrieve a security by its FactSet ID, ISIN, CUSIP, SEDOL, or ticker"""
  security(id: ID, ticker: String, isin: String, cusip: String, sedol: String): Security

  """Search for securities matching given criteria"""
  searchSecurities(input: SecuritySearchInput!): SecurityConnection!

  """Retrieve real-time quote data for one or more tickers"""
  realTimeQuotes(tickers: [String!]!): [RealTimeQuote!]!

  """Retrieve end-of-day price history for a set of securities"""
  priceHistory(input: PriceHistoryInput!): [Price!]!

  """Retrieve fundamentals for a security"""
  fundamentals(securityId: ID!): Fundamentals

  """Retrieve financial statements for a security"""
  financialStatements(securityId: ID!, periods: Int): FinancialStatements

  """Retrieve earnings estimates for a security"""
  earningsEstimates(securityId: ID!, periods: Int): [EarningsEstimate!]!

  """Retrieve analyst estimates from individual analysts"""
  analystEstimates(securityId: ID!, fiscalYear: Int): [AnalystEstimate!]!

  """Retrieve institutional ownership data for a security"""
  institutionalHolders(securityId: ID!, asOfDate: Date, limit: Int): [InstitutionalHolder!]!

  """Retrieve insider transactions for a security"""
  insiderTransactions(securityId: ID!, startDate: Date, endDate: Date): [InsiderTransaction!]!

  """Retrieve ESG scores for a security"""
  esgScores(securityId: ID!, provider: String): ESGScores

  """Retrieve ESG benchmark data for an industry"""
  esgBenchmark(industry: String!, asOfDate: Date): ESGBenchmark

  """Retrieve analyst ratings for a security"""
  analystRatings(securityId: ID!, limit: Int): [AnalystRating!]!

  """Retrieve consensus rating summary for a security"""
  consensusRating(securityId: ID!, asOfDate: Date): ConsensusRating

  """Retrieve a market index by ID or ticker"""
  marketIndex(id: ID, ticker: String): MarketIndex

  """Retrieve a list of available market indices"""
  marketIndices(country: String, provider: String, limit: Int): [MarketIndex!]!

  """Retrieve a portfolio by ID"""
  portfolio(id: ID!): Portfolio

  """Retrieve all portfolios for the authenticated user"""
  portfolios: [Portfolio!]!

  """Retrieve a portfolio analytics calculation"""
  calculation(id: ID!): Calculation

  """Retrieve a bond by ISIN or CUSIP"""
  bond(isin: String, cusip: String): Bond

  """Retrieve an economic indicator series"""
  economicIndicator(id: ID!): EconomicIndicator

  """Search economic indicators by country or keyword"""
  economicIndicators(country: String, query: String): [EconomicIndicator!]!

  """Retrieve credit ratings for a bond or issuer"""
  creditRatings(bondId: ID, securityId: ID): [CreditRating!]!

  """Retrieve dividends for a security"""
  dividends(securityId: ID!, startDate: Date, endDate: Date): [Dividend!]!

  """Retrieve a company profile"""
  companyProfile(securityId: ID!): CompanyProfile

  """Retrieve available exchanges"""
  exchanges(country: String): [Exchange!]!
}

type Mutation {
  """Create a new portfolio for analytics"""
  createPortfolio(input: CreatePortfolioInput!): Portfolio!

  """Update an existing portfolio's holdings"""
  updatePortfolioHoldings(id: ID!, holdings: [PortfolioHoldingInput!]!): Portfolio!

  """Delete a portfolio"""
  deletePortfolio(id: ID!): Boolean!

  """Submit a portfolio analytics calculation"""
  submitCalculation(portfolioId: ID!, parameters: JSON): Calculation!

  """Cancel a running calculation"""
  cancelCalculation(id: ID!): Calculation!
}

type Subscription {
  """Subscribe to real-time price updates for a set of tickers"""
  priceUpdates(tickers: [String!]!): RealTimeQuote!

  """Subscribe to calculation status changes"""
  calculationStatus(id: ID!): Calculation!
}
