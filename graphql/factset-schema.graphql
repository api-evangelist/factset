"""
FactSet GraphQL API Schema
Derived from FactSet REST API covering securities data, pricing, fundamentals,
earnings estimates, ownership data, ESG scores, and portfolio analytics.
"""

scalar Date
scalar DateTime
scalar Float
scalar JSON

# ─────────────────────────────────────────────
# Enumerations
# ─────────────────────────────────────────────

enum CurrencyCode {
  USD
  EUR
  GBP
  JPY
  CAD
  AUD
  CHF
  HKD
  SGD
  SEK
  NOK
  DKK
  NZD
  MXN
  BRL
  INR
  CNY
  KRW
  ZAR
  OTHER
}

enum Frequency {
  DAILY
  WEEKLY
  MONTHLY
  QUARTERLY
  SEMI_ANNUAL
  ANNUAL
}

enum PriceType {
  ADJUSTED
  UNADJUSTED
}

enum SecurityType {
  EQUITY
  FIXED_INCOME
  ETF
  MUTUAL_FUND
  INDEX
  DERIVATIVE
  CURRENCY
  COMMODITY
  OTHER
}

enum ExchangeType {
  NYSE
  NASDAQ
  LSE
  TSX
  ASX
  HKEX
  SSE
  TSE
  EURONEXT
  OTHER
}

enum ESGCategory {
  ENVIRONMENTAL
  SOCIAL
  GOVERNANCE
  COMBINED
}

enum RatingAction {
  UPGRADE
  DOWNGRADE
  INITIATION
  REITERATION
  SUSPENDED
}

enum OwnershipType {
  INSTITUTIONAL
  INSIDER
  MUTUAL_FUND
  ETF
  HEDGE_FUND
}

enum CalculationStatus {
  QUEUED
  EXECUTING
  COMPLETED
  CANCELLED
  FAILED
}

enum SortOrder {
  ASC
  DESC
}

# ─────────────────────────────────────────────
# Core Security Types
# ─────────────────────────────────────────────

"""A financial security (equity, bond, ETF, etc.)"""
type Security {
  id: ID!
  ticker: String!
  isin: String
  cusip: String
  sedol: String
  figi: String
  name: String!
  type: SecurityType!
  exchange: Exchange
  currency: CurrencyCode!
  country: String
  sector: String
  industry: String
  subIndustry: String
  isActive: Boolean!
  marketCap: Float
  sharesOutstanding: Float
  price: Price
  priceHistory(
    startDate: Date!
    endDate: Date!
    frequency: Frequency
    priceType: PriceType
  ): [Price!]
  fundamentals: Fundamentals
  earningsEstimates: [EarningsEstimate!]
  dividends(startDate: Date, endDate: Date): [Dividend!]
  ownership: OwnershipSummary
  esgScores: ESGScores
  analystRatings: [AnalystRating!]
  companyProfile: CompanyProfile
  financialStatements: FinancialStatements
}

"""A stock exchange or trading venue"""
type Exchange {
  id: ID!
  code: String!
  name: String!
  country: String!
  currency: CurrencyCode!
  timezone: String
  type: ExchangeType!
  micCode: String
  openTime: String
  closeTime: String
}

# ─────────────────────────────────────────────
# Pricing Types
# ─────────────────────────────────────────────

"""Real-time or end-of-day price data for a security"""
type Price {
  securityId: ID!
  date: Date!
  open: Float
  high: Float
  low: Float
  close: Float!
  adjustedClose: Float
  volume: Float
  vwap: Float
  currency: CurrencyCode!
  priceType: PriceType!
  splitFactor: Float
  dividendFactor: Float
}

"""Real-time quote data"""
type RealTimeQuote {
  securityId: ID!
  ticker: String!
  bidPrice: Float
  askPrice: Float
  lastPrice: Float!
  lastSize: Float
  bidSize: Float
  askSize: Float
  timestamp: DateTime!
  exchange: String
  condition: String
  currency: CurrencyCode!
  change: Float
  changePercent: Float
  fiftyTwoWeekHigh: Float
  fiftyTwoWeekLow: Float
}

