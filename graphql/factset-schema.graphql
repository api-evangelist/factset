  fiscalPeriod: String!
  reportDate: Date!
  currency: CurrencyCode!
  totalAssets: Float
  currentAssets: Float
  cashAndEquivalents: Float
  shortTermInvestments: Float
  accountsReceivable: Float
  inventory: Float
  totalLiabilities: Float
  currentLiabilities: Float
  accountsPayable: Float
  shortTermDebt: Float
  longTermDebt: Float
  totalDebt: Float
  shareholdersEquity: Float
  retainedEarnings: Float
  commonStock: Float
  totalCapital: Float
}

"""Cash flow statement data"""
type CashFlowStatement {
  securityId: ID!
  fiscalYear: Int!
  fiscalPeriod: String!
  reportDate: Date!
  currency: CurrencyCode!
