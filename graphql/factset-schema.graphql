"""Portfolio performance metrics"""
type PortfolioPerformance {
  portfolioId: ID!
  startDate: Date!
  endDate: Date!
  returnTotal: Float!
  returnAnnualized: Float
  benchmarkReturn: Float
  alpha: Float
  beta: Float
  sharpeRatio: Float
  sortinoRatio: Float
  informationRatio: Float
  trackingError: Float
