              meta:
                type: object
                description: The meta member contains the meta information of the response.
                properties:
                  status:
                    $ref: '#/components/schemas/StatusObject'
                x-property-sort:
                - status
    GetPortfolioTransactionList200Response:
      description: Successful Response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                description: List of transactions.
                nullable: false
                type: array
                items:
                  type: object
                  nullable: false
                  x-property-sort:
                  - id
                  - instrument
                  - notation
                  - type
                  - time
                  - numberShares
                  - price
                  - charges
                  - exchangeRate
                  properties:
                    id:
                      nullable: true
                      type: string
                      format: id64
                      x-positive: true
                      description: Identifier of transaction.
                    instrument:
                      nullable: false
                      type: object
                      x-property-sort:
                      - id
                      - name
                      - shortName
                      - isin
                      - assetClass
                      - type
                      description: Details of the instrument
                      properties:
