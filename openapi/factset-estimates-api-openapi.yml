  parameters:
    periodicity:
      name: periodicity
      in: query
      required: false
      schema:
        type: string
        enum:
        - ANN
        - QTR
        - SEMI
        - NTMA
        - LTMA
        default: ANN
      description: "The periodicity for the estimates requested, allowing you to fetch Quarterly, Semi-Annual, Annual, and NTMA/LTMA Estimates.\n  * **ANN** - Annual\n  * **QTR** - Quarterly\n  * **SEMI** - Semi-Annual \n  * **NTMA** - Next-Twelve-Months - Time-weighted Annual. Estimates use a percentage of annual estimates from two fiscal years to create an estimate based on the 12-month period. Visit [OA 16614](https://my.apps.factset.com/oa/pages/16614)\nfor detail.\n  * **LTMA** - Last-Twelve-Months - Time-weighted Annual. Estimates use a percentage of annual estimates from two fiscal years to create an estimate based on the 12-month period. Visit [OA 16614](https://my.apps.factset.com/oa/pages/16614)\nfor detail.\n  \n"
    estimateMetrics:
      name: metrics
      in: query
      required: true
      explode: false
      description: Requested list of estimate metrics. Common estimate items include FF_EST_SALES, FF_EST_EPS, FF_EST_EBITDA, FF_EST_NET_INC. Use the `/metrics` endpoint for a complete list of available estimate items.
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 1600
      examples:
        epsEstimates:
          summary: EPS and sales estimates
          value:
          - FF_EST_EPS
          - FF_EST_SALES
    fiscalPeriodEnd_2:
      name: fiscalPeriodEnd
      in: query
      required: false
      description: The fiscal period end expressed as YYYY-MM-DD. Calendar date that will fall back to the most recently completed period during resolution.
      schema:
        type: string
        format: date
        examples:
        - '2024-01-01'
    statistic:
      name: statistic
      in: query
      required: false
      schema:
        type: string
        enum:
        - MEAN
        - MEDIAN
        - HIGH
        - LOW
        - COUNT
        - STDDEV
        default: MEAN
      description: Statistic for consensus calculation.
    ids:
      name: ids
      in: query
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 3000
      required: true
      explode: false
      description: 'Security or Entity identifiers. FactSet Identifiers, tickers, CUSIP and SEDOL are accepted input. <p>***ids limit** =  3000 per request*</p> * Make Note - id limit of 3000 for defaults, otherwise the service is limited to a 30 second duration. This can be reached when increasing total number of metrics requested and depth of history. *

        '
      examples:
        oneId:
          summary: One Market Identifier
          value:
          - AAPL-USA
        multipleIds:
          summary: Multiple Market Identifiers
          value:
          - FDS-US
          - AAPL-US
          - MSFT-US
    fiscalPeriodStart_2:
      name: fiscalPeriodStart
      in: query
      required: false
      description: The fiscal period start expressed as YYYY-MM-DD. Calendar date that will fall back to the most recent completed period during resolution.
      schema:
        type: string
        format: date
        examples:
        - '2023-01-01'
    segmentType:
      name: segmentType
      in: query
      required: true
      schema:
        type: string
        enum:
        - BUS
        - GEO
        default: BUS
      description: "Controls the type of segment selected.\n  * **BUS** = Business / Product Segment\n  * **GEO** = Geographic Segment\n"
      examples:
        Business:
          summary: BUS - Business Segments
          value: BUS
        Geographic:
          summary: GEO - Geographic Segments
          value: GEO
    category:
      name: category
      in: query
      schema:
        type: string
        enum:
        - FINANCIAL_STATEMENT
        - INDUSTRY_METRIC
        - OTHER
      required: false
      description: "Filters the list of Estimate metrics by major category -\n  * **FINANCIAL_STATEMENT** = Includes Balance Sheet, Cash Flow, and Income Statement.\n  * **INDUSTRY_METRICS** = Industry specific metrics.\n  * **OTHER** = Target Price\n"
    metrics:
      name: metrics
      in: query
      required: true
      schema:
        type: array
        items:
          type: string
          example: SALES
        minItems: 1
      explode: false
      description: 'Requested metrics. Use the /metrics endpoint to return a list of available estimate items. Note, the number of metrics you are allowed to supply is limited to 1 for now. **Top 10** most used metrics are **EPS, SALES, DPS, EBITDA,EBIT, PRICE_TGT, CFPS, BPS, NET_INC, and ASSETS**.  For more details, visit [Online Assistant Page #15034](https://oa.apps.factset.com/pages/15034).

        '
      examples:
        Metric:
          summary: Metrics
          value:
          - SALES
    subcategory:
      name: subcategory
      in: query
      schema:
        type: string
        enum:
        - AIRLINES
        - BALANCE_SHEET
        - BANKS
        - CASH_FLOW
        - COMMODITIES
        - COMPUTER_HARDWARE
        - CONSUMER_SERVICES
        - EDUCATION
        - FINANCIAL_SERVICE_PROVIDER
        - HOME_BUILDERS
        - HOSPITALS
        - HOTELS
        - INCOME_STATEMENT
        - INSURANCE
        - MARIJUANA
        - MINING
        - MISCELLANEOUS
        - MULTIFINANCIAL
        - OIL_AND_GAS
        - OTHER
        - REITS
        - RESTAURANTS
        - RETAILERS
        - TELECOMMUNICATIONS
        - TRANSPORTATION
      required: false
      description: "Sub-Category Filter for the Primary Category Requested. Choose a related sub-category for the Category requested. For methodology, visit [OA 16038](https://my.apps.factset.com/oa/pages/16038) <p>Financial Statement - \n  * **BALANCE_SHEET** - Balance Sheet line items, such as Assets, Long-term Debt, and more.\n  * **CASH_FLOW** - Cash Flow Statement line items, such as Free Cash Flow and Share Repurchases\n  * **INCOME_STATEMENT** - Income Statement line items, such as EPS, Sales, DPS, and more.\n  * **MISCELLANEOUS** - EPS Long Term Growth\n</p> <p> Industry Metrics - \n\n  * **AIRLINES** - Including items such as Revenue Passenger, Total Revenue per ASK, Available Seats, and more.\n  * **BANKS** - Including items such as Net Interest Income, Trading Income, Net Loans, and more. SUPPLEMENTAL\n  * **COMMODITIES** - Including items such as Average Target Price.\n  * **COMPUTER_HARDWARE** - Including items such as Total Addressable Market.\n  * **CONSUMER_SERVICES** - Including items such as Gross Merchandise Volume\n  * **EDUCATION** - Including Items such as Total Student Enrollment\n  * **FINANCIAL_SERVICE_PROVIDER** - Including items such as Annual Subscription Value\n  * **HOME_BUILDERS** - Including items such as Home Sales, Land Sales, Cancellation Rates, and more.\n  * **HOSPITALS** - Including items such as Bad Debt Provisions, Medical Cost Ratio, SS Admissions and more.\n  * **HOTELS** - Including items such as Average Daily Rate, Occupancy %, RevPAR, and more.\n  * **INSURANCE** - Including items such as Gross Premiums Written, Underwriting Income, and Claims.\n  * **HOSPITALS** - Including items such as Bad Debt Provisions, Medical Cost Ratio, SS Admissions and more.\n  * **HOTELS** - Including items such as Average Daily Rate, Occupancy %, RevPAR, and more.\n  * **INSURANCE** - Including items such as Gross Premiums Written, Underwriting Income, and Claims.\n  * **MARIJUANA** - Including items such as Cost per Gram and Kg of Cannabis Sold.\n  * **MINING** - Including items such as Realized Price and Total Production\n  * **MULTIFINANCIAL** - Including items such as AUM, Net Flows, and Fee Related Earnings.\n  * **OIL_AND_GAS** - Including items such as Downstream Income, Production per Day, and Exploration Expense.\n  * **OTHER** - Target Price\n  * **REITS** - Including items such as Funds from Operations, Implied Cap Rate, and LTV.\n  * **RESTAURANTS** - Including items such as Restaurant Margin.\n  * **RETAILERS** - Including items such as Stores Information, Selling Space and Net sales per square foot.\n  * **TELECOMMUNICATIONS** - Including items such as Gross Adds, Monthly Revenue Per User, Churn, and more.\n  * **TRANSPORTATION** - Including items such as Revenue Per Unit, Volume Growth, and Operating Ratio.</p>\n  \n"
    fiscalPeriodEnd:
      name: fiscalPeriodEnd
      in: query
      required: false
      schema:
        type: string
      description: "Fiscal period start expressed in absolute date formats. Date that will fall back to most recent completed period during resolution.\n  * **Fiscal Quarter-end** - YYYY/FQ (e.g., 2019/1F, 2019/2F, 2019/3F, 2019/4F)\n  * **Fiscal Year-end** - YYYY (e.g. 2019)\n"
      example: '2020'
    includeAll:
      name: includeAll
      in: query
      schema:
        type: boolean
        default: false
      required: false
      description: "Include All filter is used to identify included and excluded broker details from the consensus\n  By default the service would return only the brokers included in the consensus-\n  * **TRUE** = Returns all the brokers included and excluded in the consensus\n  * **FALSE** = Returns only the broker details included in the consensus\n  \n"
    periodicityDetail:
      name: periodicity
      in: query
      required: false
      schema:
        type: string
        enum:
        - ANN
        - QTR
        - SEMI
        default: ANN
      description: "The periodicity for the estimates requested, allowing you to fetch Quarterly, Semi-Annual, and Annual Estimates.\n  * **ANN** - Annual\n  * **QTR** - Quarterly\n  * **SEMI** - Semi-Annual \n"
    periodicitySurprise:
      name: periodicity
      in: query
      required: false
      schema:
        type: string
        enum:
        - ANN
        - QTR
        - SEMI
        default: ANN
      description: "The periodicity for the estimates requested, allowing you to fetch Quarterly, Semi-Annual and Annual Estimates.\n  * **ANN** - Annual\n  * **QTR** - Quarterly\n  * **SEMI** - Semi-Annual \n"
    frequency:
      name: frequency
      in: query
      schema:
        type: string
        enum:
        - D
        - W
        - AM
        - AQ
        - AY
        default: D
      description: "Controls the frequency of the data returned.\n  * **D** = Daily\n  * **W** = Weekly, based on the last day of the week of the start date.\n  * **AM** = Monthly, based on the start date (e.g., if the start date is June 16, data is displayed for June 16, May 16, April 16 etc.).      \n  * **AQ** = Quarterly, based on the start date.\n  * **AY** = Actual Annual, based on the start date. \n"
      examples:
        Daily:
          summary: D - Daily frequency display based on trading calendar
          value: D
        Weekly:
          summary: W - Weekly - based on the last day of the week of the start date
          value: W
        Actual Month:
          summary: AM - Actual Month - based on the startDate (e.g., if the start date is June 16, data is displayed for June 16, May 16, April 16 etc.).
          value: AM
        Actual Annual:
          summary: AY - Actual Annual - based on the startDate
          value: AY
    fiscalPeriodStart:
      name: fiscalPeriodStart
      in: query
      required: false
      schema:
        type: string
      description: "Fiscal period start expressed in absolute date formats. Date that will fall back to most recent completed period during resolution.\n  * **Fiscal Quarter-end** - YYYY/FQ (e.g., 2019/1F, 2019/2F, 2019/3F, 2019/4F)\n  * **Fiscal Year-end** - YYYY (e.g. 2019)\n"
      example: '2019'
    startDate:
      name: startDate
      in: query
      required: false
      schema:
        type: string
      description: Start date for point in time of estimates expressed in YYYY-MM-DD format.
      example: '2019-07-30'
    currency_2:
      name: currency
      in: query
      required: false
      description: Currency code for currency values. For a list of currency ISO codes, visit Online Assistant Page 1470. Use "DOC" for reporting currency. Defaults to LOCAL.
      schema:
        type: string
        default: LOCAL
        examples:
        - USD
        - EUR
        - GBP
    endDate:
      name: endDate
      in: query
      required: false
      schema:
        type: string
      description: End date for point in time of estimates expressed in YYYY-MM-DD format.
      example: '2020-07-30'
    relativeFiscalEnd:
      name: relativeFiscalEnd
      in: query
      required: false
      schema:
        type: integer
      description: Relative fiscal period, expressed as an integer, used to filter results. This is combined with the periodicity parameter to specify a relative estimate period. For example, set to 2 and periodicity to ANN to ask for relative Fiscal Year 1 (FY2).
      example: 3
    currency:
      name: currency
      in: query
      required: false
      schema:
        type: string
      description: 'Currency code for adjusting the data. Use ''ESTIMATE'' as input value for the values in Estimate Currency. For a list of currency ISO codes, visit [Online Assistant Page #1470](https://oa.apps.factset.com/pages/1470).'
      example: USD
    ids_2:
      name: ids
      in: query
      required: true
      explode: false
      description: The requested list of security identifiers. Accepted ID types include Market Tickers, SEDOL, ISINs, CUSIPs, or FactSet Permanent Ids. Limit of 1,000 per non-batch request / 2,000 per batch request (GET) or 30,000 per batch request (POST).
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 2000
      examples:
        singleId:
          summary: One equity identifier
          value:
          - AAPL-US
        multipleIds:
          summary: Multiple equity identifiers
          value:
          - FDS-US
          - AAPL-US
          - MSFT-US
    segmentIds:
      name: ids
      in: query
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 50
      required: true
      explode: false
      description: 'Security or Entity identifiers. FactSet Identifiers, tickers, CUSIP and SEDOL are accepted input. <p>***ids limit** =  50 per request*</p> * Make Note - id limit of 50 for defaults, otherwise the service is limited to a 30 second duration. This can be reached when increasing total number of metrics requested and depth of history. *

        '
      examples:
        oneId:
          summary: One Market Identifier
          value:
          - AAPL-USA
        multipleIds:
          summary: Multiple Market Identifiers
          value:
          - FDS-US
          - AAPL-US
          - MSFT-US
    relativeFiscalStart:
      name: relativeFiscalStart
      in: query
      required: false
      schema:
        type: integer
      description: Relative fiscal period, expressed as an integer, used to filter results. This is combined with the periodicity parameter to specify a relative estimate period. For example, set to 1 and periodicity to ANN to ask for relative Fiscal Year 1 (FY1).
      example: 1
    periodicity_2:
      name: periodicity
      in: query
      required: false
      description: Periodicity or frequency of the fiscal periods. ANN = Annual Original, ANN_R = Annual Latest (includes restatements), QTR = Quarterly Original, QTR_R = Quarterly Latest, SEMI = Semi-Annual, SEMI_R = Semi-Annual Latest, LTM = Last Twelve Months, LTM_R = Last Twelve Months Latest, LTMSG = Last Twelve Months Global, LTM_SEMI = Last Twelve Months Semi-Annual, YTD = Year-to-date.
      schema:
        type: string
        enum:
        - ANN
        - ANN_R
        - QTR
        - QTR_R
        - SEMI
        - SEMI_R
        - LTM
        - LTM_R
        - LTMSG
        - LTM_SEMI
        - YTD
        default: ANN
