  /estimates:
    get:
      tags:
      - Estimates
      operationId: getEstimates
      summary: Factset Returns Consensus Analyst Estimates.
      description: 'Retrieves consensus analyst estimates for specified securities and metrics. Consensus estimates are aggregated from a wide base of over 800+ contributors and cover over 19,000 active companies across 90+ countries.


        Common estimate metrics include FF_EST_SALES (estimated sales), FF_EST_EPS (estimated earnings per share), and FF_EST_EBITDA (estimated EBITDA).'
      parameters:
      - $ref: '#/components/parameters/ids_2'
      - $ref: '#/components/parameters/estimateMetrics'
      - $ref: '#/components/parameters/periodicity_2'
      - $ref: '#/components/parameters/fiscalPeriodStart_2'
      - $ref: '#/components/parameters/fiscalPeriodEnd_2'
      - $ref: '#/components/parameters/currency_2'
      responses:
        '200':
          description: Estimate data returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstimatesResponse'
              examples:
                consensusEstimates:
                  summary: Consensus EPS estimates for AAPL-US
                  value:
                    data:
                    - requestId: AAPL-US
                      fsymId: MH33D6-R
                      metric: FF_EST_EPS
                      periodicity: ANN
                      fiscalPeriod: 0
                      fiscalYear: 2025
                      fiscalEndDate: '2025-09-30'
                      currency: USD
                      estimateCount: 38
                      mean: 7.42
                      median: 7.45
                      high: 7.95
                      low: 6.85
                      standardDeviation: 0.22
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
