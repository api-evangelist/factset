    PostNewsArticleListByIndex200Response:
      description: Successful Response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  identifiers:
                    nullable: false
                    description: List of identifiers that resolve to index notations, and their type.
                    type: array
                    items:
                      type: object
                      nullable: false
                      x-property-sort:
                      - idNotation
                      - sourceIdentifier
                      - status
                      properties:
                        idNotation:
                          nullable: true
                          type: string
                          format: id64
                          x-positive: true
                          description: MDG identifier of the listing.
                        sourceIdentifier:
                          nullable: true
                          type: string
                          description: Identifier used in the request.
                        status:
                          nullable: false
                          type: object
                          x-property-sort:
                          - code
                          - identifier
                          - details
                          - encryptedDetails
                          description: Error status for the requested identifier.
                          properties:
                            code:
                              nullable: true
                              type: string
                              description: Code of the error condition.
                              x-enum-description:
                              - No error.
                              - The provided identifier does not refer to a valid listing level identifier.
                              - Not entitled to see data for the identifier.
                              - Unable to resolve the provided identifier.
                              enum:
                              - none
                              - parameter
                              - entitlement
                              - identifierMapping
                            identifier:
                              nullable: true
                              type: string
                              description: Provided identifier.
                            details:
                              nullable: true
                              type: string
                              description: A human-readable, unstructured explanation specific to this occurrence of the problem.
                            encryptedDetails:
                              nullable: true
                              type: string
                              description: Base64-encoded internal details about the error.
                  articles:
                    nullable: false
                    description: News articles that match the filter criteria ordered by descending article time.
                    type: array
                    items:
                      type: object
                      nullable: false
                      x-property-sort:
                      - code
                      - time
                      - headline
                      - summary
                      - types
                      - language
                      - distributor
                      - publisher
                      - categories
                      - chain
                      - instruments
                      properties:
                        code:
                          nullable: true
                          description: Identifier of the news article.
                          type: string
                        time:
                          nullable: true
                          x-pushable: true
                          description: Date and time of the news article.
                          type: string
                          format: datetime
                        headline:
                          nullable: true
                          x-pushable: true
                          description: Headline of the news article represented as text with HTML entity encoding but without HTML tags.
                          type: string
                        summary:
                          nullable: true
                          x-pushable: true
                          description: Textual summary of the body of the news article or `null` if no summary was provided by the news article distributor.
                          type: string
                        types:
                          nullable: false
                          description: Types of news article. See endpoint `/news/article/type/list` for possible values.
                          type: array
                          items:
                            type: object
                            nullable: false
                            x-property-sort:
                            - id
                            properties:
                              id:
                                nullable: true
                                description: Identifier of the type of news article.
                                type: number
                                format: id32
                                x-positive: true
                        language:
                          nullable: false
                          description: Language of the news article. See endpoint `/basic/language/list` for possible values.
                          type: object
                          x-property-sort:
                          - id
                          properties:
                            id:
                              nullable: true
                              description: Identifier of the language.
                              type: number
                              format: id32
                              x-positive: true
                        distributor:
                          nullable: false
                          description: Distributor of the news article. See endpoint `/news/distributor/list` for possible values.
                          type: object
                          x-property-sort:
                          - id
                          properties:
                            id:
                              nullable: true
                              description: Identifier of the distributor.
                              type: number
                              format: id32
                              x-positive: true
                        publisher:
                          nullable: false
                          description: Publisher of the news article. See endpoint `/news/publisher/list` for possible values.
                          type: object
                          x-property-sort:
                          - id
                          properties:
                            id:
                              nullable: true
                              description: Identifier of the publisher.
                              type: number
                              format: id32
                              x-positive: true
                        categories:
                          nullable: false
                          description: Categories related to the news article. See endpoint `/category/list` for possible values.
                          type: array
                          items:
                            type: object
                            nullable: false
                            x-property-sort:
                            - id
                            properties:
                              id:
                                nullable: true
                                x-pushable: true
                                description: Identifier of the category.
                                type: number
                                format: id32
                                x-positive: true
                        chain:
                          nullable: false
                          description: Article chain.
                          type: object
                          x-property-sort:
                          - id
                          properties:
                            id:
                              nullable: true
                              x-pushable: true
                              description: Identifier of the news article chain.
                              type: string
                              format: id64
                              x-positive: true
                        instruments:
                          nullable: false
                          description: Set of stock instruments related to the article. The set is not updated in the course of corporate actions, e.g. when the related company obtains a new instrument after a spin-off.
                          type: array
                          items:
                            type: object
                            nullable: false
                            x-property-sort:
                            - id
                            - fsym
                            properties:
                              id:
                                nullable: true
                                x-pushable: true
                                description: Identifier of the instrument.
                                type: string
                                format: id64
                                x-positive: true
                              fsym:
                                nullable: false
                                type: object
                                x-property-sort:
                                - security
                                description: Instrument-level FactSet identifier of the financial instrument used primarily in FactSet products other than the MDG.
                                properties:
                                  security:
                                    nullable: false
                                    type: object
                                    x-property-sort:
                                    - permanentIdentifier
                                    description: Security-level identifier.
                                    properties:
                                      permanentIdentifier:
                                        nullable: true
                                        x-pushable: true
                                        description: FactSet Permanent Identifier for an instrument. The format is six alpha numeric characters, excluding vowels, with an S suffix (XXXXXX-S).
                                        type: string
                description: News articles for instruments that are constituents of the given indices.
                nullable: false
                x-property-sort:
                - identifiers
                - articles
              meta:
                type: object
                description: The meta member contains the meta information of the response.
                properties:
                  status:
                    $ref: '#/components/schemas/StatusObject'
                  pagination:
                    $ref: '#/components/schemas/CursorBasedPaginationOutputObjectWithoutTotal'
                x-property-sort:
                - status
                - pagination
            x-property-sort:
            - data
            - meta
