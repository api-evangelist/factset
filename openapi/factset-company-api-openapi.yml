  /factset-people/v1/company-stats:
    get:
      summary: Factset Returns Statistics About Top Leadership of a Company.
      description: 'Returns the statistics such as the average age, tenure, compensation of leadership, number of executives, and the gender diversity of leadership. We can utilize the data for analyzing a company''s board and management.

        '
      tags:
      - Company
      operationId: getCompanyStats
      parameters:
      - $ref: '#/components/parameters/companyId'
      - $ref: '#/components/parameters/mbType'
      responses:
        '200':
          description: Array of Company Stats objects.
          content:
            application/json:
