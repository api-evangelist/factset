openapi: 3.0.3
info:
  title: Factset Analytics Datastore About Company API
  description: Allow clients to fetch precalculated Analytics through predeterministic URLs.
  contact:
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
    email: api@factset.com
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.factset.com
  description: Production
- url: https://api-sandbox.factset.com
  description: Sandbox
security:
- basicAuth: []
tags:
- name: Company
paths:
  /company/logo/get:
    get:
      tags:
      - Company
      operationId: get/company/logo/get
      x-supportsOffsetBasedPaging: false
      x-supportsOffsetBasedPagingWithoutTotal: false
      x-supportsCursorBasedPaging: false
      x-supportsCursorBasedPagingWithoutTotal: false
      x-supportsPush: false
      x-requiresUser: false
      x-requiresInternalClient: false
      x-disallowUser: false
      x-no-merge: false
      x-maxSortParameterCount: 10
      x-supportsPermissionDeniedResponse: false
      summary: Factset List of URLs of company logos.
      description: "List of URLs for transparent company logos in different sizes and formats.   The different sizes for the rectangular and square formats are: \n\n **Small**:\n * rectangular:  maximum width of 88 pixels and maximum height of 31 pixels.\n * square:  31 x 31 pixels.\n\n\n **Medium**: small logo scaled up by 200%.\n\n **Large**: small logo scaled up by 300%.\n\n **Vector**: can be rendered at any size."
      parameters:
      - name: identifier
        in: query
        type: string
        required: true
        pattern: ^(([0-9A-Z]{6}-[SLR])|([0-9A-Z.]{1,47}-[A-Z]{2,4})|([0-9]{1,20}))$
        maxLength: 50
        exclusiveMaximum: false
        minLength: 4
        exclusiveMinimum: false
        description: 'Identifier that resolves to a company. '
      - name: identifierType
        in: query
        type: string
        required: true
        description: The type of the identifier.
        x-enum-description:
        - MDG identifier of an instrument.
        - 'FactSet market symbol of the notation, usually consisting of the ticker (e.g. "FDS" for FactSet Research Systems Inc.) and the three-character code of the exchange on which the listing is traded (example: FDS-NYS).'
        enum:
        - idInstrument
        - tickerExchange
      - name: format
        in: query
        type: string
        description: Format of the logos.
        required: false
        default: rectangular
        x-enum-description:
        - Logos in rectangular format
        - Logos in square format
        enum:
        - rectangular
        - square
      - name: _attributes
        in: query
        type: array
        items:
          type: string
          maxLength: 100
          exclusiveMaximum: false
        uniqueItems: true
        maxItems: 50
        collectionFormat: csv
        description: Limit the attributes returned in the response to the specified set.
      responses:
        '200':
          description: Successful Response
          schema:
            type: object
            properties:
              data:
                description: URLs of company logos. All URLs are publicly available via HTTPS and hosted by FactSet with a top-level domain `mdgms.com`. For possible values of the attribute `mimeType`, see endpoint `/basic/media/type/list` with parameter `filter.ids=1 (image)`.
                type: object
                x-property-sort:
                - small
                - medium
                - large
                - vector
                properties:
                  small:
                    type: object
                    x-property-sort:
                    - url
                    - mimeType
                    description: Small logo.
                    properties:
                      url:
                        type: string
                        format: url
                        description: URL of the logo.
                      mimeType:
                        type: string
                        description: MIME type of the logo.
                  medium:
                    type: object
                    x-property-sort:
                    - url
                    - mimeType
                    description: Medium logo.
                    properties:
                      url:
                        type: string
                        format: url
                        description: URL of the logo.
                      mimeType:
                        type: string
                        description: MIME type of the logo.
                  large:
                    type: object
                    x-property-sort:
                    - url
                    - mimeType
                    description: Large logo.
                    properties:
                      url:
                        type: string
                        format: url
                        description: URL of the logo.
                      mimeType:
                        type: string
                        description: MIME type of the logo.
                  vector:
                    type: object
                    x-property-sort:
                    - url
                    - mimeType
                    description: Vector logo.
                    properties:
                      url:
                        type: string
                        format: url
                        description: URL of the logo.
                      mimeType:
                        type: string
                        description: MIME type of the logo.
              meta:
                type: object
                description: The meta member contains the meta information of the response.
                properties:
                  status:
                    $ref: '#/definitions/StatusObject'
                x-property-sort:
                - status
  /v1/company/{component}/adaptive-card:
    parameters:
    - name: component
      in: path
      required: true
      description: Card name
      schema:
        type: string
        enum:
        - profile
        - event-calendar
    - name: ids
      in: query
      required: true
      description: Public company tickers (comma delimited)
      schema:
        type: string
        default: FDS-US
    - name: format
      in: query
      description: Return data in different format. By default adaptive cards will be returned in key (ticker) value (adaptive card) pairs in a object. Table option would return adaptive cards in an array
      schema:
        type: string
        enum:
        - table
    - name: thumbnail
      in: query
      description: Whether or not to include a thumbnail card in the return data
      schema:
        type: boolean
        enum:
        - true
        - false
    get:
      tags:
      - Company
      summary: Factset Retrieve Multiple Digital Cards in Microsoft Adaptive Card Format.
      responses:
        '200':
          description: Digital Card JSON received.
          headers:
            Content-Encoding:
              description: Standard HTTP header. Header value based on Accept-Encoding Request header.
              schema:
                type: string
            Content-Type:
              description: Standard HTTP header.
              schema:
                type: string
          content:
            application/json:
              examples:
                objectExample1:
                  $ref: '#/components/examples/MultiplePorfileCard'
                objectExample2:
                  $ref: '#/components/examples/MultipleEventCalendarCard'
        '400':
          description: Bad Request. For further assistance, file an issue under "Workflow & Throttling - 400 or 429 Response" using `Report Issue` at the top of this page, including the X-DataDirect-Request-Key from the header to assist in troubleshooting.
          headers:
            X-DataDirect-Request-Key:
              schema:
                type: string
              description: FactSet request ID
            Api-Supported-Versions:
              schema:
                type: string
              description: Supported API major versions
            Api-Version:
              schema:
                type: string
              description: API version (semantic versioning)
        '401':
          description: Missing or invalid authentication. Ensure you are logged in and have successfully generated an API KEY for the IP range you are connecting from. For further assistance, file an issue under "Connectivty - 401 or 403 Responses" using `Report Issue` at the top of this page, including the X-DataDirect-Request-Key from the header to assist in troubleshooting.
          headers:
            X-DataDirect-Request-Key:
              schema:
                type: string
              description: FactSet request ID
        '404':
          description: Not found. For further assistance, file an issue under "Performance - 404 and 500 Responses" using `Report Issue` at the top of this page, including the X-DataDirect-Request-Key from the header to assist in troubleshooting.
          headers:
            X-DataDirect-Request-Key:
              schema:
                type: string
              description: FactSet request ID
        '429':
          description: Too many requests - this API is rate-limited to 20 requests per second. For further assistance, file an issue under "Workflow & Throttling - 400 or 429 Response" using `Report Issue` at the top of this page, including the X-DataDirect-Request-Key from the header to assist in troubleshooting.
          headers:
            X-DataDirect-Request-Key:
              schema:
                type: string
              description: FactSet request ID
        '500':
          description: Server error. For further assistance, file an issue under "Performance - 404 and 500 Responses" using `Report Issue` at the top of this page, including the X-DataDirect-Request-Key from the header to assist in troubleshooting
          headers:
            X-DataDirect-Request-Key:
              schema:
                type: string
              description: FactSet request ID
        '503':
          description: Service unavailable. Typically a timeout, or result of a rejected request to prevent service overload. For further assistance, file an issue under "Performance - 404 and 500 Responses" using `Report Issue` at the top of this page, including the X-DataDirect-Request-Key from the header to assist in troubleshooting.
          headers:
            X-DataDirect-Request-Key:
              schema:
                type: string
              description: FactSet request ID
  /v1/company/{component}/adaptive-card/{id}:
    parameters:
    - name: component
      in: path
      required: true
      description: Card name
      schema:
        type: string
        enum:
        - profile
        - event-calendar
    - name: id
      in: path
      required: true
      description: Public company ticker
      schema:
        type: string
        default: FDS-US
    get:
      tags:
      - Company
      summary: Factset Retrieve One Digital Card in Microsoft Adaptive Card Format.
      responses:
        '200':
          description: Digital Card JSON received.
          headers:
            Content-Encoding:
              description: Standard HTTP header. Header value based on Accept-Encoding Request header.
