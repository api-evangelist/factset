  /company/event/list:
    post:
      summary: Factset Retrieve Company Event data
      description: This endpoint returns all company events with filters from the request.
      tags:
      - Company
      operationId: getCompanyEvent
      requestBody:
        $ref: '#/components/requestBodies/companyEventRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/companyEventResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
  /factset-people/v1/company-people:
    get:
      summary: Factset Returns the List of People for the Specified Company Identifiers
      description: 'Returns the list of executives associated the company identifier requested. Information includes the job functions, email, phone, title, name, and FactSet Entity Identifier. The personId returned can then be used in the `/profiles` endpoint to learn more about the given person.

        '
      tags:
      - Company
      operationId: getCompanyPeople
      parameters:
      - $ref: '#/components/parameters/companyId'
      - $ref: '#/components/parameters/jobFunction'
      responses:
        '200':
          description: Array of Company People objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/companyPeopleResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      summary: Factset Returns the List of People Associated for a Large List of Company Identitifers
      description: 'Returns the list of executives associated the company identifier requested. Information includes the job functions, email, phone, title, name, and FactSet Entity Identifier. The personId returned can then be used in the /profiles endpoint to learn more about the given person.

        '
      tags:
      - Company
      operationId: getCompanyPeopleForList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/companyPeopleRequest'
      responses:
        '200':
          description: Array of Company People objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/companyPeopleResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /factset-people/v1/company-positions:
    get:
      summary: Factset Returns the List of People for the Specified Company Identifiers and Position
      description: "Returns the list of people, name, and title for a list of company ids and requested position. Positions include-\n  * Chairman\n  * Chief Executive Officer\n  * President\n  * Chief Operating Officer\n  * Chief Financial Officer\n  * Chief Technology Officer\n  * Chief Investment Officer\n  * Founder(s)\n  * Compliance Officer\n  * Admin\n  * Independent Director\n  * Directors/Board Members\n  * Investor Relations\n  * Legal Counsel\n  * Treasurer\n  * Sales and Marketing Managers\n  * Human Resources\n"
      tags:
      - Company
      operationId: getCompanyPositions
      parameters:
      - $ref: '#/components/parameters/companyId'
      - $ref: '#/components/parameters/position'
      responses:
        '200':
          description: Array of Company Positions objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/companyPositionsResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      summary: Factset Returns the List of People Associated for a Large List of Company Identitifers and Position
      description: "Returns the list of people, name, and title for a list of company ids and requested position. Positions include-\n  * Chairman\n  * Chief Executive Officer\n  * President\n  * Chief Operating Officer\n  * Chief Financial Officer\n  * Chief Technology Officer\n  * Chief Investment Officer\n  * Founder(s)\n  * Compliance Officer\n  * Admin\n  * Independent Director\n  * Directors/Board Members\n  * Investor Relations\n  * Legal Counsel\n  * Treasurer\n  * Sales and Marketing Managers\n  * Human Resources\n"
      tags:
      - Company
      operationId: getCompanyPositionsForList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/companyPositionsRequest'
      responses:
        '200':
