  /factset-esg/v1/sasb-ranks:
    get:
      tags:
      - Factset
      summary: Factset Gets Esg Rankings for a Requested List of Ids and Dates.
      operationId: getSasbRanks
      description: "Indicates if a company is a Leader, Above Average, Average, Below Average, or a Laggard; directly mapping from Industry Percentiles (*request IND_PCTL in scores endpoints*). Mapping of ESG Ranks to Industry Percentile Ranges is as follows - \n\n|Rank|Industry Percentile Range (%)|\n|||\n|Leader|90 - 100|\n|Above Average|70 - 89.9|\n|Average|30 - 69.9|\n|Below Average|10 - 29.9|\n|Laggard|0 - 9.9|\n\nIndustry classifications follow SICS, SASB's Industry Classification System. Using the Adjusted Insight scores, Industry Percentiles are generated for all companies. Companies with five or more articles in a year get ranked in a first pass, then companies with filled-in values are interpolated without forcing the ranking of higher-volume companies up or down.  In the case where a company falls into an industry with fewer than 7 high or medium volume companies the Sector Percentile is inserted in the place of the Industry Percentile score.\n<p>Only Vaild for ALLCATEGORIES and MATERIALITY categories.</p>\n"
      parameters:
      - $ref: '#/components/parameters/ids'
      - $ref: '#/components/parameters/rankCategories'
      - $ref: '#/components/parameters/startDate_2'
      - $ref: '#/components/parameters/endDate_2'
      - $ref: '#/components/parameters/frequency_2'
      - $ref: '#/components/parameters/calendar_2'
      responses:
        '200':
          description: The SASB Ranks response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sasbRanksResponse'
              examples:
                ESG Ranks for multiple entities:
                  $ref: '#/components/examples/multipleSasbRanks'
        '400':
          $ref: '#/components/responses/400_2'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403_2'
        '415':
          $ref: '#/components/responses/415_2'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Factset
      summary: Factset Get Esg Ranks for a Large List of Ids and Specified Date Range.
