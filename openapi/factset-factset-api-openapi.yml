openapi: 3.0.3
info:
  title: Analytics Datastore About Factset API
  description: Allow clients to fetch precalculated Analytics through predeterministic URLs.
  contact:
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
    email: api@factset.com
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.factset.com
  description: Production
- url: https://api-sandbox.factset.com
  description: Sandbox
security:
- basicAuth: []
tags:
- name: Factset
  description: factset endpoints
paths:
  /factset/etf/getBySymbol:
    get:
      tags:
      - Factset
      operationId: get/factset/etf/getBySymbol
      x-supportsOffsetBasedPaging: false
      x-supportsOffsetBasedPagingWithoutTotal: false
      x-supportsCursorBasedPaging: false
      x-supportsCursorBasedPagingWithoutTotal: false
      x-supportsPush: false
      x-requiresUser: false
      x-requiresInternalClient: false
      x-disallowUser: false
      x-no-merge: false
      x-maxSortParameterCount: 10
      x-supportsPermissionDeniedResponse: false
      description: An ETP can be profiled by defining several common attributes such as issuer, fund description, and benchmark.
      summary: Factset Retrieve basic profile information for a specified ETP.
      parameters:
      - name: symbol
        in: query
        type: string
        maxLength: 10
        exclusiveMaximum: false
        required: true
        description: Market symbol of ETP defined by FactSet.
      - name: _attributes
        in: query
        type: array
        items:
          type: string
          maxLength: 100
          exclusiveMaximum: false
        uniqueItems: true
        maxItems: 50
        collectionFormat: csv
        description: Limit the attributes returned in the response to the specified set.
      responses:
        '200':
          description: Successful Response
          schema:
            type: object
            properties:
              data:
                description: Profile.
                type: object
                x-property-sort:
                - asOfDate
                - holdingsDate
                - symbol
                - exchange
                - name
                - issuer
                - brand
                - launchDate
                - description
                - website
                - domicile
                - status
                - currency
                - index
                - financialReport
                - createRedeem
                - aum
                - trading
                - documentation
                - insight
                properties:
                  asOfDate:
                    type: string
                    format: date
                    description: Date data was published. This data is available only for US region.
                  holdingsDate:
                    type: string
                    format: date
                    description: The as of data for holdings statistics. This data available only for US region
                  symbol:
                    type: string
                    description: Ticker of the ETP. This data is available for all region.
                  exchange:
                    type: object
                    x-property-sort:
                    - code
                    - name
                    - country
                    - region
                    description: Exchange.
                    properties:
                      code:
                        type: string
                        description: Short Code of the exchange. This data is available for all the regions.
                      name:
                        type: string
                        description: Name of the exchance where ETP is listed. This data is available for all the regions.
                      country:
                        type: string
                        description: Short country code where ETP exchange is located. This data is available for all the regions and country code is in format ISO 3166-1 alpha-2.
                      region:
                        type: string
                        description: Short region code where ETP exchange is located. This data is available for all the regions.
                        x-enum-description:
                        - Europe region.
                        - North America region.
                        - Asia-Pacific region.
                        - Middle East & Africa.
                        enum:
                        - Europe
                        - North America
                        - Asia-Pacific
                        - Middle East & Africa
                  name:
                    type: string
                    description: Name of the ETP. This data is available for all the regions.
                  issuer:
                    type: object
                    x-property-sort:
                    - name
                    description: Issuer.
                    properties:
                      name:
                        type: string
                        description: Name of the issuer of the ETP. This data is available for all the regions.
                  brand:
                    type: object
                    x-property-sort:
                    - name
                    description: Brand.
                    properties:
                      name:
                        type: string
                        description: Name of the brand of the ETP. This data is available for all the regions.
                  launchDate:
                    type: string
                    format: date
                    description: Launch date of the ETP. This data is available for all the regions.
                  description:
                    type: string
                    description: A brief description of the ETP. This data is available for all the regions.
                  website:
                    type: string
                    description: Link to the ETP's homepage. This data is available for the US and Canada region.
                  domicile:
                    type: string
                    description: ETP country of domicile. This data is available for all the regions and country code is in format ISO 3166-1 alpha-2.
                  status:
                    type: string
                    description: Staus of the ETP. This data is available for all the regions.
                    x-enum-description:
                    - Active.
                    - Delisted.
                    - Not trading yet.
                    enum:
                    - Active
                    - Delisted
                    - Not trading yet
                  currency:
                    type: object
                    x-property-sort:
                    - listing
                    - fund
                    description: Currency.
                    properties:
                      listing:
                        type: string
                        description: Currency of exchange specific listing. This data is available for all the regions and currency code is in the format ISO 4217.
                      fund:
                        type: string
                        description: Base calculation currency of the ETP. This data is available for all the regions and currency code is in the format ISO 4217.
                  index:
                    type: object
                    x-property-sort:
                    - name
                    - family
                    - website
                    - distributionTreatment
                    - rebalancingFrequency
                    - currency
                    description: The index the ETP is replicating, if applicable.
                    properties:
                      name:
                        type: string
                        description: The name of the underlying index of the ETP. This data is available for all the regions.
                      family:
                        type: string
                        description: The name of the index provider for the underlying index of the ETP. This data is available for all the regions.
                      website:
                        type: string
                        description: The link to the underlying index's homepage. This data is available for all the regions.
                      distributionTreatment:
                        type: string
                        description: Describes the treatment of constituent cash flows by the index, whether capitalized (reinvested) or ignored, as well as tax withholding by foreign countries. Text and standardized value available for this data item. This data is available for Europe only.
                      rebalancingFrequency:
                        type: string
                        description: Period of time between reweighting underlying index constituents.
                        x-enum-description:
                        - Monthly.
                        - Annually.
                        - Quarterly.
                        - Semi-annual.
                        - Daily.
                        - As Needed.
                        - Bi-Monthly.
                        - Weekly.
                        enum:
                        - Monthly
                        - Annually
                        - Quarterly
                        - Semi-annual
                        - Daily
                        - As Needed
                        - Bi-Monthly
                        - Weekly
                      currency:
                        type: string
                        description: Base calculation currency of underlying index. This data is available for all the regions and currency code is in the format ISO 4217.
                  financialReport:
                    type: object
                    x-property-sort:
                    - annual
                    - semiAnnual
                    description: Financial report.
                    properties:
                      annual:
                        type: object
                        x-property-sort:
                        - isAvailable
                        - date
                        description: Annual.
                        properties:
                          isAvailable:
                            type: boolean
                            description: States whether or not the current annual financial report is available on the issuer's website. This data is available for all the regions.
                          date:
                            type: string
                            format: date
                            description: Date of the last annual report available on issuer's site. This data is available for all the regions.
                      semiAnnual:
                        type: object
                        x-property-sort:
                        - isAvailable
                        - date
                        description: Semi annual.
                        properties:
                          isAvailable:
                            type: boolean
                            description: States whether or not the semi-annual financial report is available on the issuer's website. This data is available for all the regions.
                          date:
                            type: string
                            format: date
                            description: Date of the last semi-annual report available on the issuer's website. This data is available for all the regions.
                  createRedeem:
                    type: object
                    x-property-sort:
                    - unitCost
                    - unitSize
                    description: Create or redeem
                    properties:
                      unitCost:
                        type: number
                        format: real
                        description: The standard fee in the ETP currency to create or redeem one unit of an ETP. This data is available for the US regions..
                      unitSize:
                        type: number
                        format: real
                        description: The minimum ETP share block at which issuers are willing to perform creations or redemptions per prospectus or other filing documents. This data is available for the US regions.
                  aum:
                    type: number
                    format: real
                    description: The market value of the total assets that a individual ETP manages on behalf of it's investors. This data is available for all the regions.
                  trading:
                    type: object
                    x-property-sort:
                    - average
                    - median
                    description: Trading.
                    properties:
                      average:
                        type: object
                        x-property-sort:
                        - volume
                        - value
                        description: Average.
                        properties:
                          volume:
                            type: number
                            format: real
                            description: The average daily number of shares traded over the past 45 trading days. This data is available for the US regions.
                          value:
                            type: number
                            format: real
                            description: The average daily value traded over the past 45-trading day period in ETP's listing currency. This data is available for the US regions.
                      median:
                        type: object
                        x-property-sort:
                        - volume
                        - value
                        description: Median.
                        properties:
                          volume:
                            type: number
                            format: real
                            description: Median daily number of shares traded over the past 45 trading days. This data is available for the regions.
                          value:
                            type: number
                            format: real
                            description: Median daily value traded over the past 45 trading days in ETP's listing currency. This data is available for the US regions.
                  documentation:
                    type: object
                    x-property-sort:
                    - isProspectusPosted
                    - isSaiPosted
                    description: Documentation.
                    properties:
                      isProspectusPosted:
                        type: boolean
                        description: Complete prospectus is available on issuer website. This data is available for all the regions.
                      isSaiPosted:
                        type: boolean
                        description: Statement of Additional Information (SAI) is available on issuer website. This data is available for the US regions.
                  insight:
                    type: object
                    x-property-sort:
                    - overview
                    - quote
                    description: Insight.
                    properties:
                      overview:
                        type: string
                        description: In-depth ETP overview from FactSet ETP Analytics. This data is available for the US regions.
                      quote:
                        type: string
                        description: Abbreviated ETP overview from the FactSet ETP Analytics. This data is available for the US regions.
              meta:
                type: object
                description: The meta member contains the meta information of the response.
                properties:
                  status:
                    $ref: '#/definitions/StatusObject'
                x-property-sort:
                - status
  /factset/etf/allocation/asset/listBySymbol:
    get:
      tags:
      - Factset
      operationId: get/factset/etf/allocation/asset/listBySymbol
      x-supportsOffsetBasedPaging: true
      x-supportsOffsetBasedPagingWithoutTotal: false
      x-supportsCursorBasedPaging: false
      x-supportsCursorBasedPagingWithoutTotal: false
      x-supportsPush: false
      x-requiresUser: false
      x-requiresInternalClient: false
      x-disallowUser: false
      x-no-merge: false
      x-maxSortParameterCount: 10
      x-supportsPermissionDeniedResponse: false
      description: This endpoint returns selected ETP's allocations grouped by asset class. The response will be sorted by weight in descending order.
      summary: Factset This endpoint returns selected ETP's asset allocations.
      parameters:
      - name: symbol
        in: query
        type: string
        maxLength: 10
        exclusiveMaximum: false
        required: true
        description: Market symbol of ETP defined by FactSet.
      - name: _attributes
        in: query
        type: array
        items:
          type: string
          maxLength: 100
          exclusiveMaximum: false
        uniqueItems: true
        maxItems: 50
        collectionFormat: csv
        description: Limit the attributes returned in the response to the specified set.
      - type: number
        format: int32
        minimum: 0
        exclusiveMinimum: false
        default: 0
        description: Non-negative number of entries to skip, or 0 (default).
        name: _paginationOffset
        in: query
      - type: number
        format: int32
        minimum: 0
        exclusiveMinimum: false
        maximum: 500
        exclusiveMaximum: false
        default: 20
        description: Non-negative maximum number of entries to return.
        name: _paginationLimit
        in: query
      responses:
        '200':
          description: Successful Response
          schema:
            type: object
            properties:
              data:
                description: ETP asset allocation data.
                type: object
                x-property-sort:
                - reportDate
                - assets
                properties:
                  reportDate:
                    type: string
                    format: date
                    description: Reporting date for the allocations.
                  assets:
                    type: array
                    items:
                      type: object
                      x-property-sort:
                      - assetClass
                      - weight
                      properties:
                        assetClass:
                          type: string
                          description: Name of the asset class.
                        weight:
                          type: number
                          format: real
                          description: Consolidate weight of the position within the ETP by asset class(es).
                    uniqueItems: true
                    description: List of allocations by asset class.
              meta:
                type: object
                description: The meta member contains the meta information of the response.
                properties:
                  status:
                    $ref: '#/definitions/StatusObject'
                  pagination:
                    $ref: '#/definitions/OffsetBasedPaginationOutputObject'
                x-property-sort:
                - status
                - pagination
