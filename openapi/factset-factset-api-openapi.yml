    subcategory:
      type: string
      example: AIRLINES
      enum:
      - AIRLINES
      - BALANCE_SHEET
      - BANKS
      - CASH_FLOW
      - COMMODITIES
      - COMPUTER_HARDWARE
      - CONSUMER_SERVICES
      - EDUCATION
      - FINANCIAL_SERVICE_PROVIDER
      - HOME_BUILDERS
      - HOSPITALS
      - HOTELS
      - INCOME_STATEMENT
      - INSURANCE
      - MARIJUANA
      - MINING
      - MISCELLANEOUS
      - MULTIFINANCIAL
      - OIL_AND_GAS
      - OTHER
      - REITS
      - RESTAURANTS
      - RETAILERS
      - TELECOMMUNICATIONS
      - TRANSPORTATION
      description: "Sub-Category Filter for the Primary Category Requested. Choose a related sub-category for the Category requested. For methodology, visit [OA 16038](https://my.apps.factset.com/oa/pages/16038) <p>Financial Statement - \n  * **BALANCE_SHEET** - Balance Sheet line items, such as Assets, Long-term Debt, and more.\n  * **CASH_FLOW** - Cash Flow Statement line items, such as Free Cash Flow and Share Repurchases\n  * **INCOME_STATEMENT** - Income Statement line items, such as EPS, Sales, DPS, and more.\n  * **MISCELLANEOUS** - EPS Long Term Growth\n</p> <p> Industry Metrics - \n\n  * **AIRLINES** - Including items such as Revenue Passenger, Total Revenue per ASK, Available Seats, and more.\n  * **BANKS** - Including items such as Net Interest Income, Trading Income, Net Loans, and more. SUPPLEMENTAL\n  * **COMMODITIES** - Including items such as Average Target Price.\n  * **COMPUTER_HARDWARE** - Including items such as Total Addressable Market.\n  * **CONSUMER_SERVICES** - Including items such as Gross Merchandise Volume\n  * **EDUCATION** - Including Items such as Total Student Enrollment\n  * **FINANCIAL_SERVICE_PROVIDER** - Including items such as Annual Subscription Value\n  * **HOME_BUILDERS** - Including items such as Home Sales, Land Sales, Cancellation Rates, and more.\n  * **HOSPITALS** - Including items such as Bad Debt Provisions, Medical Cost Ratio, SS Admissions and more.\n  * **HOTELS** - Including items such as Average Daily Rate, Occupancy %, RevPAR, and more.\n  * **INSURANCE** - Including items such as Gross Premiums Written, Underwriting Income, and Claims.\n  * **HOSPITALS** - Including items such as Bad Debt Provisions, Medical Cost Ratio, SS Admissions and more.\n  * **HOTELS** - Including items such as Average Daily Rate, Occupancy %, RevPAR, and more.\n  * **INSURANCE** - Including items such as Gross Premiums Written, Underwriting Income, and Claims.\n  * **MARIJUANA** - Including items such as Cost per Gram and Kg of Cannabis Sold.\n  * **MINING** - Including items such as Realized Price and Total Production\n  * **MULTIFINANCIAL** - Including items such as AUM, Net Flows, and Fee Related Earnings.\n  * **OIL_AND_GAS** - Including items such as Downstream Income, Production per Day, and Exploration Expense.\n  * **OTHER** - Target Price\n  * **REITS** - Including items such as Funds from Operations, Implied Cap Rate, and LTV.\n  * **RESTAURANTS** - Including items such as Restaurant Margin.\n  * **RETAILERS** - Including items such as Stores Information, Selling Space and Net sales per square foot.\n  * **TELECOMMUNICATIONS** - Including items such as Gross Adds, Monthly Revenue Per User, Churn, and more.\n  * **TRANSPORTATION** - Including items such as Revenue Per Unit, Volume Growth, and Operating Ratio.</p>\n"
