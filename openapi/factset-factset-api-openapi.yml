components:
  schemas:
    surpriseRequest:
      title: Surprise Request Body
      description: Request object for requesting surprise estimates.
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/ids_2'
        metrics:
          $ref: '#/components/schemas/metrics_2'
        startDate:
          $ref: '#/components/schemas/startDate_3'
        endDate:
          $ref: '#/components/schemas/endDate_3'
        frequency:
          $ref: '#/components/schemas/frequency_3'
        periodicity:
          $ref: '#/components/schemas/periodicitySurprise'
        currency:
          $ref: '#/components/schemas/currency_2'
        statistic:
          $ref: '#/components/schemas/statistic'
      required:
      - ids
      - metrics
    articlesFields:
      title: fields
      type: array
      items:
        type: string
      description: "Request available Articles data fields to be included in the response.\n Default is all fields. _fsymId_ and _articleId_ are always included.\n \n <h3>Common Fields</h3> \n  |field|description|\n  |||\n  |fsymId|Factset Regional Security Identifier|\n  |articleId|Unique ID of the article assigned by Truvalue|          \n  \n <h3> Articles Fields</h3>\n \n  |field|description|\n  |||\n  |datePub|Publication date of the article expressed in YYYY-MM-DD format|\n  |title|Title of the article|\n  |source|Source of the article|\n  |categories|categories assigned by Truvalue|\n  |bullets|AI-generated bullet point summary for each article. Note, including bullets increases response size drastically|\n  |author|Author of the article|\n  |url|URL of the article|\n  |language|Language code of the article|\n  |orgName| Organization name assigned by Truvalue|\n  |orgId| Unique identifier assigned by Truvalue that is applied on an organization level\n  \n"
      example:
      - datePub
    benchmarkConstituentsResponse:
      title: Benchmark Constituents Response
      type: object
      properties:
        data:
          description: 'Array of metric objects representing the metrics that can be requested

            from the estimates APIs.

            '
          type: array
          items:
            $ref: '#/components/schemas/benchmarkConstituent'
          example: []
    ids:
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 1000
      description: 'Security or Entity identifiers. FactSet Identifiers, tickers, CUSIP and SEDOL are accepted input. <p>***ids limit** =  1000 per request*</p> *<p>Make note, GET Method URL request lines are also limited to a total length of 8192 bytes (8KB). In cases where the service allows for thousands of ids, which may exceed this request line limit of 8KB, its advised for any requests with large request lines to be requested through the respective "POST" method.</p>*

        '
      example:
      - AAPL-USA
    benchmarkConstituent:
      title: Benchmark Constituent
      type: object
      properties:
        fsymId:
          type: string
          description: Benchmark Id
          example: SPY-US
          nullable: true
        date:
          description: Date of weight and shares.
          type: string
          format: date
          example: '2020-07-01'
          nullable: true
        fsymSecurityId:
          description: FactSet Security Identifier (-S). If Cash or Generic Id holding, response will just pass through generic id (e.g. CASH_USD).
          type: string
          example: TKPJVY-S
          nullable: true
        fsymRegionalId:
          description: FactSet Regional Identifier (-R). If Cash or Generic Id holding, response will just pass through generic id (e.g. CASH_USD).
          type: string
          example: F07Q7W-R
          nullable: true
        currency:
          description: Currency code for prices.
          type: string
          example: USD
          nullable: true
        weightClose:
          description: Weight of Security in benchmark (percent).
          type: number
          format: double
          example: 0.085717610340781
          nullable: true
        adjHolding:
          description: Shares held adjusted. Units in Millions.
          type: number
          format: double
          example: 0.884722
          nullable: true
        unadjHolding:
          description: Shares held unadjusted. Units in Millions.
          type: number
          format: double
          example: 0.884722
          nullable: true
        price:
          description: Price of shares held.
          type: number
          format: double
          example: 267.97
          nullable: true
        adjMarketValue:
          description: Market value adjusted. Market Value represented in Millions.
          type: number
          format: double
          example: 237.07895434
          nullable: true
        requestId:
          type: string
          description: Identifier specified in the request
          example: SPY-US
    requestedDate:
      title: Date
      type: string
      description: Date of holding expressed in YYYY-MM-DD format.
      example: '2020-08-06'
    sasbScoresAll:
      title: SASB Scores All Object
      type: object
      properties:
        date:
          description: Date for the period requested expressed in YYYY-MM-DD format.
          type: string
          format: date
          example: '2020-09-30'
          nullable: true
        fsymId:
          description: FactSet Entity Identifier. Six alpha-numeric characters, excluding vowels, with a -E suffix (XXXXXX-E).
          type: string
          example: 001MF1-E
          nullable: true
        requestId:
          description: Identifier that was used for the request.
          type: string
          example: AMZN-US
        scoreType:
          description: 'The name of the specific SASB Score type being shown in the response. This will be represented by the scoreTypes input: PULSE, INSIGHT, MOMENTUM, ART_VOL_TTM, CAT_VOL_TTM, or DYNAMIC_MAT.'
          type: string
