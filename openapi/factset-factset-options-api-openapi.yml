          x-fds-fql-formula: P_OPT_GAMMA
          nullable: true
        requestId:
          description: The requested identifier submitted in the query.
          type: string
          example: TSLA.US#C00LP
        rho:
          description: The rho value of the option. Refer to the `greeks` endpoint description for more details
          type: number
          format: double
          example: 0.094465131548418
          x-fds-fql-formula: P_OPT_RHO
          nullable: true
        theta:
          description: The theta value of the option. Refer to the `greeks` endpoint description for more details
          type: number
          format: double
          example: 0.473699140972176
          x-fds-fql-formula: P_OPT_THETA
          nullable: true
        vega:
          description: The vega value of the option. Refer to the `greeks` endpoint description for more details
          type: number
          format: double
          example: 0.246816993561083
          x-fds-fql-formula: P_OPT_VEGA
          nullable: true
        date:
          description: The date the data is as of in YYYY-MM-DD format.
          type: string
          format: date
          example: '2021-05-07'
          nullable: true
    impliedVolatilityResponse:
      title: volatilityResponse
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/impliedVolatility'
    optionsReferences:
      title: optionsReferences
      type: object
      description: Options Reference Response Fields
      properties:
        fsymId:
          description: FactSet's Option Symbol. For more detail, visit [OA 12636](https://my.apps.factset.com/oa/pages/12636#options)
          type: string
          example: TSLA.US#C00LP
          x-fds-fql-formula: P_OPT_SYMBOL('FOS')
          nullable: true
        adjustedFlag:
          description: Indicates whether or not a given option contract is adjusted for corporate actions in Y/N format.
          type: string
          example: N
          x-fds-fql-formula: P_OPT_ISADJUSTED
          nullable: true
        callPutFlag:
          description: Returns a 0 if the option is a call, returns a 1 if the option is a put.
          type: integer
          example: 0
          x-fds-fql-formula: P_OPT_CALL_OR_PUT
          nullable: true
        callPutPairSymbol:
          description: Returns the corresponding put symbol given a call symbol; and vice-versa.
          type: string
          example: TSLA.US#PGGVL
          x-fds-fql-formula: P_OPT_PC_PAIRS
          nullable: true
        contractSize:
          description: The Option Contract Size
          type: integer
          example: 100
          x-fds-fql-formula: P_OPT_CONTRACT_SIZE
          nullable: true
        currency:
          description: Option Currency in ISO3 format.
          type: string
          example: USD
          x-fds-fql-formula: P_OPT_CURRENCY
          nullable: true
        exchange:
          description: Option Exchange ISO. Visit [OA 14925](https://my.apps.factset.com/oa/pages/14925) for a list of Exchange ISOs.
          type: string
          example: USA
          x-fds-fql-formula: P_OPT_EXCHANGE
          nullable: true
        expirationDate:
          description: The date on which an options contract is no longer valid and, therefore, ceases to exist, in YYYY-MM-DD format
          type: string
          format: date
          example: '2021-09-17'
          x-fds-fql-formula: P_OPT_EXP_DATEN
          nullable: true
        expirationFrequency:
          description: Returns the corresponding expiration frequency for a given option symbol. If an option has more than four expiration months, then a Long-term Equity Anticipation Security (LEAPS) indicator will be returned.
          type: string
          example: LEAPS
          x-fds-fql-formula: P_OPT_EXP_FREQ
          nullable: true
        expirationMonth:
          description: Option Expiration month in MMM format.
          type: string
          example: SEP
          x-fds-fql-formula: P_OPT_EXP_MONTH
          nullable: true
        lepoFlag:
          description: Indicates whether or not a given options contract is a Low Exercise Price Option "LEPO" (0/1). This is unique to European Options (e.g. ASX exchange).
          type: integer
          example: null
          x-fds-fql-formula: P_OPT_IS_LEPO
          nullable: true
        name:
          description: Option Descriptive Security Name
          type: string
          example: Tesla Inc Call SEP21 190.00 (LEAPs)
          x-fds-fql-formula: P_OPT_SECURITY_NAME
          nullable: true
        occ21Symbol:
          description: 'Options Clearing Corporation OSI Series Key This option symbol has up to 21 alphanumeric characters (excluding -ISO and # sign) and uses the following syntax- (Underlying Symbol + # + Expiration Year + Expiration Month + Expiration Day + Call/Put Indicator + Five-Digit Strike Dollar + Three-Digit Strike Decimal + - + ISO)

            '
          type: string
          example: TSLA#210917C00190000
          x-fds-fql-formula: P_OPT_SYMBOL("OCC21")
          nullable: true
        opra17Symbol:
          description: 'Options Price Reporting Authority''s OSI Series Key. This option symbol has up to 17 alphanumeric characters (excluding the -ISO and #) and uses the following syntax - (Underlying Symbol + # + Call/Put Expiration Month Code + Expiration Day + Expiration Year + Decimal Indicator + Strike Price + - + ISO)

            '
          type: string
          example: TSLA#I1721C190000
          x-fds-fql-formula: P_OPT_SYMBOL("OPRA17")
          nullable: true
        rootTicker:
          description: The Root Ticker for the underlying security.
          type: string
          example: TSLA
          x-fds-fql-formula: P_OPT_ROOT_SYMBOL
          nullable: true
        style:
          description: "Returns the style of the option id requested, where - \n\n|style|description|\n|||\n|0|American|\n|1|European|\n\nAn American style option can be exercised anytime during its life. The majority of exchange-traded options are American.\n\nSince investors have the freedom to exercise their American options at any point during the life of the contract, they are more valuable than European options which can only be exercised at maturity.\n\nConsider this example -  If you bought a Ford March Call option expiring in March of 2006 in March 2005, you would have the right to exercise the call option at anytime up until its expiration date. Had the Ford option been a European option, you could only exercise the option at the expiry date in March '06. During the year, the share price could have been most optimal for exercise in December of 2005, but you would have to wait to exercise your option until March 2006, where it could be out-of-the-money and virtually worthless.\n\nNote that the name of this option style has nothing to do with the geographic location.\n"
          type: integer
          example: 0
          x-fds-fql-formula: P_OPT_STYLE
          nullable: true
        type:
          description: "The option type code, where \n|code|description|\n|||\n|0|Equity Option|\n|2|Index Option|\n|99|Option on an ETF|\n|60|Option on a Future|\n|19|Option on a Spot FX Rate|\n"
          type: integer
          example: 1
          x-fds-fql-formula: P_OPT_OPTION_TYPE
          nullable: true
        underlyingFsymSecurityId:
          description: Underlying FactSet Security Permanent Identifier in XXXXXX-S format.
          type: string
          example: WWDPYB-S
          nullable: true
        date:
          description: The date the data is as of in YYYY-MM-DD format.
          type: string
          format: date
          example: '2021-05-07'
          nullable: true
        settlementMethod:
          description: 'The contract settlement method. Possible values are -

            |method|description|

            |||

            |C|Cash|

            |P|Physical|

            |NA|Not Covered|

            '
          type: string
          example: null
          nullable: true
        requestId:
          description: The requested identifier submitted in the query.
          type: string
          example: TSLA.US#C00LP
    snapshotRequest:
      title: snapshotRequest
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/optionIds'
        date:
          $ref: '#/components/schemas/chainsDate'
        currency:
          $ref: '#/components/schemas/currency'
        calendar:
          $ref: '#/components/schemas/calendar'
      required:
      - ids
    optionsDatesResponse:
      title: optionsDatesResponse
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/optionsDates'
    optionsVolumeResponse:
      title: optionsVolumeResponse
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/optionsVolume'
    optionsReferencesResponse:
      title: optionsReferencesResponse
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/optionsReferences'
    frequency:
      type: string
      title: frequency
      description: "Controls the display frequency of the data returned.\n  * **D** = Daily\n  * **W** = Weekly, based on the last day of the week of the start date.\n  * **M** = Monthly, based on the last trading day of the month.\n  * **AM** = Monthly, based on the start date (e.g., if the start date is June 16, data is displayed for June 16, May 16, April 16 etc.).\n  * **CQ** = Quarterly based on the last trading day of the calendar quarter (March, June, September, or December).\n  * **FQ** = Fiscal Quarter of the company.\n  * **AY** = Actual Annual, based on the start date.\n  * **CY** = Calendar Annual, based on the last trading day of the calendar year.\n  * **FY** = Fiscal Annual, based on the last trading day of the company's fiscal year."
      enum:
      - D
      - W
      - M
      - AM
      - CQ
      - FQ
      - AY
      - CY
      - FY
      default: D
      example: D
    optionScreeningResponse:
      title: optionScreeningResponse
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/optionScreening'
    optionScreening:
      title: optionScreening
      type: object
      properties:
        optionId:
          type: string
          description: The option identifier
          example: AAPL.US#C0185
          x-fds-fql-formula: P_OPT_SCREENING
          nullable: true
      description: Option Screening response fields
    optionsVolumeRequest:
      title: optionsVolumeRequest
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/optionIds'
        startDate:
          $ref: '#/components/schemas/startDate'
        endDate:
          $ref: '#/components/schemas/endDate'
        frequency:
          $ref: '#/components/schemas/frequency'
        exchange:
          $ref: '#/components/schemas/exchange'
        calendar:
          $ref: '#/components/schemas/calendar'
      required:
      - ids
  examples:
    badRequestInvalidParameters:
      summary: Bad Request - Invalid Parameters
      description: This error message occurs when a request parameter is used in which is not recognized by the service. Please revise your request to include only the parameters listed in the specification. Typical causes are spelling mistakes and use of improper casing.
      value:
        status: Bad Request
        timestamp: '2020-06-12 15:58:54.068'
        path: /factset-options/v1/{endpoint}
        message: 'Invalid Parameter (s): fakeParameterName1 fakeParameterName2. Please modify your request to use parameters outlined in the specification for this endpoint.'
        subErrors: null
    badRequestDateFormat:
      summary: Bad Request - Date Format
      description: This bad request occurs when a request does not use the YYYY-MM-DD in the date parameters. To resolve, convert your date to YYYY-MM-DD.
      value:
        status: Bad Request
        timestamp: '2019-10-31 16:08:07.945'
        path: /factset-options/v1/{endpoint}
        message: 'The date parameter ''startDate'' must be in the following date format: YYYY-MM-DD'
        subErrors: null
    notWritable:
      summary: Internal Server Error - Not Writable
      description: This error may be returned when the server encounters an error writing the JSON response.
      value:
        status: Internal Server Error
        timestamp: '2019-11-05 09:48:29.18'
        path: /factset-options/v1/{endpoint}
        message: Error writing JSON output
        subErrors: null
    unsupportedMediaType:
      summary: Unsupported Media Type
      description: This bad request occurs when the media type passed in the request is not supported. Currently the APIs only support 'application/json'.
      value:
        status: Unsupported Media Type
        timestamp: '2019-11-05 09:42:27.237'
        path: /factset-options/v1/{endpoint}
        message: text/html media type is not supported. Supported media types are application/json
        subErrors: null
    generalException:
      summary: Internal Server Error - General Exception
      description: This is the most general error that can be returned to by the service. Please `Report Issue` to FactSet.
      value:
        status: Internal Server Error
        timestamp: '2019-11-01 10:36:01.944'
        path: /factset-options/v1/{endpoint}
        message: Unexpected error
        subErrors: null
    badRequestReadTimeout:
      summary: Bad Request - Read Timeout
      description: This error may be returned if it takes more than 29 seconds to hear back from the data fetch service.
      value:
        status: Bad Request
        timestamp: '2019-11-04 16:18:38.949'
        path: /factset-options/v1/{endpoint}
        message: The request took too long. Try again with a smaller request.
        subErrors: null
    badRequestFutureDate:
      summary: Bad Request - Future Date
      description: This error message occurs when a future date is requested in the startDate and endDate parameters. Please revise your request to include dates as of today's current date or any prior historical date.
      value:
        status: Bad Request
        timestamp: '2020-06-12 15:52:48.091'
        path: /factset-options/v1/{endpoint}
        message: The use of future dates is not applicable in this endpoint. Please revise your request to include dates up to today's current date.
        subErrors: null
    forbidden:
      summary: Forbidden
      description: The USERNAME-SERIAL attempted to request the endpoint is not authorized to access. The request was a legal request, but the server is refusing to respond. Please reach out to FactSet Account Team for assistance with authorization.
      value:
        status: Forbidden
        timestamp: '2020-06-12 16:08:51.731'
        path: /factset-options/v1/{endpoint}
        message: USERNAME-SERIAL does not have permission to use /factset-funds /v1/{endpoint}
        subErrors: null
    unauthenticated:
      summary: User Authentication Failed
      description: This occurs when a user is not properly authenticated or recognized by the service. Please double check the USERNAME-SERIAL and API-Key used to request and ensure you are within the IP range specified for the Key. Report Issue under 401 error for help with troubleshooting.
      value:
        status: User Authentication Failed
        timestamp: '2019-10-31 16:08:07.945'
        path: /factset-options/v1/{endpoint}
        message: User Authentication Failed.
        subErrors: null
    badRequestMalformedJSON:
      summary: Bad Request - Malformed JSON Request
      description: This error may be returned when the request body is specified as JSON, but is not in proper JSON format.
      value:
        status: Bad Request
        timestamp: '2019-11-05 09:48:29.18'
        path: /factset-options/v1/{endpoint}
        message: Malformed JSON Request
        subErrors: null
    badRequestRequiredParameter:
      summary: Bad Request - Required Parameter Missing
      description: This error message occurs when the request does not include the required parameters. Required parameters are indicated with a red asterisks symbol in the specification file.
      value:
        status: Bad Request
        timestamp: '2020-06-12 15:48:42.016'
        path: /factset-options/v1/{endpoint}
        message: The parameter 'ids' is required and may not be empty.
        subErrors: null
  responses:
    '401':
      description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have successfully generated an API KEY for the IP range you are connecting from. For more help, select the **Report Issue** in the top right corner of this Developer Portal specification card and choose Connectivity 401 or 403 Responses.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/unauthenticated'
    '415':
      description: Unsupported Media Type. This error may be returned when the caller sends a resource in a format that is not accepted by the server. This can be fixed by ensuring that Content-Type header is set to the correct value. In this instance, "application/json" would be the appropriate value.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/unsupportedMediaType'
    '403':
      description: The USERNAME-SERIAL attempted to request the endpoint is not authorized to access. The request was a legal request, but the server is refusing to respond. Please reach out to FactSet Account Team for assistance with authorization.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/forbidden'
    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          examples:
            Internal Server Error - Not Writable:
              $ref: '#/components/examples/notWritable'
            Internal Server Error - General Exception:
              $ref: '#/components/examples/generalException'
    '400':
      description: Bad Request. This can occur for several reasons. Please review the "message" for more details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          examples:
            Bad Request - Date Format:
              $ref: '#/components/examples/badRequestDateFormat'
            Bad Request - Missing Required Parameter:
              $ref: '#/components/examples/badRequestRequiredParameter'
            Bad Request - Future Date:
              $ref: '#/components/examples/badRequestFutureDate'
            Bad Request - Invalid Parameter:
              $ref: '#/components/examples/badRequestInvalidParameters'
            Bad Request - Malformed JSON:
              $ref: '#/components/examples/badRequestMalformedJSON'
            Bad Request - Read Timeout:
              $ref: '#/components/examples/badRequestReadTimeout'
