    optionScreeningRequest:
      title: optionScreeningRequest
      type: object
      description: 'Options Screening Request allowing for up to three Conditions using AND Logic.

        |conditions|description|

        |||

        |P_OPT_UNDERLYING_SECURITY_E|Underlying Security Equal To|

        |P_OPT_STRIKE_PRICE_E|Strike Price Equal To|

        |P_OPT_EXP_DATEN_E|Expiration Date (YYYYMMDD) Equal To|

        |P_OPT_VOLUME_G|Volume Greater Than|

        |P_OPT_VOLUME_GE|Volume Greater Than or Equal To|

        |P_OPT_VOLUME_L|Volume Less Than|

        |P_OPT_VOLUME_LE|Volume Less Than or Equal To|

        |P_OPT_VOLUME_E|Volume Equal To|

        |P_OPT_OPTION_TYPE_E|Option Type (1= Equity, 2=Index)|

        |P_OPT_CALL_OR_PUT_E|Call or Put (0=Call, 1=Put)|

        '
      required:
      - ids
      - conditionOne
      - conditionOneValue
      properties:
        ids:
          $ref: '#/components/schemas/exchangeScreeningId'
        conditionOne:
          description: The primary condition.
          type: string
          example: P_OPT_UNDERLYING_SECURITY_E
          enum:
          - P_OPT_UNDERLYING_SECURITY_E
          - P_OPT_STRIKE_PRICE_E
          - P_OPT_EXP_DATEN_E
          - P_OPT_VOLUME_G
          - P_OPT_VOLUME_GE
          - P_OPT_VOLUME_L
          - P_OPT_VOLUME_LE
          - P_OPT_VOLUME_E
          - P_OPT_OPTION_TYPE_E
          - P_OPT_CALL_OR_PUT_E
        conditionOneValue:
          type: string
          example: AAPL
        conditionTwo:
          type: string
          example: P_OPT_CALL_OR_PUT_E
          enum:
          - P_OPT_UNDERLYING_SECURITY_E
          - P_OPT_STRIKE_PRICE_E
          - P_OPT_EXP_DATEN_E
          - P_OPT_VOLUME_G
          - P_OPT_VOLUME_GE
          - P_OPT_VOLUME_L
          - P_OPT_VOLUME_LE
          - P_OPT_VOLUME_E
          - P_OPT_OPTION_TYPE_E
          - P_OPT_CALL_OR_PUT_E
        conditionTwoValue:
          type: string
          example: '1'
        conditionThree:
          type: string
          enum:
          - P_OPT_UNDERLYING_SECURITY_E
          - P_OPT_STRIKE_PRICE_E
          - P_OPT_EXP_DATEN_E
          - P_OPT_VOLUME_G
          - P_OPT_VOLUME_GE
          - P_OPT_VOLUME_L
          - P_OPT_VOLUME_LE
          - P_OPT_VOLUME_E
          - P_OPT_OPTION_TYPE_E
          - P_OPT_CALL_OR_PUT_E
          example: P_OPT_VOLUME_G
        conditionThreeValue:
          type: string
          example: '0'
        date:
          type: string
          example: '2021-03-31'
