                  componentid: >-
                    67077F67610EC30675E240A614661176C792A8997C78C9B9D64F738C01F18893
                  accounts:
                  - id: BENCH:SP100EQ
                    holdingsmode: B&H
                  benchmarks:
                  - id: BENCH:SP50
                    holdingsmode: B&H
                  dates:
                    frequency: Single
                    enddate: '0'
