  /analytics/engines/pa/v3/calculations/{id}:
    put:
      tags:
      - Analytics
      - Calculations
      - Engines
      summary: Factset Create or Update Pa Calculation and Run It.
      description: "This endpoint updates and run the PA calculation specified in the PUT body parameters. This also allows creating new PA calculations with custom ids.\r\nIt can take one or more calculation
        units as input.\r\n\r\nRemarks:\r\n\r\n*\tAny settings in PUT body will act as a one-time override over the settings saved in the PA template.\r\n\r\n*   Account identifiers must have .ACCT or .ACTM
        extension or BENCH: prefix. Holdings mode can be optionally set for every account. \r\n    Possible values for holdings mode are B&H (Buy and Hold), TBR (Transaction based returns), OMS (Order Management
        System), \r\n    VLT (Vaulted returns) or EXT (External Returns Data). Default holdings mode value is B&H.\r\n\r\n*   If we are overriding the grouping with a frequency, we will be overriding the
        grouping saved to the original component and also overriding \r\n    the default frequency of the Beginning of Period to whatever we pass in the request body.\r\n    \r\n*   If we are overriding
        gouping frequency without overriding the group id it will not be applied to the default groupings saved to the original component.\r\n\r\n*   Componentdetail supports securities, groups, groupsall,
        and totals levels of granularity. However, if no value is passed, the default value is 'securities'.\r\n    Additionally, while 'groupsall' returns all the group levels in the PA component,\r\n\
        \    setting componentdetail to 'groups' only returns the expanded or collapsed group levels within the PA component."
      operationId: putAndCalculate
      parameters:
      - name: id
        in: path
        description: >-
          from url, provided from the location header in the Create and Run PA
          calculation endpoint
        required: true
        schema:
          type: string
          description: >-
            from url, provided from the location header in the Create and Run
            PA calculation endpoint
      - name: X-FactSet-Api-Long-Running-Deadline
        in: header
        description: >-
          Long running deadline in seconds when only one unit is passed in the
          PUT body.
        schema:
          type: integer
      - name: Cache-Control
        in: header
        description: Standard HTTP header.  Accepts max-stale.
        schema:
          type: string
      requestBody:
        description: Calculation Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PACalculationParametersRoot'
            example:
              data:
                '1':
                  componentid: >-
                    801B800245E468A52AEBEC4BE31CFF5AF82F371DAEF5F158AC2E98C2FA324B46
                  accounts:
                  - id: BENCH:DJII
                    holdingsmode: B&H
                  benchmarks:
                  - id: BENCH:SP50
                    holdingsmode: B&H
                  dates:
                    startdate: '20210101'
                    enddate: '20210231'
                    frequency: Monthly
                  currencyisocode: USD
