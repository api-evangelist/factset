  /analytics/engines/pa/v3/templated-components:
    post:
      tags:
      - Analytics
      - Engines
      - Templated
      summary: Factset Create Templated Pa Component
      description: "This endpoint creates new component based off of linked PA template or unlinked PA template.\r\n\r\nRemarks:\r\n\r\n*   Any settings in the POST body will act as a one-time override
        over the settings saved in the PA template.\r\n\r\n*   Account identifiers must have .ACCT or .ACTM extension or BENCH: prefix. Holdings mode can be optionally set for every account. \r\n    Possible
        values for holdings mode are B&H (Buy and Hold), TBR (Transaction based returns), OMS (Order Management System), \r\n    VLT (Vaulted returns) or EXT (External Returns Data). Default holdings mode
        value is B&H.\r\n\r\n*   Multi-horizon frequencies are not supported through this endpoint.\r\n\r\n*   Componentdetail supports securities, groups, groupsall, and totals levels of granularity. However,
        if no value is passed, the default value is 'securities'.\r\n    Additionally, while 'groupsall' returns all the group levels in the PA component,\r\n    setting componentdetail to 'groups' only
        returns the expanded or collapsed group levels within the PA component.\r\n\r\n*   If we are overriding the grouping with a frequency, we will be overriding the grouping saved to the original component
        and also overriding \r\n    the default frequency of the Beginning of Period to whatever we pass in the request body.\r\n    \r\n*   If we are overriding gouping frequency without overriding the
        group id it will not be applied to the default groupings saved to the original component."
      operationId: createTemplatedPAComponents
      requestBody:
        description: Request Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplatedPAComponentParametersRoot'
            example:
              data:
                directory: Personal:TemplatedPAComponents/
                parentTemplateId: '01234567890123456789012345678901'
                description: This is a templated PA component
                componentData:
                  accounts:
                  - id: SPN:SP50
                    holdingsmode: B&H
                  - id: MSCI_USA:984000
                    holdingsmode: B&H
                  benchmarks:
                  - id: SPN:SP50
                    holdingsmode: B&H
                  - id: DJGX:AMERICAS
                    holdingsmode: B&H
                  groups:
                  - id: >-
                      5BCFFD17598FAEBD88EB4934EFB5FEF53849867D607ECEF232CD42D3369BBBCA
                    frequency: BeginningOfPeriod
                  columns:
                  - id: >-
                      BD1720474AB8A80BDD79777F5B9CA594F4151C0554E30F9C916BA73BFAFC1FE0
                    statistics:
                    - eb9d6d91416e4224bacadc261787e56f
                  datasources:
                    portfoliopricingsources:
                    - id: >-
                        39A1C0C7BD46731552B29D913804EC5F3ED91E6B991AF298DEC88CCA2A9FC6B3
                    benchmarkpricingsources:
                    - id: >-
                        9BB2A3142C450AF54A7486C1D37A210A64474B2499A1E4A30E19801B9FC55E8C
                    useportfoliopricingsourcesforbenchmark: false
                  currencyisocode: USD
                  componentdetail: GROUPS
        required: true
