  /analytics/engines/pa/v3/templated-components/{id}:
    put:
      tags:
      - Analytics
      - Engines
      - Templated
      summary: Factset Update Templated Pa Component
      description: "This endpoint allows the user to change the request body from an existing templated PA component.\r\n\r\nRemarks:\r\n\r\n*   Any settings in the POST body will act as a one-time override
        over the settings saved in the PA template.\r\n\r\n*   Account identifiers must have .ACCT or .ACTM extension or BENCH: prefix. Holdings mode can be optionally set for every account. \r\n    Possible
        values for holdings mode are B&H (Buy and Hold), TBR (Transaction based returns), OMS (Order Management System), \r\n    VLT (Vaulted returns) or EXT (External Returns Data). Default holdings mode
        value is B&H. \r\n\r\n*   Multi-horizon frequencies are not supported through this endpoint.\r\n\r\n*   Componentdetail supports securities, groups, groupsall, and totals levels of granularity.
        However, if no value is passed, the default value is 'securities'.\r\n    Additionally, while 'groupsall' returns all the group levels in the PA component,\r\n    setting componentdetail to 'groups'
        only returns the expanded or collapsed group levels within the PA component.\r\n\r\n*   If we are overriding the grouping with a frequency, we will be overriding the grouping saved to the original
        component and also overriding \r\n    the default frequency of the Beginning of Period to whatever we pass in the request body.\r\n    \r\n*   If we are overriding gouping frequency without overriding
        the group id it will not be applied to the default groupings saved to the original component."
      operationId: updateTemplatedPAComponents
      parameters:
      - name: id
        in: path
        description: Unique identifier for a templated PA component
        required: true
        schema:
          type: string
          description: Unique identifier for a templated PA component
          example: '01234567890123456789012345678901'
      requestBody:
        description: Request Parameters
