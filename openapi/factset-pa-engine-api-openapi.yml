    get:
      tags:
      - Analytics
      - Columns
      - Engines
      summary: Factset Get Pa Columns
      description: >-
        This endpoint lists all the PA columns that can be applied to a
        calculation.
      operationId: getPAColumns
      parameters:
      - name: name
        in: query
        description: Column name
        schema:
          type: string
          description: Column name
          default: ''
          example: Security Name
      - name: category
