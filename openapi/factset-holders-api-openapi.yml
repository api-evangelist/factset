  parameters:
    idHolders:
      name: ids
      description: Requested list of security identifiers. <p>***ids limit** =  1 per request*</p>.
      in: query
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 1
      required: true
      explode: false
      examples:
        singleSecurityIdentifer:
          summary: Requesting Holders information for FDS-US
          value:
          - FDS-US
    requestedDate:
      name: date
      in: query
      schema:
        type: string
      required: false
      description: Date of holdings expressed in YYYY-MM-DD format. The fund-holdings endpoint will default to latest month-end close.
      example: '2019-12-31'
    currency:
      name: currency
      in: query
      schema:
        type: string
      description: Currency code for adjusting prices. Default is Local. For a list of currency ISO codes, visit [Online Assistant Page 1470](https://oa.apps.factset.com/pages/1470).
      example: USD
    topn:
      name: topn
      description: Limits number of holdings or holders displayed by the top *n* securities based on positions Market Value. Default is ALL, otherwise use number to limit number.
      in: query
      required: false
      schema:
        type: string
        default: ALL
      example: 5
    holderType:
      name: holderType
      in: query
      schema:
        type: string
        enum:
        - F
        - M
        - S
        - FS
        - B
        default: F
      description: "Controls the Holder Type of the data returned. By default, the service will return Institutional Holders. Requesting All Holders is not currently supported. Only a single Holder Type is allowed per request.\n  * **F** = Institutions\n  * **M** = Mutual Funds\n  * **S** =  Insiders/Stakeholders\n  * **FS** = Institutions/Insiders\n  * **B** = Beneficial Owners\n"
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
