openapi: 3.0.3
info:
  title: Factset Analytics Datastore About Holders API
  description: Allow clients to fetch precalculated Analytics through predeterministic URLs.
  contact:
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
    email: api@factset.com
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.factset.com
  description: Production
- url: https://api-sandbox.factset.com
  description: Sandbox
security:
- basicAuth: []
tags:
- name: Holders
paths:
  /factset-ownership/v1/security-holders:
    get:
      tags:
      - Holders
      summary: Factset Get Security Ownership Data for Requested Security Identifers.
      operationId: getSecurityHolders
      description: 'Gets security ownership details and activity for the requested security identifiers. The services allows filtering by "Topn" holders and by holder "type", such as Institutions, Insiders, and Stakeholders.

        '
      parameters:
      - $ref: '#/components/parameters/idHolders'
      - $ref: '#/components/parameters/holderType'
      - $ref: '#/components/parameters/topn'
      - $ref: '#/components/parameters/requestedDate'
      - $ref: '#/components/parameters/currency'
      responses:
        '200':
          description: Security Holders Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityHoldersResponse'
              examples:
                Single identifier request for Top 1 holder of FDS-US securities as of 2020-06-31:
                  $ref: '#/components/examples/singleSecurityHolder'
                Top 5 Insiders and Stakeholders of TSLA-US as of 2020-02-14:
                  $ref: '#/components/examples/insiderTop5Holders'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Holders
      summary: Factset Get Security Ownership Data for a List of Requested Securities.
      description: 'Gets security ownership details and activity for the requested security identifiers. The services allows filtering by "Topn" holders and by holder "type", such as Institutions, Insiders, and Stakeholders.

        '
      operationId: postSecurityHolders
      requestBody:
        required: true
        description: Requesting Security Holders for a list of Fund Identifiers.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/securityHoldersRequest'
            examples:
              Request the Top Institutional holder of FDS-US as of 2020-06-30:
                $ref: '#/components/examples/singleSecurityHolderPostRequest'
              Request Latest Top 5 Insiders for TSLA-US:
                $ref: '#/components/examples/top5InsidersRequest'
      responses:
        '200':
          description: Security Holders Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityHoldersResponse'
              examples:
                Single identifier request for Top 1 holder of FDS-US securities as of 2020-06-30:
                  $ref: '#/components/examples/singleSecurityHolder'
                Top 5 Insiders and Stakeholders of TSLA-US as of 2020-02-14:
                  $ref: '#/components/examples/insiderTop5Holders'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /holders:
    get:
      tags:
      - Holders
      operationId: getOwnershipHolders
      summary: Factset Holders of a Company or Fund
      description: Holders of a company or fund
      parameters:
      - name: id
        in: query
        description: Company or Fund Identifier
        required: true
        schema:
          type: string
          example: FDS
      - name: asset_type
        in: query
        description: Controls the Asset Type of the data returned
        required: false
        schema:
          type: string
          enum:
          - EQUITY
          - DEBT
          default: EQUITY
      - name: holder_type
        in: query
        description: Controls the Holder Type of the data returned
        required: false
        schema:
          type: string
          enum:
          - ALL_HOLDERS
          - BENEFICIAL_OWNERS
          - FUNDS
          - INSTITUTIONS
          - INSTITUTIONS_INSIDERS
          - INSIDERS_STAKEHOLDERS
          default: INSTITUTIONS
      - name: topn
        in: query
        description: "Limits the number of holders returned based on their Market Value position in the security.  \nDefault is ALL, otherwise use a valid number above 0.\n"
        schema:
          type: string
          example: ALL
      - name: date
        in: query
        description: Top Holders as of date expressed in YYYY-MM-DD format. Defaults to latest month-end close; non-month-end dates are converted to month-end dates.
        required: false
        schema:
          type: string
          example: '2019-12-31'
      responses:
        '200':
          $ref: '#/components/responses/200OKStach'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '429':
          $ref: '#/components/responses/429TooManyRequests'
        '500':
          $ref: '#/components/responses/500InternalServerError'
        '503':
          $ref: '#/components/responses/503ServiceUnavailable'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    Meta:
      type: object
      additionalProperties:
        type: string
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorObject'
          example: []
        meta:
          $ref: '#/components/schemas/Meta'
    holderType:
      type: string
      enum:
      - F
      - M
      - S
      - FS
      - B
      default: F
      description: "Controls the Holder Type of the data returned. By default, the service will return Institutional Holders. Requesting All Holders is not currently supported. Only a single Holder Type is allowed per request.\n  * **F** = Institutions\n  * **M** = Mutual Funds\n  * **S** =  Insiders/Stakeholders\n  * **FS** = Institutions/Insiders\n  * **B** = Beneficial Owners\n"
    Response:
      type: object
      properties:
        data:
          title: STACH
          description: Returns a STACH 2.0 row organized package
          example: example_value
        meta:
          $ref: '#/components/schemas/Meta'
    ErrorObject:
      type: object
      properties:
        id:
          type: string
          example: abc123
        code:
          type: string
          example: example_value
        title:
          type: string
          example: Example Title
        links:
          type: object
          properties:
            about:
              type: string
          example: example_value
        detail:
          type: string
          example: example_value
        source:
          type: object
          properties:
            parameter:
              type: string
          example: example_value
    idHolders:
      description: Security Requested for Holders information.
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 1
      example:
      - FDS-US
    requestedDate:
      description: Date of holdings expressed in YYYY-MM-DD format.
      type: string
      example: '2019-09-30'
    securityHoldersRequest:
      title: Security Holders Request
      description: Security Holders Request
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/idHolders'
        holderType:
          $ref: '#/components/schemas/holderType'
        date:
          $ref: '#/components/schemas/requestedDate'
        topn:
          $ref: '#/components/schemas/topn'
        currency:
          $ref: '#/components/schemas/currency'
      required:
      - ids
    securityHoldersResponse:
      title: Security Holders Response
      type: object
      description: securityHolders response
      properties:
        data:
          description: Array of Security Holders
          type: array
          items:
            $ref: '#/components/schemas/securityHolders'
          example: []
    securityHolders:
      title: Security Holders
      description: Security Holders response object
      type: object
      properties:
        holderId:
          description: FactSet Ownership Holders ID that corresponds to the requested security holder.
          type: string
          example: M4004630
          nullable: true
        fsymId:
          description: FactSet Security Identifier of security requested. This does not represent the FactSet permanent identifier for the holder, but rather the requested id. Six alpha-numeric characters, excluding vowels, with an -S suffix (XXXXXX-S). All equity and fixed income securities that exist on FactSet are allocated a security-level permanent identifier.
          type: string
          example: SQFMK3-R
          nullable: true
        holderEntityId:
          description: FactSet Entity ID that corresponds to the specified holder ID.
          type: string
          example: 07JGQN-E
          nullable: true
        holderName:
          description: Name of the holder for the requested security identifier.
          type: string
          example: Vanguard Total Stock Market Index Fund
          nullable: true
        date:
          description: 'Date of the reported holding in YYYY-MM-DD format. For more details regarding date resolution, visit [Online Assistant Page #11262](https://oa.apps.factset.com/pages/11262).'
          type: string
          format: date
          example: '2020-06-30'
          nullable: true
        currency:
          description: 'Currency code. The service will default to the local currency if the currency is not requested. For a list of currency ISO codes, visit [Online Assistant Page #1470](https://oa.apps.factset.com/pages/1470).'
          type: string
          example: USD
          nullable: true
        investorType:
          description: 'FactSet Ownership Institution, Mutual Fund, and Insider/Stakeholder investor types. To learn more about the different investor types, visit [Online Assistant Page #11656](https://my.apps.factset.com/oa/pages/11656).'
          type: string
          example: Open-End Fund
          nullable: true
        holderType:
          description: 'Holder Type name of the respective holder object. The name will align to the holderType requested. '
          type: string
          example: Mutual Fund
          nullable: true
        adjHolding:
          description: 'Adjusted number of shares held. All positions and prices are adjusted for splits and name changes, but they are not adjusted for spinoffs or mergers. If a given company announces a split today, FactSet''s Ownership data will reflect that split either tomorrow or the day after, depending upon the time in which the FactSet Symbology team makes record of the change. For more details, visit [Online Assistant Page #11262](https://oa.apps.factset.com/pages/11262).'
          type: number
          format: double
          example: 1066876
          nullable: true
        adjMarketValue:
          description: 'Adjusted market values of shares held. Market Value. All positions and prices are adjusted for splits and name changes, but they are not adjusted for spinoffs or mergers. If a given company announces a split today, FactSet''s Ownership data will reflect that split either tomorrow or the day after, depending upon the time in which the FactSet Symbology team makes record of the change. For more details, visit [Online Assistant Page #11262](https://oa.apps.factset.com/pages/11262).'
          type: number
          format: double
          example: 373833350.4
          nullable: true
        weightClose:
          description: '"Closing weight of the security for the holders of the requested security (percent). To learn more about how ownership weight is calculated please visit [Online Assistant Page #11247](https://my.apps.factset.com/oa/pages/11247)."

            '
          type: number
          format: double
          example: 0.0356
          nullable: true
        percentOutstanding:
          description: 'The percent of the outstanding common shares held by a particular filing institution. To learn more, visit [Online Assistant Page #11041](https://my.apps.factset.com/oa/pages/11041).'
          type: number
          format: double
          example: 2.808
          nullable: true
        source:
          description: Either the 13F Form or ND-30D report filed where the security holdings data was sourced from. To learn more about source, please visit https://my.apps.factset.com/oa/pages/11260
          type: string
          example: US Fund (N-30D)
          nullable: true
        requestId:
          description: 'Security Identifier that was used in the request.

            '
          type: string
          example: FDS-US
    errorResponse:
      type: object
      description: error description
      title: Error Response
      properties:
        status:
          description: status
          type: string
          example: Bad Request
        timestamp:
          description: timestamp in YYYY-MM-DD HH:MM:SS.SSS
          type: string
          example: '2019-11-01 11:09:41.918'
          format: date-time
        path:
          description: The Endpoint path {package}/version/{endpoint}
          type: string
          example: /factset-ownership/v1/{end-point}
        message:
          description: The plain text error message
          type: string
          example: Validation Error
        subErrors:
          description: subErrors related to the error message. Null if not applicable.
          type: object
          properties:
            object:
              description: the operation ID
              type: string
            field:
              description: Parameter Field Name
              type: string
            message:
              description: Error message
              type: string
            rejectedValue:
              description: Rejected Values in an Array
              type: array
              items:
                type: string
          example: example_value
    topn:
      description: Limits number of holdings or holders displayed by the top *n* securities. Default is ALL, or use integer to limit number.
      type: string
      default: ALL
      example: 5
    currency:
      description: Currency code for adjusting prices. Default is Local. For a list of currency ISO codes, visit [Online Assistant Page 1470](https://oa.apps.factset.com/pages/1470).
      type: string
      example: USD
  examples:
    top5InsidersRequest:
      summary: Requesting the latest available top 5 insiders and stakeholders for TSLA-US
      description: Requesting the latest available top 5 insiders and stakeholders for TSLA-US
      value:
        ids:
        - TSLA-US
        topn: 5
        holderType: S
    badRequestInvalidParameters:
      summary: Bad Request - Invalid Parameters
      description: This error message occurs when a request parameter is used in which is not recognized by the service. Please revise your request to include only the parameters listed in the specification. Typical causes are spelling mistakes and use of improper casing.
      value:
        status: Bad Request
        timestamp: '2020-08-03 12:02:47.804'
        path: /factset-ownership/v1/{end-point}
        message: 'Invalid Parameter (s): dated. Please modify your request to use parameters outlined in the specification for this endpoint.'
        subErrors: null
    parameterErrorTopn:
      summary: topn parameter error
      value:
        errors:
        - id: 39314614-e607-465a-ba95-5bb79c362e23
          code: parameterError
          title: 'Invalid parameter: ''topn'''
    badRequestDateFormat:
      summary: Bad Request - Date Format
      description: This bad request occurs when a request doesn't use the YYYY-MM-DD in the date parameters. To resolve, convert your date to YYYY-MM-DD.
      value:
        status: Bad Request
        timestamp: '2020-08-03 12:00:31.777'
        path: /factset-ownership/v1/{end-point}
        message: 'The date parameter(s) must be in the following date format: YYYY-MM-DD. '
        subErrors: null
    notWritable:
      summary: Internal Server Error - Not Writable
      description: This error may be returned when the server encounters an error writing the JSON response.
      value:
        status: Internal Server Error
        timestamp: '2019-11-05 09:48:29.18'
