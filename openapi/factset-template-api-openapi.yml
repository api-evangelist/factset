components:
  schemas:
    UnlinkedPATemplateCategoryAndTypeRoot:
      required:
      - data
      type: object
      properties:
        data:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/UnlinkedPATemplateCategoryAndType'
          example: example_value
        meta:
          nullable: true
          example: example_value
    ClientErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
          nullable: true
          example: []
    UnlinkedPATemplateCategoryAndTypeDetailsRoot:
      required:
      - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UnlinkedPATemplateCategoryAndTypeDetails'
        meta:
          nullable: true
          example: example_value
    createBookFromTemplatePostRequest:
      title: Request Body for Post Request
      description: It is a request body to allow users to input ticker and template id.
      type: object
      properties:
        ticker:
          type: string
          description: ticker
          example: FDS-US
        template_id:
          type: string
          description: Template ID
          example: g_20210415065838185
    UnlinkedPATemplateCategoryAndType:
      type: object
      properties:
        category:
          type: string
          description: Unlinked template category
          nullable: true
          example: example_value
        name:
          type: string
          description: Unlinked template type
          nullable: true
          example: Example Title
    ErrorSource:
      type: object
      properties:
        pointer:
          type: string
          nullable: true
          example: example_value
        parameter:
          type: string
          nullable: true
          example: example_value
    UnlinkedPATemplateGroupDetails:
      type: object
      properties:
        name:
          type: string
          description: Unlinked template group name
          nullable: true
          example: Example Title
        id:
          type: string
          description: FactSet-defined or User-defined Group identifier.
          nullable: true
          example: abc123
        frequency:
          type: string
          description: Grouping frequency
          nullable: true
          example: example_value
    Error:
      type: object
      properties:
        id:
          type: string
          nullable: true
          example: abc123
        code:
          type: string
          nullable: true
          example: example_value
        title:
          type: string
          nullable: true
          example: Example Title
        detail:
          type: string
          nullable: true
          example: example_value
        source:
          $ref: '#/components/schemas/ErrorSource'
    Enable_Book_Info_From_Template:
      title: Book Information Request
      description: Request to enable book information for the client.
      type: object
      properties:
        status:
          type: string
          description: Request status
          example: OK
        bookName:
          type: string
          description: Report Name
          example: Apple Inc.
        bookID:
          type: string
          description: Book ID
          example: 20200317133713790
    UnlinkedPATemplateCategoryAndTypeDetails:
      type: object
      properties:
        id:
          type: string
          description: Type Id
          nullable: true
          example: abc123
        columns:
          type: array
          items:
            $ref: '#/components/schemas/UnlinkedPATemplateColumnDetails'
          description: List of default columns
          nullable: true
          example: []
        groups:
          type: array
          items:
            $ref: '#/components/schemas/UnlinkedPATemplateGroupDetails'
          description: List of default groupings
          nullable: true
          example: []
        snapshot:
          type: boolean
          description: Snapshot
          example: true
        category:
          type: string
          description: Unlinked template category
          nullable: true
          example: example_value
        name:
          type: string
          description: Unlinked template type
          nullable: true
          example: Example Title
    Enable_Template_Info_Post:
      title: Template Request
      description: Request to enable template list information for the client.
      type: object
      properties:
        tmpl_id:
          type: string
          description: Template ID
          example: 20200623094829450
        tmpl_name:
          type: string
          description: Template name
          example: Financials
    createTemplatePostRequest:
      title: Request Body for Template Request
      description: The request body allows users to input the name of the template, ticker
      type: object
      properties:
        tmpl_name:
          type: string
          description: name of the template
          example: Quick Financials
        tmpl_type:
          type: string
          description: Type of the template (public,pc,pe,fi)
          example: public
        content:
          type: array
          description: Content sections
          items:
            oneOf:
            - type: object
              properties:
                section_id:
                  example: COMPANY_OVERVIEW
                reports:
                  type: array
                  items:
                    oneOf:
                    - type: string
                      example: COMPANY_SNAPSHOT_IB
                    - type: string
                      example: COMPANY_SNAPSHOT_IM
                    - type: string
                      example: ENTITY_STRUCTURE
          example: []
    UnlinkedPATemplateColumnDetails:
      type: object
      properties:
        name:
          type: string
          description: Unlinked template column name
          nullable: true
          example: Example Title
        id:
          type: string
          description: FactSet-defined or User-defined Column identifier.
          nullable: true
          example: abc123
        statistics:
          type: array
          items:
            type: string
          description: Column Statistic identifier
          nullable: true
          example: []
    Enable_Template_Info:
      title: Template Request
      description: Request to enable template list information for the client.
      type: array
      items:
        properties:
          template_id:
            type: string
            description: Template ID
            example: 20200623094829450
          template_name:
            type: string
            description: Template name
            example: Financials
          created_on:
            type: string
            description: Date on which the template was created
            example: 2020-6-23 9:48
          template_source:
            type: string
            description: Source of the template - Custom vs. Default
            example: own_template
          type:
            type: string
            description: Type of the template
            example: Public
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
externalDocs:
  url: https://developer.factset.com/api-catalog/analytics-datastore-api
  description: API Documentation
