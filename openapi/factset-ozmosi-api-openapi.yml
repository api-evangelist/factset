components:
  parameters:
    trialId:
      name: trialId
      in: query
      description: This parameter specifies ID of the trial assigned by the trial registry.
      required: false
      schema:
        type: string
      example: NCT03037385
    _paginationLimit:
      name: _paginationLimit
      in: query
      description: Specifies the maximum number of results to return per result.
      required: false
      schema:
        type: integer
        maximum: 500
        minimum: 1
        default: 20
    subTherapyArea:
      name: subTherapyArea
      in: query
      description: Specifies the Sub Therapy Area of the disease.
      required: false
      schema:
        type: string
      example: Inflammation
    _paginationOffset:
      name: _paginationOffset
      in: query
      description: Specifies the starting point for pagination. This parameter is used to identify the beginning of next set of results. Using this parameter can fetch maximum of first 10000 records.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    primaryOutcomeMeasure:
      name: primaryOutcomeMeasure
      in: query
      description: It specifies the description of each primary outcome measure (or for observational studies, specific key measurement[s] or observation[s] used to describe patterns of diseases or traits or associations with exposures, risk factors or treatment).
      required: false
      schema:
        type: string
      example: Percentage of Participants Achieving an American College of Rheumatology (ACR) 50 Response at Week 12.
    beamSponsorsName:
      name: beamSponsorsName
      in: query
      description: It specifies the cleaned name of the Sponsor.
      required: false
      schema:
        type: string
      example: AtriCure
    diseaseArea:
      name: diseaseArea
      in: query
      description: Specifies the cleaned disease name.
      required: false
      schema:
        type: string
      example: Inflammation
    beamSponsorsTicker:
      name: beamSponsorsTicker
      in: query
      description: It specifies the stock ticker for primary sponsor.
      required: false
      schema:
        type: string
      example: ATRC
    primaryOutcomeDesc:
      name: primaryOutcomeDesc
      in: query
      description: It describes the metric used to characterize the specific primary outcome measure, if not included in the primary outcome measure title.
      required: false
      schema:
        type: string
      example: Week 12
    fullForm:
      name: fullForm
      in: query
      description: This parameter specifies cleaned and standardized full names of primary endpoints that are common or of key interest.
      required: false
      schema:
        type: string
      example: Overall Survival
    _sort:
      name: _sort
      in: query
      description: Enables to get the data in ascending or descending order based on startTime. Results are in reverse chronological order if this parameter is not used.
      required: false
      schema:
        type: string
        enum:
        - startDate
        - -startDate
        default: -startDate
    clinicalTrialId:
      name: clinicalTrialId
      in: query
      description: This parameter specifies Ozmosi unique ID for each historical version of a trial.
      required: false
      schema:
        type: string
      example: NCT03037385_037
    therapyArea:
      name: therapyArea
      in: query
      description: Specifies the Therapy Area of the disease.
      required: false
      schema:
        type: string
      example: Musculoskeletal
    date:
      name: date
      in: query
      description: Specifies the timestamp of each version of a trial in YYYY-MM-DD format.
      required: false
      schema:
        type: string
        format: date-time
      example: '2022-10-13 00:00:00'
    beamOpNovelDrug:
      name: beamOpNovelDrug
      in: query
      description: This parameter identifies if the trial includes a drug that is not approved by the FDA.
      required: false
      schema:
        type: string
      example: EDP-305
    beamInterventionName:
      name: beamInterventionName
      in: query
