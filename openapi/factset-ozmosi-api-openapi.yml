openapi: 3.0.3
info:
  title: Factset Analytics Datastore About Ozmosi API
  description: Allow clients to fetch precalculated Analytics through predeterministic URLs.
  contact:
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
    email: api@factset.com
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.factset.com
  description: Production
- url: https://api-sandbox.factset.com
  description: Sandbox
security:
- basicAuth: []
tags:
- name: Ozmosi
paths:
  /ozmosi/clinical-trials/daily:
    get:
      tags:
      - Ozmosi
      summary: Returns the daily files of Clinical Trial Details from Open:FactSet Partner - Ozmosi.
      operationId: getOzmosiClinicalTrialsDaily
      description: Returns the daily files of Clinical Trial Details from Open:FactSet Partner - Ozmosi.
      parameters:
      - $ref: '#/components/parameters/_sort'
      - name: _paginationLimit
        in: query
        description: Specifies the maximum number of results to return per result Default value 20 and Maximum value 300
        required: false
        schema:
          type: integer
          default: 20
          maximum: 300
          minimum: 1
      - $ref: '#/components/parameters/_paginationOffset'
      - $ref: '#/components/parameters/clinicalTrialId'
      - $ref: '#/components/parameters/officialTitle'
      - $ref: '#/components/parameters/trialId'
      - $ref: '#/components/parameters/date'
      responses:
        '200':
          description: Download link & metadata for Clinical Trial Details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
              examples:
                default200ResponseExample:
                  $ref: '#/components/examples/sampleDataResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
              examples:
                default400ResponseExample:
                  $ref: '#/components/examples/ErrorDetails'
        '401':
          description: Unauthenticated USERNAME-SERIAL. Ensure you are logged in and have successfully generated an API KEY for the IP range you are connecting from. For more help, select the Report Issue in the top right corner of this Developer Portal specification card and choose Connectivity 401 or 403 Responses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
              examples:
                default401ResponseExample:
                  $ref: '#/components/examples/AuthErrorDetails'
        '403':
          description: The USERNAME-SERIAL attempted to request the endpoint is not authorized to access. The request was a legal request, but the server is refusing to respond. Please reach out to FactSet Account Team for assistance with authorization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
              examples:
                default403ResponseExample:
                  $ref: '#/components/examples/AuthorizationErrorDetails'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
              examples:
                default500ResponseExample:
                  $ref: '#/components/examples/serverErrorDetails'
