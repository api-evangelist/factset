components:
  schemas:
    ClientErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
          nullable: true
          example: []
    VaultIdentifier:
      required:
      - id
      type: object
      properties:
        id:
          type: string
          description: User's FactSet account path OR benchmark.
          example: abc123
      description: The account/benchmark parameter for Vault calculation.
    PAComponentRoot:
      required:
      - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PAComponent'
        meta:
          nullable: true
          example: example_value
    SPARIdentifier:
      required:
      - id
      type: object
      properties:
        id:
          type: string
          description: User's FactSet account OR benchmark id.
          example: abc123
        returntype:
          type: string
          description: Benchmark return type.
          nullable: true
          example: example_value
        prefix:
          type: string
          description: Benchmark prefix.
          nullable: true
          example: example_value
      description: The account/benchmark parameter for SPAR calculation.
    PAIdentifier:
      required:
      - id
      type: object
      properties:
        id:
          type: string
          description: User's FactSet account path OR benchmark.
          example: abc123
        holdingsmode:
          type: string
          description: Holdings Mode can be B&H, TBR, OMS, EXT or VLT.
          nullable: true
          example: example_value
    ErrorSource:
      type: object
      properties:
        pointer:
          type: string
          nullable: true
          example: example_value
        parameter:
          type: string
          nullable: true
          example: example_value
    SPARComponent:
      type: object
      properties:
        id:
          type: string
          description: Component identifier.
          nullable: true
          example: abc123
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/SPARIdentifier'
          description: List of accounts in SPAR document.
          nullable: true
          example: []
        benchmarks:
          $ref: '#/components/schemas/SPARIdentifier'
        currencyIsoCode:
          type: string
          description: CurrencyCode in SPAR document.
          nullable: true
          example: example_value
        path:
          type: string
          description: The path to the document
          nullable: true
          example: example_value
        name:
          type: string
          description: Component name.
          nullable: true
          example: Example Title
        category:
          type: string
          description: Component category.
          nullable: true
          example: example_value
    Error:
      type: object
      properties:
        id:
          type: string
          nullable: true
          example: abc123
        code:
          type: string
          nullable: true
          example: example_value
        title:
          type: string
          nullable: true
          example: Example Title
        detail:
          type: string
          nullable: true
          example: example_value
        source:
          $ref: '#/components/schemas/ErrorSource'
    VaultComponentRoot:
      required:
      - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/VaultComponent'
        meta:
          nullable: true
          example: example_value
    VaultComponent:
      type: object
      properties:
        id:
          type: string
          description: Vault component identifier
          nullable: true
          example: abc123
        account:
          $ref: '#/components/schemas/VaultIdentifier'
        benchmark:
          $ref: '#/components/schemas/VaultIdentifier'
        currencyisocode:
          type: string
          description: Currency iso code saved in the document
          nullable: true
          example: example_value
        dates:
          $ref: '#/components/schemas/VaultDateParameters'
        snapshot:
          type: boolean
          description: Snapshot
          example: true
        path:
          type: string
          description: The path to the document
          nullable: true
          example: example_value
        name:
          type: string
          description: Component name.
          nullable: true
          example: Example Title
        category:
          type: string
          description: Component category.
          nullable: true
          example: example_value
    ComponentSummary:
      type: object
      properties:
        name:
          type: string
          description: Component name.
          nullable: true
          example: Example Title
        category:
          type: string
          description: Component category.
          nullable: true
          example: example_value
    SPARComponentRoot:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SPARComponent'
    PAComponent:
      type: object
      properties:
        id:
          type: string
          description: Component identifier.
          nullable: true
          example: abc123
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/PAIdentifier'
          description: List of accounts saved in the PA document.
          nullable: true
          example: []
        benchmarks:
          type: array
          items:
            $ref: '#/components/schemas/PAIdentifier'
          description: List of benchmarks saved in the PA document.
          nullable: true
          example: []
