      properties:
        startdate:
          type: string
          description: Calculation's start date.
          nullable: true
          example: example_value
        enddate:
          type: string
          description: Calculation's end date.
          example: example_value
        frequency:
          type: string
          description: Calculation's frequency.
          example: example_value
      description: The date parameters for Vault calculation
    ComponentSummaryRoot:
      required:
      - data
