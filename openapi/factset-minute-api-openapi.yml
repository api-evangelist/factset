      summary: Single ticker for the given period
      description: Post body request example to fetch details of the IBM tick data for the period 2023-01-01T00:00:00Z to 2023-01-05T23:59:59Z.
      value:
        data:
          tickers:
          - IBM
          factsetExchangeCode: USA
          dateTimeRange:
            start: '2023-01-01T00:00:00Z'
            end: '2023-01-05T23:59:59Z'
          granularity: 1m
          type: trades
