      value:
        errors:
        - code: Internal server error
          title: An unexpected error happened
          id: 7af3d86ca5954503b9244f2620fcf5eb
  schemas:
    type:
      title: type
      description: '

        <p>''type=trades'' gives  minute bars data calculated from trade data (price and volume)</p>

        '
      type: string
      enum:
      - trades
    submittedResponse:
      type: object
      title: Status Response
      description: Returns Status of the id.
      properties:
        data:
          $ref: '#/components/schemas/StatusOne'
    tickers:
      type: array
      items:
        type: string
        minItems: 1
        maxItems: 500
      description: "The requested list of one or more tickers. <p> NOTE: Maximum 500 tickers per request.</p>.\n \n"
      example:
      - FDS
    completedResponse:
      type: object
      title: status
      description: Returns status.
      properties:
        data:
          $ref: '#/components/schemas/checkFiles'
    checkFiles:
      type: object
      description: check-files
      properties:
        id:
          description: a unique identification for the query requested
          type: string
          example: abc123
        status:
          description: The status of the query
          type: string
          enum:
          - queued
          - executing
          - created
          - failed
          - cancelled
          example: queued
        error:
          $ref: '#/components/schemas/ErrorObject'
    ErrorObject:
      type: object
      nullable: true
      description: error
      properties:
        id:
          description: A UUID for this particular occurrence of the problem.
          type: string
          example: adb01824-252f-4420-b0c6-35a1e3507ef5
        code:
          description: status
          type: string
          example: GenericError
        title:
          description: The plain text error message
          type: string
          example: Validation Error
    meta:
      title: Meta
      description: Array of metadata objects
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/pagination'
    errorExample:
      type: object
      description: Specifies the fields in the error message
      properties:
        code:
          description: It specifies the unique code
          type: string
          example: example_value
        title:
          description: ' Specifies the error message'
          type: string
          example: Example Title
        id:
          description: Specifies the id
          type: string
          example: abc123
    minRequest:
      title: Level1 Minute bars Request Body
      description: Level1 Minute bars request body elements
      type: object
      properties:
        data:
          $ref: '#/components/schemas/minutesbarRequestBody'
      required:
      - data
    status:
      type: object
      description: specifies the error message fields in the response
      properties:
        errors:
          type: array
          description: An array containing errors
          items:
            $ref: '#/components/schemas/errorExample'
          example: []
    MinTickData:
      type: object
      title: Tick History Object
      description: ' Returns Tick History Response.'
      properties:
        requestTimestamp:
          description: Timestamp of when request was made
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        updateTimestamp:
          description: Timestamp when the file was last updated
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        listOfFiles:
          type: array
          description: Contains list of Files
          items:
            $ref: '#/components/schemas/filesOne'
          example: []
    dateTimePeriodMin:
      type: object
      description: 'Date-Time

        '
      required:
      - start
      - end
      properties:
        start:
          description: 'The date for (or from which) the data is required. Supports in YYYY-MM-DDTHH:MM:SSZ format.

            '
          type: string
          format: date-time
          example: '2012-01-01T11:00:00Z'
        end:
          type: string
          format: date-time
          description: 'The date to which data is required. Supports in YYYY-MM-DDTHH:MM:SSZ format.

            '
          example: '2012-01-30T11:20:30Z'
    StatusOne:
      type: object
      description: request-files
      properties:
        id:
          description: a unique identification for the query requested
          type: string
          example: abc123
        status:
          description: The status of the query
          type: string
          enum:
          - queued
          - executing
          - created
          - failed
          - cancelled
          example: queued
        error:
          $ref: '#/components/schemas/ErrorObject'
    filesOne:
      title: Files
      description: Array of data objects
      type: object
      properties:
        fileName:
          description: Name of the file(s) generated for the query requested
          type: string
          example: example_value
        url:
          description: "Download link for the TickHistory minute bars file with requested parameters. \n\n <p>The downloaded file contains isoCode, ticker, date, time, tradeOpen, tradeHigh, tradeLow, tradeClose, tradeVolume, tradeNumber, and tradeVWAP</P>\n \n <p>This download link will expire after 12 hours.</p>\n"
          type: string
          example: https://www.example.com
    minutesbarRequestBody:
      title: Level1 Minute bars Request Body
      description: Level1 Minute bars request body elements
      type: object
      properties:
        tickers:
          $ref: '#/components/schemas/tickers'
        factsetExchangeCode:
          $ref: '#/components/schemas/factsetExchangeCode'
        dateTimeRange:
          $ref: '#/components/schemas/dateTimePeriodMin'
        granularity:
          $ref: '#/components/schemas/granularity'
        type:
          $ref: '#/components/schemas/type'
      required:
      - tickers
      - factsetExchangeCode
      - dateTimeRange
      - granularity
      - type
    factsetExchangeCode:
      title: factsetExchangeCode
      description: 'FactSet specific regional or composite exchange code and last exchange code.

        <p> NOTE:Does not support multiple factsetExchangeCodes</p>.

        '
      type: string
      minItems: 1
      maxItems: 1
      example: USA
    Get-FilesMinuteResponse:
      type: object
      description: Returns Tick History Files
      properties:
        data:
          $ref: '#/components/schemas/MinTickData'
        meta:
          $ref: '#/components/schemas/meta'
    granularity:
      title: granularity
      description: 'This is the grantualrity in which minute bars data is shown. Possible values are 1 Minute (1m)

        '
      type: string
      enum:
      - 1m
    pagination:
      title: Pagination
      description: List of pagination objects
      type: object
      properties:
        total:
          description: Total number of files the API returns for a particular query
          type: integer
          example: 10
        isEstimatedTotal:
          description: Boolean value that represents whether the total count of files returned is exact or an estimate. This is defaulted to False as the API should always return the exact count
          type: boolean
          example: true
  parameters:
    _paginationLimit:
      name: _paginationLimit
      in: query
      description: Specifies the maximum number of results to return per response page
      required: false
      schema:
        type: integer
        default: 20
    _paginationOffset:
      name: _paginationOffset
      in: query
      description: Specifies the starting point for pagination. This parameter is used to identify the beginning of next set of results
      required: false
      schema:
        type: integer
        default: 0
    requestIdStatus:
      name: id
      in: query
      description: id returned by files create endpoint to poll and collect status of the query
      required: true
      schema:
        type: string
    requestId:
      name: id
      in: query
      description: id returned by files create endpoint to poll and collect results of the query
      required: true
      schema:
        type: string
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
externalDocs:
  url: https://developer.factset.com/api-catalog/analytics-datastore-api
  description: API Documentation
