    PostDebtInstrumentNotationScreenerValueRangesGetRequest:
      type: object
      properties:
        data:
          type: object
          x-property-sort:
          - validation
          - lifeCycle
          - subordinated
          - rating
          - issuer
          - issue
          - tradingVolume
          - compliance
          - coupon
          - yield
          - macaulayDuration
          - sensitivities
