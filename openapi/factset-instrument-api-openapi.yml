                      id:
                        nullable: true
                        type: number
                        format: id32
                        x-positive: true
                        description: Identifier of the debt ranking.
                      name:
                        nullable: true
                        type: string
                        format: localizedString
                        description: Name of the debt ranking.
                  germany:
                    nullable: false
