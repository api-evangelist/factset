    GetDebtInstrumentKeyFiguresNotationGet200Response:
      description: Successful Response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                nullable: false
                type: object
                x-property-sort:
                - calculation
                - yield
                - macaulayDuration
                - sensitivities
