    PostInstrumentCrossReferenceListByISIN200Response:
      description: Successful Response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                description: List of instruments.
                nullable: false
                items:
                  type: object
                  nullable: false
                  x-property-sort:
                  - id
                  - fsym
                  - validity
                  - sourceIsin
                  - status
                  properties:
                    id:
                      nullable: true
                      type: string
                      format: id64
                      x-positive: true
                      description: Identifier of the instrument.
                    fsym:
                      nullable: false
                      type: object
                      x-property-sort:
                      - security
                      description: Instrument-level FactSet identifier of the financial instrument used primarily in FactSet products other than the MDG.
                      properties:
                        security:
                          nullable: false
                          type: object
                          x-property-sort:
                          - permanentIdentifier
                          description: Security-level identifier.
                          properties:
                            permanentIdentifier:
                              nullable: true
                              type: string
                              description: FactSet Permanent Identifier for an instrument. The format is six alpha numeric characters, excluding vowels, with an S suffix (XXXXXX-S).
                    validity:
                      nullable: true
                      type: object
                      format: timeRange
                      properties:
                        start:
                          nullable: true
                          type: string
                          format: datetime
                          description: The starting point of the time range (inclusive).
                        end:
                          nullable: true
                          type: string
                          format: datetime
                          description: The ending point of the time range (exclusive), or `null` to indicate that the time range extends indefinitely into the future.
                      x-property-sort:
                      - start
                      - end
                      required:
                      - start
                      - end
                      description: Time range that this translation is valid for.
                    sourceIsin:
                      nullable: true
                      type: string
                      format: isin
                      description: The source ISIN that the instrument is translated for.
                    status:
                      nullable: false
                      type: object
                      x-property-sort:
                      - code
                      - identifier
                      description: Error status for the requested identifier
                      properties:
                        code:
                          nullable: true
                          type: string
                          description: Code of the error condition.
                          x-enum-description:
                          - No error.
                          - The provided identifier does not refer to a valid ISIN.
                          - Not entitled to see data for the instrument.
                          enum:
                          - none
                          - parameter
                          - entitlement
                        identifier:
                          nullable: true
                          type: string
                          format: isin
                          description: Provided identifier.
              meta:
                type: object
                description: The meta member contains the meta information of the response.
                properties:
                  status:
                    $ref: '#/components/schemas/StatusObject'
                x-property-sort:
                - status
            x-property-sort:
            - data
            - meta
    GetDebtInstrumentGet200Response:
      description: Successful Response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                description: Fundamental data for a debt instrument.
                nullable: false
                type: object
                x-property-sort:
                - isin
                - nsin
                - name
                - shortName
                - type
                - lifeCycle
                - issuer
                - issue
                - tradingVolume
                - redemption
                - nominalValue
                - debtRanking
                - germany
                properties:
                  isin:
                    nullable: true
                    type: string
                    format: isin
                    description: The International Securities Identification Number (ISIN) of the instrument. The ISIN is a 12-character code of digits and upper-case letters that uniquely identifies an instrument.
                  nsin:
                    nullable: false
                    type: object
                    x-property-sort:
                    - wkn
                    - valor
                    description: NSIN data of the instrument.
                    properties:
                      wkn:
                        nullable: true
                        type: string
                        description: The WKN (Wertpapierkennnummer, German for Securities Identification Number) of the instrument. The WKN is a 6-character code of digits and upper-case letters that uniquely identifies an instrument.
                      valor:
                        nullable: true
                        type: string
                        description: 'The Valor number (German: Valorennummer) of the instrument. The Valor number is an integer number that uniquely identifies an instrument.'
                  name:
                    nullable: true
                    type: string
                    format: localizedString
                    description: Name of the instrument.
                  shortName:
                    nullable: true
                    type: string
                    format: localizedString
                    description: Short name of the instrument.
                  type:
                    nullable: false
                    description: Instrument type as defined by FactSet Digital Solutions. Instrument types are arranged in a hierarchy, with the first level representing the most coarse granularity and further levels successively refining the granularity (see MDG category system 18). See endpoint `/category/get` for possible values.
                    type: array
                    items:
                      type: object
                      nullable: false
                      x-property-sort:
                      - id
                      - name
                      properties:
                        id:
                          nullable: true
                          type: number
                          format: id32
                          x-positive: true
                          description: Identifier of the instrument type.
                        name:
                          nullable: true
                          type: string
                          format: localizedString
                          description: Name of the instrument type.
                  lifeCycle:
                    nullable: false
                    type: object
                    x-property-sort:
                    - issue
                    - maturity
                    description: Important dates of the instrument.
                    properties:
                      issue:
                        nullable: true
                        type: string
                        format: date
                        description: Date of the issue.
                      maturity:
                        nullable: false
                        type: object
                        x-property-sort:
                        - date
                        - isPerpetual
                        - isCallable
                        description: Maturity data.
                        properties:
                          date:
                            nullable: true
                            type: string
                            format: date
                            description: Date of the instrument's maturity. The value is empty if the instrument is perpetual.
                          isPerpetual:
                            nullable: true
                            type: boolean
                            description: If true, the instrument is perpetual, i.e. it does not mature, therefore the attribute `date` is null.
                          isCallable:
                            nullable: true
                            type: boolean
                            description: If true, the issuer may redeem the instrument prior to maturity.
                  issuer:
                    nullable: false
                    type: object
                    x-property-sort:
                    - id
                    - name
                    - lei
                    description: Issuer of the instrument. See endpoint `/legalEntity/list` for possible values.
                    properties:
                      id:
                        nullable: true
                        type: string
                        format: id64
                        x-positive: true
                        description: Identifier of the issuer.
                      name:
                        nullable: true
                        type: string
                        description: Name of the issuer.
                      lei:
                        nullable: true
                        type: string
                        description: Legal Entity Identifier of the issuer.
                  issue:
                    nullable: false
                    type: object
                    x-property-sort:
                    - price
                    - volume
                    description: Issue data of the instrument.
                    properties:
                      price:
                        nullable: false
                        type: object
                        x-property-sort:
                        - value
                        - valueUnit
                        description: Issue price data.
                        properties:
                          value:
                            nullable: true
                            type: number
                            format: real
                            description: Issue price.
                          valueUnit:
                            nullable: false
                            type: object
                            x-property-sort:
                            - id
                            - code
                            description: Value unit of the issue price such as percentages for a debt instrument quoted in percent, or a main or a fractional currency for a per-unit-quoted debt instrument (rarely). See endpoint `/basic/valueUnit/list` for possible values.
                            properties:
                              id:
                                nullable: true
                                type: number
                                format: id32
                                x-positive: true
                                description: Identifier of the value unit.
                              code:
                                nullable: true
                                type: string
                                description: Code of the value unit.
                      volume:
                        nullable: false
                        type: object
                        x-property-sort:
                        - amount
                        - currency
