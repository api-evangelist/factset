                          nullable: true
                          type: number
                          format: real
                          description: 'Absolute number of shares of the component contained in the composite instrument.


                            The absolute number of shares can be subject to change due to corporate actions or active management of the composite instrument (see attribute `activeManagement`). If the component is an index, the number of shares is a factor which applies to the level of the index.'
                        initialWeight:
                          nullable: true
                          type: number
                          format: relativeValue
                          description: "Weighting of the component, valid only at initial fixing\n\n (see attribute `initialFixing` in endpoint `/securitizedDerivative/get`). "
                        referenceLevel:
                          nullable: true
