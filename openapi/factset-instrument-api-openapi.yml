                                  tickerRegion:
                                    nullable: true
                                    type: string
                                    description: 'FactSet regional symbol of the notation, consisting of the ticker and the two-character code of the country or region where the listing is traded (example: DAI-DE).'
                                  isPrimary:
                                    nullable: true
