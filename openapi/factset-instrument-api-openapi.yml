                            properties:
                              id:
                                nullable: true
                                type: number
                                format: id32
                                x-positive: true
                                description: Identifier of the value unit.
                              code:
                                nullable: true
                                type: string
                                description: Code of the value unit.
                      currency:
                        nullable: false
                        type: object
                        x-property-sort:
                        - id
                        - code
                        - isoCode
                        description: Main currency of the redemption. See endpoint `/basic/valueUnit/currency/main/list` for possible values.
                        properties:
                          id:
                            nullable: true
                            type: number
                            format: id32
                            x-positive: true
                            description: Identifier of the currency.
                          code:
                            nullable: true
                            type: string
                            description: 'Code of the currency: if assigned, a code according to ISO 4217, otherwise a local code.'
                          isoCode:
                            nullable: true
                            type: string
