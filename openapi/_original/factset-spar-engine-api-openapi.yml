          format: date-time
          example: '2026-01-15T10:30:00Z'
    PaginationInfo:
      type: object
      properties:
        pageNumber:
          type: integer
          format: int32
          example: 10
        pageSize:
          type: integer
          format: int32
          example: 10
        totalPages:
          type: integer
          format: int32
          example: 10
        totalCalculations:
          type: integer
          format: int32
          example: 10
        nextPage:
          type: string
          nullable: true
          example: example_value
        previousPage:
          type: string
          nullable: true
          example: example_value
    PaginationMeta:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationInfo'
    CalculationsSummaryRoot:
      required:
      - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CalculationsSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
  securitySchemes:
    FactSetApiKey:
      type: http
      scheme: basic
    FactSetOAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.factset.com/as/token.oauth2
          scopes: {}
