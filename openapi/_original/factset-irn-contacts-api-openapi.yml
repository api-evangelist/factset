openapi: 3.0.1
info:
  title: FactSet IRN Contacts API
  description: |2-

    Contacts API allows users to create, update and delete Contacts as well as
    configure settings in the Internal Research Notes Contacts application.
  version: '1'
servers:
- url: https://api.factset.com/research/irn
  description: Production Server
- url: https://api-sandbox.factset.com/research/irn
  description: Sandbox
paths:
  /v1/contact-relationships:
    get:
      tags:
      - Contact
      - Relationships
      summary: >-
        Factset Get All the Relationships Where the Given Symbol or Contact Identifier Has Been Tagged in a Relationship
      operationId: GetAllRelationshipsTaggingAContact
      parameters:
      - name: symbol
        in: query
        schema:
          type: string
      - name: contactId
        in: query
        schema:
          type: string
          format: uuid
      - name: relationshipId
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactRelationshipTwoSidedDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Contact
      - Relationships
      summary: Factset Create a Contact Relationship
      operationId: CreateContactRelationship
      requestBody:
        description: contactRelationship object to save
        content:
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/ContactRelationshipTwoSidedSaveDto'
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRelationshipTwoSidedSaveDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ContactRelationshipTwoSidedSaveDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ContactRelationshipTwoSidedSaveDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewItemDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/contact-relationships/{contactRelationshipId}:
    get:
      tags:
      - Contact
      - Contacts
      - Relationships
      summary: Factset Get Details on a Specific Contact Relationship
      operationId: GetContactRelationship
      parameters:
      - name: contactRelationshipId
        in: path
        description: contactRelationshipId to get associated record
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactRelationshipTwoSidedDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      tags:
      - Contact
      - Contacts
      - Relationships
      summary: Factset Update a Contact Relationship
      operationId: PatchContactRelationship
      parameters:
      - name: contactRelationshipId
        in: path
        description: contactRelationshipId to update associated record
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        description: contactRelationshipPatch object to update
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
          text/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
          application/*+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      tags:
      - Contact
      - Contacts
      - Relationships
      summary: Factset Delete a Contact Relationship
      operationId: DeleteContactRelationship
      parameters:
      - name: contactRelationshipId
        in: path
        description: contactRelationshipId to delete associated record
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/contacts:
    get:
      tags:
      - Contacts
      summary: >-
        Factset Get List of All Contacts in Your Group Along With Some of Their Standard Field Data
      operationId: GetContacts
      parameters:
      - name: fullName
        in: query
        description: Filter results on fullName
        schema:
          type: string
      - name: emailAddress
        in: query
        description: Filter results on emailAddress
        schema:
          type: string
      - name: identifier
        in: query
        description: Filter results on identifier
        schema:
          type: string
      - name: employerName
        in: query
        description: Filter results on employerName
        schema:
          type: string
      - name: customFieldValues
        in: query
        description: Includes custom field values in response if true
        schema:
          type: boolean
          default: false
      - name: search
        in: query
        description: >-
          Filter results on the combination of fullName, emailAddress,
          identifier and employerName
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
      - name: includeLastMeetingDate
        in: query
        description: >-
          If true, returns when they were last tagged as an attendee in an IRN
          meeting
        schema:
          type: boolean
          default: false
      - name: limit
        in: query
        description: Restrict number of records returned
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactSummaryDto'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Contacts
      summary: Factset Create a Contact
      operationId: CreateContact
      requestBody:
        description: contactSaveDto object to save
        content:
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/ContactSaveDto'
          application/json:
            schema:
              $ref: '#/components/schemas/ContactSaveDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ContactSaveDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ContactSaveDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewItemDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/contacts/{contactId}:
    get:
      tags:
      - Contacts
      summary: Factset Get All Custom Field and Standard Field Details on a Specific Contact
      operationId: GetContact
      parameters:
      - name: contactId
        in: path
        description: contactId to get associated record
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      tags:
      - Contacts
      summary: Factset Edit a Contacts Standard Field and Custom Field Data
      operationId: PatchContact
      parameters:
      - name: contactId
        in: path
        description: contactId to update associated record
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        description: contactSaveDtoPatch object to update
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
          text/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
          application/*+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      tags:
      - Contacts
      summary: Factset Delete a Contact
      operationId: DeleteContact
      parameters:
      - name: contactId
        in: path
        description: contactId to delete associated record
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/contacts/{contactId}/about:
    get:
      tags:
      - About
      - Contacts
      summary: Factset Get the About Field Content for a Specific Contact
      operationId: GetContactNotes
      parameters:
      - name: contactId
        in: path
        description: contactId of associated record
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/contacts/{contactId}/events:
    get:
      tags:
      - Contacts
      summary: Factset Get a Contacts Audit History
      operationId: GetContactEvents
      parameters:
      - name: contactId
        in: path
        description: contactId to get associated records
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactEventDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/contacts/{contactId}/records:
    get:
      tags:
      - Contacts
      - Records
      summary: Factset Get All Notes and Meetings Where a Specific Contact Was Tagged
      operationId: GetContactRecords
      parameters:
      - name: contactId
        in: path
        description: contactId to get associated records
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecordPreviewDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/contacts/{contactId}/relationships:
    get:
      tags:
      - Contacts
      - Relationships
      summary: Factset Returns a List of a Contacts Relationships
      operationId: GetContactRelationships
      parameters:
      - name: contactId
        in: path
        description: contactId to get associated records
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactRelationshipDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    AlternativeEmailAddressDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        emailAddress:
          type: string
          nullable: true
          example: user@example.com
      additionalProperties: false
    ContactAddressDto:
      type: object
      properties:
        googleMapsPlaceId:
          maxLength: 255
          minLength: 0
          type: string
          nullable: true
          example: '500123'
        formattedAddress:
          maxLength: 255
          minLength: 0
          type: string
          nullable: true
          example: example_value
        city:
          maxLength: 50
          minLength: 0
          type: string
          nullable: true
          example: example_value
        stateProvince:
          maxLength: 50
          minLength: 0
          type: string
          nullable: true
          example: example_value
        postalCode:
          maxLength: 10
          minLength: 0
          type: string
          nullable: true
          example: example_value
        country:
          maxLength: 50
          minLength: 0
          type: string
          nullable: true
          example: example_value
      additionalProperties: false
    ContactCustomFieldOptionValueDto:
      type: object
      properties:
        optionId:
          type: string
          format: uuid
          example: '500123'
        optionName:
          type: string
          nullable: true
          example: example_value
      additionalProperties: false
    ContactCustomFieldValueDto:
      type: object
      properties:
        fieldCode:
          type: string
          nullable: true
          example: example_value
        value:
          type: string
          nullable: true
          example: example_value
        optionValues:
          type: array
          items:
            $ref: '#/components/schemas/ContactCustomFieldOptionValueDto'
          nullable: true
          example: []
      additionalProperties: false
    ContactCustomFieldValueSaveDto:
      required:
      - code
      type: object
      properties:
        code:
          type: string
          example: example_value
        value:
          type: string
          nullable: true
          example: example_value
        optionValues:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          example: []
        evaluateFormula:
          type: boolean
          default: false
          example: true
      additionalProperties: false
    ContactDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        primaryEmailAddress:
          type: string
          nullable: true
          example: user@example.com
        identifier:
          type: string
          nullable: true
          example: example_value
        fullName:
          type: string
          nullable: true
          example: example_value
        address:
          $ref: '#/components/schemas/ContactAddressDto'
        linkedInProfile:
          type: string
          nullable: true
          example: example_value
        isDeleted:
          type: boolean
          example: true
        employer:
          $ref: '#/components/schemas/EmployerDto'
        role:
          $ref: '#/components/schemas/ContactRoleDto'
        type:
          $ref: '#/components/schemas/ContactTypeDto'
        phoneNumbers:
          type: array
          items:
            $ref: '#/components/schemas/ContactPhoneDto'
          nullable: true
          example: []
        alternativeEmailAddresses:
          type: array
          items:
            $ref: '#/components/schemas/AlternativeEmailAddressDto'
          nullable: true
          example: user@example.com
        customFields:
          type: array
          items:
            $ref: '#/components/schemas/ContactCustomFieldValueDto'
          nullable: true
          example: []
      additionalProperties: false
    ContactEventDto:
      type: object
      properties:
        eventType:
          type: string
          nullable: true
          example: example_value
        date:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        fullName:
          type: string
          nullable: true
          example: example_value
        details:
          type: array
          items:
            $ref: '#/components/schemas/ContactEventUpdateDto'
          nullable: true
          example: []
      additionalProperties: false
    ContactEventUpdateDto:
      type: object
      properties:
        fieldName:
          type: string
          nullable: true
          example: example_value
        oldValue:
          type: string
          nullable: true
          example: example_value
        newValue:
          type: string
          nullable: true
          example: example_value
      additionalProperties: false
    ContactIdNameDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          example: abc123
        name:
          type: string
          nullable: true
          example: Example Title
      additionalProperties: false
    ContactPhoneDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        number:
          maxLength: 50
          minLength: 0
          type: string
          nullable: true
          example: example_value
        type:
          $ref: '#/components/schemas/PhoneNumberTypeDto'
        isPrimary:
          type: boolean
          example: true
      additionalProperties: false
    ContactPhoneSaveDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        number:
          maxLength: 50
          minLength: 0
          type: string
          nullable: true
          example: example_value
        typeId:
          type: string
          format: uuid
          example: '500123'
        isPrimary:
          type: boolean
          example: true
      additionalProperties: false
    ContactRelationshipDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        relationshipCategory:
          $ref: '#/components/schemas/RelationshipCategoryIdNameDto'
        relationship:
          $ref: '#/components/schemas/RelationshipIdNameDto'
        contact:
          $ref: '#/components/schemas/ContactIdNameDto'
        symbol:
          $ref: '#/components/schemas/RelationshipSymbolSummaryDto'
        isCurrent:
          type: boolean
          example: true
        start:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        end:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        title:
          type: string
          nullable: true
          example: Example Title
        comment:
          type: string
          nullable: true
          example: example_value
      additionalProperties: false
    ContactRelationshipSaveDto:
      type: object
      properties:
        relationshipId:
          type: string
          format: uuid
          example: '500123'
        contactId:
          type: string
          format: uuid
          nullable: true
          example: '500123'
        start:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        end:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        comment:
          type: string
          nullable: true
          example: example_value
        isCurrent:
          type: boolean
          example: true
        symbol:
          type: string
          nullable: true
          example: example_value
        title:
          type: string
          nullable: true
          example: Example Title
      additionalProperties: false
    ContactRelationshipTwoSidedDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        relationshipCategory:
          $ref: '#/components/schemas/RelationshipCategoryIdNameDto'
        relationship:
          $ref: '#/components/schemas/RelationshipIdNameDto'
        leftContact:
          $ref: '#/components/schemas/ContactIdNameDto'
        rightContact:
          $ref: '#/components/schemas/ContactIdNameDto'
        symbol:
          $ref: '#/components/schemas/RelationshipSymbolSummaryDto'
        isCurrent:
          type: boolean
          example: true
        start:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        end:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        title:
          type: string
          nullable: true
          example: Example Title
        comment:
          type: string
          nullable: true
          example: example_value
      additionalProperties: false
    ContactRelationshipTwoSidedSaveDto:
      type: object
      properties:
        relationshipId:
          type: string
          format: uuid
          example: '500123'
        leftContactId:
          type: string
          format: uuid
          example: '500123'
        rightContactId:
          type: string
          format: uuid
          nullable: true
          example: '500123'
        start:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        end:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-15T10:30:00Z'
        comment:
          type: string
          nullable: true
          example: example_value
        isCurrent:
          type: boolean
          example: true
        symbolId:
          type: string
          format: uuid
          nullable: true
          example: '500123'
        symbol:
          type: string
          nullable: true
          example: example_value
        title:
          type: string
          nullable: true
          example: Example Title
      additionalProperties: false
    ContactRoleDto:
      required:
      - id
      - name
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        name:
          maxLength: 50
          minLength: 0
          type: string
          example: Example Title
      additionalProperties: false
    ContactSaveDto:
      type: object
      properties:
        primaryEmailAddress:
          maxLength: 255
          minLength: 0
          type: string
          nullable: true
          example: user@example.com
        fullName:
          maxLength: 255
          minLength: 0
          type: string
          nullable: true
          example: example_value
        notes:
          type: string
          nullable: true
          example: example_value
        linkedInProfile:
          maxLength: 255
          minLength: 0
          type: string
