components:
  schemas:
    AttributesMember:
      type: array
      description: Limit the attributes returned in the response to the specified set.
      items:
        type: string
        maxLength: 100
        exclusiveMaximum: false
      maxItems: 50
      uniqueItems: true
    PostNewsArticleListRequest:
      x-property-sort:
      - data
      - meta
      description: Request Body
      type: object
      properties:
        data:
          type: object
          x-property-sort:
          - filter
          description: The data member contains the request's primary data.
          properties:
            filter:
              description: Criteria that filter the items in the response list; only items that match all of the criteria are returned.
              type: object
              x-property-sort:
              - range
              - categories
              - regions
              - distributor
              - publisher
              - language
              - types
              properties:
                range:
                  type: object
                  format: timeRange
                  properties:
                    start:
                      type: string
                      format: datetime
                      description: The starting point of the time range (inclusive), or `null` to indicate that the time range extends indefinitely into the past.
                      x-allowNullValue: true
                    end:
                      type: string
                      format: datetime
                      description: The ending point of the time range (exclusive), or `null` to indicate that the time range extends indefinitely into the future.
                      x-allowNullValue: true
                  x-property-sort:
                  - start
                  - end
                  required:
                  - start
                  - end
                  description: Time range for matching the news article's date. At most one of the attributes `start` or `end` may be `null`.
                categories:
                  type: object
                  x-property-sort:
                  - ids
                  description: Filter for specific categories of the news article. Use a category system of type news with endpoint `/category/listBySystem` for valid values.
                  properties:
                    ids:
                      type: array
                      nullable: false
                      items:
                        type: number
                        format: id32
                        x-positive: true
                      minItems: 1
                      maxItems: 100
                      uniqueItems: true
                      description: Identifiers of the categories.
                regions:
                  type: object
                  x-property-sort:
                  - ids
                  description: Filter for specific regions of the content of the news article. See endpoint `/basic/region/list` for valid values.
                  properties:
                    ids:
                      type: array
                      nullable: false
                      items:
                        type: number
                        format: id32
                        x-positive: true
                      minItems: 1
                      maxItems: 100
                      uniqueItems: true
                      description: Identifiers of the regions.
                distributor:
                  type: object
                  x-property-sort:
                  - ids
                  description: Filter for specific distributors of the news article. See endpoint `/news/distributor/list` for valid values.
                  properties:
                    ids:
                      type: array
                      nullable: false
                      items:
                        type: number
                        format: id32
                        x-positive: true
                      minItems: 1
                      maxItems: 100
                      uniqueItems: true
                      description: Identifiers of the distributors.
                publisher:
                  type: object
                  x-property-sort:
                  - ids
                  description: Filter for specific publishers of the news article. See endpoint `/news/publisher/list` for valid values.
                  properties:
                    ids:
                      type: array
                      nullable: false
                      items:
                        type: number
                        format: id32
                        x-positive: true
                      minItems: 1
                      maxItems: 100
                      uniqueItems: true
                      description: Identifiers of the publishers.
                language:
                  type: object
                  x-property-sort:
                  - ids
                  description: Filter for specific languages of the news article. See endpoint `/basic/language/list` for valid values.
                  properties:
                    ids:
                      type: array
                      nullable: false
                      items:
                        type: number
                        format: id32
                        x-positive: true
                      minItems: 1
                      maxItems: 100
                      uniqueItems: true
                      description: Identifiers of the languages.
                types:
                  type: object
                  x-property-sort:
                  - ids
                  description: Filter for specific types of the news article. See endpoint `/news/article/type/list` for valid values.
                  properties:
                    ids:
                      type: array
                      nullable: false
                      items:
                        type: number
                        format: id32
                        x-positive: true
                      minItems: 1
                      maxItems: 100
                      uniqueItems: true
                      description: Identifiers of the article types.
          example: example_value
        meta:
          type: object
          description: The meta member contains the meta information of the request.
          properties:
            attributes:
              $ref: '#/components/schemas/AttributesMember'
            subscription:
              type: object
              description: Object defining the subscription attributes.
              properties:
                minimumInterval:
                  type: number
                  format: int32
                  minimum: 0
                  exclusiveMinimum: false
                  maximum: 5000
                  exclusiveMaximum: false
                  default: 0
                  description: Non-negative number of milliseconds to throttle the update rate from 0ms to 5000ms. Set to 0 for sending updates immediately.
              x-property-sort:
              - minimumInterval
            pagination:
              type: object
              description: Pagination attributes for the cursor-based pagination strategy.
              properties:
                cursor:
                  type: string
                  maxLength: 50
                  exclusiveMaximum: false
                  description: Starting point as returned in the attributes `pagination.next` or `pagination.previous` by a prior invocation of this endpoint, or undefined (default).
                limit:
                  type: number
                  format: int32
                  minimum: 1
                  exclusiveMinimum: false
                  maximum: 500
                  exclusiveMaximum: false
                  default: 20
                  description: Non-negative maximum number of entries to return.
              x-property-sort:
              - cursor
              - limit
          x-property-sort:
          - attributes
          - subscription
          - pagination
          example: example_value
    PostNewsArticleSearchByTextRequest:
      x-property-sort:
      - data
      - meta
      description: Request Body
      type: object
      properties:
        data:
          type: object
          x-property-sort:
          - text
          - criteria
          description: The data member contains the request's primary data.
          properties:
            text:
              description: Restrict the response of news articles to given include and exclude text criteria.
              type: object
              x-property-sort:
              - criteria
              properties:
                criteria:
                  description: ''
                  type: object
                  x-property-sort:
                  - selectionType
                  - phrases
                  - minimumMatchScore
                  - scope
                  properties:
                    selectionType:
                      description: Specify how the criteria should be applied to the search.
                      type: string
                      default: include
                      x-enum-description:
                      - Articles covering the given criteria are included in the result.
                      - Articles covering the given criteria are excluded from the result.
                      enum:
                      - include
                      - exclude
                    phrases:
                      description: Phrases to be used in the criteria.
                      type: array
                      nullable: false
                      items:
                        type: string
                        maxLength: 100
                        exclusiveMaximum: true
                      minItems: 1
                      maxItems: 16
                    minimumMatchScore:
                      type: number
                      format: real
                      default: 0.7
                      description: Minimum match score for words in the news article.
                    scope:
                      description: Restrict fulltext search to specific scope.
                      type: string
                      default: all
                      x-enum-description:
                      - Headline of the news article.
                      - Text body of the news article.
                      - Search in both headline and body.
                      enum:
                      - headline
                      - body
                      - all
            criteria:
              description: Restrict the response of news articles to given include and exclude criteria.
              type: array
              nullable: false
              items:
                type: object
                x-property-sort:
                - selectionType
                - range
                - indices
                - instruments
                - types
                - categories
                - regions
                - distributor
                - publisher
                - language
                properties:
                  selectionType:
                    description: Specify how the criteria should be applied to the search.
                    type: string
                    default: include
                    x-enum-description:
                    - Articles covering the given criteria are included in the result.
                    - Articles covering the given criteria are excluded from the result.
                    enum:
                    - include
                    - exclude
                  range:
                    type: object
                    format: timeRange
                    properties:
                      start:
                        type: string
                        format: datetime
                        description: The starting point of the time range (inclusive), or `null` to indicate that the time range extends indefinitely into the past.
                        x-allowNullValue: true
                      end:
                        type: string
                        format: datetime
                        description: The ending point of the time range (exclusive), or `null` to indicate that the time range extends indefinitely into the future.
                        x-allowNullValue: true
                    x-property-sort:
                    - start
                    - end
                    required:
                    - start
                    - end
                    description: Time range for matching the news article's date. At most one of the attributes `start` or `end` may be `null`.
                  indices:
                    type: object
                    x-property-sort:
                    - ids
                    description: Set of index notations that each represent an index. Articles that cover at least one instrument contained in one of the specified indices are found.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: string
                          format: id64
                          x-positive: true
                        minItems: 1
                        maxItems: 500
                        uniqueItems: true
                        description: Identifiers of the index notations.
                  instruments:
                    type: object
                    x-property-sort:
                    - ids
                    description: Set of stock instruments related to the article. The set is not updated in the course of corporate actions, e.g. when the related company obtains a new instrument after a spin-off.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: string
                          format: id64
                          x-positive: true
                        minItems: 1
                        maxItems: 1000
                        uniqueItems: true
                        description: Identifiers of the instruments.
                  types:
                    type: object
                    x-property-sort:
                    - ids
                    description: Types of the news article. A news article is found if one or more of the specified news article types match. See endpoint `/news/article/type/list` for valid values.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: number
                          format: id32
                          x-positive: true
                        minItems: 1
                        maxItems: 100
                        uniqueItems: true
                        description: Identifiers of the article types.
                  categories:
                    type: object
                    x-property-sort:
                    - ids
                    description: Categories of the news article. A news article is found if one or more of the specified categories match. Use a category system of type news with endpoint /category/listBySystem for valid values.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: number
                          format: id32
                          x-positive: true
                        minItems: 1
                        maxItems: 100
                        uniqueItems: true
                        description: Identifiers of the categories.
                  regions:
                    type: object
                    x-property-sort:
                    - ids
                    description: Regions of the content of the news article. A news article is found if one or more of the specified regions match. See endpoint `/basic/region/list` for valid values.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: number
                          format: id32
                          x-positive: true
                        minItems: 1
                        maxItems: 100
                        uniqueItems: true
                        description: Identifiers of the regions.
                  distributor:
                    type: object
                    x-property-sort:
                    - ids
                    description: Distributors of the news article. A news article is found if one of the specified distributors matches. See endpoint `/news/distributor/list` for valid values.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: number
                          format: id32
                          x-positive: true
                        minItems: 1
                        maxItems: 100
                        uniqueItems: true
                        description: Identifiers of the distributors.
                  publisher:
                    type: object
                    x-property-sort:
                    - ids
                    description: Publishers of the news article. A news article is found if one of the specified publishers matches. See endpoint `/news/publishers/list` for valid values.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: number
                          format: id32
                          x-positive: true
                        minItems: 1
                        maxItems: 100
                        uniqueItems: true
                        description: Identifiers of the publishers.
                  language:
                    type: object
                    x-property-sort:
                    - ids
                    description: Languages of the news article. A news article is found if one of the specified languages matches. See endpoint `/basic/language/list` for valid values.
                    properties:
                      ids:
                        type: array
                        nullable: false
                        items:
                          type: number
                          format: id32
                          x-positive: true
                        minItems: 1
                        maxItems: 100
                        uniqueItems: true
                        description: Identifiers of the languages.
              maxItems: 8
          example: example_value
        meta:
          type: object
          description: The meta member contains the meta information of the request.
          properties:
            attributes:
              $ref: '#/components/schemas/AttributesMember'
            subscription:
              type: object
              description: Object defining the subscription attributes.
              properties:
                minimumInterval:
                  type: number
                  format: int32
                  minimum: 0
                  exclusiveMinimum: false
                  maximum: 5000
                  exclusiveMaximum: false
                  default: 0
                  description: Non-negative number of milliseconds to throttle the update rate from 0ms to 5000ms. Set to 0 for sending updates immediately.
              x-property-sort:
              - minimumInterval
            pagination:
              type: object
              description: Pagination attributes for the cursor-based pagination strategy.
              properties:
                cursor:
                  type: string
                  maxLength: 50
                  exclusiveMaximum: false
                  description: Starting point as returned in the attributes `pagination.next` or `pagination.previous` by a prior invocation of this endpoint, or undefined (default).
                limit:
                  type: number
                  format: int32
                  minimum: 1
                  exclusiveMinimum: false
                  maximum: 500
                  exclusiveMaximum: false
                  default: 20
                  description: Non-negative maximum number of entries to return.
              x-property-sort:
              - cursor
              - limit
          x-property-sort:
          - attributes
          - subscription
          - pagination
          example: example_value
    PostNewsArticleListByInstrumentRequest:
      x-property-sort:
      - data
      - meta
      description: Request Body
      required:
      - data
      type: object
      properties:
        data:
          type: object
          x-property-sort:
          - identifier
          - filter
          description: The data member contains the request's primary data.
          properties:
            identifier:
              type: object
              x-property-sort:
              - values
              - type
              description: Set of identifiers and their type.
              properties:
                values:
                  description: Set of identifiers to resolve.
                  type: array
                  nullable: false
                  items:
                    type: string
                    minLength: 3
                    exclusiveMinimum: false
