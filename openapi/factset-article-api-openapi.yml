      description: Successful Response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                description: News articles that match the filter criteria ordered by descending article time.
                nullable: false
                items:
                  type: object
                  nullable: false
                  x-property-sort:
                  - code
                  - time
                  - headline
                  - summary
                  - types
                  - language
                  - distributor
                  - publisher
                  - categories
                  - chain
                  - instruments
                  properties:
                    code:
                      nullable: true
                      description: Identifier of the news article.
                      type: string
                    time:
                      nullable: true
                      x-pushable: true
                      description: Date and time of the news article.
                      type: string
                      format: datetime
                    headline:
                      nullable: true
                      x-pushable: true
                      description: Headline of the news article represented as text with HTML entity encoding but without HTML tags.
                      type: string
                    summary:
                      nullable: true
                      x-pushable: true
                      description: Textual summary of the body of the news article or `null` if no summary was provided by the news article distributor.
                      type: string
                    types:
                      nullable: false
                      description: Types of news article. See endpoint `/news/article/type/list` for possible values.
                      type: array
                      items:
                        type: object
                        nullable: false
                        x-property-sort:
                        - id
                        properties:
                          id:
                            nullable: true
                            description: Identifier of the type of news article.
                            type: number
                            format: id32
                            x-positive: true
                    language:
                      nullable: false
