openapi: 3.0.3
info:
  title: Factset Analytics Datastore About Snapshots API
  description: Allow clients to fetch precalculated Analytics through predeterministic URLs.
  contact:
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
    email: api@factset.com
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.factset.com
  description: Production
- url: https://api-sandbox.factset.com
  description: Sandbox
security:
- basicAuth: []
tags:
- name: Snapshots
paths:
  /factset-benchmarks/v1/index-snapshot:
    get:
      summary: Factset Index Level Prices, Returns, and Related Information as of a Single Date.
      operationId: getIndexSnapshot
      tags:
      - Snapshots
      description: 'Retrieves Index Level Prices and Returns information as of a specific date. Simply submit a valid Benchmark ID (you can use the /id-list endpoint for a sample list of ids), and date and retrieve Index Level Prices, Returns, and related information.

        '
      parameters:
      - $ref: '#/components/parameters/indexIds'
      - $ref: '#/components/parameters/requestedDate'
      - $ref: '#/components/parameters/returnType'
      - $ref: '#/components/parameters/currency'
      - $ref: '#/components/parameters/calendar'
      responses:
        '200':
          description: An array of Index Level Prices and Returns information as of a single date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/indexSnapshotResponse'
              examples:
                Index Level Prices and Returns snapshot for S&P 500 and Russell 3000 as of 2020-08-06:
                  $ref: '#/components/examples/resultofIndexSnapshotMultiple'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      summary: Factset Retrieves the Index Level Snapshot of Prices and Returns Information for a Given Identifier and Single Date.
      operationId: getIndexSnapshotForList
      tags:
      - Snapshots
      description: 'Retrieves Index Level Prices and Returns information as aligned with FactSet''s Benchmark Data Feed solution. Simply submit a valid Benchmark ID (you can use the /id-list endpoint for a sample list of ids), and date and retrieve Index Level Prices, Returns, and related information.

        '
      requestBody:
        required: true
        description: Requests the Index Level Snapshot for a requested list of identifiers and specified date.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/indexSnapshotRequest'
      responses:
        '200':
          description: An array of Index Level Prices and Returns information as of a single date.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/indexSnapshotResponse'
              examples:
                Index Level Prices and Returns snapshot for S&P 500 and Russell 3000 as of 2020-08-06:
                  $ref: '#/components/examples/resultofIndexSnapshotMultiple'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /DFSnapshot:
    get:
      summary: Factset Request a Snapshot of Exchange Data for a List of Symbols.
      operationId: get_DFSnapshot
      tags:
      - Snapshots
      description: "\n`ids` and `oc` are required parameters, but only one can be used based on request. Use `ids` for regular snapshot requests, and `oc` for requesting an option chain. \n\n**Try it Out** feature is available using a pre-recorded sandbox environment. Follow Try it Out inscrutions on each parameter to develop a request and view a sample server response.\n\n'*You must be logged into the Developer Portal and obtain an **[API Key](https://developer.factset.com/factset/api-key-listing)** for ''Try it Out'' to receive a successful server response. Select **Authorize** button or visit **[Authentication Support](https://developer.factset.com/authentication)** for more details.*'\n"
      parameters:
      - $ref: '#/components/parameters/ids'
      - $ref: '#/components/parameters/oc'
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/sf'
      - $ref: '#/components/parameters/format'
      - $ref: '#/components/parameters/serv'
      - $ref: '#/components/parameters/req_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DFSnapshot_Response'
              example:
                Error:
                - 0
                - ''
                FDS-USA:
                  Key: FDS-USA:D
                  Stale: ''
                  Fields:
                    '50':
                      LAST_Price: '291.7'
                    '509':
                      BID: '291.6'
                    '609':
                      ASK: '291.78'
                Host: FactSet
                IBM-USA:
                  Key: IBM-USA:D
                  Stale: ''
                  Fields:
                    '50':
                      LAST_Price: '140.84'
                    '509':
                      BID: '140.83'
                    '609':
                      ASK: '140.85'
                Request ID: ''
                Requested Fields: ASK,BID,LAST_Price
                Requested Symbols: FDS-USA,IBM-USA,TSLA-USA
                Service: ''
                TSLA-USA:
                  Key: TSLA-USA:D
                  Stale: ''
                  Fields:
                    '50':
                      LAST_Price: '236.45'
                    '509':
                      BID: '236.43'
                    '609':
                      ASK: '236.5'
            application/xml:
              schema:
                $ref: '#/components/schemas/DFSnapshot_Response'
