          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/notes/{noteId}/events/{recordEventId}:
    get:
      tags:
      - Notes
      summary: Factset Get Details of a Record Event of a Note
      operationId: GetRecordEvent
      parameters:
      - name: noteId
        in: path
        description: Note Id
        required: true
        schema:
          type: string
          format: uuid
      - name: recordEventId
        in: path
        description: Record Event Id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteEventDto'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/notes/{noteId}/attachments/{attachmentId}:
    delete:
      tags:
      - Notes
      summary: Factset Delete Attachment From Note
      operationId: SoftDeleteNoteAttachment
      parameters:
      - name: noteId
        in: path
        description: Note Id
        required: true
        schema:
          type: string
          format: uuid
      - name: attachmentId
        in: path
        description: Attachment Id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    NoteSummaryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: abc123
        date:
          type: string
          nullable: true
          example: example_value
        createdAt:
          type: string
          nullable: true
          example: example_value
        authorId:
          type: string
          format: uuid
          example: '500123'
        contributorId:
          type: string
          format: uuid
          example: '500123'
        title:
          type: string
          nullable: true
          example: Example Title
        identifier:
          type: string
          nullable: true
          example: example_value
        subjectId:
          type: string
          format: uuid
          example: '500123'
        isPersonal:
          type: boolean
          example: true
        state:
          type: string
          nullable: true
          example: example_value
        approvalStatus:
          type: string
          nullable: true
          example: example_value
        attachmentIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          example: []
        relatedSymbols:
          type: array
          items:
            type: string
          nullable: true
          example: []
        recommendationId:
          type: string
          format: uuid
          example: '500123'
        sentimentId:
          type: string
          format: uuid
          example: '500123'
        customFields:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValueDto'
          nullable: true
          example: []
      additionalProperties: false
    CreateBodyDto:
      type: object
      properties:
        content:
          type: string
          nullable: true
          example: example_value
      additionalProperties: false
    UpdateNoteDto:
      type: object
      properties:
        author:
          $ref: '#/components/schemas/UserSerialDto'
        title:
          maxLength: 255
          minLength: 0
          type: string
          nullable: true
          example: Example Title
        subjectId:
          type: string
          format: uuid
          example: '500123'
        noteDate:
          type: string
          nullable: true
          example: example_value
        recommendationId:
          type: string
          format: uuid
          nullable: true
          example: '500123'
        sentimentId:
          type: string
          format: uuid
          nullable: true
          example: '500123'
        body:
          $ref: '#/components/schemas/CreateBodyDto'
        source:
          type: string
          nullable: true
          example: example_value
        link:
          maxLength: 255
          minLength: 0
          type: string
          nullable: true
          example: example_value
        relatedSymbols:
          maxItems: 100
          type: array
          items:
            type: string
          nullable: true
          example: []
        relatedContacts:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          example: []
        relatedRecords:
          $ref: '#/components/schemas/RelatedRecordsDto'
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CreateCustomFieldValueDto'
          nullable: true
          example: []
        isPersonal:
          type: boolean
