components:
  schemas:
    ClientErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
          nullable: true
          example: []
    ColumnSummaryRoot:
      required:
      - data
      type: object
      properties:
        data:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ColumnSummary'
          example: example_value
        meta:
          nullable: true
          example: example_value
    ColumnSummary:
      type: object
      properties:
        name:
          type: string
          description: Column Name
          nullable: true
          example: Example Title
        directory:
          type: string
          description: Column Directory
          nullable: true
          example: example_value
        category:
          type: string
          description: Column Category
          nullable: true
          example: example_value
      description: Column settings (name, directory, category)
    ErrorSource:
      type: object
      properties:
        pointer:
          type: string
          nullable: true
          example: example_value
        parameter:
          type: string
          nullable: true
          example: example_value
    ColumnRoot:
      required:
      - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Column'
        meta:
          nullable: true
          example: example_value
    Error:
      type: object
      properties:
        id:
          type: string
          nullable: true
          example: abc123
        code:
          type: string
          nullable: true
          example: example_value
        title:
          type: string
          nullable: true
          example: Example Title
        detail:
          type: string
          nullable: true
          example: example_value
        source:
          $ref: '#/components/schemas/ErrorSource'
    Column:
      type: object
      properties:
        defaultstatisticsids:
          type: array
          items:
            type: string
          description: Column statistic Id
          nullable: true
          example: []
        name:
          type: string
          description: Column Name
          nullable: true
          example: Example Title
        directory:
          type: string
          description: Column Directory
          nullable: true
          example: example_value
        category:
          type: string
          description: Column Category
          nullable: true
          example: example_value
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
externalDocs:
  url: https://developer.factset.com/api-catalog/analytics-datastore-api
  description: API Documentation
