  responses:
    PostStockDividendList200Response:
      description: Successful Response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                description: List of dividends for the stock.
                nullable: false
                type: object
                x-property-sort:
                - idInstrument
                - sourceIdentifier
                - dividends
                properties:
                  idInstrument:
                    nullable: true
                    type: string
                    format: id64
                    x-positive: true
                    description: MDG identifier of the instrument.
                  sourceIdentifier:
                    nullable: true
                    type: string
                    description: Identifier used in the request.
                  dividends:
                    nullable: false
                    description: List of dividends.
                    type: array
                    items:
                      type: object
                      nullable: false
                      x-property-sort:
                      - id
                      - type
                      - occurrence
                      - dates
                      - currency
                      - gross
                      properties:
                        id:
                          nullable: true
                          type: string
                          format: id64
                          x-positive: true
                          description: Identifier of a dividend.
                        type:
                          nullable: false
                          type: object
                          x-property-sort:
                          - id
                          - name
                          description: Dividend type.
                          properties:
                            id:
                              nullable: true
                              type: number
                              format: id32
                              x-positive: true
                              description: Identifier of the type.
                            name:
                              nullable: true
                              type: string
                              format: localizedString
                              description: Name of the type.
                        occurrence:
                          nullable: false
                          type: object
                          x-property-sort:
                          - type
                          - frequency
                          description: Occurrence and frequency of the dividend.
                          properties:
                            type:
                              nullable: true
                              type: string
                              description: Occurrence type.
                              x-enum-description:
                              - The dividend payment occurs on a regular basis, i.e., with a given frequency.
                              - The dividend payment is atypical and infrequent.
                              enum:
                              - periodic
                              - extraordinary
                            frequency:
                              nullable: false
                              type: object
                              x-property-sort:
                              - id
                              - name
                              description: Frequency of the dividend. Information about the frequency is available only if the attribute `occurrence.type` is set to "periodic". See endpoint `/basic/frequency/type/list` for possible values.
                              properties:
                                id:
                                  nullable: true
                                  type: number
                                  format: id32
                                  x-positive: true
                                  description: Identifier of the frequency.
                                name:
                                  nullable: true
                                  type: string
                                  format: localizedString
                                  description: Name of the frequency.
                        dates:
                          nullable: false
                          type: object
                          x-property-sort:
                          - announcement
                          - record
                          - effective
                          - payment
                          description: Relevant dates related to the dividend.
                          properties:
                            announcement:
                              nullable: true
                              x-sortable: true
                              type: string
                              format: date
                              description: Announcement date.
                            record:
                              nullable: true
                              x-sortable: true
                              type: string
                              format: date
                              description: Record date.
                            effective:
                              nullable: true
                              x-sortable: true
                              type: string
                              format: date
                              description: Effective date (ex-date).
                            payment:
                              nullable: true
                              x-sortable: true
                              x-default-sort-attribute: true
                              x-default-sort-direction: 1
                              type: string
                              format: date
                              description: Payment date.
                        currency:
                          nullable: false
                          type: object
                          x-property-sort:
                          - id
                          - isoCode
                          description: Main currency of the dividend. See endpoint `/basic/valueUnit/currency/main/list` for possible values.
                          properties:
                            id:
                              nullable: true
                              type: number
                              format: id32
                              x-positive: true
                              description: Identifier of the currency.
                            isoCode:
                              nullable: true
                              type: string
                              description: ISO 4217 code of the currency.
                        gross:
                          nullable: false
                          type: object
                          x-property-sort:
                          - unadjustedValue
                          description: Gross value.
                          properties:
                            unadjustedValue:
                              nullable: true
                              type: number
                              format: real
                              description: Value of the unadjusted dividend.
              meta:
