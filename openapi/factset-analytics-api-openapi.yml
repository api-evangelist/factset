                dates:
                  startdate: '20200101'
                  enddate: '20201215'
                  frequency: Monthly
                groups:
                - id: 5BCFFD17598FAEBD88EB4934EFB5FEF53849867D607ECEF232CD42D3369BBBCA
                  frequency: BeginningOfPeriod
                datasources:
                  portfoliopricingsources:
                  - id: 39A1C0C7BD46731552B29D913804EC5F3ED91E6B991AF298DEC88CCA2A9FC6B3
                  benchmarkpricingsources:
                  - id: 9BB2A3142C450AF54A7486C1D37A210A64474B2499A1E4A30E19801B9FC55E8C
                  useportfoliopricingsourcesforbenchmark: false
                currencyisocode: USD
                componentdetail: GROUPS
                content:
                  mandatory:
                  - accounts
                  - benchmarks
                  optional:
                  - groups
                  - columns
                  locked:
                  - dates
