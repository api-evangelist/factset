  /analytics/pub-datastore/tag-search/v1/tags:
    get:
      tags:
      - Analytics
      summary: Factset Gets a list of tag definitions for the user.
      description: Tag definitions consist of a name and a type. Use this end point to see a list of pre-existing tags that can be used to filter on the Documents end point.
      operationId: getTagsEndPoint
      parameters:
      - name: _paginationOffset
        in: query
        description: The offset integer on where to begin paginating
        schema:
          type: integer
          default: 0
      - name: _paginationLimit
        in: query
        description: The limit of records to return when paginating
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 50
      responses:
        '200':
          description: Expected response, returns a list of tag definitions the user has access to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '400':
