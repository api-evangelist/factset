          format: double
          example: 25.2970433246628
          x-fds-fql-formula: FFD_TRET({date},"3YR","NAV",{dividendAdjust})
          nullable: true
        fiveYearAnnualized:
          description: The five year annualized return for the requested id and date. The return type is determined by including or excluding dividends through the dividendAdjust parameter.
          type: number
          format: double
          example: null
          x-fds-fql-formula: FFD_TRET_ANN({date},"5YR","NAV",{dividendAdjust})
          nullable: true
        date:
          description: The date of the return in YYYY-MM-DD format.
          type: string
          format: date
          example: '2021-03-30'
          nullable: true
        requestId:
          description: The requested Id sent as input.
          type: string
          example: MABAX
    returns:
      title: Returns Object
      type: object
      properties:
        fsymId:
          description: FactSet Security Identifier. Six alpha-numeric characters, excluding vowels, with a -S suffix (XXXXXX-S), resolved from the requestId of the Fund requested.
          type: string
          example: FNK7XP-S
          x-fds-fql-formula: FSYM_SECURITY_PERM_ID('SECURITY')
          nullable: true
        return:
          description: The Return for the requested id and date. Adjusting the frequency of the time-series does not adjust the return calculation, and simply controls the display frequency. The return type is determined by including or excluding dividends through the dividendAdjust parameter.
          type: number
          format: double
          example: 25.2970433246628
          x-fds-fql-formula: FFD_TOTAL_RET
          nullable: true
        date:
          description: The date of the return in YYYY-MM-DD format.
          type: string
          format: date
          example: '2021-02-26'
          nullable: true
        currency:
          description: ISO3 Currency
          type: string
          example: USD
          nullable: true
        requestId:
          description: The requested Id sent as input.
          type: string
          example: MABAX
    dateSnapshot:
      type: string
      description: 'The date requested for a given date range in YYYY-MM-DD format. The date MUST be equal to or less than the `priceRecentDate` found within the /summary endpoint.

        '
      example: '2019-01-01'
    calendar:
      type: string
      enum:
      - FIVEDAY
      - SEVENDAY
