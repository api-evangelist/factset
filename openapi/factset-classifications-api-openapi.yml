openapi: 3.0.3
info:
  title: Factset Analytics Datastore About Classifications API
  description: Allow clients to fetch precalculated Analytics through predeterministic URLs.
  contact:
    name: FactSet Research Systems
    url: https://developer.factset.com/contact
    email: api@factset.com
  license:
    name: Apache License, Version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.factset.com
  description: Production
- url: https://api-sandbox.factset.com
  description: Sandbox
security:
- basicAuth: []
tags:
- name: Classifications
paths:
  /classifications/v1/gics:
    get:
      tags:
      - Classifications
      summary: Factset Gets the GICS Direct Classifications
      operationId: getGics
      description: 'Gets the **Global Industry Classification Standard ("GICS")** Sectors, Industry Group, Industry, and Sub-Industry Names and Numbers for a requested list of ids and date range. All economic sectors have a two-digit identification code, all industry groups have a four-digit identification code, all industries have a six-digit identification code, and all sub-industries have an eight-digit identification code. To access the complete GICS structure and definitions, visit the [MSCI GICS](https://www.msci.com/gics) or [S&P GICS](https://www.spglobal.com/spdji/en/landing/topic/gics/) home pages. Coverage includes over 37,000 securities.

        *Licensing for GICS Classifications, Regions, and History is required in addition to FactSet API license. Reach out to your FactSet Account Team for assistance.*

        '
      parameters:
      - $ref: '#/components/parameters/ids'
      - $ref: '#/components/parameters/startDate'
      - $ref: '#/components/parameters/endDate'
      - $ref: '#/components/parameters/frequency'
      - $ref: '#/components/parameters/calendar'
      responses:
        '200':
          description: GICS Response Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gicsResponse'
              examples:
                Multiple IDs as of latest month end:
                  $ref: '#/components/examples/gicsMultipleExample'
                Security with GICS Change:
                  $ref: '#/components/examples/gicsChangeExample'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
    post:
      tags:
      - Classifications
      summary: Factset Returns the GICS classifications for the requested 'ids' and date range.
      description: 'Gets the **Global Industry Classification Standard ("GICS")** Sectors, Industry Group, Industry, and Sub-Industry Names and Numbers for a requested list of ids and date range. All economic sectors have a two-digit identification code, all industry groups have a four-digit identification code, all industries have a six-digit identification code, and all sub-industries have an eight-digit identification code. To access the complete GICS structure and definitions, visit the [MSCI GICS](https://www.msci.com/gics) or [S&P GICS](https://www.spglobal.com/spdji/en/landing/topic/gics/) home pages. Coverage includes over 37,000 securities.

        *Licensing for GICS Classifications, Regions, and History is required in addition to FactSet API license. Reach out to your FactSet Account Team for assistance.*

        '
      operationId: postGics
      requestBody:
        required: true
        description: Requests GICS Classifications for the given identifier and date range.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/gicsRequest'
      responses:
        '200':
          description: GICS Direct Response Items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gicsResponse'
              examples:
                Multiple IDs as of latest month end:
                  $ref: '#/components/examples/gicsMultipleExample'
                Security with GICS Change:
                  $ref: '#/components/examples/gicsChangeExample'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '415':
          $ref: '#/components/responses/415'
        '500':
          $ref: '#/components/responses/500'
  /factset-funds/v1/classifications:
    get:
      tags:
      - Classifications
      summary: Factset Get Basic Fund Classifications
      operationId: getFundsClassifications
      description: 'Fetch basic fund classification data, such as Asset Class, Category, Focus, Niche, Region, and more.<p> FactSet Mutual Funds Reference uses FactSet''s proprietary Fund Classification System, which categorizes funds using a rules-based system that is derived from seven core classifications. This system evaluates the asset class, economic development level, and geographical region as described in each fund''s prospectus and marketing materials. Fund exposure details are presented on successively granular levels- category, then focus, and then niche. Moreover, FactSet Fund Reference captures over 40 unique data points for U.S. mutual funds. All data items are grouped in one of two levels, either as a Fund or as a Share Class.</p><p>For more details regarding FactSet''s Fund Classification, visit Online Assistant [21436](https://my.apps.factset.com/oa/pages/21436) or download - [FactSet Fund Classification System Rules & Methodology](https://my.apps.factset.com/oa/cms/oaAttachment/4547a2f4-5df5-4ec9-a0d3-7d51610dd637/26837)</p><p>

        |Classification Type|Description|

        |||

        |Asset Class|The asset class of the fund (e.g. Equity, Fixed Income, Currency, Commodities, Asset Allocation, or Alternatives) based on the fund''s mandate.|

        |Category|The 1st of 3 asset-class-specific, hierarchical exposure tiers; the broadest category the fund falls under within its asset class (e.g., Size & Style, Sector, Precious Metals, Absolute Returns); based on the fund''s mandate.|

        |Focus|The 2nd of 3 asset-class-specific, hierarchical exposure tiers; the fund''s classification within its category (e.g. Small Cap, Energy, Palladium, Long/Short); based on the fund''s mandate.|

        |Niche|The 3rd of 3 asset-class-specific, hierarchical exposure tiers; The fund''s classification within its Focus. Most granular tier of exposure sort (e.g., Growth, Coal, Physically held, Merger Arbitrage); based on the fund''s mandate.|

        |Economic Development Level|The country development level of the fund (Developed, Emerging, Frontier, or Blended) based on the fund''s mandate.|

        |Region|The broad regional exposure of the fund (e.g., Latin America, Asia-Pacific, Global) based on the fund''s mandate.|

        |Specific Geography|The specific geographic exposure of the fund (e.g., Developed Europe, Chile, Asia-Pacific Ex-Japan) based on the fund''s mandate.|

        </p>

        '
      parameters:
      - $ref: '#/components/parameters/ids_2'
      responses:
        '200':
          description: The Fund Summaries response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/classificationsResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403_2'
        '415':
          $ref: '#/components/responses/415_2'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Classifications
      summary: Factset Get Basic Fund Classifications for a Large List of Ids.
      description: 'Fetch basic fund classification data, such as Asset Class, Category, Focus, Niche, Region, and more.<p> FactSet Mutual Funds Reference uses FactSet''s proprietary Fund Classification System, which categorizes funds using a rules-based system that is derived from seven core classifications. This system evaluates the asset class, economic development level, and geographical region as described in each fund''s prospectus and marketing materials. Fund exposure details are presented on successively granular levels- category, then focus, and then niche. Moreover, FactSet Fund Reference captures over 40 unique data points for U.S. mutual funds. All data items are grouped in one of two levels, either as a Fund or as a Share Class.</p><p>For more details regarding FactSet''s Fund Classification, visit Online Assistant [21436](https://my.apps.factset.com/oa/pages/21436) or download - [FactSet Fund Classification System Rules & Methodology](https://my.apps.factset.com/oa/cms/oaAttachment/4547a2f4-5df5-4ec9-a0d3-7d51610dd637/26837)</p><p>

        |Classification Type|Description|

        |||

        |Asset Class|The asset class of the fund (e.g. Equity, Fixed Income, Currency, Commodities, Asset Allocation, or Alternatives) based on the fund''s mandate.|

        |Category|The 1st of 3 asset-class-specific, hierarchical exposure tiers; the broadest category the fund falls under within its asset class (e.g., Size & Style, Sector, Precious Metals, Absolute Returns); based on the fund''s mandate.|

        |Focus|The 2nd of 3 asset-class-specific, hierarchical exposure tiers; the fund''s classification within its category (e.g. Small Cap, Energy, Palladium, Long/Short); based on the fund''s mandate.|

        |Niche|The 3rd of 3 asset-class-specific, hierarchical exposure tiers; The fund''s classification within its Focus. Most granular tier of exposure sort (e.g., Growth, Coal, Physically held, Merger Arbitrage); based on the fund''s mandate.|

        |Economic Development Level|The country development level of the fund (Developed, Emerging, Frontier, or Blended) based on the fund''s mandate.|

        |Region|The broad regional exposure of the fund (e.g., Latin America, Asia-Pacific, Global) based on the fund''s mandate.|

        |Specific Geography|The specific geographic exposure of the fund (e.g., Developed Europe, Chile, Asia-Pacific Ex-Japan) based on the fund''s mandate.|

        </p>

        '
      operationId: getFundsClassificationsForList
      requestBody:
        required: true
        description: The Classifications request body, allowing the user to specify a list of ids.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/classificationsRequest'
      responses:
        '200':
          description: The Classifications response object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/classificationsResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403_2'
        '415':
          $ref: '#/components/responses/415_2'
        '500':
          $ref: '#/components/responses/500'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    ids_2:
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 1000
      description: 'The requested Fund Identifier. FactSet Identifiers, tickers, CUSIP and SEDOL are accepted input. <p>***ids limit** =  1000 per request*</p> *<p>Make note, GET Method URL request lines are also limited to a total length of 8192 bytes (8KB). In cases where the service allows for thousands of ids, which may lead to exceeding this request line limit of 8KB, its advised for any requests with large request lines to be requested through the respective "POST" method.</p>*

        '
      example:
      - MABAX
      - FCNTX
    gics:
      title: GICS Object
      type: object
      properties:
        fsymId:
          type: string
          description: FactSet Entity Identifier by default, otherwise returns FactSet Regional Identifier. This is a six alpha-numeric characters, excluding vowels, with an -E suffix (XXXXXX-E).
          example: 0FPWZZ-E
        date:
          description: Date in YYYY-MM-DD for the classification record from GICS Direct
          type: string
          format: date
          example: '2020-10-30'
        gicsSectorName:
          description: GICS Sector Name in Proper Format.
          type: string
          example: Communications Services
        gicsSectorNumber:
          description: GICS Sector Number
          type: string
          example: '50'
        gicsIndustryGroupName:
          description: GICS Industry Group Name in Proper Format.
          type: string
          example: Media & Entertainment
        gicsIndustryGroupNumber:
          description: GICS Industry Group Number
          type: string
          example: '5020'
        gicsIndustryName:
          description: GICS Industry Name in Proper Format.
          type: string
          example: Interactive Media & Services
        gicsIndustryNumber:
          description: GICS Industry Number
          type: string
          example: '502030'
        gicsSubIndustryName:
          description: GICS Sub-Industry Name in Proper Format.
          type: string
          example: Interactive Media & Services
        gicsSubIndustryNumber:
          description: GICS Industry Number.
          type: string
          example: '50203010'
        requestId:
          type: string
          description: Identifier specified in the request
          example: SPY-US
    classifications:
      title: Classifications Object
      type: object
      properties:
        fsymId:
          description: FactSet Security Identifier. Six alpha-numeric characters, excluding vowels, with a -S suffix (XXXXXX-S), resolved from the requestId of the Fund requested.
          type: string
          example: FNK7XP-S
          x-fds-fql-formula: FSYM_SECURITY_PERM_ID('SECURITY')
          nullable: true
        requestId:
          description: The requested Id sent as input.
          type: string
          example: MABAX
        assetClass:
          description: Returns the asset class description from FactSet's fund classification system. Asset class designates the fund's underlying holding type, e.g. equity, fixed-income, etc.
          type: string
          example: Equity
          x-fds-fql-formula: FFD_CLASS_ASSET
          nullable: true
        categoryClass:
          description: Returns the asset class category description from FactSet's fund classification system. The asset class category is the first-tier subcategory within the fund's asset class, e.g. size & style, sector, precious metals, etc.
          type: string
          example: Size and Style
          x-fds-fql-formula: FFD_CLASS_CAT
          nullable: true
        economicDevelopmentClass:
          description: Returns the fund's economic development description from FactSet's fund classification system. This description refers to the development level for the fund's geographic region of focus, e.g. developed, emerging, etc.
          type: string
          example: Developed Markets
          x-fds-fql-formula: FFD_CLASS_DEV
          nullable: true
        focusClass:
          description: Returns the fund's focus description from FactSet's fund classification system. The fund's focus is the second-tier subcategory within the fund's asset class, e.g. small cap, energy, etc.
          type: string
          example: Total Market
          x-fds-fql-formula: FFD_CLASS_FOCUS
          nullable: true
        geographicClass:
          description: Returns the fund's specific geography description from FactSet's fund classification system. Specific geography refers to the fund's particular geographic focus within the region, e.g. Chile, BRICs, etc.
          type: string
          example: U.S.
          x-fds-fql-formula: FFD_CLASS_GEO
          nullable: true
        nicheClass:
          description: Returns the fund's niche description from FactSet's fund classification system. The fund's niche is the third-tier subcategory with the fund's asset class, e.g. growth, coal, etc.
          type: string
          example: Value
          x-fds-fql-formula: FFD_CLASS_NICHE
          nullable: true
        regionClass:
          description: Returns the fund's region description from FactSet's fund classification system. Refers to the broad regional exposure of the fund's holdings, e.g. Latin America, Asia-Pacific, etc.
          type: string
          example: North America
          x-fds-fql-formula: FFD_CLASS_REG
          nullable: true
    ids:
      title: Security Ids
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 1000
      description: 'The requested list of security identifiers. Accepted ID types include Market Tickers, SEDOL, ISINs, CUSIPs, or FactSet Permanent Ids. <p>***ids limit** =  1000 per request*</p> *<p>Make note, GET Method URL request lines are also limited to a total length of 8192 bytes (8KB). In cases where the service allows for thousands of ids, which may lead to exceeding this request line limit of 8KB, its advised for any requests with large request lines to be requested through the respective "POST" method.</p>*

        '
      example:
      - AAPL-US
    calendar:
      title: Calendar
      type: string
      enum:
      - FIVEDAY
      - SEVENDAY
      default: FIVEDAY
      description: Calendar of data returned. SEVENDAY includes weekends.
      example: FIVEDAY
    endDate:
      title: End Date
      type: string
      description: Requested end date for Range expressed in YYYY-MM-DD format.
      example: '2019-12-31'
    errorResponse:
      type: object
      title: Error Response
      properties:
        status:
          description: status
          type: string
          example: Bad Request
        timestamp:
          description: timestamp in YYYY-MM-DD HH:MM:SS.SSS
          type: string
          example: '2019-11-01 11:09:41.918'
          format: date-time
        path:
          description: The Endpoint path {package}/version/{endpoint}
          type: string
          example: /classifications/v1/{endpoint}
        message:
          description: The plain text error message
          type: string
          example: Validation Error
        subErrors:
          description: subErrors related to the error message. Null if not applicable.
          type: object
          properties:
            object:
              description: the operation ID
              type: string
            field:
              description: Parameter Field Name
              type: string
            message:
              description: Error message
              type: string
            rejectedValue:
              description: Rejected Values in an Array
              type: array
              items:
                type: string
    classificationsRequest:
      title: Classifications Request Body
      description: Classifications Request Body
      type: object
      properties:
        ids:
          $ref: '#/components/schemas/ids_2'
      required:
      - ids
    classificationsResponse:
      type: object
      title: Classifications Response
      properties:
        data:
          description: Array of Classifications Objects
          type: array
          items:
            $ref: '#/components/schemas/classifications'
          example: []
    startDate:
      title: Start Date
      type: string
      description: Requested start date expressed in YYYY-MM-DD format.
      example: '2018-12-31'
    gicsResponse:
      title: GICS Response
      type: object
      properties:
        data:
          description: 'Array of GICS Objects, representing all requested ids and dates.

            '
          type: array
          items:
            $ref: '#/components/schemas/gics'
    gicsRequest:
      type: object
      title: GICS POST Request Model
      properties:
        ids:
          $ref: '#/components/schemas/ids'
        startDate:
          $ref: '#/components/schemas/startDate'
        endDate:
          $ref: '#/components/schemas/endDate'
        frequency:
          $ref: '#/components/schemas/frequency'
        calendar:
          $ref: '#/components/schemas/calendar'
      required:
      - ids
    errorResponse_3:
      type: object
      title: Error Response
      properties:
        status:
          description: status
          type: string
          example: Bad Request
        timestamp:
          description: timestamp in YYYY-MM-DD HH:MM:SS.SSS
          type: string
          example: '2019-11-01 11:09:41.918'
          format: date-time
        path:
          description: The Endpoint path {package}/version/{endpoint}
          type: string
          example: /factset-funds/v1/superRegion
        message:
          description: The plain text error message
          type: string
          example: Validation Error
        subErrors:
          description: subErrors related to the error message. Null if not applicable.
          type: object
          properties:
            object:
              description: the operation ID
              type: string
            field:
              description: Parameter Field Name
              type: string
            message:
              description: Error message
              type: string
            rejectedValue:
              description: Rejected Values in an Array
              type: array
              items:
                type: string
          example: example_value
    frequency:
      title: Frequency
      type: string
      enum:
      - D
      - W
      - M
      - AM
      - CQ
      - AY
      - CY
      default: M
      description: "Controls the display frequency of the data returned.\n  * **D** = Daily\n  * **W** = Weekly, based on the last day of the week of the start date.\n  * **M** = Monthly, based on the last trading day of the month.\n  * **AM** = Monthly, based on the start date (e.g., if the start date is June 16, data is displayed for June 16, May 16, April 16 etc.). \n  * **CQ** = Quarterly based on the last trading day of the calendar quarter (March, June, September, or December).\n  * **AY** = Actual Annual, based on the start date.\n  * **CY** = Calendar Annual, based on the last trading day of the calendar year.\n"
      example: M
  examples:
    forbidden_2:
      summary: Forbidden
      description: The USERNAME-SERIAL attempted to request the endpoint is not authorized to access. The request was a legal request, but the server is refusing to respond. Please reach out to FactSet Account Team for assistance with authorization.
      value:
        status: Forbidden
        timestamp: '2020-06-12 16:08:51.731'
        path: /factset-funds/v1/{endpoint}
        message: USERNAME-SERIAL does not have permission to use /factset-funds /v1/{endpoint}
        subErrors: null
    badRequestInvalidParameters:
      summary: Bad Request - Invalid Parameters
      description: This error message occurs when a request parameter is used in which is not recognized by the service. Please revise your request to include only the parameters listed in the specification. Typical causes are spelling mistakes and use of improper casing.
      value:
        status: Bad Request
        timestamp: '2020-06-12 15:58:54.068'
        path: /classifications/v1/{endpoint}
        message: 'Invalid Parameter (s): fakeParameterName1 fakeParameterName2. Please modify your request to use parameters outlined in the specification for this endpoint.'
        subErrors: null
    badRequestDateFormat:
      summary: Bad Request - Date Format
      description: This bad request occurs when a request doesn't use the YYYY-MM-DD in the date parameters. To resolve, convert your date to YYYY-MM-DD.
      value:
        status: Bad Request
        timestamp: '2019-10-31 16:08:07.945'
        path: /classifications/v1/{endpoint}
        message: 'The date parameter ''startDate'' must be in the following date format: YYYY-MM-DD'
        subErrors: null
    notWritable:
      summary: Internal Server Error - Not Writable
      description: This error may be returned when the server encounters an error writing the JSON response.
      value:
        status: Internal Server Error
        timestamp: '2019-11-05 09:48:29.18'
        path: /classifications/v1/{endpoint}
        message: Error writing JSON output
        subErrors: null
    unsupportedMediaType:
      summary: Unsupported Media Type
      description: This bad request occurs when the media type passed in the request is not supported. Currently the APIs only support 'application/json'.
      value:
        status: Unsupported Media Type
        timestamp: '2019-11-05 09:42:27.237'
        path: /classifications/v1/{endpoint}
        message: text/html media type is not supported. Supported media types are application/json
        subErrors: null
    generalException:
      summary: Internal Server Error - General Exception
      description: This is the most general error that can be returned to by the service. Please `Report Issue` to FactSet.
      value:
        status: Internal Server Error
        timestamp: '2019-11-01 10:36:01.944'
        path: /classifications/v1/{endpoint}
        message: Unexpected error
        subErrors: null
    gicsChangeExample:
      summary: Fetching GICS Classifications for Security with Changes
      description: Fetching Acadia Realty Trust (AKR-US) in 2016 over period in which classifications changed from Financials to Real Estate.
      value:
        data:
        - date: '2016-08-31'
          fsymId: 00263C-E
          gicsIndustryGroupName: Real Estate
          gicsIndustryGroupNumber: '4040'
          gicsIndustryName: Real Estate Investment Trusts (REITs)
          gicsIndustryNumber: '404020'
          gicsSectorName: Financials
          gicsSectorNumber: '40'
          gicsSubIndustryName: Retail REITs
          gicsSubindustryNumber: '40402060'
          requestId: AKR-US
        - date: '2016-09-30'
          fsymId: 00263C-E
          gicsIndustryGroupName: Real Estate
          gicsIndustryGroupNumber: '6010'
          gicsIndustryName: Equity Real Estate Investment Trusts (REITs)
          gicsIndustryNumber: '601010'
          gicsSectorName: Real Estate
          gicsSectorNumber: '60'
          gicsSubIndustryName: Retail REITs
          gicsSubindustryNumber: '60101070'
          requestId: AKR-US
    badRequestReadTimeout:
      summary: Bad Request - Read Timeout
      description: This error may be returned if it takes more than 29 seconds to hear back from the data fetch service.
      value:
        status: Bad Request
        timestamp: '2019-11-04 16:18:38.949'
        path: /classifications/v1/{endpoint}
        message: The request took too long. Try again with a smaller request.
        subErrors: null
    badRequestFutureDate:
      summary: Bad Request - Future Date
      description: This error message occurs when a future date is requested in the startDate and endDate parameters. Please revise your request to include dates as of today's current date or any prior historical date.
      value:
        status: Bad Request
        timestamp: '2020-06-12 15:52:48.091'
        path: /classifications/v1/{endpoint}
        message: The use of future dates is not applicable in this endpoint. Please revise your request to include dates up to today's current date.
        subErrors: null
    forbidden:
      summary: Forbidden
      description: The USERNAME-SERIAL attempted to request the endpoint is not authorized to access. The request was a legal request, but the server is refusing to respond. Please reach out to FactSet Account Team for assistance with authorization.
      value:
        status: Forbidden
        timestamp: '2020-06-12 16:08:51.731'
        path: /classifications/v1/{endpoint}
        message: USERNAME-SERIAL does not have permission to use /classifications/v1/{endpoint}
        subErrors: null
    unauthenticated:
      summary: User Authentication Failed
      description: This occurs when a user is not properly authenticated or recognized by the service. Please double check the USERNAME-SERIAL and API-Key used to request and ensure you are within the IP range specified for the Key. Report Issue under 401 error for help with troubleshooting.
      value:
        status: User Authentication Failed
        timestamp: '2019-10-31 16:08:07.945'
        path: /classifications/v1/{endpoint}
        message: User Authentication Failed.
        subErrors: null
    unsupportedMediaType_2:
      summary: Unsupported Media Type
      description: This bad request occurs when the media type passed in the request is not supported. Currently the APIs only support 'application/json'.
      value:
        status: Unsupported Media Type
        timestamp: '2019-11-05 09:42:27.237'
        path: /factset-funds/v1/{endpoint}
        message: text/html media type is not supported. Supported media types are application/json
        subErrors: null
    badRequestMalformedJSON:
      summary: Bad Request - Malformed JSON Request
      description: This error may be returned when the request body is specified as JSON, but is not in proper JSON format.
      value:
        status: Bad Request
        timestamp: '2019-11-05 09:48:29.18'
        path: /classifications/v1/{endpoint}
        message: Malformed JSON Request
        subErrors: null
    gicsMultipleExample:
      summary: Fetching GICS Direct Classifications for two securities
      description: Fetching GICS Direct Classifications for XOM and APPL as of latest completed period.
