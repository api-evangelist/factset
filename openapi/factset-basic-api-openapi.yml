      - name: searchValue
        in: query
        schema:
          type: string
          minLength: 3
          exclusiveMinimum: false
          maxLength: 200
          exclusiveMaximum: false
          pattern: ^[ -!#-&(-+--/0-:=?-Za-z\w"]*$
