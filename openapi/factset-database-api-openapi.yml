        '200':
          description: Creates and responds with ofdb path
          headers:
            X-DataDirect-Request-Key:
              $ref: '#/components/headers/X-DataDirect-Request-Key'
            X-FactSet-Api-Request-Key:
              $ref: '#/components/headers/X-FactSet-Api-Request-Key'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDatabase'
          links:
            GetDataByPath:
              operationId: GetData
              parameters:
                path: $response.body#/path
              description: 'The `path` value returned in the response can be used as the `path` parameter in `GET /v1/database/{path}/data`.

                '
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '404':
          $ref: '#/components/responses/404Response'
        '406':
          $ref: '#/components/responses/406Response'
        '429':
          $ref: '#/components/responses/429Response'
        '500':
          $ref: '#/components/responses/500Response'
        '503':
          $ref: '#/components/responses/503Response'
components:
  schemas:
    AddDates:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              date:
                type: integer
                description: Date unique to the database.
                example: 20220202
              content:
                type: array
                items:
                  type: object
                  properties:
                    symbol:
                      type: string
                    field:
                      type: integer
    Symbols:
      type: array
      items:
        type: string
        example: FDS
    UpdateDate:
      type: object
      description: Set of fields along with symbol is mandatory to update the date.
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              content:
                type: array
                items:
                  type: object
                  properties:
                    symbol:
                      type: string
                    field:
                      type: integer
          description: date has to be provide in case 3d OFDB with date and atleast one iterative field
          example:
          - content:
            - symbol: FDS
              price: 100
    Fields:
      type: array
      items:
        type: object
        properties:
          description:
            type: string
          iteration:
            type: string
            enum:
            - 2D
            - 3D
          name:
            type: string
          size:
            type: integer
          splitDirection:
            type: string
            enum:
            - NONE
            - NORMAL
            - REVERSE
          type:
            type: string
            enum:
            - INT
            - FLOAT
            - DOUBLE
            - CHAR
            - LONG_CHAR
            - STRING
            - DATE
          codePageFlag:
            type: string
            enum:
            - ASCII
    BulkDelete:
      type: object
      properties:
        data:
          type: array
          items:
            description: Users may provide any combination of a symbol, date, and/or field to perform a bulk delete operation. For example, if a user provides both a symbol and a date within the same data point {} then the endpoint will delete the symbol for just that date. If they provide a symbol, date, and field then the endpoint will delete just that singular field entry point for that date for the given symbol. Providing singular entities within a {} will delete the complete data for that given value.
            type: object
            properties:
              symbol:
                type: string
              date:
                type: integer
              field:
                type: string
          example:
          - symbol: FDS
          - date: 20220202
          - field: PRICE
          - symbol: AAPL
            date: 20230303
          - symbol: TSLA
            date: 20240404
            field: SHARES
    BulkDeleteArrayItemNested:
      oneOf:
      - type: object
        additionalProperties:
          type: array
          items:
            type: integer
      - type: array
        items:
          type: integer
    SuccessPostResponse:
      type: object
      description: Response format of any kind of post response
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              description: id of the newly created resource
    DatabaseSchema:
      type: object
      properties:
        data:
          type: object
          properties:
            path:
              type: string
              example: CLIENT:this_is_a_test_.OFDB
            description:
              type: string
              example: A user would fill this with relevant information
            fields:
              $ref: '#/components/schemas/Fields'
    AddFields:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Fields'
    rolloverResponse:
      type: object
      title: Rollover Response
      properties:
        data:
          description: Array of `Database Rollover` objects.
          type: array
          items:
            $ref: '#/components/schemas/rollover'
          example: []
    errorResponse:
      type: object
      title: Error Response
      properties:
        status:
          description: status
          type: string
          example: Bad Request
        timestamp:
          description: timestamp in YYYY-MM-DD HH:MM:SS.SSS
          type: string
          example: '2019-11-01 11:09:41.918'
          format: date-time
        path:
          description: The Endpoint path {package}/version/{endpoint}
          type: string
          example: /factset-prices/v1/prices
        message:
          description: The plain text error message
          type: string
          example: Validation Error
        subErrors:
          description: subErrors related to the error message. Null if not applicable.
          type: object
          properties:
            object:
              description: the operation ID
              type: string
            field:
              description: Parameter Field Name
              type: string
            message:
              description: Error message
              type: string
            rejectedValue:
              description: Rejected Values in an Array
              type: array
              items:
                type: string
          example: example_value
    Dates:
      type: array
      items:
        type: integer
        example: 20220202
    BulkDeleteArrayItem:
      anyOf:
      - type: object
        additionalProperties:
          $ref: '#/components/schemas/BulkDeleteArrayItemNested'
      - type: array
        items:
          type: string
    BulkDeleteArray:
      type: array
      description: 'A list of the various backend responses needed for the bulk delete. These typically contain data points that failed to be deleted, and are in the order of: <br>Delete values by symbol, date, and field + delete values by symbol and field <br>Delete dates by field + delete dates <br>Delete dates by symbol <br>Delete fields <br>Delete symbols'
      items:
        $ref: '#/components/schemas/BulkDeleteArrayItem'
    UpdateDates:
      type: object
      description: Set of fields along with symbol is mandatory to update the date.
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              date:
                type: integer
              content:
                type: array
                items:
                  type: object
                  properties:
                    symbol:
                      type: string
                    field:
                      type: integer
          description: date has to be provide in case 3d OFDB with date and atleast one iterative field
          example:
          - date: 20220202
            content:
            - symbol: FDS
              price: 100
    CreateDatabase:
      type: object
      properties:
        data:
          type: object
          properties:
            path:
              type: string
              description: path of the newly created database.
    UpdateSymbol:
      type: object
      description: Any arbitary set of fields that are provided while creating the ofdb and their values.
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              content:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: integer
                    field1:
                      type: integer
                    field2:
                      type: string
                description: date must be provided in the case of a 3d ofdb with at least one iterative field
    UpdateSymbols:
      type: object
      description: Any arbitrary set of fields that are provided while creating the ofdb and their values.
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              symbol:
                type: string
              content:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: integer
                    field1:
                      type: integer
                    field2:
                      type: string
                description: date must be provided in the case of a 3d ofdb with at least one iterative field
    AddSymbols:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              symbol:
                type: string
                description: Names of the symbol and unique to this database
              content:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: integer
                    field:
                      type: string
                description: date must be provided in the case of a 3d ofdb with atleast one iterative field
    rollover:
      title: Rollover Object
      type: object
      properties:
        americasRollTime:
          description: Time of last zero date rollover for the Americas. This is in Eastern Time Zone. The date-time format is expressed as [YYYY-MM-DD]T[HH:MM:SSS], following ISO 8601.
          type: string
          format: date-time
          example: '2020-06-18T02:52:21.000'
          nullable: true
        americasZeroDate:
          description: Current relative zero date for the Americas. Date is expressed in Eastern Time and expressed as YYYY-MM-DD.
          type: string
          format: date
          example: '2020-06-17'
          nullable: true
        asiapacificRollTime:
          description: Time of last zero date rollover for Asia/Pacific. This is in Eastern Time Zone. The date-time format is expressed as [YYYY-MM-DD]T[HH:MM:SSS], following ISO 8601.
          type: string
          format: date-time
          example: '2020-06-18T12:50:30.000'
          nullable: true
        asiapacificZeroDate:
          description: Current relative zero date for Asia/Pacific. This is in Eastern Time Zone
          type: string
          format: date
          example: '2020-06-18'
          nullable: true
        europeRollTime:
          description: Time of last zero date rollover for Europe. This is in Eastern Time Zone. The date-time format is expressed as [YYYY-MM-DD]T[HH:MM:SSS], following ISO 8601.
          type: string
          format: date-time
          example: '2020-06-17T21:50:36.000'
          nullable: true
        europeZeroDate:
          description: Current relative zero date for Europe. This is in Eastern Time Zone
          type: string
          format: date
          example: '2020-06-17'
          nullable: true
  responses:
    201LongRunningResponse:
      description: Returns when the long running request is completed. The next pickup URL is provided by the Location header.
      headers:
        Location:
          $ref: '#/components/headers/Long-Running-Location'
        X-DataDirect-Request-Key:
          $ref: '#/components/headers/X-DataDirect-Request-Key'
        X-FactSet-Api-Request-Key:
          $ref: '#/components/headers/X-FactSet-Api-Request-Key'
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
