                isEstimatedTotal:
                  type: boolean
                  description: This field acts as a flag for the exact count of results and is defaulted to false as the API should always return the exact count of results.
                limit:
                  type: integer
                  description: Number of results returned per page.
                offset:
                  type: integer
                  description: The flag indicating the position in the results array if additional results are available beyond the default value or the value in _paginationLimit parameter (if used). This value is passed in the _paginationOffset parameter to retrieve subsequent results.
            partial:
              type: object
              properties:
                isPartial:
                  type: boolean
                  description: If the value is True, it indicates additional results are available. False represents that this is the last set of results for this request.
          example: example_value
  parameters:
    reportId:
      schema:
        type: integer
        format: int32
      in: query
      name: reportId
      example: 2683372
      description: Unique identifier for an event.
    ticker:
      schema:
        type: string
      in: query
      name: ticker
      example: AZZ-US
      description: Ticker-region identifier for the company hosting the event.
    paginationLimit:
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 500
        default: 200
      in: query
      name: _paginationLimit
      example: 5
      description: Specifies the  number of results to return per page. [ Min=0; Max=500]
    paginationOffset:
      schema:
        type: integer
        format: int32
        default: 0
      in: query
      name: _paginationOffset
      description: Specifies the starting point for pagination. This parameter is used to identify the beginning of next set of results.
    speakerSort:
      schema:
        type: string
        default: startDate
        enum:
        - startDate
        - -startDate
      in: query
      name: _sort
      description: Enables to get the data in chronological or reverse chronological order. Results are in chronological order if this parameter is not used.
    audioSourceId:
      schema:
        type: integer
        format: int32
      in: query
      name: audioSourceId
      example: 471849
      required: true
      description: Unique ID for an Internal recording specific to reportID. For example, ReportID X would have multiple recordings from different source (dial-in or webcast). One ReportID can have multiple AudioSourceIDs.
    audioSourceId1:
      schema:
        type: integer
        format: int32
      in: query
      name: audioSourceId
      example: 471849
      required: false
      description: Unique ID for an Internal recording specific to reportID. For example, ReportID X would have multiple recordings from different source (dial-in or webcast). One ReportID can have multiple AudioSourceIDs.
    callSort:
      schema:
        type: string
        enum:
        - startDate
        - -startDate
        default: -startDate
      in: query
      name: _sort
      description: Enables to get the data in chronological or reverse chronological order based on startDate. Results are in reverse chronological order if this parameter is not used.
    entityId:
      schema:
        type: string
      in: query
      name: entityId
      example: 000CGP-E
      description: Factset entity level identifier for the company hosting the event.
    indexedpaginationLimit:
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 50
        default: 25
      in: query
      name: _paginationLimit
      example: 5
      description: Specifies the  number of results to return per page. [ Min=0; Max=50 ]
    callStatus:
      schema:
        type: string
        enum:
        - inProgress
        - ended
        - ewn
        - issueAtSource
      in: query
      name: callStatus
      description: Status of the call i.e. ended or inProgress or ewn or issueAtSource.
