- name: get_equity_prices
  description: Retrieve global end-of-day equity prices for one or more securities over a date range.
- name: get_company_fundamentals
  description: Retrieve fundamental financial data for a company (revenue, EBITDA, EPS, margins, balance sheet).
- name: get_consensus_estimates
  description: Retrieve sell-side analyst consensus estimates for a company (revenue, EPS, EBITDA forecasts).
- name: search_entities
  description: Search for companies, funds, or other financial entities by name, ticker, or identifier.
- name: get_ownership_data
  description: Retrieve institutional and mutual fund ownership data for a security.
- name: get_ma_intelligence
  description: Retrieve M&A transaction data including deal details, value, status, and advisors.
- name: get_people_data
  description: Retrieve executives, board members, and key personnel at a company.
- name: get_geographic_revenue
  description: Retrieve geographic revenue segment breakdown by region or country for a company.
- name: get_supply_chain
  description: Retrieve supply chain relationship data including key suppliers and customers.
- name: get_events
  description: 'Retrieve corporate events for companies: earnings calls, dividends, splits, conferences.'
